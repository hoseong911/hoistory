<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>관리자 모드 — 인천동양중학교</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --glass: rgba(255,255,255,0.05);
  --glass-hover: rgba(255,255,255,0.08);
  --glass-border: rgba(255,255,255,0.10);
  --glass-strong: rgba(255,255,255,0.12);
  --text: #e6edf3;
  --text2: #8b949e;
  --text3: #484f58;
  --accent: #58a6ff;
  --accent2: #79c0ff;
  --success: #3fb950;
  --danger: #f85149;
  --warn: #d29922;
  --gold: #e3b341;
  --sans: 'Noto Sans KR', sans-serif;
  --serif: 'Noto Serif KR', serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: var(--sans);
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 50% at 20% 0%, rgba(88,166,255,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(63,185,80,0.06) 0%, transparent 60%);
  color: var(--text);
  min-height: 100vh;
}

/* ── 토스트 ── */
#toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
  background: rgba(22,27,34,0.95); backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border); border-radius: 20px;
  padding: 10px 20px; font-size: 14px; color: var(--text);
  z-index: 9999; transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap; pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ══ 로그인 화면 ══ */
#screen-login {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 32px 20px;
}
.login-logo {
  font-size: 40px; margin-bottom: 20px;
  filter: drop-shadow(0 0 20px rgba(88,166,255,0.4));
}
.login-title {
  font-family: var(--serif); font-size: 22px; font-weight: 600;
  color: var(--text); margin-bottom: 6px; text-align: center;
}
.login-sub { font-size: 13px; color: var(--text2); margin-bottom: 36px; text-align: center; }
.login-card {
  width: 100%; max-width: 360px;
  background: var(--glass); backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border); border-radius: 16px;
  padding: 28px 24px;
}
.g-label { font-size: 12px; color: var(--text2); margin-bottom: 8px; display: block; }
.g-input {
  width: 100%; padding: 12px 16px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
  border-radius: 10px; font-size: 16px; color: var(--text); font-family: var(--sans);
  margin-bottom: 14px; outline: none; transition: border-color .2s, box-shadow .2s;
}
.g-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88,166,255,0.12); }
.g-input::placeholder { color: var(--text3); }
.g-btn {
  width: 100%; padding: 13px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: var(--sans); transition: opacity .15s, transform .12s;
}
.g-btn:active { transform: translateY(1px); opacity: .9; }
.login-err { font-size: 13px; color: var(--danger); margin-top: 12px; text-align: center; display: none; }

/* ══ 메인 (로그인 후) ══ */
#screen-main { display: none; min-height: 100vh; }

/* 상단 헤더 */
.admin-header {
  background: rgba(13,17,23,0.9); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--glass-border);
  padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.admin-header-title { font-size: 15px; font-weight: 700; color: var(--text); }
.admin-header-badge {
  font-size: 11px; background: rgba(88,166,255,0.15);
  border: 1px solid rgba(88,166,255,0.3); color: var(--accent);
  padding: 4px 10px; border-radius: 20px;
}

/* 활동 선택 */
#screen-select {
  padding: 28px 20px; max-width: 480px; margin: 0 auto;
}
.select-heading {
  font-size: 13px; color: var(--text2); margin-bottom: 16px; letter-spacing: .06em;
}
.activity-card {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 16px; padding: 20px; margin-bottom: 12px;
  cursor: pointer; transition: background .2s, border-color .2s, transform .12s;
  display: flex; align-items: center; gap: 16px;
}
.activity-card:hover { background: var(--glass-hover); border-color: rgba(255,255,255,0.18); }
.activity-card:active { transform: scale(.98); }
.activity-icon { font-size: 32px; flex-shrink: 0; }
.activity-info { flex: 1; }
.activity-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.activity-desc { font-size: 13px; color: var(--text2); }
.activity-arrow { font-size: 18px; color: var(--text3); }

/* ══ 활동 관리 공통 ══ */
#screen-activity { display: none; }
.back-row {
  padding: 14px 20px 0; max-width: 700px; margin: 0 auto;
}
.back-btn-sm {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 8px; padding: 7px 14px; font-size: 13px; color: var(--text2);
  cursor: pointer; font-family: var(--sans); transition: background .2s;
}
.back-btn-sm:hover { background: var(--glass-hover); }

/* 탭 네비 */
.act-tab-nav {
  display: flex; overflow-x: auto; gap: 4px;
  padding: 14px 20px 0; max-width: 700px; margin: 0 auto;
  border-bottom: 1px solid var(--glass-border); margin-top: 12px;
}
.act-tab-btn {
  padding: 10px 16px; font-size: 13px; font-weight: 500;
  color: var(--text2); cursor: pointer; border: none; background: transparent;
  font-family: var(--sans); border-bottom: 2px solid transparent;
  white-space: nowrap; transition: color .2s, border-color .2s;
}
.act-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* 탭 콘텐츠 */
.act-tab-body { display: none; padding: 20px; max-width: 700px; margin: 0 auto 80px; }
.act-tab-body.show { display: block; }

/* 섹션 타이틀 */
.s-title {
  font-size: 13px; font-weight: 700; color: var(--text2);
  letter-spacing: .08em; text-transform: uppercase; margin-bottom: 12px; margin-top: 24px;
}
.s-title:first-child { margin-top: 0; }

/* 글래스 카드 */
.g-card {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 14px; padding: 16px; margin-bottom: 12px;
}

/* 토글 버튼 */
.toggle-btn {
  width: 100%; padding: 14px; border-radius: 12px; border: none;
  font-size: 14px; font-weight: 700; cursor: pointer; font-family: var(--sans);
  margin-bottom: 8px; transition: all .2s;
}
.toggle-btn.on {
  background: rgba(63,185,80,0.12); color: var(--success);
  border: 1px solid rgba(63,185,80,0.3);
}
.toggle-btn.off {
  background: rgba(248,81,73,0.10); color: var(--danger);
  border: 1px solid rgba(248,81,73,0.25);
}
.toggle-btn.warn {
  background: rgba(248,81,73,0.10); color: var(--danger);
  border: 1px solid rgba(248,81,73,0.25);
}

/* 미션 편집 카드 */
.mission-edit-card {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 12px; margin-bottom: 10px; overflow: hidden;
}
.mec-header {
  padding: 14px 16px; display: flex; align-items: center;
  justify-content: space-between; cursor: pointer;
  transition: background .15s;
}
.mec-header:hover { background: var(--glass-hover); }
.mec-left { display: flex; align-items: center; gap: 10px; }
.mec-num { font-size: 11px; color: var(--text3); }
.mec-title-text { font-size: 14px; font-weight: 500; color: var(--text); }
.mec-arrow { font-size: 12px; color: var(--text3); transition: transform .2s; }
.mission-edit-card.open .mec-arrow { transform: rotate(180deg); }
.mec-body { display: none; padding: 14px 16px; border-top: 1px solid var(--glass-border); }
.mission-edit-card.open .mec-body { display: block; }
.f-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; margin-top: 12px; display: block; }
.f-label:first-child { margin-top: 0; }
.f-input {
  width: 100%; padding: 10px 12px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
  border-radius: 8px; font-size: 14px; color: var(--text); font-family: var(--sans);
  outline: none; transition: border-color .2s;
}
.f-input:focus { border-color: var(--accent); }
.f-textarea {
  width: 100%; padding: 10px 12px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
  border-radius: 8px; font-size: 14px; color: var(--text); font-family: var(--sans);
  resize: vertical; min-height: 80px; outline: none; line-height: 1.6;
  transition: border-color .2s;
}
.f-textarea:focus { border-color: var(--accent); }
.mec-save-btn {
  width: 100%; margin-top: 12px; padding: 11px;
  background: rgba(88,166,255,0.15); border: 1px solid rgba(88,166,255,0.3);
  border-radius: 8px; color: var(--accent); font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: var(--sans); transition: background .15s;
}
.mec-save-btn:hover { background: rgba(88,166,255,0.22); }
.saved-badge { font-size: 11px; color: var(--success); margin-top: 6px; opacity: 0; transition: opacity .3s; display: block; }
.saved-badge.show { opacity: 1; }

/* ── 활동1 전용: 요약 카드 ── */
.stat-row {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px;
}
.stat-card {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 12px; padding: 14px 10px; text-align: center;
}
.stat-num { font-family: var(--serif); font-size: 28px; font-weight: 600; color: var(--gold); }
.stat-label { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* ── 활동2 전용: 학생 카드 ── */
.student-card {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 12px; margin-bottom: 10px; overflow: hidden;
}
.sc-header {
  padding: 14px 16px; display: flex; align-items: center;
  justify-content: space-between; cursor: pointer; transition: background .15s;
}
.sc-header:hover { background: var(--glass-hover); }
.sc-info { display: flex; align-items: center; gap: 12px; }
.sc-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(88,166,255,0.15); border: 1px solid rgba(88,166,255,0.25);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px; color: var(--accent); flex-shrink: 0;
}
.sc-name { font-size: 14px; font-weight: 700; color: var(--text); }
.sc-id { font-size: 11px; color: var(--text2); margin-top: 2px; }
.mission-pills { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; max-width: 120px; }
.mpill {
  font-size: 9px; padding: 2px 7px; border-radius: 99px;
}
.mpill.done { background: rgba(63,185,80,0.12); color: var(--success); border: 1px solid rgba(63,185,80,0.25); }
.mpill.todo { background: rgba(255,255,255,0.05); color: var(--text3); border: 1px solid var(--glass-border); }
.sc-detail { display: none; padding: 14px 16px; border-top: 1px solid var(--glass-border); }
.student-card.open .sc-detail { display: block; }
.mission-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--glass-border);
}
.mission-row:last-child { border-bottom: none; }
.mr-left { display: flex; align-items: center; gap: 10px; }
.mr-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.mr-dot.done { background: var(--success); }
.mr-dot.todo { background: var(--text3); }
.mr-name { font-size: 13px; color: var(--text); font-weight: 500; }
.mr-time { font-size: 11px; color: var(--text2); margin-top: 1px; }
.photo-view-btn {
  font-size: 11px; color: var(--accent);
  background: rgba(88,166,255,0.10); border: 1px solid rgba(88,166,255,0.2);
  border-radius: 6px; padding: 4px 10px; cursor: pointer; font-family: var(--sans);
  transition: background .15s;
}
.photo-view-btn:hover { background: rgba(88,166,255,0.18); }
.search-input {
  width: 100%; padding: 11px 14px; margin-bottom: 14px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
  border-radius: 10px; font-size: 14px; color: var(--text); font-family: var(--sans);
  outline: none; transition: border-color .2s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text3); }

/* ── 마커 편집 ── */
.marker-map-wrap {
  position: relative; overflow: auto;
  border: 1px solid var(--glass-border); border-radius: 12px;
  background: #1a1a2e; cursor: crosshair; margin-bottom: 16px;
}
#map-aspect {
  position: relative; width: 200%; height: 0;
  padding-bottom: calc(830 / 1022 * 100%);
}
#marker-map-img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: fill; display: block; pointer-events: none;
}
.edit-marker {
  position: absolute; transform: translate(-50%, -100%);
  cursor: grab; z-index: 10; user-select: none;
}
.edit-marker:active { cursor: grabbing; }
.edit-marker-pin {
  width: 24px; height: 24px;
  background: var(--accent); border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
  border: 2px solid white; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 10px rgba(0,0,0,0.5);
}
.edit-marker-num { transform: rotate(45deg); font-size: 10px; font-weight: 700; color: white; }
.edit-marker-label {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: rgba(13,17,23,0.9); color: var(--text); padding: 2px 8px; border-radius: 4px;
  font-size: 9px; font-weight: 700; white-space: nowrap; pointer-events: none;
  border: 1px solid var(--glass-border);
}
.coord-list {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 12px; overflow: hidden; margin-bottom: 14px;
}
.coord-row {
  display: flex; align-items: center; padding: 12px 14px; gap: 12px;
  border-bottom: 1px solid var(--glass-border);
}
.coord-row:last-child { border-bottom: none; }
.coord-name { font-size: 13px; color: var(--text); flex: 1; font-weight: 500; }
.coord-val { font-size: 11px; color: var(--text2); font-family: monospace; }
.coord-reset {
  font-size: 11px; color: var(--danger); background: none;
  border: 1px solid rgba(248,81,73,0.3); padding: 4px 8px; border-radius: 6px; cursor: pointer;
}

/* 사진 모달 */
#photo-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(13,17,23,0.85); backdrop-filter: blur(16px);
  z-index: 8000; justify-content: center; align-items: center; padding: 20px;
}
#photo-modal.show { display: flex; }
.pm-inner {
  background: rgba(22,27,34,0.95); backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border); border-radius: 16px;
  padding: 20px; max-width: 500px; width: 100%;
}
.pm-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
}
.pm-title { font-size: 15px; font-weight: 700; color: var(--text); }
.pm-close {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 50%; width: 28px; height: 28px; font-size: 14px;
  cursor: pointer; color: var(--text2); display: flex; align-items: center; justify-content: center;
}
#modal-img {
  width: 100%; border-radius: 10px; max-height: 60vh;
  object-fit: contain; background: var(--glass);
}
.modal-loading { text-align: center; padding: 40px; font-size: 13px; color: var(--text2); }

/* 공통 저장 버튼 */
.save-big-btn {
  width: 100%; padding: 14px;
  background: rgba(88,166,255,0.15); border: 1px solid rgba(88,166,255,0.3);
  border-radius: 12px; color: var(--accent); font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: var(--sans); transition: background .15s;
}
.save-big-btn:hover { background: rgba(88,166,255,0.22); }
.empty-state {
  text-align: center; padding: 48px 20px; color: var(--text2); font-size: 13px;
}
</style>
</head>

window.showToast = function(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
};
function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

}

window.saveA1Mission = function(id) {
  const el = document.getElementById(`a1-ans-${id}`);
  if (!el) { showToast('이 유형은 편집 불필요'); return; }
  const answers = el.value.split(',').map(s => s.trim()).filter(Boolean);
  adminEdits[id] = { answers };
  // GAS에 저장
  fetch(GAS_URL, {
    method: 'POST', mode: 'no-cors',
    body: JSON.stringify({ type: 'adminEdit', missionId: id, answers })
  }).catch(() => {});
  const badge = document.getElementById(`a1-saved-${id}`);
  badge.classList.add('show');
  setTimeout(() => badge.classList.remove('show'), 2000);
  showToast(`M${id+1} 저장 완료`);
};

        <span class="saved-badge" id="a2-saved-${key}">✓ 저장됨</span>
      </div>
    </div>`;
  }).join('');
}

window.saveA2Mission = async function(key) {
  const title  = document.getElementById(`mec2-title-${key}`)?.value.trim();
  const desc   = document.getElementById(`mec2-desc-${key}`)?.value.trim();
  const verify = document.getElementById(`mec2-verify-${key}`)?.value.trim();
  if (!title || !desc || !verify) { showToast('모든 항목을 입력해주세요'); return; }
  try {
    await set(ref(db, `missionData/${key}`), { title, desc, verify });
    currentMissions1883[key] = { ...currentMissions1883[key], title, desc, verify };
    const badge = document.getElementById(`a2-saved-${key}`);
    badge.classList.add('show');
    setTimeout(() => badge.classList.remove('show'), 2000);
    showToast(`✅ ${key} 저장 완료`);
  } catch(e) { showToast('저장 실패: ' + e.message); }
};

/* ── 대시보드 ── */
function loadDashboard2() {
  onValue(ref(db, 'status'), snap => {
    allData1883 = snap.exists() ? snap.val() : {};
    renderDashboardStats();
    renderStudentList('');
  });
}
function renderDashboardStats() {
  const entries = Object.entries(allData1883);
  let totalComp = 0, fullCount = 0;
  entries.forEach(([, m]) => {
    const d = Object.values(m).filter(v => v.status === '완료').length;
    totalComp += d;
    if (d >= TOTAL_1883) fullCount++;
  });
  document.getElementById('stat-students').textContent = entries.length;
  document.getElementById('stat-comp').textContent = totalComp;
  document.getElementById('stat-full').textContent = fullCount;
}
function renderStudentList(query) {
  const list = document.getElementById('a2-student-list');
  if (!list) return;
  const entries = Object.entries(allData1883).filter(([k]) => k.includes(query));
  if (!entries.length) {
    list.innerHTML = `<div class="empty-state">${Object.keys(allData1883).length === 0 ? '아직 제출한 학생이 없습니다' : '검색 결과가 없습니다'}</div>`;
    return;
  }
  entries.sort(([,a],[,b]) => Object.values(b).filter(v=>v.status==='완료').length - Object.values(a).filter(v=>v.status==='완료').length);
  list.innerHTML = entries.map(([key, missions]) => {
    const [id, ...np] = key.split('_'); const name = np.join(' ');
    const mStatus = ALL_MISSIONS_1883.map(mn => {
      const e = missions[mn.replace(/\s/g,'')] || missions[mn];
      return { name: mn, done: !!(e && e.status === '완료'), time: e?.time || '' };
    });
    const doneCount = mStatus.filter(m => m.done).length;
    const pills = mStatus.slice(0, 7).map(m => `<span class="mpill ${m.done?'done':'todo'}">${m.done?'✓':'○'}</span>`).join('');
    const rows = mStatus.map(m => `
      <div class="mission-row">
        <div class="mr-left">
          <div class="mr-dot ${m.done?'done':'todo'}"></div>
          <div>
            <div class="mr-name">${m.name}</div>
            <div class="mr-time">${m.done ? formatTime(m.time) : '미완료'}</div>
          </div>
        </div>
        ${m.done ? `<button class="photo-view-btn" onclick="viewPhoto('${id}','${name}','${m.name.replace(/\s/g,'')}','${m.name}')">📷 사진</button>` : '<span style="font-size:11px;color:var(--text3);">–</span>'}
      </div>`).join('');
    return `
      <div class="student-card" id="scard-${key}">
        <div class="sc-header" onclick="document.getElementById('scard-${key}').classList.toggle('open')">
          <div class="sc-info">
            <div class="sc-avatar">${name.charAt(0)||'?'}</div>
            <div>
              <div class="sc-name">${name}</div>
              <div class="sc-id">${id} · ${doneCount}/${TOTAL_1883} 완료</div>
            </div>
          </div>
          <div class="mission-pills">${pills}</div>
        </div>
        <div class="sc-detail">${rows}</div>
      </div>`;
  }).join('');
}

/* ── 사진 보기 ── */
window.viewPhoto = async function(id, name, mKey, mName) {
  document.getElementById('modal-title').textContent = `${name} · ${mName}`;
  document.getElementById('modal-content').innerHTML = '<div class="modal-loading">📷 불러오는 중...</div>';
  document.getElementById('photo-modal').classList.add('show');
  for (const ext of ['jpg','jpeg','png','heic','webp']) {
    try {
      const url = await getDownloadURL(sRef(storage, `missions/${id}_${name}_${mKey}.${ext}`));
      document.getElementById('modal-content').innerHTML = `<img id="modal-img" src="${url}" alt="인증 사진">`;
      return;
    } catch(_) {}
  }
  document.getElementById('modal-content').innerHTML = '<div class="modal-loading">사진을 찾을 수 없습니다.</div>';
};
window.closeModal = () => document.getElementById('photo-modal').classList.remove('show');
document.getElementById('photo-modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

/* ── 마커 편집 ── */
async function loadMarkerPositions2() {
  try {
    const snap = await get(ref(db, 'markerPositions'));
    if (snap.exists()) {
      Object.keys(snap.val()).forEach(k => { if (editPositions[k]) editPositions[k] = snap.val()[k]; });
    }
  } catch(e) { console.warn(e); }
}

window.buildMarkerEditor = function() {
  const aspect = document.getElementById('map-aspect');
  if (!aspect) return;
  aspect.querySelectorAll('.edit-marker').forEach(el => el.remove());
  PLACE_MISSIONS_1883.forEach(key => {
    const pos = editPositions[key], num = NUMS_1883[key] || '';
    const el = document.createElement('div');
    el.className = 'edit-marker'; el.id = `edit-${key}`;
    el.style.left = pos.x + '%'; el.style.top = pos.y + '%';
    el.innerHTML = `<div class="edit-marker-label">${key}</div><div class="edit-marker-pin"><span class="edit-marker-num">${num}</span></div>`;
    makeDraggable(el, key, aspect);
    aspect.appendChild(el);
  });
  renderCoordList();
};

function makeDraggable(el, key, container) {
  let dragging = false, startX, startY, startLeft, startTop;
  function onStart(e) {
    dragging = true;
    const pt = e.touches ? e.touches[0] : e;
    startX = pt.clientX; startY = pt.clientY;
    startLeft = (parseFloat(el.style.left)/100) * container.scrollWidth;
    startTop  = (parseFloat(el.style.top)/100)  * container.scrollHeight;
    e.preventDefault();
  }
  function onMove(e) {
    if (!dragging) return;
    const pt = e.touches ? e.touches[0] : e;
    const dx = pt.clientX - startX, dy = pt.clientY - startY;
    const ww = container.scrollWidth, wh = container.scrollHeight;
    const nx = Math.max(0, Math.min(100, ((startLeft + dx) / ww) * 100));
    const ny = Math.max(0, Math.min(100, ((startTop  + dy) / wh) * 100));
    el.style.left = nx + '%'; el.style.top = ny + '%';
    editPositions[key] = { x: parseFloat(nx.toFixed(2)), y: parseFloat(ny.toFixed(2)) };
    updateCoordRow(key);
    e.preventDefault();
  }
  function onEnd() { dragging = false; }
  el.addEventListener('mousedown', onStart);
  el.addEventListener('touchstart', onStart, { passive: false });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchend', onEnd);
}

function renderCoordList() {
  const el = document.getElementById('coord-list');
  if (!el) return;
  el.innerHTML = PLACE_MISSIONS_1883.map(key => `
    <div class="coord-row">
      <div class="coord-name">${NUMS_1883[key]||''} ${key}</div>
      <div class="coord-val" id="coord-val-${key}">X: ${editPositions[key].x}% / Y: ${editPositions[key].y}%</div>
      <button class="coord-reset" onclick="resetMarker('${key}')">초기화</button>
    </div>`).join('');
}
function updateCoordRow(key) {
  const el = document.getElementById(`coord-val-${key}`);
  if (el) el.textContent = `X: ${editPositions[key].x}% / Y: ${editPositions[key].y}%`;
}
window.resetMarker = function(key) {
  editPositions[key] = { ...DEFAULT_POSITIONS[key] };
  const el = document.getElementById(`edit-${key}`);
  if (el) { el.style.left = editPositions[key].x + '%'; el.style.top = editPositions[key].y + '%'; }
  updateCoordRow(key);
  showToast(`${key} 초기화 완료`);
};
window.saveMarkers = async function() {
  try {
    await set(ref(db, 'markerPositions'), editPositions);
    showToast('✅ 마커 저장 완료! 학생 화면에 즉시 반영됩니다.');
  } catch(e) { showToast('저장 실패: ' + e.message); }
};
</script>
