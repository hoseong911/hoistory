<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>역사 열공 마일리지 : 관리자 모드</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
@font-face{font-family:'Paperlogy';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');font-weight:700;font-display:swap}
@font-face{font-family:'Paperlogy';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');font-weight:900;font-display:swap}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --canvas:#FAFAF9;--surface:#F4F3EE;
  --hairline:#E5E4DF;--hairline-soft:#ECEAE4;
  --ink:#0A1317;--sub:#6B7280;--stone:#C4C4C4;
  --primary:#1E3A8A;--primary-deep:#172554;--primary-soft:rgba(30,58,138,0.09);--primary-m:rgba(30,58,138,0.15);
  --accent:#2DD4BF;--accent-deep:#0F766E;--accent-l:rgba(45,212,191,0.12);
  --pass:#16A34A;--pass-l:rgba(22,163,74,0.1);
  --insuf:#DC2626;--insuf-l:rgba(220,38,38,0.09);
  --pick:#7C3AED;--pick-l:rgba(124,58,237,0.1);
  --warn:#D97706;--warn-l:rgba(217,119,6,0.1);
  --shadow:rgba(20,22,26,0.2) 0px 1px 4px 0px;
}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--surface);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── 로그인 게이트 ── */
#gate-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.gate-card{width:100%;max-width:340px;background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:24px;padding:32px 28px;box-shadow:var(--shadow)}
.gate-logo{font-family:'Paperlogy',sans-serif;font-weight:900;font-size:18px;color:var(--primary);text-align:center;margin-bottom:6px}
.gate-sub{font-size:12px;color:var(--sub);text-align:center;margin-bottom:24px}
.gate-field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.gate-field label{font-size:12px;font-weight:700;color:var(--sub)}
.gate-input{width:100%;padding:11px 14px;border:1.5px solid var(--hairline);border-radius:10px;font-family:inherit;font-size:14px;color:var(--ink);background:var(--surface);outline:none;transition:border-color .2s;text-align:center;letter-spacing:2px}
.gate-input:focus{border-color:var(--primary)}
.gate-err{font-size:12px;color:#DC2626;min-height:16px;margin-bottom:4px;text-align:center}
.gate-btn{width:100%;padding:12px;border-radius:10px;background:var(--primary);color:#fff;font-family:'Paperlogy',sans-serif;font-weight:700;font-size:15px;border:none;cursor:pointer}
.gate-btn:hover{background:var(--primary-deep)}
.gate-foot{text-align:center;margin-top:16px}
.gate-foot a{font-size:12px;color:var(--sub);text-decoration:none}
.gate-foot a:hover{color:var(--ink)}

/* ── 어드민 레이아웃 ── */
#gate-admin{display:none;flex-direction:column;min-height:100vh}
/* 3열 그리드: 로고/탭/로그아웃 각각을 명시적으로 지정한 칸에 고정한다.
   (주의) display:none인 그리드 아이템은 auto-placement에서 아예 빠져버려서, 로고·로그아웃을 숨기면
   유일하게 남은 탭이 1번 칸으로 밀려 들어가 "중앙정렬이 안 되는" 버그가 생긴다. grid-column을 직접 못박아 방지. */
.adm-header{background:var(--canvas);border-bottom:1px solid var(--hairline-soft);padding:0 28px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;height:54px;position:sticky;top:0;z-index:30}
.adm-logo{font-family:'Paperlogy',sans-serif;font-weight:900;font-size:16px;color:var(--primary);justify-self:start;grid-column:1}
.adm-tabs{display:flex;gap:2px;background:var(--surface);border:1px solid var(--hairline-soft);border-radius:10px;padding:3px;justify-self:center;grid-column:2}
.adm-tab{padding:6px 20px;border-radius:7px;font-family:inherit;font-size:13px;font-weight:700;color:var(--sub);background:none;border:none;cursor:pointer;transition:.15s}
.adm-tab.active{background:var(--primary);color:#fff}
.adm-logout{background:none;border:1.5px solid var(--hairline);border-radius:8px;padding:6px 14px;font-family:inherit;font-size:12px;font-weight:700;color:var(--sub);cursor:pointer;justify-self:end;grid-column:3}
/* lms/admin iframe에 embed된 경우 상위 어드민의 "목록으로"를 대신하는 버튼. 로그아웃 자리를 대신 차지한다 */
.adm-back{display:none;background:none;border:1.5px solid var(--hairline);border-radius:8px;padding:6px 14px;font-family:inherit;font-size:12px;font-weight:700;color:var(--sub);cursor:pointer;justify-self:end;grid-column:3}
.adm-back:hover{background:var(--surface)}
body.embedded .adm-back{display:inline-flex;align-items:center}
.adm-body{padding:24px 28px 60px;max-width:1100px;margin:0 auto;width:100%}
/* lms/admin iframe으로 embed된 경우: 이미 상위 어드민에 로그인되어 있으므로 로고·로그아웃은 숨긴다 */
body.embedded .adm-logo,body.embedded .adm-logout{display:none}

/* ── 탭 패널 ── */
.tab-panel{display:none}
.tab-panel.active{display:block}
.section-card{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:20px;padding:22px;margin-bottom:16px;box-shadow:var(--shadow)}
.section-title{font-family:'Paperlogy',sans-serif;font-weight:700;font-size:15px;color:var(--ink);margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* ── 버튼 ── */
.btn{padding:9px 18px;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-deep)}
.btn-accent{background:var(--accent-l);color:var(--accent-deep);border:1.5px solid rgba(45,212,191,.3)}.btn-accent:hover{background:rgba(45,212,191,.22)}
.btn-ghost{background:none;border:1.5px solid var(--hairline);color:var(--sub)}.btn-ghost:hover{border-color:var(--stone);color:var(--ink)}
.btn-danger{background:var(--insuf-l);color:var(--insuf);border:1.5px solid rgba(220,38,38,.2)}.btn-danger:hover{background:rgba(220,38,38,.16)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:7px}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:6px}
.btn:disabled{opacity:.4;cursor:default}

/* ── 반 필터 ── */
.class-filter{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.cf-btn{padding:7px 16px;border-radius:100px;border:1.5px solid var(--hairline);background:var(--canvas);font-family:inherit;font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;transition:.15s}
.cf-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ── 정렬 토글 ── */
.sort-toggle{display:inline-flex;background:var(--surface);border-radius:100px;padding:3px;border:1px solid var(--hairline-soft)}
.sort-toggle button{background:transparent;border:none;font-family:inherit;cursor:pointer;color:var(--sub);padding:6px 14px;border-radius:100px;font-size:11px;font-weight:800;letter-spacing:.4px;transition:.15s}
.sort-toggle button.active{background:var(--primary);color:#fff}

/* ── 통계 칩 ── */
.stats-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
.stat-chip{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:14px;padding:12px 18px;box-shadow:var(--shadow);text-align:center}
.stat-chip-label{font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px}
.stat-chip-val{font-family:'Paperlogy',sans-serif;font-weight:900;font-size:30px;line-height:1;color:var(--ink)}

/* ── 학생 카드 (3열 그리드, 클릭 시 모달로 인증내역) ── */
.student-list{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media (max-width:900px){.student-list{grid-template-columns:repeat(2,1fr)}}
@media (max-width:560px){.student-list{grid-template-columns:1fr}}
.stu-card{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:14px;box-shadow:var(--shadow);padding:14px 16px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;gap:5px}
.stu-card:hover{border-color:var(--stone)}
.stu-class-badge{align-self:flex-start;flex-shrink:0;padding:3px 8px;border-radius:6px;background:var(--primary-soft);color:var(--primary);font-size:11px;font-weight:800}
.stu-name{font-weight:800;font-size:14px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stu-id{font-size:11px;color:var(--sub)}
.stu-days{font-family:'Paperlogy',sans-serif;font-weight:900;font-size:20px;color:var(--accent-deep)}
.stu-days small{font-size:11px;color:var(--sub);font-weight:600;margin-left:2px}

/* ── 학생 상세 모달 ── */
.stu-modal-back{position:fixed;inset:0;background:rgba(10,19,23,.55);display:none;align-items:center;justify-content:center;z-index:500;padding:20px}
.stu-modal-back.open{display:flex}
.stu-modal-box{background:var(--canvas);border-radius:20px;padding:24px;max-width:480px;width:100%;max-height:82vh;overflow-y:auto}
.stu-modal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px}
.stu-modal-name{font-family:'Paperlogy',sans-serif;font-weight:700;font-size:17px;color:var(--ink)}
.stu-modal-close{background:none;border:1.5px solid var(--hairline);border-radius:8px;padding:5px 12px;font-family:inherit;font-size:12px;font-weight:700;color:var(--sub);cursor:pointer;flex-shrink:0}
.stu-modal-close:hover{background:var(--surface)}
.stu-modal-sub{font-size:13px;color:var(--sub);margin-bottom:14px}

/* 누적 일수 직접 수정 */
.mileage-edit-row{display:flex;align-items:center;gap:8px;margin:14px 0;padding:12px;background:var(--surface);border-radius:10px}
.mileage-edit-row label{font-size:12px;font-weight:700;color:var(--sub);flex-shrink:0}
.mileage-edit-row input{width:70px;padding:6px 10px;border:1.5px solid var(--hairline);border-radius:8px;font-family:inherit;font-size:13px;text-align:center;background:var(--canvas)}

/* 학생별 인증 기록 목록 */
.cert-mini{display:flex;gap:10px;padding:10px 0;border-top:1px solid var(--hairline-soft)}
.cert-mini:first-child{border-top:none}
.cert-mini-thumb{width:52px;height:52px;border-radius:8px;flex-shrink:0;background:var(--surface);border:1px solid var(--hairline-soft);overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--stone)}
.cert-mini-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.cert-mini-body{flex:1;min-width:0}
.cert-mini-date{font-size:11px;font-weight:800;color:var(--primary);margin-bottom:2px}
.cert-mini-text{font-size:12px;color:var(--ink);line-height:1.5}
.cert-mini-feeling{font-size:11px;color:var(--sub);margin-top:2px;line-height:1.5}
.no-cert{text-align:center;color:var(--stone);font-size:13px;padding:16px 0}

/* ── 인증 검토 필터 ── */
.filter-row{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap;justify-content:center}
.filter-row select,.filter-row input[type="date"]{padding:8px 12px;border:1.5px solid var(--hairline);border-radius:8px;font-family:inherit;font-size:13px;color:var(--ink);background:var(--canvas);outline:none}
.filter-row select:focus,.filter-row input:focus{border-color:var(--primary)}

/* ── 인증 카드 ── */
.cert-detail{display:flex;gap:14px;align-items:flex-start;background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:14px;padding:14px;margin-bottom:8px;box-shadow:var(--shadow)}
.cert-thumb-wrap{width:76px;height:76px;border-radius:10px;flex-shrink:0;background:var(--surface);border:1px solid var(--hairline-soft);overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--stone)}
.cert-thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.cert-detail .body{flex:1;min-width:0}
.cert-detail .name{font-weight:800;font-size:14px;color:var(--ink);display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.cert-detail .name .meta-inline{font-weight:500;color:var(--sub);font-size:12px}
.cert-detail .content{font-size:13px;color:var(--ink);margin:4px 0;line-height:1.55}
.cert-detail .meta{font-size:11px;color:var(--sub)}
.cert-detail .actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}

/* ── 배지 ── */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;letter-spacing:.3px}
.badge-pass{background:var(--pass-l);color:var(--pass)}
.badge-fail{background:var(--insuf-l);color:var(--insuf)}
.badge-pending{background:var(--warn-l);color:var(--warn)}
.badge-override{background:var(--pick-l);color:var(--pick);margin-left:4px}

/* ── 사진 확대 모달 ── */
.photo-modal{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;cursor:zoom-out;padding:24px}
.photo-modal.open{display:flex}
.photo-modal img{max-width:100%;max-height:100%;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.5)}

.no-data{text-align:center;padding:40px 20px;color:var(--stone);font-size:14px}

@media (max-width:600px){
  .adm-header{padding:0 14px}
  .adm-body{padding:16px 14px 40px}
  .filter-row{gap:6px}
  .cert-detail{flex-wrap:wrap}
}
</style>
<script>if(window.self!==window.top)document.documentElement.classList.add('in-iframe');</script>
</head>
<body>

<!-- 로그인 게이트 -->
<div id="gate-login">
  <div class="gate-card">
    <div class="gate-logo">역사 열공 마일리지</div>
    <div class="gate-sub">관리자 모드</div>
    <div class="gate-field">
      <input type="password" id="gate-pw" class="gate-input" placeholder="비밀번호">
    </div>
    <div class="gate-err" id="gate-err"></div>
    <button class="gate-btn" id="gate-login-btn">접속하기</button>
    <div class="gate-foot"><a href="index.html">학생 페이지로</a></div>
  </div>
</div>

<!-- 어드민 -->
<div id="gate-admin">
  <header class="adm-header">
    <div class="adm-logo">역사 열공 마일리지</div>
    <div class="adm-tabs">
      <button class="adm-tab active" data-tab="class">Class</button>
      <button class="adm-tab" data-tab="certs">Certs</button>
    </div>
    <button class="adm-logout" id="logout-btn">로그아웃</button>
    <button class="adm-back" id="embed-back-btn">목록으로</button>
  </header>

  <div class="adm-body">

    <!-- ── Class 탭 ── -->
    <div class="tab-panel active" id="tab-class">
      <div class="section-card">
        <div class="section-title">
          👤 반별 학생 · 마일리지
          <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
            <button class="btn btn-danger btn-sm" onclick="window.resetAllMileage()">전체 마일리지 초기화</button>
            <div class="sort-toggle" id="class-sort-toggle">
              <button class="active" data-sort="num" onclick="window.setClassSort('num')">학번</button>
              <button data-sort="days" onclick="window.setClassSort('days')">마일리지</button>
            </div>
          </div>
        </div>
        <div class="class-filter" id="class-filter"></div>
        <div class="student-list" id="class-student-list"></div>
      </div>
    </div>

    <!-- ── Certs 탭 ── -->
    <div class="tab-panel" id="tab-certs">
      <div class="class-filter" id="certs-class-filter"></div>

      <div class="stats-row" id="certs-stats-row">
        <div class="stat-chip">
          <div class="stat-chip-label">전체</div>
          <div class="stat-chip-val" id="c-total">0</div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-label">통과</div>
          <div class="stat-chip-val" id="c-pass" style="color:var(--pass)">0</div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-label">실패</div>
          <div class="stat-chip-val" id="c-fail" style="color:var(--insuf)">0</div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-label">보류</div>
          <div class="stat-chip-val" id="c-pending" style="color:var(--warn)">0</div>
        </div>
      </div>

      <div class="filter-row">
        <select id="certs-result-filter" onchange="window.renderCerts()">
          <option value="all">전체 결과</option>
          <option value="pending">보류 (검토 필요)</option>
          <option value="pass">통과</option>
          <option value="fail">실패</option>
        </select>
        <input type="date" id="certs-date-filter" onchange="window.renderCerts()">
        <button class="btn btn-ghost btn-sm" onclick="window.clearCertsFilter()">필터 초기화</button>
      </div>
      <div id="certs-list"></div>
    </div>

  </div>
</div>

<!-- 학생 상세 모달 (카드 클릭 시 인증내역) -->
<div id="stu-modal" class="stu-modal-back" onclick="if(event.target===this)window.closeStudentModal()">
  <div class="stu-modal-box">
    <div class="stu-modal-head">
      <div class="stu-modal-name" id="stu-modal-name"></div>
      <button class="stu-modal-close" onclick="window.closeStudentModal()">닫기</button>
    </div>
    <div class="stu-modal-sub" id="stu-modal-sub"></div>
    <div id="stu-modal-body"></div>
  </div>
</div>

<!-- 사진 확대 모달 -->
<div id="photo-modal" class="photo-modal" onclick="this.classList.remove('open')">
  <img id="photo-modal-img" src="" alt="">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getDatabase, ref, get, set, update, remove, onValue
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
  authDomain: "ho0911seong-56638.firebaseapp.com",
  databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ho0911seong-56638",
  storageBucket: "ho0911seong-56638.firebasestorage.app",
  messagingSenderId: "994509567071",
  appId: "1:994509567071:web:be8ed4e8e9b0a833f557ea"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ─────────── State ─────────── */
let roster = [];      // lms/admin 학생 관리(RTDB students/)와 동일한 명단, 읽기 전용
let allCerts = [];
let mileage = {};
let classFilterClass = '전체';
let classFilterCerts = '전체';
let classSortMode = 'num';
const isEmbedded = window.self !== window.top;

/* ─────────── 반 번호 파싱 (학번 2~3번째 자리, 0n이면 n반) ─────────── */
function classNumOf(sid) {
  sid = String(sid || '');
  if (sid.length < 3) return null;
  const c = parseInt(sid.slice(1, 3), 10);
  return isNaN(c) ? null : c;
}

/* ─────────── 데이터 구독 ─────────── */
onValue(ref(db, 'students'), snap => {
  const data = snap.val() || {};
  roster = Object.values(data).filter(Boolean)
    .map(s => ({ studentId: String(s.studentId || s.id || '').trim(), name: s.name || s.studentName || s.realName || '' }))
    .filter(s => s.studentId && s.name)
    .map(s => ({ ...s, classNum: classNumOf(s.studentId) }))
    // 0반(테스트 계정)은 명단·통계에서 제외
    .filter(s => s.classNum !== 0)
    .sort((a, b) => a.studentId.localeCompare(b.studentId));
  renderAll();
});

onValue(ref(db, 'historyMileage'), snap => {
  const data = snap.val() || {};
  allCerts = data.studyCert ? Object.entries(data.studyCert).map(([id, c]) => ({ id, ...c })) : [];
  mileage = data.mileage || {};
  renderAll();
});

/* ─────────── 로그인 ───────────
   lms/admin(이미 로그인된 어드민)의 iframe으로 열린 경우 로그인 화면을 생략한다. */
function initAdmin() {
  document.getElementById('gate-login').style.display = 'none';
  document.getElementById('gate-admin').style.display = 'flex';
}

if (isEmbedded) {
  document.body.classList.add('embedded');
  // lms/admin에 이 마커가 있으면 상위의 "목록으로" 바를 대신 숨기고, 이 페이지 자체 헤더의
  // 목록으로 버튼(탭과 같은 줄)을 쓰도록 신호를 보낸다.
  document.documentElement.classList.add('has-own-back');
  document.getElementById('embed-back-btn').addEventListener('click', () => {
    try { window.parent.closeAppAdmin && window.parent.closeAppAdmin(); } catch (e) {}
  });
  initAdmin();
} else {
  if (sessionStorage.getItem('hi_admin_ok') === '1') initAdmin();
}

document.getElementById('gate-login-btn').addEventListener('click', async () => {
  const pw = document.getElementById('gate-pw').value;
  const errEl = document.getElementById('gate-err');
  errEl.textContent = '';
  if (!pw) { errEl.textContent = '비밀번호를 입력해 주세요'; return; }

  try {
    const snap = await get(ref(db, 'historyMileage/config/adminPw'));
    const storedPw = snap.val();
    if (!storedPw) {
      if (pw.length < 4) { errEl.textContent = '초기 비밀번호는 4자 이상이어야 해요'; return; }
      await set(ref(db, 'historyMileage/config/adminPw'), pw);
    } else if (pw !== storedPw) {
      errEl.textContent = '비밀번호가 일치하지 않습니다';
      return;
    }
    sessionStorage.setItem('hi_admin_ok', '1');
    document.getElementById('gate-pw').value = '';
    initAdmin();
  } catch (e) {
    errEl.textContent = '로그인 중 오류가 발생했어요';
  }
});
document.getElementById('gate-pw').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('gate-login-btn').click(); });
document.getElementById('logout-btn').addEventListener('click', () => {
  sessionStorage.removeItem('hi_admin_ok');
  document.getElementById('gate-admin').style.display = 'none';
  document.getElementById('gate-login').style.display = 'flex';
});

/* ─────────── 탭 ─────────── */
document.querySelectorAll('.adm-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.adm-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    renderAll();
  });
});

function renderAll() {
  if (document.getElementById('tab-class').classList.contains('active')) {
    renderClassFilter();
    window.renderClassView();
  }
  if (document.getElementById('tab-certs').classList.contains('active')) {
    renderCertsClassFilter();
    window.renderCerts();
  }
}

/* ─────────── 반 필터 (공통) ─────────── */
function classNumList() {
  return [...new Set(roster.map(s => s.classNum))].filter(n => n != null).sort((a, b) => a - b);
}

function renderClassFilter() {
  const classes = ['전체', ...classNumList()];
  document.getElementById('class-filter').innerHTML = classes.map(c => `
    <button class="cf-btn${String(c) === classFilterClass ? ' active' : ''}" data-c="${c}">${c === '전체' ? '전체' : c + '반'}</button>
  `).join('');
  document.querySelectorAll('#class-filter .cf-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      classFilterClass = btn.dataset.c;
      renderClassFilter();
      window.renderClassView();
    });
  });
}

function renderCertsClassFilter() {
  const classes = ['전체', ...classNumList()];
  document.getElementById('certs-class-filter').innerHTML = classes.map(c => `
    <button class="cf-btn${String(c) === classFilterCerts ? ' active' : ''}" data-c="${c}">${c === '전체' ? '전체' : c + '반'}</button>
  `).join('');
  document.querySelectorAll('#certs-class-filter .cf-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      classFilterCerts = btn.dataset.c;
      renderCertsClassFilter();
      window.renderCerts();
    });
  });
}

/* ─────────── Class 탭 ─────────── */
window.setClassSort = (sort) => {
  classSortMode = sort;
  document.querySelectorAll('#class-sort-toggle button').forEach(b => b.classList.toggle('active', b.dataset.sort === sort));
  window.renderClassView();
};

window.renderClassView = () => {
  const list = document.getElementById('class-student-list');
  let rows = classFilterClass === '전체' ? [...roster] : roster.filter(s => String(s.classNum) === classFilterClass);

  if (classSortMode === 'days') {
    rows.sort((a, b) => (mileage[b.studentId] || 0) - (mileage[a.studentId] || 0) || a.studentId.localeCompare(b.studentId));
  } else {
    rows.sort((a, b) => a.studentId.localeCompare(b.studentId));
  }

  if (!rows.length) { list.innerHTML = '<div class="no-data">학생이 없어요</div>'; return; }

  list.innerHTML = rows.map(s => {
    const days = mileage[s.studentId] || 0;
    return `
    <div class="stu-card" data-sid="${s.studentId}" onclick="window.openStudentModal('${s.studentId}')">
      <span class="stu-class-badge">${s.classNum ?? '?'}반</span>
      <div class="stu-name">${escHtml(s.name)}</div>
      <div class="stu-id">${s.studentId}</div>
      <div class="stu-days">${days}<small>일</small></div>
    </div>`;
  }).join('');
};

window.openStudentModal = (studentId) => {
  const s = roster.find(r => r.studentId === studentId);
  if (!s) return;
  const days = mileage[studentId] || 0;
  const certCount = allCerts.filter(c => String(c.studentNum) === studentId && c.result === 'pass').length;
  document.getElementById('stu-modal-name').textContent = s.name;
  document.getElementById('stu-modal-sub').textContent = `${studentId} · ${s.classNum ?? '?'}반 · 누적 ${days}일 · 인증 ${certCount}회`;
  renderStudentModalBody(studentId);
  document.getElementById('stu-modal').classList.add('open');
};

window.closeStudentModal = () => {
  document.getElementById('stu-modal').classList.remove('open');
};

function renderStudentModalBody(studentId) {
  const body = document.getElementById('stu-modal-body');
  const days = mileage[studentId] || 0;
  const certs = allCerts
    .filter(c => String(c.studentNum) === studentId && c.result === 'pass')
    .sort((a, b) => b.id.localeCompare(a.id)); // Firebase push id는 시간순 정렬이 보장되어 최신이 먼저 오도록 내림차순 비교

  const certsHtml = certs.length
    ? certs.map(c => `
      <div class="cert-mini">
        <div class="cert-mini-thumb" ${c.photoURL ? `onclick="window.showPhoto('${escHtml(c.photoURL)}')"` : ''}>
          ${c.photoURL ? `<img src="${escHtml(c.photoURL)}" onerror="this.parentElement.textContent='📷'">` : '📷'}
        </div>
        <div class="cert-mini-body">
          <div class="cert-mini-date">${c.date || ''}</div>
          <div class="cert-mini-text">${escHtml(c.studyContent || '-')}</div>
          ${c.studyFeeling ? `<div class="cert-mini-feeling">${escHtml(c.studyFeeling)}</div>` : ''}
        </div>
      </div>`).join('')
    : '<div class="no-cert">아직 통과한 인증이 없어요</div>';

  body.innerHTML = `
    <div class="mileage-edit-row">
      <label>누적 일수 직접 수정</label>
      <input type="number" min="0" id="mileage-input-${studentId}" value="${days}">
      <button class="btn btn-primary btn-xs" onclick="window.saveMileage('${studentId}')">저장</button>
    </div>
    ${certsHtml}
  `;
}

window.saveMileage = async (studentId) => {
  const input = document.getElementById(`mileage-input-${studentId}`);
  const newDays = parseInt(input.value, 10);
  if (isNaN(newDays) || newDays < 0) { alert('일수는 0 이상의 숫자여야 해요'); return; }
  try {
    await set(ref(db, `historyMileage/mileage/${studentId}`), newDays);
    await set(ref(db, `historyMileage/totalEarned/${studentId}`), newDays);
    window.openStudentModal(studentId);
    alert('저장 완료');
  } catch (e) { alert('저장 실패: ' + e.message); }
};

// 인증 기록만 지워선 누적 일수(mileage)가 자동으로 0이 되지 않는다(별도 경로에 저장되기 때문).
// 명단에 있는 학생 + 마일리지 값이 남아있는 학생(명단에서 빠졌어도) 전부를 대상으로 한 번에 0으로 맞춘다.
window.resetAllMileage = async () => {
  const ids = new Set([...roster.map(s => s.studentId), ...Object.keys(mileage)]);
  if (!ids.size) { alert('초기화할 학생이 없어요'); return; }
  if (!confirm(`전체 ${ids.size}명의 누적 일수를 0으로 초기화하시겠습니까?\n\n이 작업은 되돌릴 수 없습니다.`)) return;
  if (!confirm('마지막 확인: 정말로 모든 학생의 마일리지를 0으로 초기화하시겠습니까?')) return;
  const updates = {};
  ids.forEach(id => { updates[`mileage/${id}`] = 0; updates[`totalEarned/${id}`] = 0; });
  try {
    await update(ref(db, 'historyMileage'), updates);
    alert('전체 초기화 완료');
  } catch (e) { alert('초기화 실패: ' + e.message); }
};

/* ─────────── Certs 탭 ─────────── */
function certsFilteredByClass() {
  if (classFilterCerts === '전체') return allCerts;
  return allCerts.filter(c => String(c.cls) === classFilterCerts || String(classNumOf(c.studentNum)) === classFilterCerts);
}

function updateCertsStats() {
  const rows = certsFilteredByClass();
  document.getElementById('c-total').textContent = rows.length;
  document.getElementById('c-pass').textContent = rows.filter(c => c.result === 'pass').length;
  document.getElementById('c-fail').textContent = rows.filter(c => c.result === 'fail').length;
  document.getElementById('c-pending').textContent = rows.filter(c => c.result === 'pending').length;
}

window.renderCerts = () => {
  const resultF = document.getElementById('certs-result-filter')?.value || 'all';
  const dateF = document.getElementById('certs-date-filter')?.value || '';
  const list = document.getElementById('certs-list');

  updateCertsStats();

  // Firebase push id는 생성 순서대로 정렬되는 문자열이라, 시간 문자열(time)을 다시 파싱하는 것보다
  // id 역순 정렬이 "최신이 위로" 오는 걸 안정적으로 보장한다.
  let rows = certsFilteredByClass().sort((a, b) => b.id.localeCompare(a.id));
  if (resultF !== 'all') rows = rows.filter(c => c.result === resultF);
  if (dateF) rows = rows.filter(c => c.date === dateF);

  if (!rows.length) { list.innerHTML = '<div class="no-data">조건에 맞는 인증이 없어요</div>'; return; }

  const showLimit = 100;
  list.innerHTML = rows.slice(0, showLimit).map(c => {
    const r = c.result || 'fail';
    const badgeClass = r === 'pass' ? 'badge-pass' : (r === 'pending' ? 'badge-pending' : 'badge-fail');
    const badgeLabel = r === 'pass' ? '통과' : (r === 'pending' ? '보류' : '실패');
    let actionsHtml = '';
    if (r === 'pending') {
      actionsHtml = `
        <button class="btn btn-accent btn-sm" onclick="window.overrideCert('${c.id}', 'pass')">✓ 승인 (+1일)</button>
        <button class="btn btn-danger btn-sm" onclick="window.overrideCert('${c.id}', 'fail')">✗ 반려</button>`;
    } else if (r === 'fail') {
      actionsHtml = `<button class="btn btn-ghost btn-sm" onclick="window.overrideCert('${c.id}', 'pass')">✓ 통과로 변경 (+1일)</button>`;
    } else {
      actionsHtml = `<button class="btn btn-danger btn-sm" onclick="window.overrideCert('${c.id}', 'fail')">✗ 통과 취소 (-1일)</button>`;
    }
    const photoBtn = c.photoURL
      ? `<button class="btn btn-ghost btn-sm" onclick="window.showPhoto('${escHtml(c.photoURL)}')">🔍 사진 보기</button>`
      : `<button class="btn btn-ghost btn-sm" disabled>📷 사진 없음</button>`;
    return `
    <div class="cert-detail">
      <div class="cert-thumb-wrap" ${c.photoURL ? `onclick="window.showPhoto('${escHtml(c.photoURL)}')"` : ''}>
        ${c.photoURL ? `<img src="${escHtml(c.photoURL)}" onerror="this.style.display='none'">` : '📷'}
      </div>
      <div class="body">
        <div class="name">
          ${escHtml(c.studentName || '-')}
          <span class="meta-inline">${c.studentNum || ''} · ${c.cls || classNumOf(c.studentNum) || '?'}반</span>
          <span class="badge ${badgeClass}">${c.emoji || ''} ${badgeLabel}</span>
          ${c.manualOverride ? '<span class="badge badge-override">수동 변경</span>' : ''}
        </div>
        <div class="content">📚 "${escHtml(c.studyContent || '-')}"</div>
        ${c.studyFeeling ? `<div class="content" style="color:var(--sub)">💭 "${escHtml(c.studyFeeling)}"</div>` : ''}
        <div class="meta">${c.time || ''} · ${escHtml(c.reason || '-')}</div>
        <div class="actions">
          ${photoBtn}
          ${actionsHtml}
          <button class="btn btn-danger btn-sm" onclick="window.deleteCert('${c.id}')">기록 삭제</button>
        </div>
      </div>
    </div>`;
  }).join('');

  if (rows.length > showLimit) {
    list.innerHTML += `<div class="no-data">최근 ${showLimit}건만 표시됩니다 (전체 ${rows.length}건)</div>`;
  }
};

window.clearCertsFilter = () => {
  document.getElementById('certs-result-filter').value = 'all';
  document.getElementById('certs-date-filter').value = '';
  classFilterCerts = '전체';
  renderCertsClassFilter();
  window.renderCerts();
};

window.showPhoto = (url) => {
  document.getElementById('photo-modal-img').src = url;
  document.getElementById('photo-modal').classList.add('open');
};

window.overrideCert = async (certId, newResult) => {
  const cert = allCerts.find(c => c.id === certId);
  if (!cert) return;
  const oldResult = cert.result;
  if (oldResult === newResult) return;
  const delta = (newResult === 'pass' ? 1 : 0) - (oldResult === 'pass' ? 1 : 0);
  const studentNum = cert.studentNum;
  const resultLabel = newResult === 'pass' ? '통과' : newResult === 'pending' ? '보류' : '실패';
  const deltaText = delta === 0 ? '누적 일수 변화 없음' : `누적 일수 ${delta > 0 ? '+' : ''}${delta}일`;
  if (!confirm(`이 인증을 "${resultLabel}"(으)로 변경하시겠습니까?\n\n· ${cert.studentName}(${studentNum})\n· ${deltaText}`)) return;
  try {
    await update(ref(db, `historyMileage/studyCert/${certId}`), {
      result: newResult,
      manualOverride: { at: new Date().toLocaleString('ko-KR'), from: oldResult, to: newResult }
    });
    if (delta !== 0) {
      const curDays = mileage[studentNum] || 0;
      const newDays = Math.max(0, curDays + delta);
      await set(ref(db, `historyMileage/mileage/${studentNum}`), newDays);
      await set(ref(db, `historyMileage/totalEarned/${studentNum}`), newDays);
    }
  } catch (e) { alert('변경 실패: ' + e.message); }
};

window.deleteCert = async (certId) => {
  if (!confirm('이 인증 기록을 삭제하시겠습니까?\n\n⚠️ 누적 일수는 자동으로 조정되지 않습니다.\n필요하면 Class 탭에서 일수를 따로 조정해 주세요.')) return;
  await remove(ref(db, `historyMileage/studyCert/${certId}`));
};

function escHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
</script>
