<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 인천동양중학교 역사 수업 : 생각 Check</title>
    
    <!-- Firebase SDK (Compat 버전) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        /* =========================================
           Spotify Design System Variables
           ========================================= */
        :root {
            --bg-base: #121212;
            --bg-surface: #181818;
            --bg-interactive: #1f1f1f;
            --bg-card-hover: #252525;
            
            --brand-green: #1ed760;
            --brand-green-hover: #1db954;
            
            --text-base: #ffffff;
            --text-muted: #b3b3b3;
            --text-error: #f3727f;
            
            --border-gray: #4d4d4d;
            
            --shadow-heavy: rgba(0, 0, 0, 0.5) 0px 8px 24px;
            --shadow-medium: rgba(0, 0, 0, 0.3) 0px 8px 8px;
            --input-inset: rgb(18, 18, 18) 0px 1px 0px, rgb(124, 124, 124) 0px 0px 0px 1px inset;
        }

        /* 🎨 Typography & Base */
        body { 
            font-family: 'Circular', 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: var(--bg-base); 
            color: var(--text-base); 
            margin: 0; padding: 20px; 
            min-height: 100vh;
            display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }
        
        /* 💠 Containers (Surface Level 1) */
        .container { 
            width: 100%; max-width: 900px; margin: 0 auto; 
            background-color: var(--bg-base); /* 스포티파이는 메인 컨테이너가 배경과 동일하고 내부 요소가 surface를 가짐 */
            padding: 10px;
            box-sizing: border-box;
        }

        .surface-card {
            background-color: var(--bg-surface);
            border-radius: 8px;
            padding: 24px;
            box-shadow: var(--shadow-heavy);
            margin-bottom: 24px;
        }

        h1 { font-size: 24px; font-weight: 700; color: var(--text-base); text-align: center; margin-top: 0; letter-spacing: -0.5px; }
        h2 { font-size: 18px; font-weight: 700; color: var(--text-base); margin-top: 0; }
        h3 { font-size: 16px; font-weight: 700; color: var(--text-base); margin-top: 0; }
        p { font-size: 14px; font-weight: 400; color: var(--text-muted); line-height: 1.5; }
        
        /* 📝 Inputs (Pill shape, inset borders) */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 12px; color: var(--text-base); }
        
        input[type="text"], select { 
            width: 100%; padding: 12px 24px; 
            background-color: var(--bg-interactive);
            color: var(--text-base);
            border: none;
            border-radius: 500px; /* Pill */
            box-shadow: var(--input-inset);
            font-size: 14px; font-family: inherit;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        
        textarea {
            width: 100%; padding: 16px 24px; 
            background-color: var(--bg-interactive);
            color: var(--text-base);
            border: none;
            border-radius: 16px; /* Textarea는 둥근 사각형 유지 */
            box-shadow: var(--input-inset);
            font-size: 14px; font-family: inherit;
            box-sizing: border-box;
            resize: vertical;
            line-height: 1.5;
        }

        input:focus, textarea:focus, select:focus { 
            outline: 2px solid var(--text-base); 
            box-shadow: none;
        }
        
        /* 🔘 Buttons (Pill geometry, uppercase, tracking) */
        button { 
            background-color: var(--bg-interactive); 
            color: var(--text-base); 
            border: none; 
            padding: 12px 32px; 
            border-radius: 500px; /* Pill */
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            transition: background-color 0.2s, transform 0.1s;
            display: inline-block;
            text-align: center;
            box-sizing: border-box;
        }
        button:hover { background-color: #2a2a2a; transform: scale(1.02); }
        button:active { transform: scale(0.98); }

        /* Primary CTAs (Spotify Green) */
        .btn-primary { 
            background-color: var(--brand-green); 
            color: #000000; 
        }
        .btn-primary:hover { background-color: var(--brand-green-hover); }

        /* Outlined Buttons */
        .btn-outline {
            background-color: transparent;
            border: 1px solid #7c7c7c;
        }
        .btn-outline:hover {
            border-color: var(--text-base);
        }

        /* Danger / Subtle */
        .btn-danger { color: var(--text-error); background-color: transparent; }
        .btn-danger:hover { background-color: rgba(243, 114, 127, 0.1); }

        /* 네비게이션 탭 (Pill 형태) */
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px; }
        .nav-tabs button { 
            background-color: var(--bg-interactive); 
            color: var(--text-base); 
            padding: 8px 16px; 
            border-radius: 9999px;
            font-size: 12px;
            flex: none;
            text-transform: none; /* 탭은 가독성을 위해 일반 케이스 사용 가능 */
            letter-spacing: 0.5px;
        }
        .nav-tabs button.active { 
            background-color: var(--text-base); 
            color: #000000; 
        }
        .nav-tabs button:hover:not(.active) { background-color: var(--bg-card-hover); }

        /* 유틸리티 및 경고 */
        .hidden { display: none !important; }
        .char-count { font-size: 12px; color: var(--text-muted); text-align: right; margin-top: 8px; font-weight: 700; }
        .warning { color: var(--text-error); font-size: 12px; font-weight: 700; margin-top: 12px; text-align: center; }
        
        /* 📋 관리자 대시보드 및 테이블 (Dark Mode Tables) */
        .table-container { overflow-x: auto; background-color: var(--bg-surface); border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; font-size: 14px; }
        th, td { border-bottom: 1px solid var(--border-gray); padding: 16px; text-align: left; vertical-align: middle; }
        th { color: var(--text-muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* 테이블 내 작은 액션 버튼 */
        .action-btn { 
            padding: 6px 12px; font-size: 10px; border-radius: 500px; 
            letter-spacing: 1px; width: auto; 
        }
        .pick-btn { border: 1px solid #7c7c7c; background: transparent; }
        .pick-btn.picked { background-color: var(--text-base); color: #000; border-color: var(--text-base); }

        /* 📌 패들렛 스타일 아카이브 (Spotify Playlist Card Style) */
        .padlet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; margin-top: 24px; }
        .padlet-card { 
            background-color: var(--bg-surface); 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: var(--shadow-medium);
            transition: background-color 0.3s;
            line-height: 1.5; word-break: break-all;
        }
        .padlet-card:hover { background-color: var(--bg-card-hover); }
        .padlet-card.picked-card { border-left: 4px solid var(--brand-green); }

        /* 강의 리스트 버튼 (블록 형태) */
        .lecture-list-btn {
            background-color: var(--bg-interactive);
            color: var(--text-base);
            width: 100%; text-align: left;
            padding: 16px 24px;
            border-radius: 8px; /* 리스트 아이템은 약간 둥근 사각형 */
            margin-bottom: 12px;
            text-transform: none; letter-spacing: normal; font-size: 16px; font-weight: 600;
        }
        .lecture-list-btn:hover { background-color: var(--bg-card-hover); }

        /* 🔐 관리자 진입 버튼 (최하단) */
        .admin-footer { text-align: center; padding: 40px 20px; margin-top: auto; }
        .admin-footer button { 
            background: transparent; color: var(--border-gray); 
            font-size: 10px; padding: 8px; letter-spacing: 2px;
        }
        .admin-footer button:hover { color: var(--text-muted); background: transparent; }

    </style>
</head>
<body>

<div class="container">
    <h1 id="main-title" style="margin-bottom: 32px;">2026 인천동양중학교 역사 수업 : 생각 Check</h1>
    
    <!-- ==================== 👨‍🎓 학생 화면 ==================== -->
    <div id="student-view">
        
        <!-- 1. 로그인 화면 -->
        <div id="login-section" class="surface-card">
            <div class="form-group">
                <label>학번 (5자리)</label>
                <input type="text" id="student-id" placeholder="예: 30101">
            </div>
            <div class="form-group">
                <label>이름</label>
                <input type="text" id="student-name" placeholder="이름을 입력하세요">
            </div>
            <div class="form-group">
                <label>본인 확인 문구</label>
                <input type="text" id="verify-phrase" placeholder="나만의 확인 문구 입력 (학습지와 동일)">
            </div>
            <button class="btn-primary" style="width: 100%; margin-top: 16px;" onclick="login()">접속하기</button>
        </div>

        <!-- 로그인 후 보이는 헤더(탭) -->
        <div id="student-nav" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 0 8px;">
                <span id="welcome-msg" style="font-weight: 700; font-size: 14px;"></span>
                <button class="btn-outline action-btn" onclick="logout()">로그아웃</button>
            </div>
            <div class="nav-tabs">
                <button id="tab-btn-today" class="active" onclick="switchStudentTab('today')">오늘의 강의</button>
                <button id="tab-btn-archive" onclick="switchStudentTab('archive')">생각 체크 아카이브</button>
            </div>
        </div>

        <!-- 2. 오늘의 강의 탭 -->
        <div id="student-today-section" class="hidden">
            <div id="lecture-list-area">
                <h3 style="margin-bottom: 16px; padding-left: 8px;">오늘의 강의 선택</h3>
                <div id="student-lecture-list"></div>
            </div>

            <div id="writing-area" class="hidden surface-card">
                <button class="btn-outline action-btn" style="margin-bottom: 24px;" onclick="cancelWriting()">목록으로</button>
                <h2 id="lecture-title-display" style="margin-bottom: 24px; font-size: 24px;"></h2>
                <div class="form-group">
                    <p id="lecture-question-display" style="font-size: 16px; font-weight: 700; color: var(--text-base); margin-bottom: 16px;"></p>
                    <p id="lecture-reference-display" style="font-size: 14px; color: var(--text-muted); margin-bottom: 24px;" class="hidden"></p>
                    
                    <textarea id="answer-text" rows="8" placeholder="본인의 생각을 이유와 함께 작성해 봅시다."></textarea>
                    <div class="char-count">글자 수 (공백 제외): <span id="count-display">0</span>자</div>
                    <div id="cheat-warning" class="warning hidden">⚠️ 다른 화면으로 이동한 기록이 있습니다. 직접 작성해주세요!</div>
                </div>
                <button class="btn-primary" style="width: 100%; margin-top: 16px;" onclick="submitAnswer()">제출하기</button>
            </div>
        </div>

        <!-- 3. 생각 체크 아카이브 탭 -->
        <div id="student-archive-section" class="hidden">
            <h3 style="margin-bottom: 16px; padding-left: 8px;">생각 체크 아카이브</h3>
            <div id="student-archive-lecture-list"></div>
            <div id="padlet-area" class="hidden">
                <button class="btn-outline action-btn" style="margin-bottom: 24px;" onclick="closePadlet()">아카이브 목록으로</button>
                <h2 id="padlet-title" style="font-size: 24px; margin-bottom: 8px;"></h2>
                <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 24px;">학생들의 소중한 생각 모음입니다.</p>
                <div id="padlet-grid" class="padlet-grid">
                    <!-- 포스트잇 카드들이 여기에 생성됩니다 -->
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== 👨‍🏫 교사(관리자) 화면 ==================== -->
    <div id="admin-view" class="hidden">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2 style="margin: 0;">관리자 모드</h2>
            <button class="btn-outline action-btn" onclick="exitAdmin()">닫기</button>
        </div>

        <div class="nav-tabs">
            <button id="admin-tab-lectures" class="active" onclick="switchAdminTab('lectures')">강의 목록</button>
            <button id="admin-tab-answers" onclick="switchAdminTab('answers')">답변 보기</button>
            <button id="admin-tab-archive" onclick="switchAdminTab('archive')">아카이브 제작</button>
        </div>

        <!-- 1. 강의 목록 탭 -->
        <div id="admin-lectures-section">
            <div class="surface-card">
                <h3>새 강의 열기</h3>
                <div style="height: 16px;"></div>
                <div class="form-group"><input type="text" id="new-lecture-title" placeholder="강의명 (예: 1강 선사시대)"></div>
                <div class="form-group"><input type="text" id="new-lecture-question" placeholder="오늘의 생각 질문 입력"></div>
                <div class="form-group"><input type="text" id="new-lecture-reference" placeholder="참고 글 (선택사항)"></div>
                <button class="btn-primary" style="width: 100%;" onclick="addLecture()">강의 생성</button>
            </div>
            
            <h3 style="margin: 32px 0 16px 8px;">개설된 강의 목록</h3>
            <div id="admin-lecture-list-container"></div>
        </div>

        <!-- 2. 생각 체크 답변 보기 탭 -->
        <div id="admin-answers-section" class="hidden">
            <select id="admin-lecture-select" onchange="renderAnswersTable()" style="margin-bottom: 24px;">
                <option value="">강의를 선택하세요</option>
            </select>
            
            <div class="nav-tabs">
                <button class="class-filter active" onclick="setAnswerFilter('all', this)">전체</button>
                <button class="class-filter" onclick="setAnswerFilter('1', this)">1반</button>
                <button class="class-filter" onclick="setAnswerFilter('2', this)">2반</button>
                <button class="class-filter" onclick="setAnswerFilter('3', this)">3반</button>
                <button class="class-filter" onclick="setAnswerFilter('4', this)">4반</button>
                <button class="class-filter" onclick="setAnswerFilter('5', this)">5반</button>
                <button class="class-filter" onclick="setAnswerFilter('6', this)">6반</button>
                <button class="class-filter" onclick="setAnswerFilter('picked', this)" style="color: var(--brand-green);">⭐ 픽</button>
            </div>

            <p style="margin-bottom: 16px; font-size: 14px;">해당 필터 제출 완료: <span id="filter-submit-count" style="color: var(--brand-green); font-weight: 700;">0</span> 명</p>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 25%;">학생 정보</th>
                            <th style="width: 50%;">답변 내용</th>
                            <th style="width: 25%;">관리</th>
                        </tr>
                    </thead>
                    <tbody id="answers-table-body"></tbody>
                </table>
            </div>
        </div>

        <!-- 3. 아카이브 제작 탭 -->
        <div id="admin-archive-section" class="hidden">
            <h3 style="margin-bottom: 8px;">아카이브 제작 관리</h3>
            <p style="margin-bottom: 24px;">제작 시 학생 화면의 '생각 체크 아카이브'에 공개됩니다.</p>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>강의명</th>
                            <th>상태</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody id="archive-manage-table-body"></tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<div class="admin-footer" id="admin-footer-btn">
    <button onclick="promptAdmin()">ADMIN ACCESS</button>
</div>

<!-- ==================== ⚙️ 스크립트 ==================== -->
<script>
    // 1. Firebase 초기화
    const firebaseConfig = {
        apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
        authDomain: "ho0911seong-56638.firebaseapp.com",
        databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ho0911seong-56638",
        storageBucket: "ho0911seong-56638.firebasestorage.app",
        messagingSenderId: "994509567071",
        appId: "1:994509567071:web:be8ed4e8e9b0a833f557ea"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let activeLectures = []; 
    let allSubmissions = []; 
    let currentUser = null; 
    let currentSelectedLecture = null; 
    let startTime = 0; 
    let cheatCount = 0; 
    let currentAnswerFilter = 'all';

    // Firebase 실시간 수신
    db.collection("lectures").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
        activeLectures = [];
        snapshot.forEach((doc) => {
            activeLectures.push({ docId: doc.id, ...doc.data() });
        });
        if(currentUser) renderStudentLectureList();
        if(!document.getElementById('admin-view').classList.contains('hidden')){
            renderAdminLectureList();
            populateAdminLectureSelect();
            renderArchiveManageList();
        }
        renderStudentArchiveList();
    });

    db.collection("submissions").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
        allSubmissions = [];
        snapshot.forEach((doc) => {
            allSubmissions.push({ subId: doc.id, ...doc.data() });
        });
        if(!document.getElementById('admin-view').classList.contains('hidden')){
            renderAnswersTable();
        }
    });

    // ==================== 👨‍🎓 학생 모드 ====================

    function login() {
        const id = document.getElementById('student-id').value.trim();
        const name = document.getElementById('student-name').value.trim();
        const verify = document.getElementById('verify-phrase').value.trim();

        if (!id || !name || !verify) { alert("모든 칸을 입력해주세요!"); return; }
        
        currentUser = { id, name, verify };
        
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('student-nav').classList.remove('hidden');
        document.getElementById('welcome-msg').textContent = `${id} ${name}`;
        document.getElementById('admin-footer-btn').classList.add('hidden'); 
        
        switchStudentTab('today');
    }

    function logout() {
        currentUser = null;
        document.getElementById('student-id').value = '';
        document.getElementById('student-name').value = '';
        document.getElementById('verify-phrase').value = '';
        
        document.getElementById('student-nav').classList.add('hidden');
        document.getElementById('student-today-section').classList.add('hidden');
        document.getElementById('student-archive-section').classList.add('hidden');
        document.getElementById('login-section').classList.remove('hidden');
        document.getElementById('admin-footer-btn').classList.remove('hidden');
    }

    function switchStudentTab(tab) {
        document.getElementById('tab-btn-today').classList.remove('active');
        document.getElementById('tab-btn-archive').classList.remove('active');
        document.getElementById('student-today-section').classList.add('hidden');
        document.getElementById('student-archive-section').classList.add('hidden');

        if(tab === 'today') {
            document.getElementById('tab-btn-today').classList.add('active');
            document.getElementById('student-today-section').classList.remove('hidden');
            renderStudentLectureList();
            document.getElementById('lecture-list-area').classList.remove('hidden');
            document.getElementById('writing-area').classList.add('hidden');
        } else {
            document.getElementById('tab-btn-archive').classList.add('active');
            document.getElementById('student-archive-section').classList.remove('hidden');
            renderStudentArchiveList();
            document.getElementById('student-archive-lecture-list').classList.remove('hidden');
            document.getElementById('padlet-area').classList.add('hidden');
        }
    }

    function renderStudentLectureList() {
        const listContainer = document.getElementById('student-lecture-list');
        listContainer.innerHTML = ''; 
        if (activeLectures.length === 0) {
            listContainer.innerHTML = '<p style="text-align:center; margin-top:32px;">개설된 강의가 없습니다.</p>';
            return;
        }
        activeLectures.forEach(lecture => {
            const btn = document.createElement('button');
            btn.className = 'lecture-list-btn';
            btn.textContent = lecture.title;
            btn.onclick = () => openWritingSection(lecture);
            listContainer.appendChild(btn);
        });
    }

    function openWritingSection(lecture) {
        currentSelectedLecture = lecture;
        document.getElementById('lecture-list-area').classList.add('hidden');
        document.getElementById('writing-area').classList.remove('hidden');
        
        document.getElementById('lecture-title-display').textContent = lecture.title;
        document.getElementById('lecture-question-display').textContent = lecture.question;
        
        const refElement = document.getElementById('lecture-reference-display');
        if (lecture.reference) {
            refElement.textContent = lecture.reference;
            refElement.classList.remove('hidden');
        } else {
            refElement.classList.add('hidden');
        }
        
        document.getElementById('answer-text').value = '';
        document.getElementById('count-display').textContent = '0';
        cheatCount = 0;
        document.getElementById('cheat-warning').classList.add('hidden');
        startTime = Date.now(); 
    }

    function cancelWriting() {
        document.getElementById('writing-area').classList.add('hidden');
        document.getElementById('lecture-list-area').classList.remove('hidden');
    }

    const textarea = document.getElementById('answer-text');
    textarea.addEventListener('input', function() {
        document.getElementById('count-display').textContent = this.value.replace(/\s/g, '').length;
    });
    textarea.addEventListener('paste', e => { e.preventDefault(); alert('직접 타이핑해주세요!'); });
    textarea.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('visibilitychange', function() {
        if (document.hidden && !document.getElementById('writing-area').classList.contains('hidden')) {
            cheatCount++;
            document.getElementById('cheat-warning').classList.remove('hidden');
        }
    });

    function submitAnswer() {
        const text = textarea.value.trim();
        if(!text) { alert("내용을 작성해주세요!"); return; }

        db.collection("submissions").add({
            lectureDocId: currentSelectedLecture.docId,
            lectureTitle: currentSelectedLecture.title,
            id: currentUser.id,
            name: currentUser.name,
            verify: currentUser.verify,
            text: text,
            textLength: text.replace(/\s/g, '').length,
            duration: Math.floor((Date.now() - startTime) / 1000),
            cheatCount: cheatCount,
            isPicked: false,
            createdAt: Date.now()
        }).then(() => {
            alert("제출이 완료되었습니다.");
            cancelWriting();
        });
    }

    function renderStudentArchiveList() {
        const listContainer = document.getElementById('student-archive-lecture-list');
        listContainer.innerHTML = ''; 
        const archivedLectures = activeLectures.filter(l => l.isArchived);
        
        if (archivedLectures.length === 0) {
            listContainer.innerHTML = '<p style="text-align:center; margin-top:32px;">아직 제작된 아카이브가 없습니다.</p>';
            return;
        }

        archivedLectures.forEach(lecture => {
            const btn = document.createElement('button');
            btn.className = 'lecture-list-btn';
            btn.innerHTML = `<span style="color:var(--brand-green); margin-right:8px;">●</span> ${lecture.title}`;
            btn.onclick = () => openPadlet(lecture);
            listContainer.appendChild(btn);
        });
    }

    function openPadlet(lecture) {
        document.getElementById('student-archive-lecture-list').classList.add('hidden');
        document.getElementById('padlet-area').classList.remove('hidden');
        document.getElementById('padlet-title').textContent = lecture.title;

        const padletGrid = document.getElementById('padlet-grid');
        padletGrid.innerHTML = '';

        let subs = allSubmissions.filter(s => s.lectureDocId === lecture.docId);
        subs.sort((a, b) => {
            if (a.isPicked !== b.isPicked) return b.isPicked ? 1 : -1;
            return b.textLength - a.textLength;
        });

        subs.forEach(sub => {
            const div = document.createElement('div');
            div.className = `padlet-card ${sub.isPicked ? 'picked-card' : ''}`;
            div.innerHTML = `
                ${sub.isPicked ? '<div style="color:var(--brand-green); font-size:12px; margin-bottom:8px; font-weight:700; text-transform:uppercase; letter-spacing:1px;">Selected</div>' : ''}
                <div style="font-size: 14px; color:var(--text-base);">${sub.text}</div>
            `;
            padletGrid.appendChild(div);
        });
    }

    function closePadlet() {
        document.getElementById('padlet-area').classList.add('hidden');
        document.getElementById('student-archive-lecture-list').classList.remove('hidden');
    }

    // ==================== 👨‍🏫 관리자 모드 ====================

    function promptAdmin() {
        if(prompt("관리자 비밀번호를 입력하세요:") === "ghtjd12!@") {
            document.getElementById('student-view').classList.add('hidden');
            document.getElementById('admin-footer-btn').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');
            
            renderAdminLectureList();
            populateAdminLectureSelect();
            renderArchiveManageList();
            switchAdminTab('lectures');
        } else {
            alert("비밀번호가 틀렸습니다.");
        }
    }

    function exitAdmin() {
        document.getElementById('admin-view').classList.add('hidden');
        document.getElementById('student-view').classList.remove('hidden');
        document.getElementById('admin-footer-btn').classList.remove('hidden');
    }

    function switchAdminTab(tab) {
        ['lectures', 'answers', 'archive'].forEach(t => {
            document.getElementById(`admin-tab-${t}`).classList.remove('active');
            document.getElementById(`admin-${t}-section`).classList.add('hidden');
        });
        document.getElementById(`admin-tab-${tab}`).classList.add('active');
        document.getElementById(`admin-${tab}-section`).classList.remove('hidden');
    }

    function addLecture() {
        const title = document.getElementById('new-lecture-title').value.trim();
        const question = document.getElementById('new-lecture-question').value.trim();
        const reference = document.getElementById('new-lecture-reference').value.trim();

        if (!title || !question) { alert("강의명과 질문을 입력해주세요."); return; }

        db.collection("lectures").add({
            title: title, question: question, reference: reference,
            isArchived: false, createdAt: Date.now()
        }).then(() => {
            document.getElementById('new-lecture-title').value = '';
            document.getElementById('new-lecture-question').value = '';
            document.getElementById('new-lecture-reference').value = '';
        });
    }

    function renderAdminLectureList() {
        const container = document.getElementById('admin-lecture-list-container');
        container.innerHTML = '';
        activeLectures.forEach(lec => {
            const div = document.createElement('div');
            div.className = 'surface-card';
            div.style.marginBottom = '16px'; div.style.padding = '16px';
            div.innerHTML = `
                <div style="font-weight:700; font-size:16px; margin-bottom:8px; color:var(--text-base);">${lec.title}</div>
                <div style="font-size:14px; color:var(--text-muted); margin-bottom:16px;">${lec.question}</div>
                <div>
                    <button class="btn-outline action-btn" onclick="editLecture('${lec.docId}')">EDIT</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function editLecture(docId) {
        const lec = activeLectures.find(l => l.docId === docId);
        const newTitle = prompt("새 강의명:", lec.title); if(!newTitle) return;
        const newQuestion = prompt("새 질문:", lec.question); if(!newQuestion) return;
        const newRef = prompt("새 참고글:", lec.reference || "");
        
        db.collection("lectures").doc(docId).update({
            title: newTitle, question: newQuestion, reference: newRef
        });
    }

    function populateAdminLectureSelect() {
        const select = document.getElementById('admin-lecture-select');
        const currentVal = select.value;
        select.innerHTML = '<option value="">강의를 선택하세요</option>';
        activeLectures.forEach(l => {
            select.innerHTML += `<option value="${l.docId}">${l.title}</option>`;
        });
        select.value = currentVal;
    }

    function setAnswerFilter(filter, btn) {
        currentAnswerFilter = filter;
        document.querySelectorAll('.class-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderAnswersTable();
    }

    function renderAnswersTable() {
        const tbody = document.getElementById('answers-table-body');
        const countSpan = document.getElementById('filter-submit-count');
        tbody.innerHTML = '';
        
        const selectedLectureId = document.getElementById('admin-lecture-select').value;
        if(!selectedLectureId) { countSpan.textContent = '0'; return; }

        let count = 0;
        allSubmissions.forEach(data => {
            if(data.lectureDocId !== selectedLectureId) return;

            const classStr = data.id.toString();
            const classNumber = classStr.length >= 3 ? classStr.charAt(2) : '';

            if (currentAnswerFilter === 'picked' && !data.isPicked) return;
            if (currentAnswerFilter !== 'all' && currentAnswerFilter !== 'picked' && currentAnswerFilter !== classNumber) return;

            count++;
            const isSuspicious = data.cheatCount > 0 || data.duration < 10;
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <strong style="color:var(--text-base);">${data.id} ${data.name}</strong><br>
                    <span style="font-size:12px; color:var(--text-muted);">문구: ${data.verify}</span><br>
                    <span style="font-size:12px; color:var(--border-gray);">${data.textLength}자 / ${data.duration}초</span><br>
                    ${isSuspicious ? '<span style="color:var(--text-error); font-size:12px; font-weight:700;">⚠ WARNING</span>' : ''}
                </td>
                <td style="line-height:1.5; color:var(--text-base);">${data.text}</td>
                <td>
                    <button class="action-btn pick-btn ${data.isPicked ? 'picked' : ''}" style="margin-bottom:8px;" onclick="togglePick('${data.subId}')">
                        ${data.isPicked ? 'UNPICK' : 'PICK'}
                    </button>
                    <button class="action-btn btn-danger" onclick="deleteSubmission('${data.subId}')">DELETE</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
        countSpan.textContent = count;
    }

    function togglePick(subId) {
        const target = allSubmissions.find(s => s.subId === subId);
        if(target) db.collection("submissions").doc(subId).update({ isPicked: !target.isPicked });
    }
    
    function deleteSubmission(subId) {
        if(confirm("이 학생의 데이터를 삭제하시겠습니까?")) {
            db.collection("submissions").doc(subId).delete();
        }
    }

    function renderArchiveManageList() {
        const tbody = document.getElementById('archive-manage-table-body');
        tbody.innerHTML = '';
        activeLectures.forEach(l => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="color:var(--text-base); font-weight:700;">${l.title}</td>
                <td style="color: ${l.isArchived ? 'var(--brand-green)' : 'var(--text-muted)'}; font-weight:700; font-size:12px; letter-spacing:1px; text-transform:uppercase;">
                    ${l.isArchived ? 'PUBLISHED' : 'HIDDEN'}
                </td>
                <td>
                    <button class="action-btn ${l.isArchived ? 'btn-outline' : 'btn-primary'}" onclick="toggleArchive('${l.docId}', ${l.isArchived})">
                        ${l.isArchived ? 'HIDE ARCHIVE' : 'PUBLISH'}
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function toggleArchive(docId, currentStatus) {
        if(!currentStatus) {
            if(confirm("이 강의를 아카이브에 공개하시겠습니까?")) {
                db.collection("lectures").doc(docId).update({ isArchived: true });
            }
        } else {
            if(confirm("아카이브에서 숨기시겠습니까?")) {
                db.collection("lectures").doc(docId).update({ isArchived: false });
            }
        }
    }
</script>
</body>
</html>
