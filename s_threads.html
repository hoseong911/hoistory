<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>S_threads | 신라 하대</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #000; --card: #121212; --text: #fff; --sub: #777; --border: #262626; }
    body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
    
    /* 접속 화면 & 모달 */
    #loginOverlay, #profileModal { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    #profileModal { display: none; background: rgba(0,0,0,0.95); z-index: 1500; }
    
    .box { width: 100%; max-width: 400px; text-align: center; }
    h1 { font-family: 'Jua', sans-serif; font-size: 3.5rem; margin-bottom: 20px; }
    
    input, select, textarea { 
      width: 100%; padding: 15px; background: #1e1e1e; border: 1px solid #333; 
      border-radius: 12px; color: #fff; margin-bottom: 8px; box-sizing: border-box; font-size: 16px;
    }
    .input-hint { color: #f91880; font-size: 11px; text-align: left; margin-bottom: 12px; padding-left: 5px; }

    .btn-main { width: 100%; padding: 15px; background: #fff; color: #000; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 5px; }
    .btn-sub { background: #333; color: #fff; margin-top: 10px; }

    /* 메인 앱 */
    #appContainer { display: none; width: 100%; max-width: 600px; min-height: 100vh; border-left: 1px solid var(--border); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid var(--border); }
    header h1 { font-size: 1.5rem; margin: 0; }
    .profile-trigger { font-size: 24px; cursor: pointer; }

    .post-area { padding: 20px; border-bottom: 1px solid var(--border); }
    .post-input-wrapper { display: flex; gap: 12px; }
    .avatar-circle { width: 45px; height: 45px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    textarea { background: transparent; border: none; padding: 5px; font-size: 18px; height: 80px; margin-bottom: 0; }

    #feed { flex: 1; }
    .thread-card { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; }
    .nickname { font-weight: bold; font-size: 14px; color: #fff; }
    .role-tag { font-size: 11px; color: var(--sub); background: #1a1a1a; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
    .time { color: var(--sub); font-size: 12px; margin-left: auto; }
    .content-text { font-size: 15px; line-height: 1.5; margin: 8px 0; color: #efefef; white-space: pre-wrap; }

    footer { padding: 40px 20px; text-align: center; color: #333; font-size: 12px; }
    .admin-icon { cursor: pointer; margin-top: 10px; opacity: 0.5; }
    #adminOverlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; padding: 20px; overflow-y: auto; }
  </style>
</head>
<body>

  <div id="loginOverlay">
    <div class="box">
      <h1>S_threads</h1>
      <input type="text" id="joinId" placeholder="학번 (5자리)" maxlength="5">
      <input type="text" id="joinName" placeholder="이름 (실명)">
      <input type="text" id="joinNick" placeholder="Nickname" oninput="validateNick(this)">
      <div class="input-hint">* 영문, 숫자, _ , ' , &quot; , 쉼표만 가능 (한글 금지)</div>
      <select id="joinRole">
        <option value="진골">👑 진골 귀족</option>
        <option value="6두품">📜 6두품 지식인</option>
        <option value="호족">🏰 지방 호족</option>
        <option value="농민">🌾 일반 농민</option>
        <option value="선종 승려">🧘 선종 승려</option>
        <option value="풍수지리사">🧭 풍수지리사</option>
      </select>
      <button class="btn-main" onclick="enterApp()">신라 접속하기</button>
    </div>
  </div>

  <div id="profileModal">
    <div class="box">
      <h2 class="jua-font">프로필 수정</h2>
      <input type="text" id="editNick" placeholder="New Nickname" oninput="validateNick(this)">
      <div class="input-hint">* 영문, 숫자, _ , ' , &quot; , 쉼표만 가능</div>
      <select id="editRole">
        <option value="진골">👑 진골 귀족</option>
        <option value="6두품">📜 6두품 지식인</option>
        <option value="호족">🏰 지방 호족</option>
        <option value="농민">🌾 일반 농민</option>
        <option value="선종 승려">🧘 선종 승려</option>
        <option value="풍수지리사">🧭 풍수지리사</option>
      </select>
      <button class="btn-main" onclick="saveProfile()">변경 내용 저장</button>
      <button class="btn-main btn-sub" onclick="closeProfile()">취소</button>
    </div>
  </div>

  <div id="appContainer">
    <header>
      <h1 class="jua-font">S_threads</h1>
      <div class="profile-trigger" onclick="openProfile()">👤</div>
    </header>

    <div class="post-area">
      <div class="post-input-wrapper">
        <div class="avatar-circle" id="myAvatar">?</div>
        <div style="flex:1">
          <textarea id="postInput" placeholder="새로운 스레드를 시작하세요..."></textarea>
          <div style="text-align:right;">
            <button class="btn-main" style="width:auto; padding:8px 20px;" onclick="createPost()">게시</button>
          </div>
        </div>
      </div>
    </div>

    <div id="feed"></div>

    <footer>
      <div>v1.2.1 - Incheon Dongyang Middle School</div>
      <div class="admin-icon" onclick="tryAdmin()">⚙️ Admin Mode</div>
    </footer>
  </div>

  <div id="adminOverlay">
    <button onclick="closeAdmin()" style="float:right; color:#fff; background:none; border:none; font-size:30px;">×</button>
    <h2 class="jua-font">관리자 센터</h2>
    <button onclick="initDummy()" style="background:blue; color:#fff; padding:10px; border:none; border-radius:5px;">더미 생성</button>
    <button onclick="resetAll()" style="background:red; color:#fff; padding:10px; border:none; border-radius:5px; margin-left:10px;">전체 초기화</button>
    <div id="adminTableContainer" style="margin-top:20px;"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
      authDomain: "ho0911seong-56638.firebaseapp.com",
      databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "ho0911seong-56638",
      storageBucket: "ho0911seong-56638.firebasestorage.app",
      messagingSenderId: "994509567071",
      appId: "1:994509567071:web:de99e71c125ec2a3f557ea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const postsRef = ref(db, 'posts');

    let currentUser = null;
    const roleIcons = { "진골": "👑", "6두품": "📜", "호족": "🏰", "농민": "🌾", "선종 승려": "🧘", "풍수지리사": "🧭" };

    // 닉네임 유효성 검사 (영문, 숫자, _, ', ", , 허용 / 한글 및 기타 특문 차단)
    window.validateNick = (target) => {
      const regex = /[^a-zA-Z0-9_,'"]/g;
      target.value = target.value.replace(regex, '');
    };

    window.enterApp = () => {
      const id = document.getElementById('joinId').value;
      const name = document.getElementById('joinName').value;
      const nick = document.getElementById('joinNick').value;
      const role = document.getElementById('joinRole').value;

      if(id.length !== 5 || !name || !nick) return alert("학번, 이름, 닉네임을 모두 입력하세요.");

      currentUser = { id, name, nick, role };
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('appContainer').style.display = 'flex';
      updateUI();
      listenFeed();
    };

    function updateUI() {
      document.getElementById('myAvatar').innerText = roleIcons[currentUser.role];
      document.getElementById('editNick').value = currentUser.nick;
      document.getElementById('editRole').value = currentUser.role;
    }

    window.createPost = () => {
      const content = document.getElementById('postInput').value;
      if(!content.trim()) return;

      const now = new Date();
      const timestamp = `${now.getMonth()+1}.${now.getDate()}. ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

      const newPostRef = push(postsRef);
      set(newPostRef, {
        id: newPostRef.key,
        studentId: currentUser.id,
        realName: currentUser.name,
        nickname: currentUser.nick,
        role: currentUser.role,
        content: content,
        time: timestamp,
        likes: 0,
        likedBy: { "init": true }
      });
      document.getElementById('postInput').value = "";
    };

    function listenFeed() {
      onValue(postsRef, (snapshot) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        const data = snapshot.val();
        if(!data) return;

        const postsArr = Object.values(data).filter(p => p.id);
        postsArr.sort((a,b) => (b.likes || 0) - (a.likes || 0) || b.id.localeCompare(a.id));

        postsArr.forEach(post => {
          const isLiked = post.likedBy && post.likedBy[currentUser.id];
          const card = document.createElement('div');
          card.className = 'thread-card';
          card.innerHTML = `
            <div class="avatar-circle">${roleIcons[post.role] || '👤'}</div>
            <div style="flex:1">
              <div style="display:flex; align-items:center;">
                <span class="nickname">${post.nickname}</span>
                <span class="role-tag">${post.role}</span>
                <span class="time">${post.time}</span>
              </div>
              <div class="content-text">${post.content}</div>
              <div style="color:${isLiked ? '#f91880':'#777'}; cursor:pointer; font-size:14px;" onclick="toggleLike('${post.id}', ${isLiked})">
                ${isLiked ? '❤️':'♡'} ${post.likes || 0}
              </div>
            </div>
          `;
          feed.appendChild(card);
        });
        renderAdminTable(postsArr);
      });
    }

    window.toggleLike = (postId, isLiked) => {
      const postRef = ref(db, `posts/${postId}`);
      onValue(postRef, (snapshot) => {
        const post = snapshot.val();
        if(!post) return;
        const updates = {};
        updates[`posts/${postId}/likes`] = isLiked ? (post.likes - 1) : (post.likes + 1);
        updates[`posts/${postId}/likedBy/${currentUser.id}`] = isLiked ? null : true;
        update(ref(db), updates);
      }, { onlyOnce: true });
    };

    // 개인정보 수정 로직
    window.openProfile = () => document.getElementById('profileModal').style.display = 'flex';
    window.closeProfile = () => document.getElementById('profileModal').style.display = 'none';
    window.saveProfile = () => {
      const newNick = document.getElementById('editNick').value;
      const newRole = document.getElementById('editRole').value;
      if(!newNick) return alert("닉네임을 입력하세요.");
      
      currentUser.nick = newNick;
      currentUser.role = newRole;
      updateUI();
      closeProfile();
      alert("프로필이 변경되었습니다!");
    };

    window.initDummy = () => {
      const dummyData = [
        { studentId: "00000", realName: "Master", nickname: "King_of_Silla", role: "진골", content: "Party tonight at Anapji! No 6-Dupums allowed.", likes: 10, time: "4.23. 11:00" },
        { studentId: "00000", realName: "Master", nickname: "Angry_Farmer_1", role: "농민", content: "Taxes are too high... I'm leaving for the mountains.", likes: 15, time: "4.23. 11:10" }
      ];
      dummyData.forEach(d => {
        const r = push(postsRef);
        set(r, { ...d, id: r.key, likedBy: { "init": true } });
      });
    };

    window.tryAdmin = () => { if(prompt("Pass:") === "1234") document.getElementById('adminOverlay').style.display = 'block'; };
    window.closeAdmin = () => document.getElementById('adminOverlay').style.display = 'none';
    window.resetAll = () => { if(confirm("초기화?")) remove(postsRef); };
    window.deletePost = (id) => remove(ref(db, `posts/${id}`));

    function renderAdminTable(arr) {
      let html = `<table style="width:100%; border-collapse:collapse; background:#111; color:#fff; font-size:12px;">
        <tr><th>학번</th><th>이름</th><th>닉네임</th><th>삭제</th></tr>`;
      arr.forEach(p => {
        html += `<tr style="border-bottom:1px solid #333;"><td style="padding:10px;">${p.studentId}</td><td>${p.realName}</td><td>${p.nickname}</td><td><button onclick="deletePost('${p.id}')">X</button></td></tr>`;
      });
      html += `</table>`;
      document.getElementById('adminTableContainer').innerHTML = html;
    }
  </script>
</body>
</html>
