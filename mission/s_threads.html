<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>S_threads | 신라 하대</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000; --card: #121212; --text: #fff; --sub: #777;
      --border: #262626; --accent: #fff; --danger: #f91880;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Pretendard', sans-serif;
      display: flex; justify-content: center;
      min-height: 100vh; overflow-x: hidden;
    }

    input, select {
      width: 100%; padding: 15px;
      background: #1e1e1e; border: 1px solid #333; border-radius: 12px;
      color: #fff; margin-bottom: 8px;
      font-size: 16px; font-family: 'Pretendard';
      outline: none; transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    input:focus { border-color: #555; }
    input.valid   { border-color: #2ecc71 !important; }
    input.invalid { border-color: #f91880 !important; }

    /* ── 로그인 ── */
    #loginOverlay {
      position: fixed; inset: 0; background: #000; z-index: 1000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-box { width: 100%; max-width: 400px; }
    .login-logo {
      font-family: 'Jua', sans-serif; font-size: 3rem;
      text-align: center; margin-bottom: 8px;
    }
    .login-sub {
      text-align: center; font-size: 12px; color: #555;
      margin-bottom: 28px; letter-spacing: 0.04em;
    }

    .input-wrap { position: relative; margin-bottom: 8px; }
    .input-wrap input { margin-bottom: 0; }
    .input-status {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-size: 16px; pointer-events: none;
    }

    .verify-msg {
      font-size: 11px; padding: 0 4px; margin-bottom: 6px; height: 16px;
      transition: 0.15s;
    }
    .verify-msg.ok  { color: #2ecc71; }
    .verify-msg.err { color: #f91880; }

    .btn-main {
      width: 100%; padding: 15px; background: #fff; color: #000;
      border: none; border-radius: 30px; font-weight: 800;
      cursor: pointer; font-size: 15px; margin-top: 6px;
      font-family: 'Pretendard', sans-serif;
      transition: opacity 0.15s;
    }
    .btn-main:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-main:not(:disabled):hover { opacity: 0.88; }
    .btn-main.danger { background: #c0392b; color: #fff; }
    .btn-main.gray   { background: #2a2a2a; color: #bbb; }

    /* 아카이브 진입 버튼 */
    .btn-archive-entry {
      width: 100%; padding: 14px; background: transparent;
      border: 1px solid #2a2a2a; border-radius: 30px;
      color: #777; font-size: 14px; font-weight: 700;
      cursor: pointer; margin-top: 10px;
      font-family: 'Pretendard', sans-serif;
      transition: 0.15s; display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-archive-entry:hover { border-color: #555; color: #aaa; }

    /* ── 프로필 모달 ── */
    #profileModal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      backdrop-filter: blur(8px);
      z-index: 1000; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 24px;
    }
    #profileModal .modal-box {
      width: 100%; max-width: 360px;
      background: #111; border: 1px solid #2a2a2a;
      border-radius: 20px; padding: 28px 24px;
    }
    .modal-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 22px;
    }
    .modal-avatar {
      width: 44px; height: 44px; background: #222;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 22px; flex-shrink: 0;
    }
    .modal-user-info .modal-name { font-size: 15px; font-weight: 800; }
    .modal-user-info .modal-id   { font-size: 11px; color: #555; margin-top: 2px; }
    .modal-section-label {
      font-size: 10px; font-weight: 700; color: #555;
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 8px; margin-top: 16px;
    }
    .modal-section-label:first-of-type { margin-top: 0; }
    .modal-btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 18px; }

    /* ── 글 수정 모달 ── */
    #editPostModal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.96);
      backdrop-filter: blur(10px);
      z-index: 1100; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 24px;
    }
    #editPostModal .modal-box {
      width: 100%; max-width: 400px;
      background: #111; border: 1px solid #2a2a2a;
      border-radius: 20px; padding: 28px 24px;
    }
    #editPostModal .modal-title {
      font-size: 15px; font-weight: 800; margin-bottom: 18px; color: #fff;
    }
    #editPostModal textarea {
      width: 100%; background: #1e1e1e; border: 1px solid #333;
      border-radius: 12px; color: #fff; padding: 14px;
      font-size: 15px; font-family: 'Pretendard'; outline: none;
      resize: none; height: 160px; line-height: 1.5;
      transition: border-color 0.15s; margin-bottom: 8px;
    }
    #editPostModal textarea:focus { border-color: #555; }
    #editCharCount { font-size: 11px; color: #555; text-align: right; margin-bottom: 12px; }

    /* ── 메인 앱 ── */
    #appContainer {
      display: none; width: 100%; max-width: 600px; min-height: 100vh;
      border-left: 1px solid var(--border); border-right: 1px solid var(--border);
      flex-direction: column;
    }
    header {
      padding: 12px 16px;
      display: flex; flex-direction: column; gap: 0;
      position: sticky; top: 0;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
      z-index: 100; border-bottom: 1px solid var(--border);
    }
    .header-top {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%; margin-bottom: 8px;
    }
    .header-logo { font-family: 'Jua', sans-serif; font-size: 1.4rem; }

    .profile-btn {
      display: flex; align-items: center; gap: 7px;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 20px; padding: 5px 12px 5px 6px;
      cursor: pointer; transition: 0.15s;
      font-family: 'Pretendard', sans-serif;
    }
    .profile-btn:hover { border-color: #555; background: #222; }
    .profile-btn .pb-avatar {
      width: 26px; height: 26px; background: #2a2a2a;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 14px;
    }
    .profile-btn .pb-nick {
      font-size: 12px; font-weight: 700; color: #e0e0e0;
      max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .role-tabs {
      display: flex; overflow-x: auto; scrollbar-width: none; width: 100%;
    }
    .role-tabs::-webkit-scrollbar { display: none; }
    .role-tab {
      flex-shrink: 0; padding: 8px 14px; border: none; background: none;
      font-size: 12px; font-weight: 500; color: var(--sub);
      cursor: pointer; border-bottom: 2px solid transparent;
      font-family: 'Pretendard', sans-serif; white-space: nowrap; transition: 0.12s;
    }
    .role-tab.active { color: #fff; border-bottom-color: #fff; font-weight: 700; }

    .sort-container {
      display: flex; justify-content: flex-end;
      padding: 10px 16px; border-bottom: 1px solid var(--border); background: #000;
    }
    .sort-box { display: flex; background: #1a1a1a; border-radius: 20px; padding: 3px; }
    .sort-btn {
      padding: 5px 12px; border: none; border-radius: 15px;
      font-size: 11px; font-weight: 700; color: var(--sub);
      background: none; cursor: pointer; transition: 0.2s;
      font-family: 'Pretendard', sans-serif;
    }
    .sort-btn.active { color: #000; background: #fff; }

    .post-area { padding: 16px; border-bottom: 1px solid var(--border); }
    .post-input-wrapper { display: flex; gap: 12px; }
    .avatar-circle {
      width: 42px; height: 42px; background: #222; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    textarea {
      background: transparent; border: none;
      font-size: 17px; height: 50px; outline: none;
      width: 100%; resize: none; color: #fff;
      font-family: 'Pretendard', sans-serif;
    }
    textarea::placeholder { color: #555; font-style: italic; font-size: 15px; }

    #feed { flex: 1; }
    .thread-card { padding: 15px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; }
    .nickname { font-weight: bold; font-size: 14px; }
    .role-tag {
      font-size: 10px; color: var(--sub); background: #1a1a1a;
      padding: 2px 6px; border-radius: 4px; margin-left: 5px;
    }
    .dummy-tag {
      font-size: 10px; color: #555; background: #1a1a1a;
      padding: 2px 6px; border-radius: 4px; margin-left: 5px;
      border: 1px solid #2a2a2a;
    }
    .edited-tag { font-size: 10px; color: #555; margin-left: 5px; }
    .time { color: var(--sub); font-size: 11px; margin-left: auto; }
    .content-text { font-size: 15px; line-height: 1.5; margin: 6px 0; color: #efefef; white-space: pre-wrap; }

    .pick-badge-dark {
      display: inline-block; background: #2a2000; color: #f5a623;
      border: 1px solid #6a5000; border-radius: 4px; padding: 1px 7px;
      font-size: 10px; font-weight: 700; margin-bottom: 4px;
    }

    .post-actions { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
    .like-btn {
      color: #777; cursor: pointer; font-size: 13px; display: inline-flex; align-items: center;
    }
    .like-btn.liked { color: #f91880; }
    .edit-btn {
      color: #555; cursor: pointer; font-size: 12px;
      background: none; border: none; padding: 0;
      font-family: 'Pretendard', sans-serif; transition: color 0.15s;
    }
    .edit-btn:hover { color: #aaa; }

    .empty-state {
      padding: 60px 20px; text-align: center; color: var(--sub);
      font-size: 14px; line-height: 1.7;
    }

    footer { padding: 30px 20px; text-align: center; color: #333; font-size: 11px; }

    .spinner-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 30px 0;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid #2a2a2a; border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #toastContainer {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
      z-index: 9999; display: flex; flex-direction: column; gap: 8px;
      pointer-events: none; width: 90%; max-width: 420px;
    }
    .toast {
      background: linear-gradient(135deg, #1a1200, #2a2000);
      border: 1.5px solid #6a5000; border-radius: 14px;
      padding: 14px 18px; display: flex; align-items: flex-start; gap: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: toastIn 0.35s cubic-bezier(.34,1.56,.64,1) forwards;
      pointer-events: auto;
    }
    .toast.err-toast { background: linear-gradient(135deg, #1a0006, #2a000f); border-color: #6a0020; }
    .toast.out { animation: toastOut 0.3s ease forwards; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-16px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(-10px) scale(0.95); }
    }
    .toast-icon { font-size: 22px; flex-shrink: 0; }
    .toast-body { flex: 1; }
    .toast-title { font-size: 13px; font-weight: 800; color: #f5a623; margin-bottom: 2px; }
    .toast-title.red { color: #f91880; }
    .toast-msg   { font-size: 12px; color: #c8a060; line-height: 1.5; }
    .toast-msg.red { color: #c06080; }
    .toast-close {
      background: none; border: none; cursor: pointer;
      color: #555; font-size: 18px; padding: 0; line-height: 1; flex-shrink: 0;
    }

    /* ══════════════════════════
       아카이브 뷰
    ══════════════════════════ */
    #archiveView {
      display: none; width: 100%; max-width: 600px; min-height: 100vh;
      border-left: 1px solid var(--border); border-right: 1px solid var(--border);
      flex-direction: column;
    }

    .arc-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
    }
    .arc-header-top {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .arc-back-btn {
      background: none; border: 1px solid #2a2a2a; color: #777;
      border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: 'Pretendard', sans-serif; transition: 0.15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .arc-back-btn:hover { border-color: #555; color: #ccc; }
    .arc-header-logo { font-family: 'Jua', sans-serif; font-size: 1.2rem; color: #fff; }
    .arc-header-sub { font-size: 11px; color: #555; margin-top: 1px; }

    /* 8칸 그리드 메뉴 */
    .arc-menu-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .arc-menu-btn {
      padding: 10px 8px; background: #111; border: 1px solid #2a2a2a;
      border-radius: 10px; color: #666; font-size: 12px; font-weight: 700;
      cursor: pointer; text-align: center; transition: 0.15s;
      font-family: 'Pretendard', sans-serif; white-space: nowrap;
    }
    .arc-menu-btn:hover { border-color: #444; color: #aaa; }
    .arc-menu-btn.active { background: #fff; border-color: #fff; color: #000; }
    .arc-menu-btn.pick-btn.active { background: #2a2000; border-color: #6a5000; color: #f5a623; }

    /* 아카이브 피드 */
    .arc-body { flex: 1; padding-bottom: 40px; }

    /* 픽 글 스타일 */
    .arc-card { padding: 15px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; }
    .arc-card.is-pick { background: rgba(42,32,0,0.4); }
    .arc-card-body { flex: 1; }
    .arc-card-meta { display: flex; align-items: center; flex-wrap: wrap; margin-bottom: 4px; }
    .arc-nick { font-weight: 800; font-size: 13px; color: #ddd; }
    .arc-role-tag {
      font-size: 10px; color: #555; background: #1a1a1a;
      padding: 2px 6px; border-radius: 4px; margin-left: 6px;
    }
    .arc-time { font-size: 11px; color: #444; margin-left: auto; }
    .arc-content { font-size: 15px; line-height: 1.55; color: #ddd; white-space: pre-wrap; margin-bottom: 5px; }
    .arc-likes { font-size: 12px; color: #555; }
    /* 픽된 글에만 표시하는 학번/이름 */
    .arc-pick-info {
      font-size: 11px; color: #f5a623; font-weight: 700; margin-top: 3px;
    }

    .arc-empty {
      padding: 60px 20px; text-align: center; color: #333; font-size: 14px; line-height: 1.8;
    }

    .btn-arc-more {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: calc(100% - 32px); margin: 12px 16px;
      padding: 13px; background: #111; border: 1px solid #2a2a2a;
      border-radius: 10px; font-size: 14px; font-weight: 700; color: #666;
      cursor: pointer; transition: 0.15s; font-family: inherit;
    }
    .btn-arc-more:hover { border-color: #444; color: #aaa; }

    .arc-section-divider {
      padding: 10px 16px 6px;
      font-size: 11px; font-weight: 700; color: #444;
      letter-spacing: 0.06em; border-top: 1px solid #1a1a1a;
    }
  </style>
</head>
<body>

<div id="toastContainer"></div>

<!-- ── 로그인 ── -->
<div id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">S_threads</div>
    <div class="login-sub">신라 하대 스레드</div>

    <div class="input-wrap">
      <input type="text" id="joinId" placeholder="학번 (5자리)" maxlength="5"
        inputmode="numeric" autocomplete="off" oninput="onIdInput(this)">
      <span class="input-status" id="idStatus"></span>
    </div>
    <div class="verify-msg" id="idMsg"></div>

    <div class="input-wrap">
      <input type="text" id="joinName" placeholder="이름 (실명)" autocomplete="off"
        oninput="onNameInput(this)" disabled>
      <span class="input-status" id="nameStatus"></span>
    </div>
    <div class="verify-msg" id="nameMsg"></div>

    <input type="text" id="joinNick" placeholder="nickname (영문/숫자/_)"
      oninput="validateNick(this)" autocomplete="off">
    <select id="joinRole">
      <option value="진골">👑 진골 귀족</option>
      <option value="6두품">📜 6두품 지식인</option>
      <option value="호족">🏰 지방 호족</option>
      <option value="농민">🌾 일반 농민</option>
      <option value="선종 승려">🧘 선종 승려</option>
      <option value="풍수지리사">🧭 풍수지리사</option>
    </select>

    <button class="btn-main" id="enterBtn" onclick="enterApp()" disabled>신라 접속하기</button>
    <div id="loginSpinner" style="display:none;" class="spinner-wrap">
      <div class="spinner"></div>
      <div style="font-size:12px;color:#555;">학생 명단 확인 중...</div>
    </div>

    <button class="btn-archive-entry" onclick="openArchive()">
      📚 활동 아카이브 보기
    </button>

    <div style="text-align:center; margin-top:20px;">
      <a href="s_threads_admin.html" style="color:#333; font-size:11px; text-decoration:none;">관리자 센터</a>
    </div>
  </div>
</div>

<!-- ── 프로필 모달 ── -->
<div id="profileModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-avatar" id="modalAvatar">?</div>
      <div class="modal-user-info">
        <div class="modal-name" id="modalName">-</div>
        <div class="modal-id" id="modalId">-</div>
      </div>
    </div>
    <div class="modal-section-label">닉네임 변경</div>
    <input type="text" id="editNick" placeholder="new_nickname" oninput="validateNick(this)" autocomplete="off">
    <div class="modal-section-label">신분 변경</div>
    <select id="editRole">
      <option value="진골">👑 진골 귀족</option>
      <option value="6두품">📜 6두품 지식인</option>
      <option value="호족">🏰 지방 호족</option>
      <option value="농민">🌾 일반 농민</option>
      <option value="선종 승려">🧘 선종 승려</option>
      <option value="풍수지리사">🧭 풍수지리사</option>
    </select>
    <div class="modal-btn-group">
      <button class="btn-main" onclick="saveProfile()">수정 완료</button>
      <button class="btn-main gray" onclick="closeProfile()">취소</button>
      <button class="btn-main danger" style="margin-top:6px;" onclick="logout()">로그아웃</button>
    </div>
  </div>
</div>

<!-- ── 글 수정 모달 ── -->
<div id="editPostModal">
  <div class="modal-box">
    <div class="modal-title">✏️ 글 수정</div>
    <div class="modal-section-label" style="margin-top:0;">내용 수정</div>
    <textarea id="editPostContent" placeholder="내용을 수정하세요..."></textarea>
    <div id="editCharCount">0 / 300</div>
    <div class="modal-section-label">계층 변경</div>
    <select id="editPostRole">
      <option value="진골">👑 진골 귀족</option>
      <option value="6두품">📜 6두품 지식인</option>
      <option value="호족">🏰 지방 호족</option>
      <option value="농민">🌾 일반 농민</option>
      <option value="선종 승려">🧘 선종 승려</option>
      <option value="풍수지리사">🧭 풍수지리사</option>
    </select>
    <div class="modal-btn-group">
      <button class="btn-main" onclick="submitPostEdit()">수정 완료</button>
      <button class="btn-main gray" onclick="closeEditPost()">취소</button>
    </div>
  </div>
</div>

<!-- ── 메인 앱 ── -->
<div id="appContainer">
  <header>
    <div class="header-top">
      <span class="header-logo">S_threads</span>
      <button class="profile-btn" onclick="openProfile()">
        <div class="pb-avatar" id="headerAvatar">?</div>
        <span class="pb-nick" id="headerNick">...</span>
      </button>
    </div>
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRoleFilter('all', this)">전체</button>

        <div style="display:flex; justify-content:space-between; align-items:center;">

  <footer>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, update, get }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
    authDomain: "ho0911seong-56638.firebaseapp.com",
    databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ho0911seong-56638",
    storageBucket: "ho0911seong-56638.firebasestorage.app",
    messagingSenderId: "994509567071",
    appId: "1:994509567071:web:de99e71c125ec2a3f557ea"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const postsRef   = ref(db, 'posts');
  const toastRef   = ref(db, 'silla_toast');
  const studentsRef= ref(db, 'students');

  const roleIcons = {
    "진골": "👑", "6두품": "📜", "호족": "🏰",
    "농민": "🌾", "선종 승려": "🧘", "풍수지리사": "🧭"
  };

  const BAD_WORDS = [
    "씨발","시발","쉬발","씨바","시바","ㅅㅂ","ㅆㅂ",
    "개새끼","개새","ㄱㅅㄲ","개샊","개섀끼",
    "병신","ㅂㅅ","벙신","뻥신","지랄","ㅈㄹ","지ㄹㄹ",
    "미친","미치","ㅁㅊ","미칀","엠창",
    "fuck","shit","bitch","asshole","bastard",
    "새끼","쌔끼","섀끼","ㅅㄲ","년","놈","놈새끼",
    "꺼져","꺼지","죽어","죽여","뒤져","뒈져","뒤지","뒈지",
    "창녀","창년","걸레","보지","자지","강간","성폭","성추",
    "ㅗ","ㅗㅗ","개같","개 같","닥쳐","닥ㅊ",
    "느금마","느그엄마","니애미","니에미","니엄마",
    "존나","ㅈㄴ","좆","ㅈㅈ","좋같","좆같",
    "빡대가리","빡대","찐따","찐따새끼","머저리","멍청","바보같","돼지같",
    "꼴통","장애","장애인 같"
  ];
  function containsBadWord(text) {
    const normalized = text.replace(/\s/g, '').toLowerCase();
    return BAD_WORDS.some(w => normalized.includes(w.toLowerCase().replace(/\s/g, '')));
  }

  let currentUser = null;
  let currentSort = 'newest';
  let currentRoleFilter = 'all';
  let allPostsCache = [];
  let lastToastKey = null;
  let studentMap = {};
  let studentMapLoaded = false;
  let editingPostId = null;

  // 아카이브 상태
  let arcFilter = 'all';
  let arcPage = 1;
  const ARC_PAGE_SIZE = 10;
  let arcListening = false;

  async function loadStudentMap() {
    if (studentMapLoaded) return;
    try {
      const snap = await get(studentsRef);
      const data = snap.val();
      if (data) {
        Object.values(data).forEach(s => {
          const sid   = s.studentId || s.id || '';
          const sname = s.name || s.studentName || s.realName || '';
          if (sid && sname) studentMap[sid] = sname;
        });
      }
    } catch (e) { console.warn('학생 명단 로드 실패:', e); }
    studentMapLoaded = true;
  }

  let idVerifyTimer = null;
  let verifiedStudentName = null;

  window.validateNick = (el) => {
    el.value = el.value.toLowerCase().replace(/[^a-z0-9_.]/g, '');
  };

  window.onIdInput = async (el) => {
    const val = el.value.replace(/\D/g, '');
    el.value = val;
    const idMsg=document.getElementById('idMsg'), idStatus=document.getElementById('idStatus');
    const nameInput=document.getElementById('joinName'), nameMsg=document.getElementById('nameMsg'), nameStatus=document.getElementById('nameStatus');

    verifiedStudentName = null;
    nameInput.disabled = true; nameInput.value = '';
    nameInput.classList.remove('valid','invalid'); nameMsg.textContent=''; nameMsg.className='verify-msg'; nameStatus.textContent='';
    updateEnterBtn(); el.classList.remove('valid','invalid'); idStatus.textContent='';

    if (val.length < 5) { idMsg.textContent = val.length > 0 ? `학번은 5자리입니다 (현재 ${val.length}자리)` : ''; idMsg.className='verify-msg err'; return; }

    idMsg.textContent=''; idStatus.textContent='⏳';
    clearTimeout(idVerifyTimer);
    idVerifyTimer = setTimeout(async () => {
      await loadStudentMap();
      if (Object.keys(studentMap).length === 0) {
        el.classList.add('valid'); idStatus.textContent='✅'; idMsg.textContent='학번 형식 확인 완료'; idMsg.className='verify-msg ok';
        nameInput.disabled=false; nameInput.placeholder='이름 (실명)'; updateEnterBtn(); return;
      }
      if (studentMap[val] !== undefined) {
        verifiedStudentName = studentMap[val]; el.classList.add('valid'); idStatus.textContent='✅';
        idMsg.textContent='명단 확인 완료'; idMsg.className='verify-msg ok';
        nameInput.value=verifiedStudentName; nameInput.disabled=false; nameInput.classList.add('valid');
        nameStatus.textContent='✅'; nameMsg.textContent=`${verifiedStudentName} 학생으로 확인되었습니다`; nameMsg.className='verify-msg ok';
      } else {
        el.classList.add('invalid'); idStatus.textContent='❌';
        idMsg.textContent='명단에 없는 학번입니다. 선생님께 문의하세요.'; idMsg.className='verify-msg err'; nameInput.disabled=true;
      }
      updateEnterBtn();
    }, 400);
  };

  window.onNameInput = (el) => {
    const val=el.value.trim(), nameMsg=document.getElementById('nameMsg'), nameStatus=document.getElementById('nameStatus');
    el.classList.remove('valid','invalid'); nameStatus.textContent='';
    if (!val) { nameMsg.textContent=''; nameMsg.className='verify-msg'; updateEnterBtn(); return; }
    if (verifiedStudentName) {
      if (val===verifiedStudentName) { el.classList.add('valid'); nameStatus.textContent='✅'; nameMsg.textContent='이름 일치'; nameMsg.className='verify-msg ok'; }
      else { el.classList.add('invalid'); nameStatus.textContent='❌'; nameMsg.textContent='이름이 일치하지 않습니다'; nameMsg.className='verify-msg err'; }
    } else { el.classList.add('valid'); nameStatus.textContent='✅'; nameMsg.textContent=''; }
    updateEnterBtn();
  };

  function isLoginValid() {
    const id=document.getElementById('joinId').value.trim(), name=document.getElementById('joinName').value.trim(), nick=document.getElementById('joinNick').value.trim();
    if (!/^\d{5}$/.test(id)) return false;
    if (!name || !nick) return false;
    if (verifiedStudentName && name!==verifiedStudentName) return false;
    if (studentMapLoaded && Object.keys(studentMap).length>0 && !studentMap[id]) return false;
    return true;
  }
  function updateEnterBtn() { document.getElementById('enterBtn').disabled = !isLoginValid(); }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('joinNick').addEventListener('input', updateEnterBtn);
    document.getElementById('joinRole').addEventListener('change', updateEnterBtn);

    document.getElementById('postInput').addEventListener('input', function() {
      const withoutSpace=this.value.replace(/\s/g,'');
      if (withoutSpace.length>300) { let count=0,cutIndex=0; for(let i=0;i<this.value.length;i++){if(this.value[i]!==' '&&this.value[i]!=='\n')count++;if(count===300){cutIndex=i+1;break;}} this.value=this.value.slice(0,cutIndex); }
      document.getElementById('charCount').textContent=`${this.value.replace(/\s/g,'').length} / 300`;
    });

    document.getElementById('editPostContent').addEventListener('input', function() {
      const withoutSpace=this.value.replace(/\s/g,'');
      if (withoutSpace.length>300) { let count=0,cutIndex=0; for(let i=0;i<this.value.length;i++){if(this.value[i]!==' '&&this.value[i]!=='\n')count++;if(count===300){cutIndex=i+1;break;}} this.value=this.value.slice(0,cutIndex); }
      document.getElementById('editCharCount').textContent=`${this.value.replace(/\s/g,'').length} / 300`;
    });
  });

  window.enterApp = () => {
    const id=document.getElementById('joinId').value.trim(), name=document.getElementById('joinName').value.trim(),
          nick=document.getElementById('joinNick').value.trim(), role=document.getElementById('joinRole').value;
    if (!isLoginValid()) return;
    currentUser={id,name,nick,role};
    localStorage.setItem('s_threads_user',JSON.stringify(currentUser));
    showApp();
  };

  window.onload = async () => {
    const saved=localStorage.getItem('s_threads_user');
    if (saved) { currentUser=JSON.parse(saved); showApp(); }
  };

  function showApp() {
    document.getElementById('loginOverlay').style.display='none';
    document.getElementById('archiveView').style.display='none';
    const appEl=document.getElementById('appContainer');
    appEl.style.display='flex';
    updateUI(); listenFeed(); listenToast();
  }

  function updateUI() {
    const icon=roleIcons[currentUser.role]||'?';
    document.getElementById('myAvatar').textContent=icon;
    document.getElementById('headerAvatar').textContent=icon;
    document.getElementById('headerNick').textContent=currentUser.nick;
    document.getElementById('modalAvatar').textContent=icon;
    document.getElementById('modalName').textContent=`${currentUser.name} (${currentUser.nick})`;
    document.getElementById('modalId').textContent=`학번 ${currentUser.id} · ${currentUser.role}`;
    document.getElementById('editNick').value=currentUser.nick;
    document.getElementById('editRole').value=currentUser.role;
  }

  function listenFeed() {
    onValue(postsRef, snap => {
      const data=snap.val();
      allPostsCache=data?Object.values(data).filter(p=>p&&p.id):[];
      renderFeed();
      // 아카이브도 같은 데이터로 갱신
      if (document.getElementById('archiveView').style.display!=='none') renderArcFeed();
    });
  }

  function listenToast() {
    onValue(toastRef, snap => {
      const data=snap.val(); if(!data) return;
      if (data.key===lastToastKey) return;
      lastToastKey=data.key;
      if (Date.now()-data.ts>5000) return;
      showPickToast(data.content,data.nickname);
    });
  }

  function showPickToast(content,nickname) {
    const container=document.getElementById('toastContainer');
    const toast=document.createElement('div'); toast.className='toast';
    const preview=content.length>40?content.slice(0,40)+'…':content;
    toast.innerHTML=`<div class="toast-icon">⭐</div><div class="toast-body"><div class="toast-title">선생님이 이 글을 Pick 했어요!</div><div class="toast-msg">"${preview}"<br><span style="color:#f5a623;font-weight:700;">— ${nickname}</span></div></div><button class="toast-close" onclick="this.closest('.toast').remove()">×</button>`;
    container.appendChild(toast);
    setTimeout(()=>{toast.classList.add('out');setTimeout(()=>toast.remove(),300);},5000);
  }

  function showToast(msg,isError=false) {
    const container=document.getElementById('toastContainer');
    const toast=document.createElement('div'); toast.className=isError?'toast err-toast':'toast';
    toast.innerHTML=`<div class="toast-icon">${isError?'🚫':'✏️'}</div><div class="toast-body"><div class="toast-title ${isError?'red':''}">${isError?'게시 불가':'글자 수 부족'}</div><div class="toast-msg ${isError?'red':''}">${msg}</div></div><button class="toast-close" onclick="this.closest('.toast').remove()">×</button>`;
    container.appendChild(toast);
    setTimeout(()=>{toast.classList.add('out');setTimeout(()=>toast.remove(),300);},3500);
  }

  window.setRoleFilter=(role,btn)=>{
    currentRoleFilter=role;
    document.querySelectorAll('.role-tab').forEach(el=>el.classList.remove('active'));
    btn.classList.add('active'); renderFeed();
  };
  window.changeSort=(type)=>{
    currentSort=type;
    document.getElementById('sortNewest').classList.toggle('active',type==='newest');
    document.getElementById('sortPopular').classList.toggle('active',type==='popular');
    renderFeed();
  };

  function isMyPost(post) {
    if (!currentUser) return false;
    return post.studentId===currentUser.id&&post.realName===currentUser.name&&post.nickname===currentUser.nick&&post.role===currentUser.role;
  }

  function renderFeed() {
    const feed=document.getElementById('feed'); feed.innerHTML='';
    let posts=[...allPostsCache];
    if (currentRoleFilter==='pick') posts=posts.filter(p=>p.adminPick===true);
    else if (currentRoleFilter!=='all') posts=posts.filter(p=>p.role===currentRoleFilter);
    if (currentSort==='popular') posts.sort((a,b)=>(b.likes||0)-(a.likes||0)||((b.timestamp||0)-(a.timestamp||0)));
    else posts.sort((a,b)=>((b.timestamp||0)-(a.timestamp||0)));
    if (!posts.length) { feed.innerHTML=`<div class="empty-state">📭 아직 게시글이 없습니다.</div>`; return; }
    posts.forEach(post=>{
      const isDummy=post.studentId==='00000', isLiked=post.likedBy&&post.likedBy[currentUser.id], mine=!isDummy&&isMyPost(post);
      const card=document.createElement('div'); card.className='thread-card'; if(isDummy)card.style.opacity='0.75';
      const avatar=document.createElement('div'); avatar.className='avatar-circle'; avatar.textContent=roleIcons[post.role]||'?';
      const body=document.createElement('div'); body.style.flex='1';
      if(post.adminPick){const badge=document.createElement('div');badge.className='pick-badge-dark';badge.textContent='⭐ Pick';body.appendChild(badge);}
      const meta=document.createElement('div'); meta.style.cssText='display:flex;align-items:center;flex-wrap:wrap;';
      const nick=document.createElement('span'); nick.className='nickname'; nick.textContent=post.nickname;
      const roleTag=document.createElement('span'); roleTag.className='role-tag'; roleTag.textContent=post.role;
      const time=document.createElement('span'); time.className='time'; time.textContent=post.time;
      meta.append(nick,roleTag);
      if(isDummy){const dt=document.createElement('span');dt.className='dummy-tag';dt.textContent='예시';meta.appendChild(dt);}
      if(post.edited){const et=document.createElement('span');et.className='edited-tag';et.textContent='수정됨';meta.appendChild(et);}
      meta.appendChild(time);
      const contentEl=document.createElement('div'); contentEl.className='content-text'; contentEl.textContent=post.content;
      const actions=document.createElement('div'); actions.className='post-actions';
      const likeBtn=document.createElement('div'); likeBtn.className=`like-btn${isLiked?' liked':''}`;
      likeBtn.textContent=`${isLiked?'❤️':'♡'} ${post.likes||0}`;
      if(!isDummy)likeBtn.onclick=()=>toggleLike(post.id,!!isLiked);
      actions.appendChild(likeBtn);
      if(mine){const editBtn=document.createElement('button');editBtn.className='edit-btn';editBtn.textContent='수정';editBtn.onclick=()=>openEditPost(post);actions.appendChild(editBtn);}
      body.append(meta,contentEl,actions); card.append(avatar,body); feed.appendChild(card);
    });
  }

  window.toggleLike=async(postId,isLiked)=>{
    const snap=await get(ref(db,`posts/${postId}`)); const post=snap.val(); if(!post)return;
    const updates={};
    updates[`posts/${postId}/likes`]=Math.max(0,isLiked?post.likes-1:post.likes+1);
    updates[`posts/${postId}/likedBy/${currentUser.id}`]=isLiked?null:true;
    update(ref(db),updates);
  };

  window.openEditPost=(post)=>{
    editingPostId=post.id;
    const ta=document.getElementById('editPostContent'); ta.value=post.content;
    document.getElementById('editCharCount').textContent=`${post.content.replace(/\s/g,'').length} / 300`;
    document.getElementById('editPostRole').value=post.role;
    document.getElementById('editPostModal').style.display='flex';
  };
  window.closeEditPost=()=>{ document.getElementById('editPostModal').style.display='none'; editingPostId=null; };

  window.submitPostEdit=async()=>{
    if(!editingPostId)return;
    const content=document.getElementById('editPostContent').value.trim(), role=document.getElementById('editPostRole').value;
    const trimmedLen=content.replace(/\s/g,'').length;
    if(trimmedLen<30){showToast(`공백 제외 30자 이상 작성해 주세요. (현재 ${trimmedLen}자)`);return;}
    if(containsBadWord(content)){showToast('부적절한 표현이 포함되어 있어 수정할 수 없습니다.',true);return;}
    const snap=await get(ref(db,`posts/${editingPostId}`)); const post=snap.val(); if(!post){closeEditPost();return;}
    const valid=post.studentId===currentUser.id&&post.realName===currentUser.name&&post.nickname===currentUser.nick;
    if(!valid){showToast('수정 권한이 없습니다.',true);closeEditPost();return;}
    const updates={};
    updates[`posts/${editingPostId}/content`]=content;
    updates[`posts/${editingPostId}/role`]=role;
    updates[`posts/${editingPostId}/edited`]=true;
    await update(ref(db),updates); closeEditPost();
  };

  window.createPost=()=>{
    const content=document.getElementById('postInput').value.trim();
    const trimmedLen=content.replace(/\s/g,'').length;
    if(trimmedLen<30){showToast(`공백 제외 30자 이상 작성해 주세요. (현재 ${trimmedLen}자)`);return;}
    if(containsBadWord(content)){showToast('부적절한 표현이 포함되어 있어 게시할 수 없습니다.',true);return;}
    const now=new Date();
    const time=`${now.getMonth()+1}.${now.getDate()}. ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const r=push(postsRef);
    set(r,{id:r.key,studentId:currentUser.id,realName:currentUser.name,nickname:currentUser.nick,role:currentUser.role,content,time,timestamp:Date.now(),likes:0,likedBy:{init:true},edited:false});
    document.getElementById('postInput').value=''; document.getElementById('charCount').textContent='0 / 300';
  };

  window.openProfile=()=>{
    document.getElementById('modalAvatar').textContent=roleIcons[currentUser.role]||'?';
    document.getElementById('modalName').textContent=`${currentUser.name} (${currentUser.nick})`;
    document.getElementById('modalId').textContent=`학번 ${currentUser.id} · ${currentUser.role}`;
    document.getElementById('editNick').value=currentUser.nick; document.getElementById('editRole').value=currentUser.role;
    document.getElementById('profileModal').style.display='flex';
  };
  window.closeProfile=()=>{ document.getElementById('profileModal').style.display='none'; };
  window.saveProfile=()=>{
    const nick=document.getElementById('editNick').value.trim(); if(!nick){alert("닉네임을 입력하세요.");return;}
    currentUser.nick=nick; currentUser.role=document.getElementById('editRole').value;
    localStorage.setItem('s_threads_user',JSON.stringify(currentUser)); updateUI(); closeProfile();
  };
  window.logout=()=>{
    if(confirm("로그아웃 하시겠습니까?")){ localStorage.removeItem('s_threads_user'); location.reload(); }
  };

  /* ═══════════════════════════
     아카이브
  ═══════════════════════════ */
  window.openArchive = () => {
    document.getElementById('loginOverlay').style.display='none';
    document.getElementById('appContainer').style.display='none';
    document.getElementById('archiveView').style.display='flex';
    window.scrollTo(0,0);
    arcPage=1;
    // 데이터 리슨
    if (!arcListening) {
      arcListening=true;
      onValue(postsRef, snap => {
        const data=snap.val();
        allPostsCache=data?Object.values(data).filter(p=>p&&p.id):[];
        renderArcFeed();
      });
    } else renderArcFeed();
  };

  window.closeArchive = () => {
    document.getElementById('archiveView').style.display='none';
    // 로그인 상태면 앱으로, 아니면 로그인 화면으로
    if (currentUser) {
      document.getElementById('appContainer').style.display='flex';
    } else {
      document.getElementById('loginOverlay').style.display='flex';
    }
    window.scrollTo(0,0);
  };

  window.arcSetFilter = (filter, btnEl) => {
    arcFilter=filter; arcPage=1;
    document.querySelectorAll('.arc-menu-btn').forEach(b=>b.classList.remove('active'));
    if (btnEl) btnEl.classList.add('active');
    renderArcFeed();
  };

  window.arcLoadMore = () => { arcPage++; renderArcFeed(); };

  function renderArcFeed() {
    const feed=document.getElementById('arcFeed'); feed.innerHTML='';
    let posts=[...allPostsCache].filter(p=>p.studentId!=='00000');

    if (arcFilter==='pick') posts=posts.filter(p=>p.adminPick===true);
    else if (arcFilter!=='all') posts=posts.filter(p=>p.role===arcFilter);

    // 픽 탭이면 픽 시간순, 나머지는 최신순
    if (arcFilter==='pick') {
      posts.sort((a,b)=>((b.pickTimestamp||b.timestamp||0)-(a.pickTimestamp||a.timestamp||0)));
    } else {
      posts.sort((a,b)=>((b.timestamp||0)-(a.timestamp||0)));
    }

    if (!posts.length) {
      feed.innerHTML=`<div class="arc-empty">📭 ${arcFilter==='pick'?'아직 Pick된 글이 없어요.':'아직 게시글이 없어요.'}</div>`;
      document.getElementById('arcMoreBtn').style.display='none';
      return;
    }

    const visible=posts.slice(0, arcPage*ARC_PAGE_SIZE);

    visible.forEach(post => {
      const card=document.createElement('div');
      card.className=`arc-card${post.adminPick?' is-pick':''}`;

      const avatarEl=document.createElement('div');
      avatarEl.className='avatar-circle';
      avatarEl.style.cssText='width:38px;height:38px;font-size:16px;flex-shrink:0;';
      avatarEl.textContent=roleIcons[post.role]||'?';

      const body=document.createElement('div'); body.className='arc-card-body';

      if (post.adminPick) {
        const badge=document.createElement('div'); badge.className='pick-badge-dark'; badge.textContent='⭐ Pick';
        body.appendChild(badge);
      }

      const meta=document.createElement('div'); meta.className='arc-card-meta';
      const nick=document.createElement('span'); nick.className='arc-nick'; nick.textContent=post.nickname;
      const roleTag=document.createElement('span'); roleTag.className='arc-role-tag'; roleTag.textContent=post.role;
      const time=document.createElement('span'); time.className='arc-time'; time.textContent=post.time||'';
      meta.append(nick, roleTag);
      if (post.edited) { const et=document.createElement('span'); et.className='edited-tag'; et.textContent='수정됨'; meta.appendChild(et); }
      meta.appendChild(time);

      const contentEl=document.createElement('div'); contentEl.className='arc-content'; contentEl.textContent=post.content;
      const likesEl=document.createElement('div'); likesEl.className='arc-likes'; likesEl.textContent=`♡ ${post.likes||0}`;

      body.append(meta, contentEl, likesEl);

      // 픽된 글에만 학번+이름 표시
      if (post.adminPick && post.realName && post.studentId) {
        const pickInfo=document.createElement('div'); pickInfo.className='arc-pick-info';
        pickInfo.textContent=`✦ ${post.studentId} ${post.realName}`;
        body.appendChild(pickInfo);
      }

      card.append(avatarEl, body);
      feed.appendChild(card);
    });

    const moreBtn=document.getElementById('arcMoreBtn');
    if (visible.length < posts.length) {
      moreBtn.style.display='flex';
      document.getElementById('arcMoreCount').textContent=`(${posts.length-visible.length}개 남음)`;
    } else moreBtn.style.display='none';
  }
</script>
</body>
</html>
