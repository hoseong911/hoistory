<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 센터 — Blind 려</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root {
      --bg: #f4f6f9; --card: #fff; --text: #1a1a1a; --sub: #555; --muted: #999;
      --border: #e4e4e4; --accent: #00c4b4; --accent-dark: #00a89a;
      --danger: #e74c3c; --warn: #f39c12; --success: #27ae60;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Pretendard', sans-serif; min-height: 100vh;
    }

    /* ── 로그인 화면 ── */
    #loginScreen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #00c4b4 0%, #00a89a 100%);
    }
    .login-card {
      background: #fff; border-radius: 20px; padding: 40px;
      width: 100%; max-width: 380px; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .login-card .logo { font-size: 2rem; font-weight: 900; color: var(--accent); letter-spacing: -0.03em; }
    .login-card .sub  { font-size: 13px; color: var(--muted); margin: 6px 0 28px; }
    .login-card input {
      width: 100%; padding: 13px 16px; border: 1.5px solid #e0e0e0; border-radius: 10px;
      font-size: 15px; font-family: 'Pretendard', sans-serif; outline: none;
      margin-bottom: 12px; transition: border-color 0.15s;
    }
    .login-card input:focus { border-color: var(--accent); }
    .login-card button {
      width: 100%; padding: 14px; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      font-family: 'Pretendard', sans-serif; cursor: pointer;
    }
    .login-card button:hover { background: var(--accent-dark); }
    .login-err { font-size: 12px; color: var(--danger); margin-top: 10px; display: none; }

    /* ── 메인 어드민 ── */
    #adminApp { display: none; }

    .top-bar {
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .top-bar .brand {
      display: flex; align-items: center; gap: 10px;
    }
    .top-bar .brand .logo { font-size: 1.1rem; font-weight: 900; color: var(--accent); }
    .top-bar .brand .badge {
      font-size: 11px; font-weight: 700; color: #fff;
      background: var(--accent); border-radius: 6px; padding: 2px 8px;
    }
    .logout-btn {
      font-size: 12px; color: var(--muted); background: var(--bg);
      border: 1px solid var(--border); border-radius: 7px;
      padding: 6px 12px; cursor: pointer; font-family: 'Pretendard', sans-serif;
    }
    .logout-btn:hover { color: var(--danger); border-color: #fcc; }

    .admin-layout { display: flex; min-height: calc(100vh - 56px); }

    /* 사이드바 */
    .sidebar {
      width: 200px; background: #fff; border-right: 1px solid var(--border);
      padding: 20px 12px; flex-shrink: 0;
      position: sticky; top: 56px; height: calc(100vh - 56px); overflow-y: auto;
    }
    .sidebar-label {
      font-size: 10px; font-weight: 700; color: var(--muted);
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0 8px; margin-bottom: 6px; margin-top: 16px;
    }
    .sidebar-label:first-child { margin-top: 0; }
    .nav-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 10px; border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 500; color: var(--sub);
      transition: all 0.12s; border: none; background: none;
      width: 100%; text-align: left; font-family: 'Pretendard', sans-serif;
    }
    .nav-item:hover { background: var(--bg); color: var(--text); }
    .nav-item.active { background: #f0fffe; color: var(--accent); font-weight: 700; }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

    /* 컨텐츠 */
    .content { flex: 1; padding: 24px; max-width: 960px; }

    .page-title {
      font-size: 20px; font-weight: 800; color: var(--text);
      margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
    }

    /* 카드 */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px; margin-bottom: 16px;
    }
    .card-title {
      font-size: 13px; font-weight: 700; color: var(--sub);
      margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
    }

    /* 통계 그리드 */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px; text-align: center;
    }
    .stat-num { font-size: 28px; font-weight: 800; color: var(--accent); }
    .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* 필터 바 */
    .filter-bar {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center;
    }
    .filter-bar input, .filter-bar select {
      padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 13px; font-family: 'Pretendard', sans-serif;
      outline: none; background: #fff; color: var(--text);
    }
    .filter-bar input { flex: 1; min-width: 200px; }
    .filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }

    /* 테이블 */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th {
      background: var(--bg); padding: 10px 8px; text-align: left;
      border-bottom: 1px solid var(--border); color: var(--sub);
      font-weight: 700; font-size: 11px; white-space: nowrap;
    }
    td { padding: 9px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: #fafafa; }
    .td-content { max-width: 200px; word-break: break-all; font-size: 12px; color: #444; line-height: 1.4; }

    /* 배지 */
    .cat-badge {
      display: inline-block; font-size: 10px; font-weight: 700; border-radius: 4px;
      padding: 2px 6px; white-space: nowrap;
    }
    .cat-central  { background: #e0faf8; color: #00877a; }
    .cat-local    { background: #e8f0fc; color: #3070c0; }
    .cat-military { background: #fceaea; color: #c03030; }
    .cat-edu      { background: #f3eafc; color: #8030c0; }

    /* 버튼들 */
    .btn {
      padding: 7px 14px; border-radius: 7px; border: none;
      font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: 'Pretendard', sans-serif; transition: 0.12s;
    }
    .btn-sm { padding: 4px 9px; font-size: 11px; border-radius: 5px; border: none; cursor: pointer; font-family: 'Pretendard', sans-serif; }
    .btn-danger  { background: #fff; color: var(--danger); border: 1px solid #fcc; }
    .btn-danger:hover  { background: #fff0f0; }
    .btn-pick    { background: none; border: none; cursor: pointer; font-size: 16px; color: #ccc; transition: color 0.15s; padding: 0 4px; }
    .btn-pick.picked { color: #f5a623; }
    .btn-pick:hover  { color: #f5a623; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-warn    { background: #fff8e1; color: #9a7000; border: 1px solid #ffe082; }
    .btn-warn:hover { background: #fff3cc; }
    .btn-reset   { background: #fff0f0; color: var(--danger); border: 1px solid #fcc; }
    .btn-reset:hover { background: #ffe0e0; }

    /* 바 차트 */
    .bar-wrap { margin-bottom: 10px; }
    .bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--sub); margin-bottom: 3px; }
    .bar-bg { background: var(--border); border-radius: 3px; height: 7px; }
    .bar-fill { height: 7px; border-radius: 3px; transition: width 0.5s; }

    /* 도구 패널 */
    .tool-section {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px; margin-bottom: 14px;
    }
    .tool-section-title {
      font-size: 14px; font-weight: 700; margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .tool-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .notice {
      background: #fff8e1; border: 1px solid #ffe082; border-radius: 8px;
      padding: 10px 14px; font-size: 12px; color: #7a6000; margin-bottom: 14px;
    }
    .danger-zone {
      background: #fff5f5; border: 1px solid #fcc; border-radius: 14px;
      padding: 20px; margin-bottom: 14px;
    }
    .danger-zone .tool-section-title { color: var(--danger); }

    /* 페이지 표시 */
    .panel { display: none; }
    .panel.active { display: block; }

    /* 반 필터 칩 */
    .class-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .class-chip {
      padding: 5px 12px; border: 1.5px solid var(--border); border-radius: 20px;
      font-size: 12px; font-weight: 500; color: var(--sub);
      background: #fff; cursor: pointer; font-family: 'Pretendard', sans-serif;
      transition: 0.12s;
    }
    .class-chip:hover { border-color: var(--accent); color: var(--accent); }
    .class-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }

    /* 토스트 발신 확인 */
    .toast-sent {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--success);
      background: #eafaf1; border: 1px solid #a9dfbf;
      border-radius: 5px; padding: 2px 8px; margin-left: 6px;
      animation: fadeOut 3s forwards;
    }
    @keyframes fadeOut { 0%,60%{opacity:1} 100%{opacity:0} }
  </style>
</head>
<body>

<!-- ── 로그인 ── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="logo">Blind</div>
    <div class="sub">관리자 센터 — 고려의 체제 정비</div>
    <input type="password" id="adminPw" placeholder="관리자 비밀번호"
      onkeydown="if(event.key==='Enter') tryLogin()">
    <button onclick="tryLogin()">관리자 접속</button>
    <div class="login-err" id="loginErr">비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<!-- ── 어드민 앱 ── -->
<div id="adminApp">
  <div class="top-bar">
    <div class="brand">
      <span class="logo">blind</span>
      <span class="badge">관리자 센터</span>
    </div>
    <button class="logout-btn" onclick="logoutAdmin()">로그아웃</button>
  </div>

  <div class="admin-layout">
    <!-- 사이드바 -->
    <nav class="sidebar">
      <div class="sidebar-label">메뉴</div>
      <button class="nav-item active" onclick="showPanel('posts')">
        <span class="icon">📋</span> 게시글 관리
      </button>
      <button class="nav-item" onclick="showPanel('stats')">
        <span class="icon">📊</span> 통계
      </button>
      <button class="nav-item" onclick="showPanel('tools')">
        <span class="icon">🔧</span> 도구
      </button>
    </nav>

    <!-- 컨텐츠 -->
    <main class="content">

      <!-- ── 게시글 관리 패널 ── -->
      <div id="panel-posts" class="panel active">
        <div class="page-title">📋 게시글 관리</div>

        <!-- 필터 바 -->
        <div class="filter-bar">
          <input type="text" id="searchInput" placeholder="🔍 학번, 이름, 닉네임, 기관, 내용 검색..."
            oninput="applyFilters()">
          <select id="catFilter" onchange="applyFilters()">
            <option value="">전체 기관 유형</option>
            <option value="central">🏛️ 중앙 기관</option>
            <option value="local">🗺️ 지방 기관</option>
            <option value="military">⚔️ 군사 기관</option>
            <option value="edu">📚 교육 기관</option>
          </select>
          <select id="pickFilter" onchange="applyFilters()">
            <option value="">전체 (픽 포함)</option>
            <option value="pick">⭐ 픽된 글만</option>
            <option value="nopick">픽 없는 글만</option>
          </select>
        </div>

        <!-- 반별 필터 -->
        <div style="margin-bottom:12px;">
          <div style="font-size:11px; font-weight:700; color:var(--muted); margin-bottom:8px; letter-spacing:0.06em;">반별 필터</div>
          <div class="class-chips" id="classChips">
            <button class="class-chip active" onclick="setClassFilter('all', this)">전체 반</button>
          </div>
        </div>

        <div class="card" style="padding:0; overflow:hidden;">
          <div class="table-wrap">
            <table id="postsTable">
              <thead>
                <tr>
                  <th>학번</th><th>반</th><th>이름</th><th>닉네임</th>
                  <th>기관</th><th>내용</th><th>❤</th><th>픽</th><th>삭제</th>
                </tr>
              </thead>
              <tbody id="postsBody"></tbody>
            </table>
          </div>
          <div id="tableCount" style="padding:10px 14px; font-size:11px; color:var(--muted); text-align:right; border-top:1px solid var(--border);"></div>
        </div>
      </div>

      <!-- ── 통계 패널 ── -->
      <div id="panel-stats" class="panel">
        <div class="page-title">📊 통계</div>
        <div class="stat-grid">
          <div class="stat-card"><div class="stat-num" id="st-total">-</div><div class="stat-lbl">전체 게시글</div></div>
          <div class="stat-card"><div class="stat-num" id="st-students">-</div><div class="stat-lbl">참여 학생</div></div>
          <div class="stat-card"><div class="stat-num" id="st-likes">-</div><div class="stat-lbl">총 좋아요</div></div>
          <div class="stat-card"><div class="stat-num" id="st-avg">-</div><div class="stat-lbl">평균 좋아요</div></div>
        </div>
        <div class="card">
          <div class="card-title">🏛️ 기관 유형별 게시글</div>
          <div id="catStats"></div>
        </div>
        <div class="card">
          <div class="card-title">🏫 반별 참여 현황</div>
          <div id="classStats"></div>
        </div>
      </div>

      <!-- ── 도구 패널 ── -->
      <div id="panel-tools" class="panel">
        <div class="page-title">🔧 도구</div>

        <!-- 더미 게시글 -->
        <div class="tool-section">
          <div class="tool-section-title">📝 더미 게시글</div>
          <div class="tool-row">
            <button class="btn btn-primary" onclick="initDummy()">더미 생성</button>
            <button class="btn btn-warn" onclick="deleteDummy()">더미만 삭제</button>
          </div>
          <div style="font-size:11px; color:var(--muted); margin-top:6px;">더미는 학번 00000 · System 계정으로 저장됩니다.</div>
        </div>

        <!-- 위험 구역 -->
        <div class="danger-zone">
          <div class="tool-section-title">⚠️ 위험 구역</div>
          <div class="notice">아래 기능은 되돌릴 수 없습니다. 신중하게 사용하세요.</div>
          <button class="btn btn-reset" onclick="resetAll()">🗑️ 전체 게시글 초기화</button>
        </div>
      </div>

    </main>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, remove, update, get }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
    authDomain: "ho0911seong-56638.firebaseapp.com",
    databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ho0911seong-56638",
    storageBucket: "ho0911seong-56638.firebasestorage.app",
    messagingSenderId: "994509567071",
    appId: "1:994509567071:web:de99e71c125ec2a3f557ea"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const postsRef = ref(db, 'goryeo_v2');
  const toastRef = ref(db, 'goryeo_v2_toast');

  const ADMIN_PW_HASH = "57765044de4726b8a55db8c3846a7b6a038a2beaff40c0cc5113744ad8b62694";
  const CAT_LABEL = { central:'중앙 기관', local:'지방 기관', military:'군사 기관', edu:'교육 기관' };
  const CAT_COLOR = { central:'#00c4b4', local:'#4a90e2', military:'#e24a4a', edu:'#9b4ae2' };

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  let allPosts = [];
  let currentClassFilter = 'all';

  // ── 로그인 ──
  window.tryLogin = async () => {
    const hash = await sha256(document.getElementById('adminPw').value);
    if (hash === ADMIN_PW_HASH) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminApp').style.display = 'block';
      startListening();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  };
  window.logoutAdmin = () => { location.reload(); };

  // ── 패널 전환 ──
  window.showPanel = (name) => {
    document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById(`panel-${name}`).classList.add('active');
    [...document.querySelectorAll('.nav-item')].find(el => el.textContent.includes(
      {posts:'게시글', stats:'통계', tools:'도구'}[name]
    ))?.classList.add('active');
  };

  // ── Firebase 리스닝 ──
  function startListening() {
    onValue(postsRef, snap => {
      const data = snap.val();
      allPosts = data ? Object.values(data).filter(p => p.id) : [];
      buildClassChips();
      applyFilters();
      renderStats();
    });
  }

  // ── 반 목록 동적 생성 (학번 앞 2자리 = 학년반) ──
  function buildClassChips() {
    const classes = new Set(
      allPosts
        .filter(p => p.studentId && p.studentId !== '00000' && /^\d{5}$/.test(p.studentId))
        .map(p => p.studentId.slice(0, 3))
    );
    const container = document.getElementById('classChips');
    const current = currentClassFilter;
    container.innerHTML = `<button class="class-chip${current==='all'?' active':''}" onclick="setClassFilter('all', this)">전체 반</button>`;
    [...classes].sort().forEach(cls => {
      const label = `${cls[0]}학년 ${parseInt(cls.slice(1))}반`;
      const active = current === cls ? ' active' : '';
      container.innerHTML += `<button class="class-chip${active}" onclick="setClassFilter('${cls}', this)">${label}</button>`;
    });
  }

  window.setClassFilter = (cls, btn) => {
    currentClassFilter = cls;
    document.querySelectorAll('.class-chip').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  };

  // ── 필터 적용 ──
  window.applyFilters = () => {
    const q       = (document.getElementById('searchInput')?.value || '').toLowerCase();
    const catF    = document.getElementById('catFilter')?.value || '';
    const pickF   = document.getElementById('pickFilter')?.value || '';

    let filtered = allPosts.filter(p => p.studentId !== '00000'); // 더미 제외

    if (currentClassFilter !== 'all') {
      filtered = filtered.filter(p => (p.studentId || '').startsWith(currentClassFilter));
    }
    if (catF) {
      filtered = filtered.filter(p => p.org?.cat === catF);
    }
    if (pickF === 'pick')   { filtered = filtered.filter(p => p.adminPick === true); }
    if (pickF === 'nopick') { filtered = filtered.filter(p => !p.adminPick); }
    if (q) {
      filtered = filtered.filter(p =>
        (p.studentId||'').includes(q) ||
        (p.realName||'').toLowerCase().includes(q) ||
        (p.nickname||'').toLowerCase().includes(q) ||
        (p.content||'').toLowerCase().includes(q) ||
        (p.org?.name||'').includes(q)
      );
    }

    filtered.sort((a,b) => b.id.localeCompare(a.id));
    renderTable(filtered);
  };

  function renderTable(posts) {
    const tbody = document.getElementById('postsBody');
    tbody.innerHTML = '';
    posts.forEach(p => {
      const cls = (p.studentId||'').slice(0,3);
      const clsLabel = /^\d{3}$/.test(cls) ? `${cls[0]}학년 ${parseInt(cls.slice(1))}반` : '-';
      const cat = p.org?.cat || '';
      const catLabel = CAT_LABEL[cat] || '';
      const catClass = cat ? `cat-${cat}` : '';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${esc(p.studentId||'')}</td>
        <td style="font-size:11px; color:var(--muted);">${clsLabel}</td>
        <td>${esc(p.realName||'')}</td>
        <td style="color:var(--muted);">${esc(p.nickname||'')}</td>
        <td><span class="cat-badge ${catClass}">${catLabel}</span></td>
        <td class="td-content">${esc(p.content||'')}</td>
        <td>${p.likes||0}</td>
        <td>
          <button class="btn-pick${p.adminPick?' picked':''}"
            onclick="togglePick('${p.id}', ${!!p.adminPick}, '${esc(p.content||'').replace(/'/g,"\\'")}', '${esc(p.nickname||'')}')">
            ${p.adminPick ? '★' : '☆'}
          </button>
        </td>
        <td><button class="btn-sm btn-danger" onclick="deletePost('${p.id}')">삭제</button></td>
      `;
      tbody.appendChild(tr);
    });
    document.getElementById('tableCount').textContent = `${posts.length}개 표시 중`;
  }

  // ── 픽 토글 + 토스트 발신 ──
  window.togglePick = async (postId, isPicked, content, nickname) => {
    const newPick = !isPicked;
    const updates = {};
    updates[`goryeo_v2/${postId}/adminPick`] = newPick ? true : null;
    await update(ref(db), updates);

    // 픽 ON 시 학생 페이지에 토스트 브로드캐스트
    if (newPick) {
      await set(toastRef, {
        key: `${postId}_${Date.now()}`,
        postId,
        content: content.slice(0, 80),
        nickname,
        ts: Date.now()
      });
    }
  };

  // ── 통계 ──
  function renderStats() {
    const real = allPosts.filter(p => p.studentId !== '00000');
    const total    = real.length;
    const students = new Set(real.map(p => p.studentId)).size;
    const likes    = real.reduce((s,p) => s+(p.likes||0), 0);
    document.getElementById('st-total').textContent    = total;
    document.getElementById('st-students').textContent = students;
    document.getElementById('st-likes').textContent    = likes;
    document.getElementById('st-avg').textContent      = total ? (likes/total).toFixed(1) : 0;

    // 기관별
    const cats = { central:0, local:0, military:0, edu:0 };
    real.forEach(p => { if(p.org?.cat) cats[p.org.cat]++; });
    const maxC = Math.max(...Object.values(cats), 1);
    document.getElementById('catStats').innerHTML = Object.entries(cats).map(([cat,cnt]) => `
      <div class="bar-wrap">
        <div class="bar-label"><span>${CAT_LABEL[cat]}</span><span>${cnt}개</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(cnt/maxC*100)}%; background:${CAT_COLOR[cat]};"></div></div>
      </div>`).join('');

    // 반별
    const classCounts = {};
    real.forEach(p => {
      const cls = (p.studentId||'').slice(0,3);
      if (/^\d{3}$/.test(cls)) classCounts[cls] = (classCounts[cls]||0)+1;
    });
    const maxCls = Math.max(...Object.values(classCounts), 1);
    document.getElementById('classStats').innerHTML = Object.entries(classCounts)
      .sort((a,b) => a[0].localeCompare(b[0]))
      .map(([cls,cnt]) => `
        <div class="bar-wrap">
          <div class="bar-label"><span>${cls[0]}학년 ${parseInt(cls.slice(1))}반</span><span>${cnt}개</span></div>
          <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(cnt/maxCls*100)}%; background:var(--accent);"></div></div>
        </div>`).join('');
  }

  // ── 삭제 ──
  window.deletePost = (id) => {
    if (confirm('이 게시글을 삭제하시겠습니까?')) remove(ref(db, `goryeo_v2/${id}`));
  };
  window.resetAll = () => {
    if (confirm('⚠️ 전체 게시글을 삭제합니까? 되돌릴 수 없습니다.'))
      if (confirm('정말요? 이 작업은 취소할 수 없습니다.')) remove(postsRef);
  };

  // ── 더미 ──
  window.deleteDummy = () => {
    if (!confirm('더미 게시글을 모두 삭제할까요?')) return;
    const toDelete = allPosts.filter(p => p.studentId === '00000');
    toDelete.forEach(p => remove(ref(db, `goryeo_v2/${p.id}`)));
    alert(`더미 ${toDelete.length}개 삭제 완료`);
  };

  window.initDummy = () => {
    const now = new Date();
    const time = `${now.getMonth()+1}.${now.getDate()}. ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const dummy = [
      { org:{name:'중서문하성',cat:'central'}, content:"오늘 회의 또 세 시간 넘겼다. 안건은 산더미인데 결론은 없고. 상서성이랑 맨날 이러는데 이게 말이 되냐 진짜." },
      { org:{name:'상서성',cat:'central'}, content:"병부 형들 이부 탓하고 이부 형들 병부 탓하고. 공문 회람만 세 번째인데 결재가 아직도 없다." },
      { org:{name:'중추원',cat:'central'}, content:"기밀 문서 정리하다 보면 북계 상황이 생각보다 훨씬 심각한 거 보인다. 근데 위에 형들은 아직도 모르는 것 같음." },
      { org:{name:'어사대',cat:'central'}, content:"지방 감찰 다녀왔는데 비리가 한두 개가 아니야. 보고서 올렸더니 윗선에서 또 흐지부지." },
      { org:{name:'삼사',cat:'central'}, content:"각 도에서 올라오는 세수 양식이 다 제각각인데 이게 말이 돼? 집계할 때마다 새로 정리해야 해서 야근이 반복되고 있잖아." },
      { org:{name:'서해도 관리',cat:'local'}, content:"서해도 수령들 공문 기한 안 지키는 게 절반이 넘는다. 독촉 공문 보내는 것도 이제 지쳤어." },
      { org:{name:'북계 관리',cat:'local'}, content:"국경 근처가 요즘 긴장감이 장난 아니야. 주진군 병력이 충분한지 매일 체크하고 있는데 중앙 형들은 개경에서 뭐 하는 거야." },
      { org:{name:'2군 소속',cat:'military'}, content:"요즘 훈련 강도가 갑자기 확 올라갔는데 공식 설명은 없어. 북계 때문인 건 다 아는데 더 불안하지." },
      { org:{name:'주진군 소속',cat:'military'}, content:"국경에 배치된 인원이 얼마나 부족한지 중추원 형들은 알기나 해? 우리끼리 버티고 있는데 지원은 없고." },
      { org:{name:'국자감',cat:'edu'}, content:"정원 확대 요청 또 기각됐다. 과거제로 인재 뽑겠다면서 배울 자리는 안 늘려주는 게 말이 되냐." },
    ];
    dummy.forEach(d => {
      const r = push(postsRef);
      set(r, { ...d, id:r.key, studentId:'00000', realName:'System', nickname:'더미', time, likes:0, likedBy:{init:true} });
    });
    alert(`더미 ${dummy.length}개 생성 완료`);
  };

  function esc(s) {
    const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
  }
</script>
</body>
</html>
