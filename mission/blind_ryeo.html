<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Blind - 려</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root {
      --bg: #fff; --surface: #f7f8fa; --card: #fff;
      --text: #1a1a1a; --sub: #666; --muted: #999;
      --border: #e8e8e8; --border-dark: #d0d0d0;
      --accent: #00c4b4; --accent-dark: #00a89a;
      --danger: #ff4757; --like: #888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--surface); color: var(--text);
      font-family: 'Pretendard', -apple-system, sans-serif;
      display: flex; justify-content: center; min-height: 100vh;
    }

    /* ── 로그인 ── */
    #loginOverlay {
      position: fixed; inset: 0; background: #fff;
      z-index: 1000; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start; overflow-y: auto;
    }
    .login-wrap { width: 100%; max-width: 480px; padding: 40px 24px 60px; }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo .logo-text { font-size: 2rem; font-weight: 800; color: var(--accent); letter-spacing: -0.03em; }
    .login-logo .logo-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .section-title {
      font-size: 13px; font-weight: 700; color: var(--text);
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }
    .input-field {
      width: 100%; padding: 13px 14px;
      border: 1px solid var(--border-dark); border-radius: 8px;
      font-size: 15px; font-family: 'Pretendard', sans-serif;
      color: var(--text); background: #fff; margin-bottom: 10px;
      outline: none; transition: border-color 0.15s;
    }
    .input-field:focus { border-color: var(--accent); }
    .input-field::placeholder { color: var(--muted); }

    .btn-main {
      width: 100%; padding: 15px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 16px; font-weight: 700;
      font-family: 'Pretendard', sans-serif; cursor: pointer; transition: background 0.15s;
    }
    .btn-main:hover { background: var(--accent-dark); }

    .err-msg { font-size: 12px; color: var(--danger); margin-bottom: 10px; padding: 0 2px; display: none; }
    .err-msg.show { display: block; }

    /* ── 앱 ── */
    #appContainer {
      display: none; width: 100%; max-width: 480px;
      min-height: 100vh; flex-direction: column; background: var(--surface);
    }
    header {
      background: #fff; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; height: 52px;
    }
    .header-logo { font-size: 1.25rem; font-weight: 800; color: var(--accent); letter-spacing: -0.02em; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
      border: none; background: none; cursor: pointer;
      border-radius: 50%; color: var(--sub); font-size: 18px; transition: background 0.12s;
    }
    .icon-btn:hover { background: var(--surface); }

    .tab-bar { display: flex; border-top: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-item {
      flex-shrink: 0; padding: 10px 16px; font-size: 13px; font-weight: 500;
      color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.12s; font-family: 'Pretendard', sans-serif;
      border: none; background: none; white-space: nowrap;
    }
    .tab-item.active { color: var(--accent); border-bottom: 2px solid var(--accent); font-weight: 700; }

    .sort-bar {
      display: flex; justify-content: flex-end; align-items: center;
      padding: 8px 14px; background: #fff; border-bottom: 1px solid var(--border); gap: 4px;
    }
    .sort-btn {
      font-size: 12px; color: var(--muted); border: none; background: none;
      cursor: pointer; font-family: 'Pretendard', sans-serif; padding: 3px 6px;
      border-radius: 4px; transition: 0.12s;
    }
    .sort-btn.active { color: var(--text); font-weight: 700; background: var(--surface); }
    .sort-dot { color: var(--border-dark); font-size: 10px; }

    .post-composer {
      background: #fff; padding: 14px 16px; border-bottom: 6px solid var(--surface);
    }
    .composer-top { display: flex; align-items: flex-start; gap: 10px; }
    .my-org-badge {
      font-size: 11px; font-weight: 700; color: var(--accent);
      background: #f0fffe; border: 1px solid #b2ede9; border-radius: 4px;
      padding: 3px 8px; white-space: nowrap; flex-shrink: 0;
    }
    .composer-input {
      flex: 1; border: none; outline: none; font-size: 15px;
      font-family: 'Pretendard', sans-serif; color: var(--text);
      resize: none; min-height: 48px; background: transparent;
    }
    .composer-input::placeholder { color: var(--muted); }
    .composer-bottom {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
    }
    .char-count { font-size: 11px; color: var(--muted); }
    .post-btn {
      padding: 7px 18px; background: var(--accent); color: #fff;
      border: none; border-radius: 5px; font-size: 13px; font-weight: 700;
      font-family: 'Pretendard', sans-serif; cursor: pointer;
    }
    .post-btn:disabled { background: var(--border-dark); cursor: default; }

    #feed { flex: 1; }

    .post-card {
      background: #fff; margin-bottom: 1px; padding: 16px 16px 12px;
      cursor: pointer; transition: background 0.1s;
    }
    .post-card:hover { background: #fafafa; }
    .post-top { display: flex; align-items: center; margin-bottom: 3px; gap: 6px; }
    .post-org { font-size: 12px; font-weight: 700; color: var(--text); }
    .post-nick { font-size: 12px; color: var(--muted); }
    .post-time { font-size: 11px; color: var(--muted); margin-left: auto; }
    .cat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .cat-dot.central  { background: #00c4b4; }
    .cat-dot.local    { background: #4a90e2; }
    .cat-dot.military { background: #e24a4a; }
    .cat-dot.edu      { background: #9b4ae2; }

    .post-body {
      font-size: 14px; color: #444; line-height: 1.6; margin: 6px 0 10px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .post-actions {
      display: flex; align-items: center; gap: 14px;
      padding-top: 8px; border-top: 1px solid var(--border);
    }
    .action-btn {
      display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--muted);
      cursor: pointer; user-select: none; border: none; background: none;
      font-family: 'Pretendard', sans-serif; padding: 0;
    }
    .action-btn:hover { color: var(--sub); }
    .action-btn.liked { color: var(--danger); }
    .action-btn svg { width: 15px; height: 15px; }

    .pick-badge {
      display: inline-block; background: #fff8e1; color: #b8860b;
      border: 1px solid #ffe082; border-radius: 5px; padding: 1px 7px;
      font-size: 11px; font-weight: 700; margin-right: 6px; vertical-align: middle;
    }

    .empty-state {
      padding: 60px 20px; text-align: center; color: var(--muted);
      font-size: 14px; line-height: 1.7;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

    /* ── 프로필 모달 ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 500; display: none; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-sheet {
      background: #fff; width: 100%; max-width: 480px;
      border-radius: 16px 16px 0 0; padding: 20px 20px 40px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 18px; }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
    .modal-input {
      width: 100%; padding: 12px 14px; border: 1px solid var(--border-dark); border-radius: 8px;
      font-size: 15px; font-family: 'Pretendard', sans-serif; color: var(--text);
      outline: none; margin-bottom: 10px;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-btn {
      width: 100%; padding: 13px; border-radius: 8px; border: none;
      font-size: 15px; font-weight: 700; font-family: 'Pretendard', sans-serif;
      cursor: pointer; margin-bottom: 8px;
    }
    .modal-btn.primary { background: var(--accent); color: #fff; }
    .modal-btn.gray    { background: #f0f0f0; color: var(--sub); }
    .modal-btn.red     { background: #fff; color: var(--danger); border: 1px solid #ffdede; }

    /* ── 토스트 팝업 ── */
    #toastContainer {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
      z-index: 9999; display: flex; flex-direction: column; gap: 8px;
      pointer-events: none; width: 90%; max-width: 420px;
    }
    .toast {
      background: linear-gradient(135deg, #fff8e1, #fffde7);
      border: 1.5px solid #ffe082; border-radius: 14px;
      padding: 14px 18px; display: flex; align-items: flex-start; gap: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      animation: toastIn 0.35s cubic-bezier(.34,1.56,.64,1) forwards;
      pointer-events: auto;
    }
    .toast.out { animation: toastOut 0.3s ease forwards; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-16px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(-10px) scale(0.95); }
    }
    .toast-icon { font-size: 22px; flex-shrink: 0; }
    .toast-body { flex: 1; }
    .toast-title { font-size: 13px; font-weight: 800; color: #b8860b; margin-bottom: 2px; }
    .toast-msg   { font-size: 12px; color: #7a6000; line-height: 1.5; }
    .toast-close {
      background: none; border: none; cursor: pointer;
      color: #ccc; font-size: 16px; padding: 0; line-height: 1; flex-shrink: 0;
    }

    footer { padding: 24px 16px; text-align: center; font-size: 11px; color: var(--muted); }
  </style>
</head>
<body>

<!-- 토스트 컨테이너 -->
<div id="toastContainer"></div>

<!-- ── 로그인 ── -->
<div id="loginOverlay">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-text">blind</div>
      <div class="logo-sub">고려 관료 익명 커뮤니티</div>
    </div>
    <input class="input-field" type="text" id="joinId" placeholder="학번 (5자리)" maxlength="5" inputmode="numeric">
    <input class="input-field" type="text" id="joinName" placeholder="이름 (실명)">
    <input class="input-field" type="text" id="joinNick" placeholder="닉네임 (영문/숫자/_)" oninput="validateNick(this)">
    <div style="margin-bottom:10px;">
      <select class="input-field" id="joinOrg" style="margin-bottom:0;">
        <option value="">근무 기관을 선택하세요</option>
        <optgroup label="🏛️ 중앙 기관">
          <option value="중서문하성" data-cat="central">중서문하성</option>
          <option value="상서성"     data-cat="central">상서성</option>
          <option value="중추원"     data-cat="central">중추원</option>
          <option value="어사대"     data-cat="central">어사대</option>
          <option value="삼사"       data-cat="central">삼사</option>
        </optgroup>
        <optgroup label="🗺️ 지방 기관 (5도)">
          <option value="서해도 관리" data-cat="local">서해도 관리</option>
          <option value="교주도 관리" data-cat="local">교주도 관리</option>
          <option value="양광도 관리" data-cat="local">양광도 관리</option>
          <option value="전라도 관리" data-cat="local">전라도 관리</option>
          <option value="경상도 관리" data-cat="local">경상도 관리</option>
        </optgroup>
        <optgroup label="🗺️ 지방 기관 (양계·경기)">
          <option value="동계 관리" data-cat="local">동계 관리</option>
          <option value="북계 관리" data-cat="local">북계 관리</option>
          <option value="경기 관리" data-cat="local">경기 관리</option>
        </optgroup>
        <optgroup label="⚔️ 군사 기관">
          <option value="2군 소속"    data-cat="military">2군 소속</option>
          <option value="6위 소속"    data-cat="military">6위 소속</option>
          <option value="주현군 소속" data-cat="military">주현군 소속</option>
          <option value="주진군 소속" data-cat="military">주진군 소속</option>
        </optgroup>
        <optgroup label="📚 교육 기관">
          <option value="국자감" data-cat="edu">국자감</option>
        </optgroup>
      </select>
    </div>
    <div id="loginErr" class="err-msg"></div>
    <button class="btn-main" onclick="enterApp()">접속하기</button>
  </div>
</div>

<!-- ── 메인 앱 ── -->
<div id="appContainer">
  <header>
    <div class="header-top">
      <div class="header-logo">blind</div>
      <div class="header-right">
        <button class="icon-btn" onclick="openProfileModal()" title="프로필">👤</button>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab-item active" onclick="setFilter('all',this)">전체</button>
      <button class="tab-item" onclick="setFilter('central',this)">중앙 기관</button>
      <button class="tab-item" onclick="setFilter('local',this)">지방 기관</button>
      <button class="tab-item" onclick="setFilter('military',this)">군사 기관</button>
      <button class="tab-item" onclick="setFilter('edu',this)">교육 기관</button>
      <button class="tab-item" onclick="setFilter('pick',this)">⭐ Pick</button>
    </div>
  </header>

  <div class="sort-bar">
    <button class="sort-btn active" id="sortNewest" onclick="changeSort('newest')">최신순</button>
    <span class="sort-dot">•</span>
    <button class="sort-btn" id="sortPopular" onclick="changeSort('popular')">인기순</button>
  </div>

  <div class="post-composer">
    <div class="composer-top">
      <div class="my-org-badge" id="composerBadge">-</div>
      <textarea class="composer-input" id="postInput"
        placeholder="고려 관료로서 하고 싶은 말을 남겨보세요..." maxlength="300" rows="2"></textarea>
    </div>
    <div class="composer-bottom">
      <span class="char-count" id="charCount">0/300</span>
      <button class="post-btn" onclick="createPost()">게시</button>
    </div>
  </div>

  <div id="feed"></div>
  <footer>Blind 려 · 인천동양중학교 · 고려의 체제 정비</footer>
</div>

<!-- 프로필 모달 -->
<div class="modal-overlay" id="profileModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">프로필 수정</div>
    <div style="font-size:12px; color:var(--muted); margin-bottom:8px;">닉네임</div>
    <input class="modal-input" type="text" id="editNick" placeholder="닉네임" oninput="validateNick(this)">
    <div style="font-size:12px; color:var(--muted); margin:12px 0 8px;">근무 기관 변경</div>
    <select class="input-field" id="editOrg" style="margin-bottom:16px;">
      <option value="">근무 기관을 선택하세요</option>
      <optgroup label="🏛️ 중앙 기관">
        <option value="중서문하성" data-cat="central">중서문하성</option>
        <option value="상서성"     data-cat="central">상서성</option>
        <option value="중추원"     data-cat="central">중추원</option>
        <option value="어사대"     data-cat="central">어사대</option>
        <option value="삼사"       data-cat="central">삼사</option>
      </optgroup>
      <optgroup label="🗺️ 지방 기관 (5도)">
        <option value="서해도 관리" data-cat="local">서해도 관리</option>
        <option value="교주도 관리" data-cat="local">교주도 관리</option>
        <option value="양광도 관리" data-cat="local">양광도 관리</option>
        <option value="전라도 관리" data-cat="local">전라도 관리</option>
        <option value="경상도 관리" data-cat="local">경상도 관리</option>
      </optgroup>
      <optgroup label="🗺️ 지방 기관 (양계·경기)">
        <option value="동계 관리" data-cat="local">동계 관리</option>
        <option value="북계 관리" data-cat="local">북계 관리</option>
        <option value="경기 관리" data-cat="local">경기 관리</option>
      </optgroup>
      <optgroup label="⚔️ 군사 기관">
        <option value="2군 소속"    data-cat="military">2군 소속</option>
        <option value="6위 소속"    data-cat="military">6위 소속</option>
        <option value="주현군 소속" data-cat="military">주현군 소속</option>
        <option value="주진군 소속" data-cat="military">주진군 소속</option>
      </optgroup>
      <optgroup label="📚 교육 기관">
        <option value="국자감" data-cat="edu">국자감</option>
      </optgroup>
    </select>
    <div id="editErr" style="font-size:12px; color:var(--danger); margin-bottom:8px; display:none;"></div>
    <button class="modal-btn primary" onclick="saveProfile()">저장</button>
    <button class="modal-btn red" onclick="logout()">로그아웃</button>
    <button class="modal-btn gray" onclick="closeProfileModal()">취소</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, update, get }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
    authDomain: "ho0911seong-56638.firebaseapp.com",
    databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ho0911seong-56638",
    storageBucket: "ho0911seong-56638.firebasestorage.app",
    messagingSenderId: "994509567071",
    appId: "1:994509567071:web:de99e71c125ec2a3f557ea"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const postsRef = ref(db, 'goryeo_v2');
  const toastRef = ref(db, 'goryeo_v2_toast');

  let currentUser = null;
  let currentSort = 'newest';
  let currentFilter = 'all';
  let allPostsCache = [];
  let lastToastKey = null; // 이미 본 토스트 중복 방지

  function getOrgFromSelect(selId) {
    const sel = document.getElementById(selId);
    const val = sel.value;
    if (!val) return null;
    const opt = [...sel.options].find(o => o.value === val);
    return { name: val, cat: opt?.dataset.cat || '' };
  }

  window.validateNick = (el) => {
    el.value = el.value.toLowerCase().replace(/[^a-z0-9_.]/g, '');
  };

  window.onload = () => {
    const saved = localStorage.getItem('goryeo_v2_user');
    if (saved) { currentUser = JSON.parse(saved); showApp(); }
  };

  function showApp() {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('appContainer').style.display = 'flex';
    updateComposerBadge();
    listenFeed();
    listenToast(); // 픽 토스트 수신
  }

  function updateComposerBadge() {
    document.getElementById('composerBadge').textContent = currentUser.org?.name || '-';
  }

  document.getElementById('postInput').addEventListener('input', function() {
    document.getElementById('charCount').textContent = `${this.value.length}/300`;
  });

  window.enterApp = () => {
    const id   = document.getElementById('joinId').value.trim();
    const name = document.getElementById('joinName').value.trim();
    const nick = document.getElementById('joinNick').value.trim();
    const errEl = document.getElementById('loginErr');
    const show = (msg) => { errEl.textContent = msg; errEl.classList.add('show'); };
    errEl.classList.remove('show');
    if (!/^\d{5}$/.test(id)) return show('학번은 숫자 5자리여야 합니다.');
    if (!name) return show('이름을 입력하세요.');
    if (!nick) return show('닉네임을 입력하세요.');
    const org = getOrgFromSelect('joinOrg');
    if (!org) return show('근무 기관을 선택하세요.');
    currentUser = { id, name, nick, org };
    localStorage.setItem('goryeo_v2_user', JSON.stringify(currentUser));
    showApp();
  };

  window.logout = () => {
    if (confirm('로그아웃 하시겠습니까?')) {
      localStorage.removeItem('goryeo_v2_user'); location.reload();
    }
  };

  window.createPost = () => {
    const content = document.getElementById('postInput').value.trim();
    if (!content) return;
    const now = new Date();
    const time = `${now.getMonth()+1}.${now.getDate()}. ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const r = push(postsRef);
    set(r, {
      id: r.key, studentId: currentUser.id, realName: currentUser.name,
      nickname: currentUser.nick, org: currentUser.org,
      content, time, likes: 0, likedBy: { init: true }
    });
    document.getElementById('postInput').value = '';
    document.getElementById('charCount').textContent = '0/300';
  };

  function listenFeed() {
    onValue(postsRef, snap => {
      const data = snap.val();
      allPostsCache = data ? Object.values(data).filter(p => p.id) : [];
      renderFeed();
    });
  }

  // ── 픽 토스트 수신 ──
  function listenToast() {
    onValue(toastRef, snap => {
      const data = snap.val();
      if (!data) return;
      // 새 픽 토스트만 표시 (이미 본 것 제외)
      if (data.key === lastToastKey) return;
      lastToastKey = data.key;
      // 5초 이내 발생한 것만 표시 (페이지 새로고침 시 오래된 토스트 무시)
      if (Date.now() - data.ts > 5000) return;
      showPickToast(data.content, data.nickname);
    });
  }

  function showPickToast(content, nickname) {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `
      <div class="toast-icon">⭐</div>
      <div class="toast-body">
        <div class="toast-title">선생님이 이 글을 Pick 했어요!</div>
        <div class="toast-msg">"${content.length > 40 ? content.slice(0,40)+'…' : content}"<br><span style="color:#b8860b; font-weight:700;">— ${nickname}</span></div>
      </div>
      <button class="toast-close" onclick="this.closest('.toast').remove()">×</button>
    `;
    container.appendChild(toast);
    setTimeout(() => {
      toast.classList.add('out');
      setTimeout(() => toast.remove(), 300);
    }, 5000);
  }

  window.setFilter = (f, btn) => {
    currentFilter = f;
    document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    renderFeed();
  };

  window.changeSort = (type) => {
    currentSort = type;
    document.getElementById('sortNewest').classList.toggle('active', type === 'newest');
    document.getElementById('sortPopular').classList.toggle('active', type === 'popular');
    renderFeed();
  };

  function renderFeed() {
    const feed = document.getElementById('feed');
    feed.innerHTML = '';

    let posts = allPostsCache.filter(p => p.studentId !== '00000');
    if (currentFilter === 'pick') {
      posts = posts.filter(p => p.adminPick === true);
    } else if (currentFilter !== 'all') {
      posts = posts.filter(p => p.org?.cat === currentFilter);
    }
    if (currentSort === 'popular') {
      posts.sort((a,b) => (b.likes||0)-(a.likes||0) || b.id.localeCompare(a.id));
    } else {
      posts.sort((a,b) => b.id.localeCompare(a.id));
    }

    if (!posts.length) {
      feed.innerHTML = `<div class="empty-state"><div class="icon">📋</div>아직 게시글이 없습니다.<br>첫 번째 글을 남겨보세요!</div>`;
      return;
    }

    posts.forEach(post => {
      const org = post.org || null;
      const isLiked = post.likedBy && post.likedBy[currentUser.id];
      const card = document.createElement('div');
      card.className = 'post-card';

      const top = document.createElement('div');
      top.className = 'post-top';

      if (post.adminPick) {
        const badge = document.createElement('span');
        badge.className = 'pick-badge';
        badge.textContent = '⭐ Pick';
        top.appendChild(badge);
      }
      if (org) {
        const dot = document.createElement('span');
        dot.className = `cat-dot ${org.cat}`;
        top.appendChild(dot);
      }
      const orgEl = document.createElement('span');
      orgEl.className = 'post-org';
      orgEl.textContent = org?.name || '';
      const nick = document.createElement('span');
      nick.className = 'post-nick';
      nick.textContent = post.nickname;
      const time = document.createElement('span');
      time.className = 'post-time';
      time.textContent = post.time;
      top.append(orgEl, nick, time);

      const body = document.createElement('div');
      body.className = 'post-body';
      body.textContent = post.content;

      const actions = document.createElement('div');
      actions.className = 'post-actions';

      const likeBtn = document.createElement('button');
      likeBtn.className = `action-btn${isLiked ? ' liked' : ''}`;
      likeBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="${isLiked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ${post.likes||0}`;
      likeBtn.onclick = (e) => { e.stopPropagation(); toggleLike(post.id, !!isLiked); };
      actions.appendChild(likeBtn);

      card.append(top, body, actions);
      feed.appendChild(card);
    });
  }

  window.toggleLike = async (postId, isLiked) => {
    const snap = await get(ref(db, `goryeo_v2/${postId}`));
    const post = snap.val(); if (!post) return;
    const updates = {};
    updates[`goryeo_v2/${postId}/likes`] = Math.max(0, isLiked ? post.likes-1 : post.likes+1);
    updates[`goryeo_v2/${postId}/likedBy/${currentUser.id}`] = isLiked ? null : true;
    update(ref(db), updates);
  };

  // ── 프로필 모달 ──
  window.openProfileModal = () => {
    document.getElementById('editNick').value = currentUser.nick;
    document.getElementById('editOrg').value = currentUser.org?.name || '';
    document.getElementById('profileModal').classList.add('show');
  };
  window.closeProfileModal = () => document.getElementById('profileModal').classList.remove('show');

  window.saveProfile = () => {
    const nick = document.getElementById('editNick').value.trim();
    const errEl = document.getElementById('editErr');
    if (!nick) { errEl.textContent = '닉네임을 입력하세요.'; errEl.style.display = 'block'; return; }
    const org = getOrgFromSelect('editOrg');
    if (!org) { errEl.textContent = '근무 기관을 선택하세요.'; errEl.style.display = 'block'; return; }
    errEl.style.display = 'none';
    currentUser.nick = nick; currentUser.org = org;
    localStorage.setItem('goryeo_v2_user', JSON.stringify(currentUser));
    updateComposerBadge();
    closeProfileModal();
  };
</script>
</body>
</html>
