<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Color Preview</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#4F46E5;
  --primary-deep:#4338CA;
  --primary-l:rgba(79,70,229,0.08);
  --accent:#F59E0B;
  --accent-deep:#D97706;
  --accent-l:rgba(245,158,11,0.10);
  --canvas:#FAFAF9;
  --surface:#F4F3EE;
  --hairline:#E5E4DF;
  --text:#0A1317;
  --sub:#6B7280;
}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--canvas);color:var(--text);padding:40px;min-height:100vh}

/* ── 테마 선택기 ── */
.theme-picker{display:flex;gap:10px;margin-bottom:36px;flex-wrap:wrap;align-items:center}
.theme-picker span{font-size:12px;font-weight:700;color:var(--sub);margin-right:4px}
.theme-btn{padding:8px 18px;border-radius:100px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:.15s;display:flex;align-items:center;gap:8px}
.theme-btn .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.theme-btn.active{border-color:var(--primary);background:var(--primary-l);color:var(--primary)}
.theme-btn:not(.active){background:var(--surface);color:var(--sub)}

/* ── 컴포넌트 ── */
section{margin-bottom:32px}
h2{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px}

.swatches{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px}
.swatch{border-radius:10px;padding:14px 18px;font-size:12px;font-weight:700;min-width:110px}
.swatch span{display:block;margin-top:3px;font-size:10px;font-weight:400;opacity:.65}

.btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn{padding:10px 22px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:.15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-deep)}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{background:var(--accent-deep)}
.btn-ghost{background:transparent;color:var(--text);border:1.5px solid var(--hairline)}
.btn-sm{padding:6px 14px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;border:none;background:var(--accent-l);color:var(--accent-deep)}

.badge-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.badge{display:inline-block;padding:4px 12px;border-radius:100px;font-size:11px;font-weight:700}
.badge-accent{background:var(--accent-l);color:var(--accent-deep)}
.badge-primary{background:var(--primary-l);color:var(--primary)}
.badge-neutral{background:var(--surface);color:var(--sub);border:1px solid var(--hairline)}

.cards{display:flex;gap:12px;flex-wrap:wrap}
.card{background:var(--canvas);border:1px solid var(--hairline);border-radius:16px;padding:18px 20px;flex:1;min-width:180px}
.card-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;margin-bottom:12px}
.icon-primary{background:var(--primary-l);color:var(--primary)}
.icon-accent{background:var(--accent-l);color:var(--accent-deep)}
.card-title{font-size:14px;font-weight:800;margin-bottom:4px}
.card-sub{font-size:12px;color:var(--sub)}

.notice{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;background:var(--accent-l);color:var(--accent-deep);border-left:3px solid var(--accent)}

.nav-demo{background:var(--canvas);border:1px solid var(--hairline);border-radius:16px;overflow:hidden;max-width:190px}
.nav-item{padding:11px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:10px;color:var(--sub)}
.nav-item.active{background:var(--primary-l);color:var(--primary)}
.nav-item.accent-nav{background:var(--accent-l);color:var(--accent-deep)}
.nav-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}

.toggle-row{display:flex;gap:20px;align-items:center}
.toggle-wrap{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
.toggle{width:40px;height:22px;border-radius:100px;position:relative;flex-shrink:0}
.toggle-off{background:var(--hairline)}
.toggle-on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:3px;width:16px;height:16px;background:#fff;border-radius:50%}
.toggle-off::after{left:3px}
.toggle-on::after{left:calc(100% - 19px)}

.row{display:flex;gap:32px;flex-wrap:wrap;align-items:flex-start}
</style>
</head>
<body>

<div class="theme-picker">
  <span>포인트 색상 선택 →</span>
  <button class="theme-btn active" onclick="setTheme('amber')" id="btn-amber">
    <span class="dot" style="background:#F59E0B"></span>앰버
  </button>
  <button class="theme-btn" onclick="setTheme('emerald')" id="btn-emerald">
    <span class="dot" style="background:#10B981"></span>에메랄드
  </button>
  <button class="theme-btn" onclick="setTheme('rose')" id="btn-rose">
    <span class="dot" style="background:#F43F5E"></span>로즈
  </button>
  <button class="theme-btn" onclick="setTheme('cyan')" id="btn-cyan">
    <span class="dot" style="background:#06B6D4"></span>시안
  </button>
  <button class="theme-btn" onclick="setTheme('mint')" id="btn-mint">
    <span class="dot" style="background:#14B8A6"></span>민트
  </button>
</div>

<div class="swatches">
  <div class="swatch" style="background:var(--primary);color:#fff">인디고<span>#4F46E5</span></div>
  <div class="swatch" id="sw-accent" style="background:var(--accent);color:#fff">포인트<span id="sw-accent-hex">#F59E0B</span></div>
  <div class="swatch" id="sw-accent-l" style="background:var(--accent-l);color:var(--accent-deep)">포인트 틴트<span>tint</span></div>
  <div class="swatch" style="background:var(--canvas);color:var(--text);border:1px solid var(--hairline)">캔버스<span>#FAFAF9</span></div>
  <div class="swatch" style="background:var(--surface);color:var(--text);border:1px solid var(--hairline)">서피스<span>#F4F3EE</span></div>
</div>

<section>
  <h2>버튼</h2>
  <div class="btn-row">
    <button class="btn btn-primary">저장</button>
    <button class="btn btn-accent">공개하기</button>
    <button class="btn btn-ghost">취소</button>
    <button class="btn btn-sm">+ 새 강의</button>
  </div>
</section>

<section>
  <h2>뱃지 · 알림</h2>
  <div class="badge-row" style="margin-bottom:12px">
    <span class="badge badge-primary">개념 체크</span>
    <span class="badge badge-accent">공개 중</span>
    <span class="badge badge-neutral">22강</span>
  </div>
  <div class="notice">공개 전 설정을 확인하세요.</div>
</section>

<section>
  <h2>카드</h2>
  <div class="cards">
    <div class="card">
      <div class="card-icon icon-primary">22</div>
      <div class="card-title">고려의 사회, 고려의 문화</div>
      <div class="card-sub">개념 체크 · 비공개</div>
    </div>
    <div class="card">
      <div class="card-icon icon-accent">🎯</div>
      <div class="card-title">선택과 결과</div>
      <div class="card-sub">미션 체크 · 공개 중</div>
    </div>
    <div class="card">
      <div class="card-icon icon-primary">23</div>
      <div class="card-title">천년의 기억</div>
      <div class="card-sub">생각 체크 · 비공개</div>
    </div>
  </div>
</section>

<section>
  <div class="row">
    <div>
      <h2>사이드바</h2>
      <div class="nav-demo">
        <div class="nav-item active"><span class="nav-dot"></span>개념 체크</div>
        <div class="nav-item"><span class="nav-dot"></span>미션 체크</div>
        <div class="nav-item"><span class="nav-dot"></span>생각 체크</div>
        <div class="nav-item accent-nav"><span class="nav-dot"></span>성적 체크</div>
        <div class="nav-item"><span class="nav-dot"></span>학생 관리</div>
      </div>
    </div>
    <div>
      <h2>토글</h2>
      <div class="toggle-row">
        <div class="toggle-wrap">
          <div class="toggle toggle-off"></div>
          <span style="color:var(--sub)">비공개</span>
        </div>
        <div class="toggle-wrap">
          <div class="toggle toggle-on"></div>
          <span>공개 중</span>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
const themes = {
  amber:   { accent:'#F59E0B', deep:'#D97706', l:'rgba(245,158,11,0.10)' },
  emerald: { accent:'#10B981', deep:'#059669', l:'rgba(16,185,129,0.10)' },
  rose:    { accent:'#F43F5E', deep:'#E11D48', l:'rgba(244,63,94,0.08)'  },
  cyan:    { accent:'#06B6D4', deep:'#0891B2', l:'rgba(6,182,212,0.10)'  },
  mint:    { accent:'#2DD4BF', deep:'#0F766E', l:'rgba(45,212,191,0.12)' },
};

function setTheme(name) {
  const t = themes[name];
  const r = document.documentElement.style;
  r.setProperty('--accent',      t.accent);
  r.setProperty('--accent-deep', t.deep);
  r.setProperty('--accent-l',    t.l);

  document.getElementById('sw-accent').style.background = t.accent;
  document.getElementById('sw-accent-l').style.background = t.l;
  document.getElementById('sw-accent-l').style.color = t.deep;
  document.getElementById('sw-accent-hex').textContent = t.accent;

  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + name).classList.add('active');
}
</script>
</body>
</html>
