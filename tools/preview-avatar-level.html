<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>아바타 커스터마이저 + 레벨 위젯 프리뷰</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<!-- DiceBear JS SDK — img 태그 없이 SVG를 JS로 직접 생성 (file:// 환경에서도 동작) -->
<script src="https://cdn.jsdelivr.net/npm/@dicebear/core@8/dist/core.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@dicebear/avataaars@8/dist/index.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', sans-serif;
  background: #f0f0ee;
  padding: 48px 36px 100px;
  color: #1a1a2e;
}
h1 { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
.page-desc { font-size: 13px; color: #666; margin-bottom: 40px; border-left: 3px solid #1E3A8A; padding-left: 10px; line-height: 1.7; }

.sec-label {
  font-size: 11px; font-weight: 700; color: #999;
  text-transform: uppercase; letter-spacing: .08em;
  margin: 0 0 16px;
  display: flex; align-items: center; gap: 10px;
}
.sec-label::after { content: ''; flex: 1; height: 1px; background: #ddd; }
.section { margin-bottom: 52px; }

/* ═══════════════════════════════
   글래스 카드
═══════════════════════════════ */
.glass {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.95);
  border-radius: 20px;
  box-shadow: 0 4px 24px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.05);
}

/* ═══════════════════════════════
   레벨 위젯 (개편된 컬러)
   Navy #1E3A8A + Amber #F59E0B
═══════════════════════════════ */
.level-widget {
  padding: 18px 22px;
  display: flex; align-items: center; gap: 16px;
  max-width: 680px;
}

/* 아바타 원 */
.lw-avatar-wrap { position: relative; flex-shrink: 0; }
.lw-avatar {
  width: 52px; height: 52px; border-radius: 50%;
  background: linear-gradient(135deg, #1E3A8A 0%, #2D4CC8 100%);
  overflow: hidden; display: flex; align-items: flex-end; justify-content: center;
  border: 2px solid rgba(255,255,255,0.9);
  box-shadow: 0 2px 10px rgba(30,58,138,.3);
}
.lw-avatar img { width: 100%; height: 100%; object-fit: cover; }
.lw-level-badge {
  position: absolute; bottom: -4px; right: -4px;
  background: #F59E0B; color: #fff;
  font-size: 10px; font-weight: 900;
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid #fff;
  box-shadow: 0 1px 4px rgba(245,158,11,.4);
}

.lw-info { min-width: 72px; flex-shrink: 0; }
.lw-name { font-size: 15px; font-weight: 800; color: #0f172a; }
.lw-sublabel { font-size: 11px; color: #94a3b8; font-weight: 600; margin-top: 1px; }

.lw-divider { width: 1px; height: 32px; background: #e2e8f0; flex-shrink: 0; }

.lw-bar-area { flex: 1; min-width: 0; }
.lw-bar-top {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 11px; color: #94a3b8; font-weight: 600; margin-bottom: 7px;
}
.lw-bar-top .cur { font-size: 15px; font-weight: 900; color: #0f172a; }
.lw-bar-top .sep { color: #cbd5e1; margin: 0 2px; }
.lw-track {
  height: 8px; border-radius: 99px;
  background: #f1f5f9; overflow: visible;
  position: relative;
}
.lw-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, #FBBF24, #F59E0B, #D97706);
  box-shadow: 0 0 8px rgba(245,158,11,.4);
  transition: width .6s cubic-bezier(.4,0,.2,1);
  position: relative;
}
.lw-fill::after {
  content: '';
  position: absolute; right: -1px; top: 50%;
  transform: translateY(-50%);
  width: 12px; height: 12px; border-radius: 50%;
  background: #F59E0B;
  border: 2px solid #fff;
  box-shadow: 0 1px 4px rgba(245,158,11,.5);
}
.lw-bar-bottom {
  display: flex; justify-content: space-between;
  font-size: 10px; color: #94a3b8; margin-top: 5px;
}

/* ═══════════════════════════════
   아바타 커스터마이저
═══════════════════════════════ */
.customizer-wrap {
  display: flex; gap: 28px; align-items: flex-start; flex-wrap: wrap;
}

/* 미리보기 패널 */
.preview-panel {
  padding: 28px 24px;
  display: flex; flex-direction: column; align-items: center;
  gap: 16px;
  width: 200px;
  flex-shrink: 0;
}
.avatar-preview {
  width: 140px; height: 140px; border-radius: 50%;
  overflow: hidden;
  border: 3px solid rgba(255,255,255,0.9);
  box-shadow: 0 4px 20px rgba(30,58,138,.2);
  background: #dbeafe; /* 기본 배경 */
  display: flex; align-items: flex-end; justify-content: center;
  position: relative;
}
.avatar-preview img {
  width: 100%; height: 100%; object-fit: cover;
  display: block;
}
.avatar-loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: inherit; font-size: 12px; color: #94a3b8;
}

.preview-name { font-size: 15px; font-weight: 800; color: #0f172a; }
.preview-lv { font-size: 12px; color: #94a3b8; font-weight: 600; }
.save-btn {
  width: 100%; padding: 10px; border-radius: 10px; border: none;
  background: #1E3A8A; color: #fff;
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: inherit;
  transition: background .15s;
}
.save-btn:hover { background: #1e40af; }

/* 옵션 패널 */
.options-panel {
  flex: 1; min-width: 300px;
  padding: 22px 20px;
}
.opt-section { margin-bottom: 20px; }
.opt-section:last-child { margin-bottom: 0; }
.opt-title {
  font-size: 11px; font-weight: 700; color: #94a3b8;
  text-transform: uppercase; letter-spacing: .07em;
  margin-bottom: 10px;
}

/* 색상 스와치 */
.color-swatches { display: flex; flex-wrap: wrap; gap: 7px; }
.swatch-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2.5px solid transparent;
  cursor: pointer; transition: transform .12s, border-color .12s;
  position: relative;
}
.swatch-btn:hover { transform: scale(1.15); }
.swatch-btn.active { border-color: #1E3A8A; }
.swatch-btn.active::after {
  content: '✓'; position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #fff; font-weight: 900;
  text-shadow: 0 1px 2px rgba(0,0,0,.4);
}

/* 스타일 칩 버튼 */
.style-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip-btn {
  padding: 5px 12px; border-radius: 99px; border: 1.5px solid #e2e8f0;
  background: #fff; font-size: 12px; font-weight: 600; color: #475569;
  cursor: pointer; transition: all .12s; font-family: inherit;
}
.chip-btn:hover { border-color: #1E3A8A; color: #1E3A8A; background: #eff6ff; }
.chip-btn.active { border-color: #1E3A8A; color: #1E3A8A; background: #eff6ff; font-weight: 700; }

/* 랜덤 버튼 */
.random-btn {
  padding: 8px 16px; border-radius: 99px; border: 1.5px solid #e2e8f0;
  background: #fff; font-size: 12px; font-weight: 700; color: #475569;
  cursor: pointer; font-family: inherit; transition: all .12s;
  display: inline-flex; align-items: center; gap: 5px;
}
.random-btn:hover { border-color: #F59E0B; color: #D97706; background: #fffbeb; }

/* ═══════════════════════════════
   레벨업 모달 (개편)
═══════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(10,15,40,0.6);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999; opacity: 0; pointer-events: none; transition: opacity .25s;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.levelup-modal {
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.98);
  border-radius: 28px; padding: 48px 40px 36px;
  text-align: center; width: 340px;
  box-shadow: 0 24px 64px rgba(0,0,0,.16);
  transform: scale(.85) translateY(24px);
  transition: transform .35s cubic-bezier(.34,1.56,.64,1);
}
.modal-overlay.show .levelup-modal { transform: scale(1) translateY(0); }

.modal-avatar {
  width: 90px; height: 90px; border-radius: 50%;
  background: linear-gradient(135deg, #1E3A8A, #2D4CC8);
  margin: 0 auto 20px; overflow: hidden;
  border: 3px solid rgba(255,255,255,.9);
  box-shadow: 0 4px 20px rgba(30,58,138,.3);
  display: flex; align-items: flex-end; justify-content: center;
}
.modal-avatar img { width: 100%; height: 100%; object-fit: cover; }

/* 반짝이 애니메이션 */
.sparkles {
  display: flex; justify-content: center; gap: 8px;
  margin-bottom: 14px;
  animation: sparkle-in .4s ease both;
}
@keyframes sparkle-in {
  from { opacity: 0; transform: scale(.5); }
  to   { opacity: 1; transform: scale(1); }
}
.sparkle { font-size: 18px; animation: twinkle 1.5s ease infinite; }
.sparkle:nth-child(2) { animation-delay: .2s; font-size: 24px; }
.sparkle:nth-child(3) { animation-delay: .4s; }
@keyframes twinkle {
  0%, 100% { transform: scale(1) rotate(0); opacity: 1; }
  50% { transform: scale(1.3) rotate(15deg); opacity: .7; }
}

.modal-label { font-size: 12px; font-weight: 700; color: #F59E0B; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 4px; }
.modal-lv {
  font-size: 64px; font-weight: 900; color: #0f172a; line-height: 1;
  animation: lv-pop .4s cubic-bezier(.34,1.56,.64,1) .1s both;
}
@keyframes lv-pop {
  from { transform: scale(.5); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.modal-sub { font-size: 14px; color: #64748b; margin: 8px 0 28px; }
.modal-close {
  width: 100%; padding: 12px; border-radius: 12px; border: none;
  background: linear-gradient(135deg, #1E3A8A, #2D4CC8);
  color: #fff; font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: inherit; box-shadow: 0 4px 12px rgba(30,58,138,.3);
  transition: opacity .15s;
}
.modal-close:hover { opacity: .88; }

/* 경험치 플로팅 */
.xp-float {
  position: fixed; pointer-events: none; z-index: 9998;
  font-size: 14px; font-weight: 800;
  background: #F59E0B; color: #fff;
  padding: 4px 10px; border-radius: 99px;
  box-shadow: 0 2px 8px rgba(245,158,11,.4);
  animation: float-up .9s ease forwards;
}
@keyframes float-up {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  60%  { opacity: 1; transform: translateY(-44px) scale(1.05); }
  100% { opacity: 0; transform: translateY(-72px) scale(.9); }
}

/* 테스트 섹션 */
.test-row { display: flex; gap: 28px; flex-wrap: wrap; align-items: flex-start; }
.test-panel { padding: 20px 22px; }
.test-title { font-size: 13px; font-weight: 700; color: #0f172a; margin-bottom: 12px; }
.test-btns { display: flex; flex-wrap: wrap; gap: 7px; }
.xp-btn {
  padding: 7px 14px; border-radius: 8px;
  border: 1.5px solid #e2e8f0; background: #fff;
  font-size: 12px; font-weight: 700; color: #475569;
  cursor: pointer; font-family: inherit;
  transition: all .12s;
}
.xp-btn:hover { border-color: #F59E0B; color: #D97706; background: #fffbeb; transform: translateY(-1px); }
.xp-btn:active { transform: translateY(0); }
.xp-btn.reset { border-color: #fee2e2; color: #ef4444; background: #fff; }
.xp-btn.reset:hover { background: #fef2f2; }
.xp-total { margin-top: 12px; font-size: 12px; color: #94a3b8; font-weight: 600; }
.xp-total strong { font-size: 20px; font-weight: 900; color: #0f172a; }
</style>
</head>
<body>

<!-- 레벨업 모달 -->
<div class="modal-overlay" id="modal">
  <div class="levelup-modal">
    <div class="modal-avatar"><img id="modal-avatar-img" src="" alt=""></div>
    <div class="sparkles">
      <span class="sparkle">✦</span>
      <span class="sparkle">★</span>
      <span class="sparkle">✦</span>
    </div>
    <div class="modal-label">Level Up!</div>
    <div class="modal-lv" id="modal-lv">5</div>
    <div class="modal-sub">경험치가 쌓여 레벨이 올랐어요!</div>
    <button class="modal-close" onclick="closeModal()">계속하기</button>
  </div>
</div>

<!-- ① 레벨 위젯 -->
<div class="section">
  <div class="sec-label">레벨 위젯 — 개편된 컬러 (Navy + Amber)</div>
  <div class="level-widget glass" id="widget">
    <div class="lw-avatar-wrap">
      <div class="lw-avatar"><img id="widget-avatar" src="" alt=""></div>
      <div class="lw-level-badge" id="widget-lv-badge">1</div>
    </div>
    <div class="lw-info">
      <div class="lw-name">김호성</div>
      <div class="lw-sublabel">Lv.<span id="widget-lv">1</span></div>
    </div>
    <div class="lw-divider"></div>
    <div class="lw-bar-area">
      <div class="lw-bar-top">
        <span>경험치</span>
        <span><span class="cur" id="bar-cur">0</span><span class="sep">/</span><span id="bar-max">100</span></span>
      </div>
      <div class="lw-track">
        <div class="lw-fill" id="lw-fill" style="width:0%"></div>
      </div>
      <div class="lw-bar-bottom">
        <span id="bar-total-label">누적 0 pt</span>
        <span id="bar-next-label">다음 레벨까지 100 pt</span>
      </div>
    </div>
  </div>
</div>

<!-- ② 아바타 커스터마이저 -->
<div class="section">
  <div class="sec-label">아바타 커스터마이저</div>
  <div class="customizer-wrap">

    <!-- 미리보기 -->
    <div class="preview-panel glass">
      <div class="avatar-preview" id="avatar-preview-wrap" style="background:#dbeafe">
        <div class="avatar-loading" id="avatar-loading">로딩 중...</div>
        <img id="avatar-img" src="" alt="" style="display:none" onload="onAvatarLoad()" onerror="onAvatarError()">
      </div>
      <div class="preview-name">김호성</div>
      <div class="preview-lv">Lv.1</div>
      <button class="random-btn" onclick="randomize()" style="width:100%;justify-content:center">
        🎲 랜덤 생성
      </button>
      <button class="save-btn" onclick="saveAvatar()">아바타 저장</button>
    </div>

    <!-- 옵션 -->
    <div class="options-panel glass">

      <!-- 배경색 -->
      <div class="opt-section">
        <div class="opt-title">배경색</div>
        <div class="color-swatches" id="bg-swatches">
          <button class="swatch-btn active" style="background:#bfdbfe" data-val="bfdbfe" onclick="selectBg(this,'bfdbfe')"></button>
          <button class="swatch-btn" style="background:#bbf7d0" data-val="bbf7d0" onclick="selectBg(this,'bbf7d0')"></button>
          <button class="swatch-btn" style="background:#fde68a" data-val="fde68a" onclick="selectBg(this,'fde68a')"></button>
          <button class="swatch-btn" style="background:#fecaca" data-val="fecaca" onclick="selectBg(this,'fecaca')"></button>
          <button class="swatch-btn" style="background:#e9d5ff" data-val="e9d5ff" onclick="selectBg(this,'e9d5ff')"></button>
          <button class="swatch-btn" style="background:#fed7aa" data-val="fed7aa" onclick="selectBg(this,'fed7aa')"></button>
          <button class="swatch-btn" style="background:#99f6e4" data-val="99f6e4" onclick="selectBg(this,'99f6e4')"></button>
          <button class="swatch-btn" style="background:#f1f5f9" data-val="f1f5f9" onclick="selectBg(this,'f1f5f9')"></button>
        </div>
      </div>

      <!-- 피부색 -->
      <div class="opt-section">
        <div class="opt-title">피부색</div>
        <div class="color-swatches" id="skin-swatches">
          <button class="swatch-btn active" style="background:#FFDBB4" data-val="pale"     onclick="selectSkin(this,'pale')"></button>
          <button class="swatch-btn" style="background:#EDB98A" data-val="light"    onclick="selectSkin(this,'light')"></button>
          <button class="swatch-btn" style="background:#F8D25C" data-val="yellow"   onclick="selectSkin(this,'yellow')"></button>
          <button class="swatch-btn" style="background:#FD9841" data-val="tanned"   onclick="selectSkin(this,'tanned')"></button>
          <button class="swatch-btn" style="background:#D08B5B" data-val="brown"    onclick="selectSkin(this,'brown')"></button>
          <button class="swatch-btn" style="background:#AE5D29" data-val="darkBrown" onclick="selectSkin(this,'darkBrown')"></button>
          <button class="swatch-btn" style="background:#614335" data-val="black"    onclick="selectSkin(this,'black')"></button>
        </div>
      </div>

      <!-- 머리 스타일 -->
      <div class="opt-section">
        <div class="opt-title">머리 스타일</div>
        <div class="style-chips" id="top-chips">
          <button class="chip-btn active" data-val="ShortHairShortFlat"   onclick="selectTop(this,'ShortHairShortFlat')">단발 (일자)</button>
          <button class="chip-btn" data-val="ShortHairShortRound"  onclick="selectTop(this,'ShortHairShortRound')">단발 (라운드)</button>
          <button class="chip-btn" data-val="ShortHairShortWaved"  onclick="selectTop(this,'ShortHairShortWaved')">단발 (웨이브)</button>
          <button class="chip-btn" data-val="ShortHairShortCurly"  onclick="selectTop(this,'ShortHairShortCurly')">단발 (곱슬)</button>
          <button class="chip-btn" data-val="ShortHairDreads01"    onclick="selectTop(this,'ShortHairDreads01')">드레드</button>
          <button class="chip-btn" data-val="LongHairBigHair"      onclick="selectTop(this,'LongHairBigHair')">긴머리 (볼륨)</button>
          <button class="chip-btn" data-val="LongHairBob"          onclick="selectTop(this,'LongHairBob')">단발 롱</button>
          <button class="chip-btn" data-val="LongHairBun"          onclick="selectTop(this,'LongHairBun')">묶음 머리</button>
          <button class="chip-btn" data-val="LongHairCurly"        onclick="selectTop(this,'LongHairCurly')">긴 곱슬</button>
          <button class="chip-btn" data-val="LongHairStraight"     onclick="selectTop(this,'LongHairStraight')">긴 직모</button>
          <button class="chip-btn" data-val="Hat"                  onclick="selectTop(this,'Hat')">모자</button>
          <button class="chip-btn" data-val="WinterHat1"           onclick="selectTop(this,'WinterHat1')">겨울 모자</button>
        </div>
      </div>

      <!-- 머리색 -->
      <div class="opt-section">
        <div class="opt-title">머리색</div>
        <div class="color-swatches" id="hair-swatches">
          <button class="swatch-btn" style="background:#2c1b18" data-val="Black"       onclick="selectHair(this,'Black')"></button>
          <button class="swatch-btn active" style="background:#4a312c" data-val="BrownDark"  onclick="selectHair(this,'BrownDark')"></button>
          <button class="swatch-btn" style="background:#b58143" data-val="Brown"       onclick="selectHair(this,'Brown')"></button>
          <button class="swatch-btn" style="background:#daa520" data-val="Blonde"      onclick="selectHair(this,'Blonde')"></button>
          <button class="swatch-btn" style="background:#f8d25c" data-val="BlondeGolden" onclick="selectHair(this,'BlondeGolden')"></button>
          <button class="swatch-btn" style="background:#f59797" data-val="PastelPink"  onclick="selectHair(this,'PastelPink')"></button>
          <button class="swatch-btn" style="background:#ecdcbf" data-val="Platinum"    onclick="selectHair(this,'Platinum')"></button>
          <button class="swatch-btn" style="background:#c93305" data-val="Red"         onclick="selectHair(this,'Red')"></button>
          <button class="swatch-btn" style="background:#9ca3af" data-val="SilverGray"  onclick="selectHair(this,'SilverGray')"></button>
        </div>
      </div>

      <!-- 눈 -->
      <div class="opt-section">
        <div class="opt-title">눈</div>
        <div class="style-chips" id="eye-chips">
          <button class="chip-btn active" data-val="Default"   onclick="selectEye(this,'Default')">기본</button>
          <button class="chip-btn" data-val="Happy"     onclick="selectEye(this,'Happy')">행복 ^^</button>
          <button class="chip-btn" data-val="Wink"      onclick="selectEye(this,'Wink')">윙크 😉</button>
          <button class="chip-btn" data-val="Hearts"    onclick="selectEye(this,'Hearts')">하트 ♥</button>
          <button class="chip-btn" data-val="Surprised" onclick="selectEye(this,'Surprised')">놀람 😲</button>
          <button class="chip-btn" data-val="Squint"    onclick="selectEye(this,'Squint')">찡그림</button>
          <button class="chip-btn" data-val="Side"      onclick="selectEye(this,'Side')">곁눈질</button>
        </div>
      </div>

      <!-- 표정 -->
      <div class="opt-section">
        <div class="opt-title">표정</div>
        <div class="style-chips" id="mouth-chips">
          <button class="chip-btn active" data-val="Smile"   onclick="selectMouth(this,'Smile')">미소 😊</button>
          <button class="chip-btn" data-val="Default"  onclick="selectMouth(this,'Default')">기본</button>
          <button class="chip-btn" data-val="Twinkle"  onclick="selectMouth(this,'Twinkle')">반짝 ✨</button>
          <button class="chip-btn" data-val="Tongue"   onclick="selectMouth(this,'Tongue')">혀 😛</button>
          <button class="chip-btn" data-val="Serious"  onclick="selectMouth(this,'Serious')">진지</button>
          <button class="chip-btn" data-val="Sad"      onclick="selectMouth(this,'Sad')">슬픔 🙁</button>
        </div>
      </div>

      <!-- 악세사리 -->
      <div class="opt-section">
        <div class="opt-title">악세사리</div>
        <div class="style-chips" id="acc-chips">
          <button class="chip-btn active" data-val=""               onclick="selectAcc(this,'')">없음</button>
          <button class="chip-btn" data-val="Prescription01" onclick="selectAcc(this,'Prescription01')">안경 (뿔테)</button>
          <button class="chip-btn" data-val="Prescription02" onclick="selectAcc(this,'Prescription02')">안경 (둥근)</button>
          <button class="chip-btn" data-val="Round"          onclick="selectAcc(this,'Round')">동그란 안경</button>
          <button class="chip-btn" data-val="Sunglasses"     onclick="selectAcc(this,'Sunglasses')">선글라스 😎</button>
          <button class="chip-btn" data-val="Wayfarers"      onclick="selectAcc(this,'Wayfarers')">웨이페어러</button>
          <button class="chip-btn" data-val="Kurt"           onclick="selectAcc(this,'Kurt')">커트 안경</button>
        </div>
      </div>

      <!-- 옷 -->
      <div class="opt-section">
        <div class="opt-title">옷</div>
        <div class="style-chips" id="cloth-chips">
          <button class="chip-btn active" data-val="BlazerSweater"  onclick="selectCloth(this,'BlazerSweater')">블레이저</button>
          <button class="chip-btn" data-val="CollarSweater"  onclick="selectCloth(this,'CollarSweater')">카라 스웨터</button>
          <button class="chip-btn" data-val="Hoodie"         onclick="selectCloth(this,'Hoodie')">후드티</button>
          <button class="chip-btn" data-val="Overall"        onclick="selectCloth(this,'Overall')">오버롤</button>
          <button class="chip-btn" data-val="ShirtCrewNeck"  onclick="selectCloth(this,'ShirtCrewNeck')">크루넥</button>
          <button class="chip-btn" data-val="ShirtVNeck"     onclick="selectCloth(this,'ShirtVNeck')">브이넥</button>
          <button class="chip-btn" data-val="GraphicShirt"   onclick="selectCloth(this,'GraphicShirt')">그래픽 티</button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ③ 테스트 (위젯 + 경험치) -->
<div class="section">
  <div class="sec-label">경험치 테스트</div>
  <div class="test-row">
    <div class="test-panel glass">
      <div class="test-title">활동별 경험치 획득</div>
      <div class="test-btns">
        <button class="xp-btn" onclick="addXP(10,this)">개념체크 완독 +10</button>
        <button class="xp-btn" onclick="addXP(30,this)">미션 제출 +30</button>
        <button class="xp-btn" onclick="addXP(20,this)">미션 만점 +20</button>
        <button class="xp-btn" onclick="addXP(20,this)">생각체크 답변 +20</button>
        <button class="xp-btn" onclick="addXP(5,this)">OX 참여 +5</button>
        <button class="xp-btn" onclick="addXP(50,this)">탈출게임 클리어 +50</button>
        <button class="xp-btn" onclick="addXP(15,this)">연속 출석 +15</button>
        <button class="xp-btn reset" onclick="resetXP()">초기화</button>
      </div>
      <div class="xp-total">누적 경험치: <strong id="xp-total-display">0</strong> pt</div>
    </div>
  </div>
</div>

<script>
/* ── 레벨 정의 ── */
const LEVELS = [
  {lv:1,xp:0},{lv:2,xp:100},{lv:3,xp:250},{lv:4,xp:450},{lv:5,xp:700},
  {lv:6,xp:1000},{lv:7,xp:1350},{lv:8,xp:1750},{lv:9,xp:2200},{lv:10,xp:2700},
  {lv:11,xp:3300},{lv:12,xp:4000},{lv:13,xp:5000},
];

/* ── 아바타 상태 ── */
const av = {
  bg: 'b6e3f4', skin: 'pale', top: 'ShortHairShortFlat',
  hair: 'BrownDark', eye: 'Default', mouth: 'Smile', acc: '', cloth: 'BlazerSweater'
};

/* SDK로 SVG 인라인 생성 — img 태그·외부 fetch 없이 동작 */
function renderSvg(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;

  /* SDK 로드 전일 경우 폴백 */
  if (typeof DiceBear === 'undefined' || typeof DiceBearAvataaars === 'undefined') {
    el.innerHTML = makeFallback('김');
    return;
  }

  const opts = {
    seed: 'kimhoseong',
    backgroundColor: [av.bg],
    skinColor: [av.skin],
    top: [av.top],
    hairColor: [av.hair],
    eyes: [av.eye],
    mouth: [av.mouth],
    clothes: [av.cloth],
    accessoriesProbability: av.acc ? 100 : 0,
  };
  if (av.acc) opts.accessories = [av.acc];

  try {
    const avatar = DiceBear.createAvatar(DiceBearAvataaars.avataaars, opts);
    el.innerHTML = avatar.toString();
    const svg = el.querySelector('svg');
    if (svg) { svg.style.width = '100%'; svg.style.height = '100%'; }
  } catch(e) {
    el.innerHTML = makeFallback('김');
  }
}

function makeFallback(initial) {
  return `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    font-size:2em;font-weight:900;color:#1E3A8A;font-family:Pretendard,sans-serif">${initial}</div>`;
}

function updateAvatar() {
  document.getElementById('avatar-preview-wrap').style.background = '#' + av.bg;
  renderSvg('avatar-svg-wrap');
  renderSvg('widget-svg-wrap');
  renderSvg('modal-svg-wrap');
}

function selectBg(el, val) { av.bg = val; setActive('bg-swatches', el); updateAvatar(); }
function selectSkin(el, val) { av.skin = val; setActive('skin-swatches', el); updateAvatar(); }
function selectTop(el, val) { av.top = val; setActive('top-chips', el); updateAvatar(); }
function selectHair(el, val) { av.hair = val; setActive('hair-swatches', el); updateAvatar(); }
function selectEye(el, val) { av.eye = val; setActive('eye-chips', el); updateAvatar(); }
function selectMouth(el, val) { av.mouth = val; setActive('mouth-chips', el); updateAvatar(); }
function selectAcc(el, val) { av.acc = val; setActive('acc-chips', el); updateAvatar(); }
function selectCloth(el, val) { av.cloth = val; setActive('cloth-chips', el); updateAvatar(); }

function setActive(parentId, el) {
  document.querySelectorAll('#' + parentId + ' .swatch-btn, #' + parentId + ' .chip-btn')
    .forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

const BG_COLORS = ['bfdbfe','bbf7d0','fde68a','fecaca','e9d5ff','fed7aa','99f6e4','f1f5f9'];
const SKIN_COLORS = ['pale','light','yellow','tanned','brown','darkBrown','black'];
const TOPS = ['ShortHairShortFlat','ShortHairShortRound','ShortHairShortWaved','ShortHairShortCurly','ShortHairDreads01','LongHairBigHair','LongHairBob','LongHairBun','LongHairCurly','LongHairStraight','Hat','WinterHat1'];
const HAIR_COLORS = ['Black','BrownDark','Brown','Blonde','BlondeGolden','PastelPink','Platinum','Red','SilverGray'];
const EYES = ['Default','Happy','Wink','Hearts','Surprised','Squint','Side'];
const MOUTHS = ['Smile','Default','Twinkle','Tongue','Serious','Sad'];
const ACCS = ['','Prescription01','Prescription02','Round','Sunglasses','Wayfarers','Kurt'];
const CLOTHS = ['BlazerSweater','CollarSweater','Hoodie','Overall','ShirtCrewNeck','ShirtVNeck','GraphicShirt'];

function randomize() {
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];
  av.bg = pick(BG_COLORS); av.skin = pick(SKIN_COLORS);
  av.top = pick(TOPS); av.hair = pick(HAIR_COLORS);
  av.eye = pick(EYES); av.mouth = pick(MOUTHS);
  av.acc = pick(ACCS); av.cloth = pick(CLOTHS);

  // UI 싱크
  syncActiveByVal('bg-swatches', av.bg);
  syncActiveByVal('skin-swatches', av.skin);
  syncActiveByVal('top-chips', av.top);
  syncActiveByVal('hair-swatches', av.hair);
  syncActiveByVal('eye-chips', av.eye);
  syncActiveByVal('mouth-chips', av.mouth);
  syncActiveByVal('acc-chips', av.acc);
  syncActiveByVal('cloth-chips', av.cloth);
  updateAvatar();
}
function syncActiveByVal(parentId, val) {
  document.querySelectorAll('#' + parentId + ' [data-val]').forEach(b => {
    b.classList.toggle('active', b.dataset.val === val);
  });
}

function saveAvatar() {
  const btn = document.querySelector('.save-btn');
  btn.textContent = '저장됨 ✓';
  btn.style.background = '#059669';
  setTimeout(() => { btn.textContent = '아바타 저장'; btn.style.background = ''; }, 1800);
}

/* ── XP 시스템 ── */
let totalXP = 0;
let curLv = 1;

function getLvInfo(xp) {
  let lv = 1, i;
  for (i = LEVELS.length - 1; i >= 0; i--) {
    if (xp >= LEVELS[i].xp) { lv = LEVELS[i].lv; break; }
  }
  const cur = LEVELS[lv - 1]; const next = LEVELS[lv] || null;
  const inLv = xp - cur.xp; const span = next ? next.xp - cur.xp : null;
  const pct = next ? (inLv / span) * 100 : 100;
  return { lv, inLv, span, pct, toNext: span ? span - inLv : 0 };
}

function updateWidget(xp) {
  const info = getLvInfo(xp);
  document.getElementById('widget-lv').textContent = info.lv;
  document.getElementById('widget-lv-badge').textContent = info.lv;
  document.getElementById('bar-cur').textContent = info.inLv;
  document.getElementById('bar-max').textContent = info.span ?? '—';
  document.getElementById('lw-fill').style.width = info.pct.toFixed(1) + '%';
  document.getElementById('bar-total-label').textContent = '누적 ' + xp + ' pt';
  document.getElementById('bar-next-label').textContent = info.span
    ? '다음 레벨까지 ' + info.toNext + ' pt'
    : '최고 레벨!';
  document.getElementById('xp-total-display').textContent = xp;
}

function addXP(amount, btn) {
  const prevLv = getLvInfo(totalXP).lv;
  totalXP += amount;
  const newLv = getLvInfo(totalXP).lv;
  updateWidget(totalXP);
  spawnFloat(amount, btn);
  if (newLv > prevLv) setTimeout(() => showModal(newLv), 450);
}

function resetXP() { totalXP = 0; curLv = 1; updateWidget(0); }

function spawnFloat(amount, btn) {
  const rect = btn.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'xp-float';
  el.textContent = '+' + amount + ' pt';
  el.style.left = (rect.left + rect.width / 2 - 28) + 'px';
  el.style.top = (rect.top - 8 + window.scrollY) + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

function showModal(lv) {
  document.getElementById('modal-lv').textContent = lv;
  const mImg = document.getElementById('modal-avatar-img');
  mImg.src = buildUrl();
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });

/* 초기 로드 */
updateAvatar();
updateWidget(0);
</script>
</body>
</html>
