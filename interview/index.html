<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>조선의 기틀을 만든 자들</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
@font-face{font-family:'Paperlogy';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');font-weight:700;font-style:normal;font-display:swap}
@font-face{font-family:'Paperlogy';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');font-weight:900;font-style:normal;font-display:swap}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --canvas:#FAFAF9;--surface:#F4F3EE;
  --hairline:#E5E4DF;--hairline-soft:#ECEAE4;
  --ink-deep:#0A1317;--sub:#6B7280;--stone:#C4C4C4;
  --primary:#1E3A8A;--primary-deep:#172554;--primary-soft:rgba(30,58,138,0.09);
  --accent:#2DD4BF;--accent-deep:#0F766E;--accent-l:rgba(45,212,191,0.12);
  --err:#EF4444;
  --shadow:rgba(20,22,26,0.25) 0px 1px 4px 0px;
  --shadow-hover:rgba(20,22,26,0.25) 0px 8px 24px 0px;
}
html,body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--surface);color:var(--ink-deep);min-height:100vh;-webkit-font-smoothing:antialiased}
body{padding-bottom:60px}

.top{padding:26px 20px 18px;text-align:center}
.top-eyebrow{font-family:'Gowun Batang',serif;font-size:14px;color:var(--sub);letter-spacing:.02em;margin-bottom:6px}
.top-title{font-family:'Paperlogy',sans-serif;font-weight:900;font-size:24px;color:var(--primary);line-height:1.3;word-break:keep-all}

.wrap{max-width:680px;margin:0 auto;padding:0 18px}
#load-msg{text-align:center;padding:60px 20px;color:var(--sub);font-size:14px}

/* ── 로그인 ── */
#screen-login{flex-direction:column;align-items:center;padding-top:8px}
.login-card{width:100%;max-width:360px;background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:24px;padding:28px 24px;box-shadow:var(--shadow)}
.login-title{font-family:'Paperlogy',sans-serif;font-weight:700;font-size:17px;text-align:center;margin-bottom:22px}
.lf{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.lf label{font-size:12px;font-weight:700;color:var(--sub)}
.li{width:100%;padding:11px 14px;border:1.5px solid var(--hairline);border-radius:10px;font-family:inherit;font-size:15px;color:var(--ink-deep);background:var(--surface);outline:none;transition:border-color .2s}
.li:focus{border-color:var(--primary)}
.li.err{border-color:var(--err)}
.login-err{font-size:12px;color:var(--err);min-height:16px;margin-bottom:2px}
.login-btn{width:100%;padding:13px;border-radius:12px;background:var(--primary);color:#fff;font-family:'Paperlogy',sans-serif;font-weight:700;font-size:16px;border:none;cursor:pointer;transition:background .15s}
.login-btn:hover{background:var(--primary-deep)}

/* ── 인물 선택 ── */
#screen-select{flex-direction:column;gap:14px}
.student-bar{display:flex;align-items:center;justify-content:space-between;background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:100px;padding:8px 10px 8px 18px;box-shadow:var(--shadow)}
.student-bar-text{font-size:14px;font-weight:700}
.student-change-btn{background:var(--surface);border:1.5px solid var(--hairline);border-radius:100px;padding:6px 14px;font-family:inherit;font-size:12px;font-weight:700;color:var(--sub);cursor:pointer}
.select-hint{text-align:center;font-size:13px;color:var(--sub)}
.char-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:420px){.char-grid{grid-template-columns:1fr}}
.char-card{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:24px;padding:22px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;text-align:center;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s;font-family:inherit;position:relative}
.char-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover)}
.char-card.done{border-color:var(--accent);box-shadow:0 0 0 1.5px var(--accent),var(--shadow)}
.char-done-badge{position:absolute;top:12px;right:12px;background:var(--accent-l);color:var(--accent-deep);font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px}
.char-avatar{width:72px;height:72px;border-radius:20px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-size:34px;flex-shrink:0}
.char-name{font-family:'Paperlogy',sans-serif;font-weight:700;font-size:18px}
.char-role{font-size:12.5px;color:var(--sub);font-weight:600;line-height:1.4;word-break:keep-all}

/* ── 인터뷰 ── */
#screen-interview{flex-direction:column;gap:14px}
.iv-back{display:inline-flex;align-items:center;gap:6px;align-self:flex-start;background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:100px;padding:8px 16px 8px 12px;font-family:inherit;font-size:13px;font-weight:700;color:var(--sub);cursor:pointer}
.iv-back:hover{color:var(--ink-deep)}
.iv-head{display:flex;align-items:center;gap:14px;background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:24px;padding:18px 20px;box-shadow:var(--shadow)}
.iv-avatar{width:56px;height:56px;border-radius:16px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.iv-name{font-family:'Paperlogy',sans-serif;font-weight:700;font-size:19px}
.iv-role{font-size:12.5px;color:var(--sub);font-weight:600;margin-top:2px}

.qa-list{display:flex;flex-direction:column;gap:10px}
.qa-item{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:18px;overflow:hidden;box-shadow:var(--shadow)}
.qa-q{width:100%;display:flex;align-items:flex-start;gap:12px;text-align:left;background:none;border:none;font-family:inherit;cursor:pointer;padding:16px 18px}
.qa-num{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;font-family:'Paperlogy',sans-serif;font-weight:900;font-size:12.5px;display:flex;align-items:center;justify-content:center;margin-top:1px}
.qa-item.open .qa-num{background:var(--accent-deep)}
.qa-qtext{flex:1;font-size:15px;font-weight:600;line-height:1.55;color:var(--ink-deep);word-break:keep-all}
.qa-toggle{flex-shrink:0;font-size:18px;font-weight:700;color:var(--stone);line-height:1;margin-top:2px}
.qa-item.open .qa-toggle{color:var(--accent-deep)}
.qa-body{display:none;padding:0 18px 18px}
.qa-item.open .qa-body{display:block}
.qa-textarea{width:100%;min-height:110px;padding:12px 14px;border:1.5px solid var(--hairline);border-radius:12px;font-family:inherit;font-size:14.5px;line-height:1.6;color:var(--ink-deep);background:var(--surface);outline:none;resize:vertical;transition:border-color .2s}
.qa-textarea:focus{border-color:var(--primary)}
.qa-textarea::placeholder{color:var(--stone)}
.save-hint{font-size:11.5px;color:var(--sub);margin-top:6px;height:14px}
.save-hint.show{color:var(--accent-deep);font-weight:700}

/* ── 심화 질문 ── */
.deep-section{background:var(--canvas);border:1.5px solid var(--accent);border-radius:18px;padding:18px;box-shadow:var(--shadow)}
.deep-head{font-family:'Paperlogy',sans-serif;font-weight:700;font-size:16px;color:var(--accent-deep);margin-bottom:6px}
.deep-hint{font-size:13px;color:var(--sub);margin-bottom:12px;line-height:1.55;word-break:keep-all}
</style>
</head>
<body>

<div class="top">
  <div class="top-eyebrow">생각하고 활동하고 질문하는 역사 수업</div>
  <div class="top-title">조선의 기틀을 만든 자들</div>
</div>

<div class="wrap">
  <div id="load-msg">불러오는 중...</div>

  <!-- 로그인 -->
  <div id="screen-login" style="display:none">
    <div class="login-card">
      <div class="login-title">학생 정보 입력</div>
      <div class="lf">
        <label>반</label>
        <select id="lg-class" class="li">
          <option value="">선택하세요</option>
          <option value="1">1반</option><option value="2">2반</option><option value="3">3반</option>
          <option value="4">4반</option><option value="5">5반</option><option value="6">6반</option>
        </select>
      </div>
      <div class="lf">
        <label>학번</label>
        <input type="text" id="lg-id" class="li" inputmode="numeric" placeholder="예) 30115">
      </div>
      <div class="lf">
        <label>이름</label>
        <input type="text" id="lg-name" class="li" placeholder="이름 입력">
      </div>
      <div class="login-err" id="login-err"></div>
      <button class="login-btn" id="login-btn">시작하기 →</button>
    </div>
  </div>

  <!-- 인물 선택 -->
  <div id="screen-select" style="display:none">
    <div class="student-bar">
      <span class="student-bar-text" id="student-bar-text"></span>
      <button class="student-change-btn" id="change-btn">변경</button>
    </div>
    <p class="select-hint">인터뷰하고 싶은 인물을 선택하세요</p>
    <div class="char-grid" id="char-grid"></div>
  </div>

  <!-- 인터뷰 -->
  <div id="screen-interview" style="display:none">
    <button class="iv-back" id="iv-back-btn">← 목록으로</button>
    <div class="iv-head">
      <div class="iv-avatar" id="iv-avatar"></div>
      <div>
        <div class="iv-name" id="iv-name"></div>
        <div class="iv-role" id="iv-role"></div>
      </div>
    </div>
    <div class="qa-list" id="qa-list"></div>
    <div class="deep-section">
      <div class="deep-head">✏️ 나만의 심화 질문 제작</div>
      <p class="deep-hint">이 인물에게 더 묻고 싶은 질문을 직접 만들어 보세요. 단순한 사실 확인보다, 역사적 판단이나 가치관을 묻는 질문을 써보면 더 좋아요!</p>
      <textarea id="deep-textarea" class="qa-textarea" placeholder="예) 만약 당시 결정을 다시 내릴 수 있다면 어떻게 하시겠습니까?"></textarea>
      <div class="save-hint" id="deep-hint"></div>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getFirestore,doc,getDoc,setDoc,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",authDomain:"ho0911seong-56638.firebaseapp.com",projectId:"ho0911seong-56638",storageBucket:"ho0911seong-56638.firebasestorage.app",messagingSenderId:"994509567071",appId:"1:994509567071:web:8b33bb03a3d8f3a9f557ea"});
const db=getFirestore(app);

const DEFAULT_CONTENT={characters:[
  {id:'taejong',name:'태종',role:'조선 3대 국왕',emoji:'👑',questions:[
    '전하, 신하들의 최고 기구인 의정부를 거치지 않고 6조의 판서들에게 직접 업무를 보고받으시는(6조 직계제) 진짜 이유가 무엇입니까?',
    '왕족과 공신들이 거느리던 개인 군대(사병)를 전부 없애버리셨습니다. 굳이 군사력을 국가로 집중시키신 이유가 궁금합니다.',
    '모든 국사를 직접 챙기시려면 엄청나게 피곤하실 것 같습니다. 혹시 신하들을 전혀 믿지 못하시는 건가요?'
  ]},
  {id:'sejong',name:'세종',role:'조선 4대 국왕',emoji:'📖',questions:[
    "아버님(태종)께서 만들어 놓으신 강력한 6조 직계제를 폐지하고, 다시 영의정 등 3정승과 국사를 논의하는 '의정부 서사제'를 실시하신 이유가 무엇입니까?",
    '집현전을 설치하고 젊은 학자들과 밤낮으로 토론(경연)을 하신다고 들었습니다. 굳이 신하들과 피곤하게 토론하시는 이유가 있나요?',
    '만약 신하들이 전하의 의견에 끝까지 반대한다면, 그때는 어떻게 결정하실 생각이십니까?'
  ]},
  {id:'samsa',name:'3사 관원',role:'사헌부·사간원·홍문관',emoji:'🖋️',questions:[
    "대감께서 속한 '3사'는 조선 최고의 엘리트 직장이라고 들었습니다. 구체적으로 어떤 일을 하시길래 다들 그렇게 우러러보는 것입니까?",
    '전하의 정책을 대놓고 비판하거나 높은 대신들의 비리를 고발하시는데, 혹시 나중에 보복을 당하거나 왕에게 미움을 받을까 두렵지 않으십니까?',
    "새로운 관리를 임명할 때 대감들의 동의(서경)를 꼭 받아야 한다고 들었습니다. 동의를 해주고 말고를 결정하는 대감만의 '합격 기준'은 무엇입니까?"
  ]},
  {id:'yuhyangso',name:'유향소 양반',role:'지방 자치 기구',emoji:'🏘️',questions:[
    "나으리, 왕께서 직접 고을에 사또(수령)를 파견하셨는데, 굳이 지역 양반들이 모여 '유향소'라는 기구를 따로 만드신 이유가 무엇입니까?",
    '사또가 새로 부임하면 지역 사정을 잘 모를 텐데, 유향소에서는 사또를 그저 무조건 도와주기만 하는 건가요? 아니면 다른 역할도 있습니까?',
    "고을의 실무를 담당하는 '향리(아전)'들을 유향소에서 굉장히 엄격하게 감시한다고 들었습니다. 향리들을 그렇게 견제해야만 하는 특별한 이유가 있습니까?"
  ]}
]};

const LS_ANS='interview_joseon_answers';
const LS_DEEP='interview_joseon_deep';
const LS_STU='interview_joseon_student';

let CONTENT=DEFAULT_CONTENT;
let student=null;
let currentCharIdx=null;
let fsTimer=null;

function loadLocalAnswers(){try{return JSON.parse(localStorage.getItem(LS_ANS))||{};}catch(e){return {};}}
function loadLocalDeep(){try{return JSON.parse(localStorage.getItem(LS_DEEP))||{};}catch(e){return {};}}

function saveLocalAnswer(charId,qi,text){
  const all=loadLocalAnswers();
  if(!all[charId])all[charId]={};
  all[charId][qi]=text;
  localStorage.setItem(LS_ANS,JSON.stringify(all));
}
function saveLocalDeep(charId,text){
  const all=loadLocalDeep();
  all[charId]=text;
  localStorage.setItem(LS_DEEP,JSON.stringify(all));
}

function scheduleFS(charId){
  clearTimeout(fsTimer);
  fsTimer=setTimeout(async()=>{
    if(!student)return;
    const answers=loadLocalAnswers()[charId]||{};
    const deepQuestion=loadLocalDeep()[charId]||'';
    const char=CONTENT.characters.find(c=>c.id===charId);
    try{
      await setDoc(doc(db,'interview_joseon_answers',student.studentId),{
        studentId:student.studentId,name:student.name,classNum:student.classNum,
        charId,charName:char?.name||'',answers,deepQuestion,
        updatedAt:serverTimestamp(),status:'pending'
      },{merge:true});
    }catch(e){}
  },600);
}

function escHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function showScreen(id){
  ['screen-login','screen-select','screen-interview'].forEach(s=>{
    document.getElementById(s).style.display=(s===id)?'flex':'none';
  });
  window.scrollTo(0,0);
}

function showHint(el,text){
  el.textContent=text;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1200);
}

/* ── 로그인 ── */
document.getElementById('login-btn').addEventListener('click',doLogin);
document.getElementById('lg-name').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function doLogin(){
  const classNum=document.getElementById('lg-class').value;
  const studentId=document.getElementById('lg-id').value.trim();
  const name=document.getElementById('lg-name').value.trim();
  const errEl=document.getElementById('login-err');
  if(!classNum||!studentId||!name){errEl.textContent='모든 항목을 입력해 주세요.';return;}
  errEl.textContent='';
  student={studentId,name,classNum};
  localStorage.setItem(LS_STU,JSON.stringify(student));

  // Firestore에서 기존 데이터 병합
  try{
    const snap=await getDoc(doc(db,'interview_joseon_answers',studentId));
    if(snap.exists()){
      const d=snap.data();
      if(d.charId&&d.answers){
        const all=loadLocalAnswers();
        all[d.charId]={...d.answers,...(all[d.charId]||{})};
        localStorage.setItem(LS_ANS,JSON.stringify(all));
      }
      if(d.charId&&d.deepQuestion){
        const deep=loadLocalDeep();
        if(!deep[d.charId])deep[d.charId]=d.deepQuestion;
        localStorage.setItem(LS_DEEP,JSON.stringify(deep));
      }
    }
  }catch(e){}

  enterSelect();
}

function enterSelect(){
  document.getElementById('student-bar-text').textContent=`${student.classNum}반 · ${student.studentId} · ${student.name}`;
  renderGrid();
  showScreen('screen-select');
}

document.getElementById('change-btn').addEventListener('click',()=>{
  student=null;
  localStorage.removeItem(LS_STU);
  showScreen('screen-login');
});

/* ── 인물 그리드 ── */
function renderGrid(){
  const localAns=loadLocalAnswers();
  document.getElementById('char-grid').innerHTML=CONTENT.characters.map((c,i)=>{
    const done=localAns[c.id]&&Object.values(localAns[c.id]).some(v=>v&&v.trim());
    return `<button class="char-card${done?' done':''}" data-idx="${i}">
      ${done?'<span class="char-done-badge">작성함</span>':''}
      <div class="char-avatar">${c.emoji}</div>
      <div class="char-name">${c.name}</div>
      <div class="char-role">${c.role}</div>
    </button>`;
  }).join('');
  document.getElementById('char-grid').querySelectorAll('.char-card').forEach(btn=>{
    btn.addEventListener('click',()=>openInterview(+btn.dataset.idx));
  });
}

/* ── 인터뷰 ── */
function openInterview(idx){
  currentCharIdx=idx;
  const c=CONTENT.characters[idx];
  const charAns=loadLocalAnswers()[c.id]||{};
  const deepVal=loadLocalDeep()[c.id]||'';

  document.getElementById('iv-avatar').textContent=c.emoji;
  document.getElementById('iv-name').textContent=c.name;
  document.getElementById('iv-role').textContent=c.role;

  const list=document.getElementById('qa-list');
  list.innerHTML=c.questions.map((q,i)=>`
    <div class="qa-item" data-i="${i}">
      <button class="qa-q" type="button">
        <span class="qa-num">${i+1}</span>
        <span class="qa-qtext">${escHtml(q)}</span>
        <span class="qa-toggle">+</span>
      </button>
      <div class="qa-body">
        <textarea class="qa-textarea" placeholder="${escHtml(c.name)}의 입장이 되어 이 질문에 어떻게 답할지 상상해서 적어보세요.">${escHtml(charAns[i]||'')}</textarea>
        <div class="save-hint"></div>
      </div>
    </div>
  `).join('');

  list.querySelectorAll('.qa-item').forEach(item=>{
    const qBtn=item.querySelector('.qa-q');
    const toggleEl=item.querySelector('.qa-toggle');
    qBtn.addEventListener('click',()=>{
      const wasOpen=item.classList.contains('open');
      list.querySelectorAll('.qa-item.open').forEach(o=>{o.classList.remove('open');o.querySelector('.qa-toggle').textContent='+';});
      if(!wasOpen){item.classList.add('open');toggleEl.textContent='−';}
    });
    const ta=item.querySelector('.qa-textarea');
    const hint=item.querySelector('.save-hint');
    let t=null;
    ta.addEventListener('input',()=>{
      saveLocalAnswer(c.id,+item.dataset.i,ta.value);
      clearTimeout(t);
      t=setTimeout(()=>{scheduleFS(c.id);showHint(hint,'저장됨');},500);
    });
  });

  // 심화 질문
  const deepTA=document.getElementById('deep-textarea');
  const deepHint=document.getElementById('deep-hint');
  deepTA.value=deepVal;
  deepHint.textContent='';deepHint.classList.remove('show');
  let dt=null;
  deepTA.oninput=()=>{
    saveLocalDeep(c.id,deepTA.value);
    clearTimeout(dt);
    dt=setTimeout(()=>{scheduleFS(c.id);showHint(deepHint,'저장됨');},500);
  };

  showScreen('screen-interview');
}

document.getElementById('iv-back-btn').addEventListener('click',()=>{
  renderGrid();showScreen('screen-select');
});

/* ── Init ── */
async function init(){
  try{
    const snap=await getDoc(doc(db,'settings','interview_content'));
    if(snap.exists()&&Array.isArray(snap.data().characters)&&snap.data().characters.length)
      CONTENT=snap.data();
  }catch(e){}

  document.getElementById('load-msg').style.display='none';

  try{
    const saved=JSON.parse(localStorage.getItem(LS_STU));
    if(saved?.studentId&&saved?.name&&saved?.classNum){
      student=saved;
      enterSelect();return;
    }
  }catch(e){}
  showScreen('screen-login');
}
init();
</script>
