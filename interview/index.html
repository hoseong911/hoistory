<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>조선의 기틀을 만든 자들</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
@font-face{font-family:'Paperlogy';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');font-weight:700;font-display:swap}
@font-face{font-family:'Paperlogy';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');font-weight:900;font-display:swap}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --canvas:#FAFAF9;--surface:#F4F3EE;
  --hairline:#E5E4DF;--hairline-soft:#ECEAE4;
  --ink:#0A1317;--sub:#6B7280;--stone:#C4C4C4;
  --primary:#1E3A8A;--primary-deep:#172554;--primary-soft:rgba(30,58,138,0.09);--primary-m:rgba(30,58,138,0.18);
  --accent:#2DD4BF;--accent-deep:#0F766E;--accent-l:rgba(45,212,191,0.12);
  --pass:#16A34A;--pass-l:rgba(22,163,74,0.1);
  --insuf:#DC2626;--insuf-l:rgba(220,38,38,0.09);
  --shadow:rgba(20,22,26,0.22) 0px 1px 5px 0px;
  --shadow-lg:rgba(20,22,26,0.22) 0px 8px 28px 0px;
}
html,body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--surface);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
body{padding-bottom:60px}
.wrap{max-width:680px;margin:0 auto;padding:0 16px}

/* ── 공통 버튼 ── */
.btn{padding:11px 22px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-deep)}
.btn-accent{background:var(--accent-l);color:var(--accent-deep);border:1.5px solid rgba(45,212,191,.3)}.btn-accent:hover{background:rgba(45,212,191,.2)}
.btn-ghost{background:none;border:1.5px solid var(--hairline);color:var(--sub)}.btn-ghost:hover{border-color:var(--stone);color:var(--ink)}
.btn-danger{background:var(--insuf-l);color:var(--insuf);border:1.5px solid rgba(220,38,38,.2)}
.btn-full{width:100%;justify-content:center}
.btn-back{display:inline-flex;align-items:center;gap:5px;background:none;border:none;font-family:inherit;font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;padding:6px 0;margin-bottom:14px}
.btn-back:hover{color:var(--ink)}

/* ── 스크린 공통 ── */
.screen{display:none;flex-direction:column;gap:14px;padding-top:28px;padding-bottom:20px}
.screen.active{display:flex}

/* ─────────── 표지 ─────────── */
#screen-cover{align-items:center;justify-content:center;min-height:calc(100vh - 40px);text-align:center;gap:0;padding-top:0;padding-bottom:0}
.cover-inner{background:linear-gradient(155deg,var(--primary) 0%,var(--primary-deep) 100%);border-radius:32px;padding:64px 36px;width:100%;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.cover-inner::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.cover-eyebrow{font-family:'Gowun Batang',serif;font-size:14px;color:rgba(255,255,255,.65);letter-spacing:.08em;margin-bottom:18px}
.cover-title{font-family:'Paperlogy',sans-serif;font-weight:900;font-size:28px;color:#fff;line-height:1.35;word-break:keep-all;margin-bottom:10px}
.cover-sub{font-size:14px;color:rgba(255,255,255,.65);line-height:1.7;word-break:keep-all;margin-bottom:36px}
.cover-student{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border-radius:100px;padding:8px 16px;font-size:13px;font-weight:700;color:#fff;margin-bottom:32px}
.cover-dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.cover-start-btn{background:#fff;color:var(--primary);font-family:'Paperlogy',sans-serif;font-weight:700;font-size:16px;border:none;cursor:pointer;padding:14px 48px;border-radius:14px;transition:.15s;box-shadow:0 4px 18px rgba(0,0,0,.2)}
.cover-start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.25)}
.cover-no-login{background:rgba(255,255,255,.1);border-radius:12px;padding:14px 20px;font-size:13px;color:rgba(255,255,255,.8);line-height:1.6}

/* ─────────── 인물 선택 ─────────── */
.select-greeting{text-align:center;font-size:14px;color:var(--sub)}
.char-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:420px){.char-grid{grid-template-columns:1fr}}
.char-card{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:24px;padding:22px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;text-align:center;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s;font-family:inherit;position:relative}
.char-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.char-card.done{border-color:var(--accent)}
.char-done-tag{position:absolute;top:12px;right:12px;background:var(--accent-l);color:var(--accent-deep);font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px}
.char-avatar{width:72px;height:72px;border-radius:20px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-size:34px}
.char-name{font-family:'Paperlogy',sans-serif;font-weight:700;font-size:17px}
.char-role{font-size:12px;color:var(--sub);font-weight:600;line-height:1.4;word-break:keep-all}

/* ─────────── 인터뷰 ─────────── */
.iv-head{display:flex;align-items:center;gap:14px;background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:22px;padding:16px 18px;box-shadow:var(--shadow)}
.iv-avatar{width:52px;height:52px;border-radius:14px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.iv-name{font-family:'Paperlogy',sans-serif;font-weight:700;font-size:18px}
.iv-role{font-size:12px;color:var(--sub);font-weight:600;margin-top:2px}
.iv-notice{background:var(--primary-soft);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--primary);font-weight:600;line-height:1.55;word-break:keep-all}

.qa-wrap{display:flex;flex-direction:column;gap:12px}
.qa-block{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:18px;padding:18px;box-shadow:var(--shadow)}
.qa-num-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.qa-num{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;font-family:'Paperlogy',sans-serif;font-weight:900;font-size:12px;display:flex;align-items:center;justify-content:center;margin-top:1px}
.qa-q{font-size:14.5px;font-weight:600;line-height:1.55;word-break:keep-all}
.qa-ta{width:100%;min-height:100px;padding:11px 13px;border:1.5px solid var(--hairline);border-radius:10px;font-family:inherit;font-size:14px;line-height:1.6;color:var(--ink);background:var(--surface);outline:none;resize:vertical;transition:border-color .2s}
.qa-ta:focus{border-color:var(--primary)}
.qa-ta::placeholder{color:var(--stone)}
.qa-char-hint{font-size:12px;color:var(--sub);margin-top:6px;font-style:italic}

/* ─────────── AI 피드백 ─────────── */
.ai-loading{display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px 20px;text-align:center}
.ai-spinner{width:44px;height:44px;border:3px solid var(--hairline);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-loading-text{font-size:14px;color:var(--sub);font-weight:600}
.ai-result-wrap{display:flex;flex-direction:column;gap:10px}
.ai-q-result{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:16px;padding:16px;box-shadow:var(--shadow)}
.ai-q-label{font-size:12px;font-weight:800;color:var(--sub);margin-bottom:6px}
.ai-answer-preview{font-size:13px;color:var(--ink);line-height:1.55;margin-bottom:10px;padding:8px 10px;background:var(--surface);border-radius:8px;word-break:break-word}
.ai-feedback-row{display:flex;align-items:flex-start;gap:8px}
.ai-badge{flex-shrink:0;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:800}
.ai-badge.pass{background:var(--pass-l);color:var(--pass)}
.ai-badge.insuf{background:var(--insuf-l);color:var(--insuf)}
.ai-feedback-text{font-size:13px;color:var(--sub);line-height:1.6;word-break:keep-all}
.ai-overall{border-radius:16px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.ai-overall.pass{background:var(--pass-l);border:1.5px solid rgba(22,163,74,.2)}
.ai-overall.insuf{background:var(--insuf-l);border:1.5px solid rgba(220,38,38,.2)}
.ai-overall-label{font-family:'Paperlogy',sans-serif;font-weight:700;font-size:15px}
.ai-overall.pass .ai-overall-label{color:var(--pass)}
.ai-overall.insuf .ai-overall-label{color:var(--insuf)}
.ai-overall-desc{font-size:13px;color:var(--sub);margin-top:3px;word-break:keep-all}
.ai-overall-icon{font-size:32px;flex-shrink:0}
.ai-action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ─────────── 제출 후 메뉴 ─────────── */
.post-header{text-align:center;padding:20px 0 8px}
.post-title{font-family:'Paperlogy',sans-serif;font-weight:900;font-size:20px;margin-bottom:6px}
.post-sub{font-size:13px;color:var(--sub)}
.post-badge{display:inline-block;padding:4px 12px;border-radius:100px;font-size:12px;font-weight:800;margin-bottom:14px}
.post-badge.pass{background:var(--pass-l);color:var(--pass)}
.post-badge.insuf{background:var(--insuf-l);color:var(--insuf)}
.post-menu{display:flex;flex-direction:column;gap:10px}
.post-menu-btn{display:flex;align-items:center;gap:14px;background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:18px;padding:18px 20px;cursor:pointer;font-family:inherit;text-align:left;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s}
.post-menu-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.post-menu-icon{width:48px;height:48px;border-radius:14px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.post-menu-title{font-family:'Paperlogy',sans-serif;font-weight:700;font-size:15px;margin-bottom:3px}
.post-menu-desc{font-size:12px;color:var(--sub);line-height:1.5;word-break:keep-all}

/* ─────────── 심화 질문 작성 ─────────── */
.deep-char-tabs{display:flex;gap:8px;flex-wrap:wrap}
.deep-char-tab{padding:8px 14px;border-radius:100px;border:1.5px solid var(--hairline);background:var(--canvas);font-family:inherit;font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;transition:.15s}
.deep-char-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.deep-section-card{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:18px;padding:18px;box-shadow:var(--shadow)}
.deep-section-label{font-family:'Paperlogy',sans-serif;font-weight:700;font-size:15px;color:var(--accent-deep);margin-bottom:6px}
.deep-hint{font-size:13px;color:var(--sub);line-height:1.55;margin-bottom:12px;word-break:keep-all}
.save-hint{font-size:12px;color:var(--sub);margin-top:6px;height:14px;transition:color .2s}
.save-hint.show{color:var(--accent-deep);font-weight:700}

/* ─────────── 친구 답변 보기 ─────────── */
.peer-filter{display:flex;gap:6px;flex-wrap:wrap}
.peer-filter-btn{padding:6px 14px;border-radius:100px;border:1.5px solid var(--hairline);background:var(--canvas);font-family:inherit;font-size:12px;font-weight:700;color:var(--sub);cursor:pointer}
.peer-filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

.comment-list{display:flex;flex-direction:column;gap:10px}
.comment-card{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:18px;overflow:hidden;box-shadow:var(--shadow)}
.comment-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
.comment-head:hover{background:var(--surface)}
.comment-avatar{width:40px;height:40px;border-radius:12px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.comment-info{flex:1}
.comment-name{font-weight:800;font-size:14px}
.comment-meta{font-size:12px;color:var(--sub);margin-top:1px}
.comment-preview{font-size:12px;color:var(--sub);margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:200px}
.comment-toggle{font-size:16px;color:var(--stone)}
.comment-card.open .comment-toggle{color:var(--primary)}
.comment-body{display:none;border-top:1px solid var(--hairline-soft);padding:14px 16px}
.comment-card.open .comment-body{display:block}
.comment-ans-block{margin-bottom:12px}
.comment-ans-q{font-size:11px;font-weight:800;color:var(--primary);margin-bottom:4px}
.comment-ans-text{font-size:13px;color:var(--ink);line-height:1.65;word-break:break-word}

/* ─────────── 친구 심화질문 보기 ─────────── */
.peer-deep-list{display:flex;flex-direction:column;gap:10px}
.deep-card{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:18px;padding:16px;box-shadow:var(--shadow)}
.deep-card-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.deep-card-emoji{font-size:18px}
.deep-card-who{font-size:12px;color:var(--sub);font-weight:600}
.deep-card-q{font-size:14.5px;font-weight:700;line-height:1.6;color:var(--ink);word-break:keep-all;margin-bottom:12px}
.deep-card-ans-area{display:none;flex-direction:column;gap:8px}
.deep-card.expanded .deep-card-ans-area{display:flex}
.deep-card-ans-ta{width:100%;min-height:80px;padding:10px 12px;border:1.5px solid var(--hairline);border-radius:10px;font-family:inherit;font-size:13.5px;line-height:1.6;color:var(--ink);background:var(--surface);outline:none;resize:vertical}
.deep-card-ans-ta:focus{border-color:var(--primary)}
.deep-card-btn-row{display:flex;gap:8px}

.no-data{text-align:center;padding:40px 20px;color:var(--stone);font-size:14px}
</style>
</head>
<body>

<div class="wrap">

  <!-- 표지 -->
  <div class="screen active" id="screen-cover">
    <div class="cover-inner">
      <div class="cover-eyebrow">생각하고 활동하고 질문하는 역사 수업</div>
      <div class="cover-title">조선의 기틀을<br>만든 자들</div>
      <div class="cover-sub">조선을 세운 인물들과 직접 인터뷰해 보세요.<br>그들의 결정 뒤에 숨겨진 이야기를 찾아봅시다.</div>
      <div id="cover-student-chip" class="cover-student" style="display:none">
        <span class="cover-dot"></span>
        <span id="cover-student-text"></span>
      </div>
      <div id="cover-no-login" class="cover-no-login" style="display:none">
        LMS 허브에서 로그인 후 이 페이지에 접속해 주세요.
      </div>
      <br>
      <button class="cover-start-btn" id="cover-start-btn" style="display:none">시작하기 →</button>
    </div>
  </div>

  <!-- 인물 선택 -->
  <div class="screen" id="screen-select">
    <p class="select-greeting" id="select-greeting"></p>
    <div class="char-grid" id="char-grid"></div>
  </div>

  <!-- 인터뷰 (답변 작성) -->
  <div class="screen" id="screen-interview">
    <button class="btn-back" id="iv-back-btn">← 인물 선택으로</button>
    <div class="iv-head">
      <div class="iv-avatar" id="iv-avatar"></div>
      <div>
        <div class="iv-name" id="iv-name"></div>
        <div class="iv-role" id="iv-role"></div>
      </div>
    </div>
    <div class="iv-notice">이 인물이라면 어떻게 대답할지 상상하며 작성해 보세요. 답변이 완성되면 AI 피드백을 받을 수 있어요.</div>
    <div class="qa-wrap" id="qa-wrap"></div>
    <button class="btn btn-primary btn-full" id="ai-check-btn">AI 피드백 받기 →</button>
  </div>

  <!-- AI 피드백 -->
  <div class="screen" id="screen-ai">
    <button class="btn-back" id="ai-back-btn">← 답변 수정하기</button>
    <div id="ai-loading" class="ai-loading">
      <div class="ai-spinner"></div>
      <div class="ai-loading-text">답변을 분석하고 있어요...</div>
    </div>
    <div id="ai-result" style="display:none;flex-direction:column;gap:12px"></div>
  </div>

  <!-- 제출 후 메뉴 -->
  <div class="screen" id="screen-post">
    <div class="post-header">
      <div class="post-title">제출 완료!</div>
      <div id="post-status-badge" class="post-badge"></div>
      <div class="post-sub">다음으로 무엇을 할까요?</div>
    </div>
    <div class="post-menu">
      <button class="post-menu-btn" id="menu-deep">
        <div class="post-menu-icon">✏️</div>
        <div>
          <div class="post-menu-title">심화 질문 작성하기</div>
          <div class="post-menu-desc">다른 인물들에게도 내가 직접 질문을 던져보세요</div>
        </div>
      </button>
      <button class="post-menu-btn" id="menu-peer-ans">
        <div class="post-menu-icon">💬</div>
        <div>
          <div class="post-menu-title">다른 친구들의 답변 보기</div>
          <div class="post-menu-desc">같은 인물을 선택한 친구들은 어떻게 답했을까요?</div>
        </div>
      </button>
      <button class="post-menu-btn" id="menu-peer-deep">
        <div class="post-menu-icon">❓</div>
        <div>
          <div class="post-menu-title">다른 친구들의 심화 질문 보기</div>
          <div class="post-menu-desc">친구들의 질문을 보고 나도 답해볼 수 있어요</div>
        </div>
      </button>
    </div>
  </div>

  <!-- 심화 질문 작성 -->
  <div class="screen" id="screen-deep">
    <button class="btn-back" id="deep-back-btn">← 돌아가기</button>
    <div class="iv-head" id="deep-iv-head">
      <div class="iv-avatar" id="deep-iv-avatar"></div>
      <div>
        <div class="iv-name" id="deep-iv-name"></div>
        <div class="iv-role" id="deep-iv-role"></div>
      </div>
    </div>
    <div class="deep-char-tabs" id="deep-char-tabs"></div>
    <div class="deep-section-card">
      <div class="deep-section-label">✏️ 나만의 심화 질문</div>
      <p class="deep-hint">이 인물에게 묻고 싶은 질문을 만들어보세요. 역사적 판단, 가치관, 만약에 상황 등을 자유롭게 떠올려보세요!</p>
      <textarea id="deep-ta" class="qa-ta" style="min-height:90px" placeholder="예) 만약 당시 결정을 다시 내릴 수 있다면 어떻게 하시겠습니까?"></textarea>
      <div class="save-hint" id="deep-save-hint"></div>
    </div>
    <button class="btn btn-primary btn-full" id="deep-submit-btn">심화 질문 제출하기</button>
  </div>

<script type="module">

  {id:'sejong',name:'세종',role:'조선 4대 국왕',emoji:'📖',questions:["아버님(태종)께서 만들어 놓으신 강력한 6조 직계제를 폐지하고, 다시 영의정 등 3정승과 국사를 논의하는 '의정부 서사제'를 실시하신 이유가 무엇입니까?",'집현전을 설치하고 젊은 학자들과 밤낮으로 토론(경연)을 하신다고 들었습니다. 굳이 신하들과 피곤하게 토론하시는 이유가 있나요?','만약 신하들이 전하의 의견에 끝까지 반대한다면, 그때는 어떻게 결정하실 생각이십니까?']},

];

/* ─── State ─── */
let CHARS=DEFAULT_CHARS;
let student=null; // {studentId,name,classNum}
let selIdx=null;
let answers=['','',''];
let aiResult=null; // {items:[{ok,feedback}],overallOk}
let submissionStatus=null;
let deepCharIdx=null;
let deepQuestions={}; // charId → text (local draft)
let peerFilter='전체';
let pdFilter='전체';

function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function showHint(el,t){el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1400);}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

/* ─── LMS 로그인 연동 ─── */
function getStudentFromLMS(){
  const sid=localStorage.getItem('lms_autosave_sid');
  const sname=localStorage.getItem('lms_autosave_sname');
  if(!sid||!sname||sid.length<3)return null;
  const classNum=sid.charAt(2); // 5자리: 30101 → 3번째 자리 = 반
  return{studentId:sid,name:sname,classNum};
}

/* ─── AI 피드백 (휴리스틱) ─── */
const FEEDBACK_INSUF_SHORT="답변이 너무 짧아요. 이 인물이라면 어떤 이유로 그런 판단을 내렸을지 더 구체적으로 써보세요.";
const FEEDBACK_INSUF_MID="내용은 있지만 더 깊이 있는 분석이 필요해요. 역사적 배경이나 인물의 처지를 함께 담아보세요.";
const FEEDBACK_PASS="충분한 내용의 답변이에요. 인물의 입장을 잘 표현했습니다!";

function evalAnswer(ans){
  const t=ans.trim();
  if(t.length<15)return{ok:false,fb:FEEDBACK_INSUF_SHORT};
  if(t.length<60)return{ok:false,fb:FEEDBACK_INSUF_MID};
  return{ok:true,fb:FEEDBACK_PASS};
}

async function runAI(){
  // 로딩 연출 (1.2초)
  await new Promise(r=>setTimeout(r,1200));
  const items=answers.map(a=>evalAnswer(a));
  const overallOk=items.every(i=>i.ok);
  return{items,overallOk};
}

/* ─── 표지 ─── */
async function initCover(){
  try{
    const snap=await getDoc(doc(db,'settings','interview_content'));
    if(snap.exists()&&Array.isArray(snap.data().characters)&&snap.data().characters.length)
      CHARS=snap.data().characters;
  }catch(e){}

  student=getStudentFromLMS();
  if(student){
    document.getElementById('cover-student-text').textContent=`${student.classNum}반 · ${student.studentId} · ${student.name}`;
    document.getElementById('cover-student-chip').style.display='inline-flex';
    document.getElementById('cover-start-btn').style.display='inline-block';
  }else{
    document.getElementById('cover-no-login').style.display='block';
  }
}

document.getElementById('cover-start-btn').addEventListener('click',()=>{
  document.getElementById('select-greeting').textContent=`${student.name} 학생, 인터뷰할 인물을 선택하세요!`;
  renderCharGrid();
  showScreen('screen-select');
});

/* ─── 인물 선택 ─── */
function renderCharGrid(){
  document.getElementById('char-grid').innerHTML=CHARS.map((c,i)=>`
    <button class="char-card" data-i="${i}">
      <div class="char-avatar">${c.emoji}</div>
      <div class="char-name">${esc(c.name)}</div>
      <div class="char-role">${esc(c.role)}</div>
    </button>
  `).join('');
  document.querySelectorAll('.char-card').forEach(btn=>{
    btn.addEventListener('click',()=>openInterview(+btn.dataset.i));
  });
}

/* ─── 인터뷰 ─── */
function openInterview(idx){
  selIdx=idx;
  answers=['','',''];
  const c=CHARS[idx];
  document.getElementById('iv-avatar').textContent=c.emoji;
  document.getElementById('iv-name').textContent=c.name;
  document.getElementById('iv-role').textContent=c.role;

  document.getElementById('qa-wrap').innerHTML=c.questions.map((q,i)=>`
    <div class="qa-block">
      <div class="qa-num-row">
        <span class="qa-num">${i+1}</span>
        <span class="qa-q">${esc(q)}</span>
      </div>
      <textarea class="qa-ta" data-i="${i}" placeholder="${esc(c.name)}의 입장에서 답변을 작성해보세요."></textarea>
      <div class="qa-char-hint">${esc(c.name)}이라면 어떻게 생각했을까요?</div>
    </div>
  `).join('');

  document.querySelectorAll('.qa-ta').forEach(ta=>{
    ta.addEventListener('input',()=>{ answers[+ta.dataset.i]=ta.value; });
  });

document.getElementById('iv-back-btn').addEventListener('click',()=>showScreen('screen-select'));

/* ─── AI 피드백 ─── */
document.getElementById('ai-check-btn').addEventListener('click',async()=>{
  if(answers.every(a=>!a.trim())){alert('답변을 하나 이상 작성해주세요.');return;}
  showScreen('screen-ai');
  document.getElementById('ai-loading').style.display='flex';
  document.getElementById('ai-result').style.display='none';

  aiResult=await runAI();

  document.getElementById('ai-loading').style.display='none';
  const c=CHARS[selIdx];
  const resultEl=document.getElementById('ai-result');
  resultEl.innerHTML='';

  const itemsHtml=aiResult.items.map((item,i)=>`
    <div class="ai-q-result">
      <div class="ai-q-label">Q${i+1}. ${esc(c.questions[i])}</div>
      <div class="ai-answer-preview">${esc(answers[i])||'<em style="color:var(--stone)">미작성</em>'}</div>
      <div class="ai-feedback-row">
        <span class="ai-badge ${item.ok?'pass':'insuf'}">${item.ok?'통과':'미흡'}</span>
        <span class="ai-feedback-text">${item.fb}</span>
      </div>
    </div>
  `).join('');

  const overallHtml=`
    <div class="ai-overall ${aiResult.overallOk?'pass':'insuf'}">
      <div>
        <div class="ai-overall-label">${aiResult.overallOk?'전체 통과':'보완이 필요해요'}</div>
        <div class="ai-overall-desc">${aiResult.overallOk?'모든 답변이 충분해요. 제출해 보세요!':'일부 답변을 더 보완하면 더 좋은 인터뷰가 될 거예요.'}</div>
      </div>
      <div class="ai-overall-icon">${aiResult.overallOk?'✅':'📝'}</div>
    </div>
    <div class="ai-action-row">
      <button class="btn btn-ghost" id="rewrite-btn">← 다시 쓰기</button>
      <button class="btn ${aiResult.overallOk?'btn-primary':'btn-danger'}" id="submit-btn">${aiResult.overallOk?'제출하기':'그래도 제출하기'}</button>
    </div>
  `;

  resultEl.innerHTML=itemsHtml+overallHtml;
  resultEl.style.display='flex';

  document.getElementById('rewrite-btn').addEventListener('click',()=>{
    showScreen('screen-interview');
    // 기존 텍스트에어리어에 answers 복원
    document.querySelectorAll('.qa-ta').forEach(ta=>{ta.value=answers[+ta.dataset.i]||'';});
  });

  document.getElementById('submit-btn').addEventListener('click',doSubmit);
});

document.getElementById('ai-back-btn').addEventListener('click',()=>{
  showScreen('screen-interview');
  document.querySelectorAll('.qa-ta').forEach(ta=>{ta.value=answers[+ta.dataset.i]||'';});
});

/* ─── 제출 ─── */
async function doSubmit(){
  submissionStatus=aiResult?.overallOk?'pass':'insufficient';
  const c=CHARS[selIdx];
  const ansMap={};
  answers.forEach((a,i)=>ansMap[i]=a);
  try{
    await setDoc(doc(db,'interview_joseon_answers',student.studentId),{
      studentId:student.studentId,name:student.name,classNum:student.classNum,
      charId:c.id,charName:c.name,
      answers:ansMap,
      submittedAt:serverTimestamp(),
      status:submissionStatus
    },{merge:true});
  }catch(e){}

  const badge=document.getElementById('post-status-badge');
  badge.textContent=submissionStatus==='pass'?'통과':'미흡';
  badge.className='post-badge '+(submissionStatus==='pass'?'pass':'insuf');
  showScreen('screen-post');
}

/* ─── 제출 후 메뉴 ─── */
document.getElementById('menu-deep').addEventListener('click',()=>{
  deepCharIdx=selIdx;
  renderDeepScreen();
  showScreen('screen-deep');
});
document.getElementById('menu-peer-ans').addEventListener('click',async()=>{
  await loadPeerAnswers();
  showScreen('screen-peer-ans');
});
document.getElementById('menu-peer-deep').addEventListener('click',async()=>{
  await loadPeerDeep();
  showScreen('screen-peer-deep');
});

document.getElementById('deep-back-btn').addEventListener('click',()=>showScreen('screen-post'));
document.getElementById('pa-back-btn').addEventListener('click',()=>showScreen('screen-post'));
document.getElementById('pd-back-btn').addEventListener('click',()=>showScreen('screen-post'));

/* ─── 심화 질문 작성 ─── */
function renderDeepScreen(){
  const c=CHARS[deepCharIdx];
  document.getElementById('deep-iv-avatar').textContent=c.emoji;
  document.getElementById('deep-iv-name').textContent=c.name;
  document.getElementById('deep-iv-role').textContent=c.role;

  document.getElementById('deep-char-tabs').innerHTML=CHARS.map((ch,i)=>`
    <button class="deep-char-tab${i===deepCharIdx?' active':''}" data-i="${i}">${ch.emoji} ${esc(ch.name)}</button>
  `).join('');
  document.querySelectorAll('.deep-char-tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      deepCharIdx=+btn.dataset.i;
      renderDeepScreen();
    });
  });

  const ta=document.getElementById('deep-ta');
  ta.value=deepQuestions[c.id]||'';
  ta.oninput=()=>{deepQuestions[c.id]=ta.value;};
  document.getElementById('deep-save-hint').textContent='';
}

document.getElementById('deep-submit-btn').addEventListener('click',async()=>{
  const c=CHARS[deepCharIdx];
  const q=(deepQuestions[c.id]||'').trim();
  if(!q){alert('질문을 작성해 주세요.');return;}
  try{
    await addDoc(collection(db,'interview_joseon_deep'),{
      studentId:student.studentId,name:student.name,classNum:student.classNum,
      charId:c.id,charName:c.name,emoji:c.emoji,
      question:q,createdAt:serverTimestamp()
    });
    deepQuestions[c.id]='';
    document.getElementById('deep-ta').value='';
    showHint(document.getElementById('deep-save-hint'),'제출 완료!');
  }catch(e){alert('오류: '+e.message);}
});

/* ─── 친구들 답변 보기 ─── */
let peerAnswers=[];
async function loadPeerAnswers(){
  try{
    const snap=await getDocs(collection(db,'interview_joseon_answers'));
    peerAnswers=[];
    snap.forEach(d=>{
      const data=d.data();
      if(data.studentId!==student.studentId&&data.charId)
        peerAnswers.push(data);
    });
  }catch(e){}
  peerFilter='전체';
  renderPeerAnswers();
}

function renderPeerAnswers(){
  const chars=['전체',...new Set(peerAnswers.map(p=>p.charId))];
  const filterEl=document.getElementById('pa-filter');
  filterEl.innerHTML=chars.map(cid=>{
    const ch=CHARS.find(c=>c.id===cid);
    const label=cid==='전체'?'전체':(ch?`${ch.emoji} ${ch.name}`:cid);
    return`<button class="peer-filter-btn${cid===peerFilter?' active':''}" data-c="${cid}">${label}</button>`;
  }).join('');
  filterEl.querySelectorAll('.peer-filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{peerFilter=btn.dataset.c;renderPeerAnswers();});
  });

  const filtered=peerFilter==='전체'?peerAnswers:peerAnswers.filter(p=>p.charId===peerFilter);
  const listEl=document.getElementById('pa-list');
  if(!filtered.length){listEl.innerHTML='<div class="no-data">아직 친구들의 답변이 없어요.</div>';return;}
  const ch=CHARS.find(c=>c.id===(filtered[0]?.charId));

  listEl.innerHTML=filtered.map((p,i)=>{
    const pch=CHARS.find(c=>c.id===p.charId);
    const ans=p.answers||{};
    const qs=pch?.questions||[];
    const preview=Object.values(ans).find(a=>a&&a.trim())||'';
    return`<div class="comment-card" data-i="${i}">
      <div class="comment-head">
        <div class="comment-avatar">${pch?.emoji||'👤'}</div>
        <div class="comment-info">
          <div class="comment-name">${esc(p.name)}</div>
          <div class="comment-meta">${esc(p.classNum)}반 · ${esc(pch?.name||p.charId)}</div>
          <div class="comment-preview">${esc(preview.substring(0,40))}${preview.length>40?'...':''}</div>
        </div>
        <span class="comment-toggle">▸</span>
      </div>
      <div class="comment-body">
        ${qs.map((q,qi)=>`
          <div class="comment-ans-block">
            <div class="comment-ans-q">Q${qi+1}. ${esc(q)}</div>
            <div class="comment-ans-text">${esc(ans[qi]||'(미작성)')}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }).join('');

  listEl.querySelectorAll('.comment-head').forEach(head=>{
    head.addEventListener('click',()=>{
      const card=head.closest('.comment-card');
      const isOpen=card.classList.contains('open');
      listEl.querySelectorAll('.comment-card.open').forEach(c=>{c.classList.remove('open');c.querySelector('.comment-toggle').textContent='▸';});
      if(!isOpen){card.classList.add('open');head.querySelector('.comment-toggle').textContent='▾';}
    });
  });
}

/* ─── 친구들 심화질문 보기 ─── */
let peerDeepList=[];
async function loadPeerDeep(){
  try{
    const snap=await getDocs(collection(db,'interview_joseon_deep'));
    peerDeepList=[];
    snap.forEach(d=>{
      const data=d.data();
      if(data.studentId!==student.studentId)
        peerDeepList.push({id:d.id,...data});
    });
  }catch(e){}
  pdFilter='전체';
  renderPeerDeep();
}

function renderPeerDeep(){
  const chars=['전체',...new Set(peerDeepList.map(p=>p.charId))];
  const filterEl=document.getElementById('pd-filter');
  filterEl.innerHTML=chars.map(cid=>{
    const ch=CHARS.find(c=>c.id===cid);
    const label=cid==='전체'?'전체':(ch?`${ch.emoji} ${ch.name}`:cid);
    return`<button class="peer-filter-btn${cid===pdFilter?' active':''}" data-c="${cid}">${label}</button>`;
  }).join('');
  filterEl.querySelectorAll('.peer-filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{pdFilter=btn.dataset.c;renderPeerDeep();});
  });

  const filtered=pdFilter==='전체'?peerDeepList:peerDeepList.filter(p=>p.charId===pdFilter);
  const listEl=document.getElementById('pd-list');
  if(!filtered.length){listEl.innerHTML='<div class="no-data">아직 친구들의 심화 질문이 없어요.</div>';return;}

  listEl.innerHTML=filtered.map((p,i)=>`
    <div class="deep-card" data-i="${i}">
      <div class="deep-card-meta">
        <span class="deep-card-emoji">${esc(p.emoji||'🏛️')}</span>
        <span class="deep-card-who">${esc(p.charName)} · ${esc(p.name)} (${esc(p.classNum)}반)</span>
      </div>
      <div class="deep-card-q">${esc(p.question)}</div>
      <button class="btn btn-ghost" style="font-size:13px;padding:8px 16px" onclick="toggleDeepReply(this)">나도 답해보기 ▸</button>
      <div class="deep-card-ans-area">
        <textarea class="deep-card-ans-ta" placeholder="이 질문에 대한 내 생각을 자유롭게 써보세요..."></textarea>
        <div class="deep-card-btn-row">
          <button class="btn btn-ghost" style="font-size:12px;padding:7px 14px" onclick="toggleDeepReply(this.closest('.deep-card').querySelector('.btn-ghost'))">닫기</button>
        </div>
      </div>
    </div>
  `).join('');
}

window.toggleDeepReply=function(btn){
  const card=btn.closest('.deep-card');
  const expanded=card.classList.contains('expanded');
  card.classList.toggle('expanded');
  btn.textContent=expanded?'나도 답해보기 ▸':'닫기 ▴';
};
