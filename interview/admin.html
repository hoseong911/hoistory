<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인터뷰 어드민</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
@font-face{font-family:'Paperlogy';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');font-weight:700;font-display:swap}
@font-face{font-family:'Paperlogy';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');font-weight:900;font-display:swap}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --canvas:#FAFAF9;--surface:#F4F3EE;
  --hairline:#E5E4DF;--hairline-soft:#ECEAE4;
  --ink:#0A1317;--sub:#6B7280;--stone:#C4C4C4;
  --primary:#1E3A8A;--primary-deep:#172554;--primary-soft:rgba(30,58,138,0.09);--primary-m:rgba(30,58,138,0.15);
  --accent:#2DD4BF;--accent-deep:#0F766E;--accent-l:rgba(45,212,191,0.12);
  --pass:#16A34A;--pass-l:rgba(22,163,74,0.1);
  --insuf:#DC2626;--insuf-l:rgba(220,38,38,0.09);
  --pick:#7C3AED;--pick-l:rgba(124,58,237,0.1);
  --warn:#D97706;--warn-l:rgba(217,119,6,0.1);
  --shadow:rgba(20,22,26,0.2) 0px 1px 4px 0px;
}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--surface);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── 로그인 게이트 ── */
#gate-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.gate-card{width:100%;max-width:340px;background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:24px;padding:32px 28px;box-shadow:var(--shadow)}
.gate-logo{font-family:'Paperlogy',sans-serif;font-weight:900;font-size:18px;color:var(--primary);text-align:center;margin-bottom:6px}
.gate-sub{font-size:12px;color:var(--sub);text-align:center;margin-bottom:24px}
.gate-field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.gate-field label{font-size:12px;font-weight:700;color:var(--sub)}
.gate-input{width:100%;padding:11px 14px;border:1.5px solid var(--hairline);border-radius:10px;font-family:inherit;font-size:14px;color:var(--ink);background:var(--surface);outline:none;transition:border-color .2s}
.gate-input:focus{border-color:var(--primary)}
.gate-err{font-size:12px;color:#DC2626;min-height:16px;margin-bottom:4px}
.gate-btn{width:100%;padding:12px;border-radius:10px;background:var(--primary);color:#fff;font-family:'Paperlogy',sans-serif;font-weight:700;font-size:15px;border:none;cursor:pointer}
.gate-btn:hover{background:var(--primary-deep)}

/* ── 어드민 레이아웃 ── */
#gate-admin{display:none;flex-direction:column;min-height:100vh}
/* 3열 그리드: 로고/탭/로그아웃 각각을 명시적으로 지정한 칸에 고정한다.
   (주의) display:none인 그리드 아이템은 auto-placement에서 아예 빠져버려서, 로고·로그아웃을 숨기면
   유일하게 남은 탭이 1번 칸으로 밀려 들어가 "중앙정렬이 안 되는" 버그가 생긴다. grid-column을 직접 못박아 방지. */
.adm-header{background:var(--canvas);border-bottom:1px solid var(--hairline-soft);padding:0 28px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;height:54px;position:sticky;top:0;z-index:30}
.adm-logo{font-family:'Paperlogy',sans-serif;font-weight:900;font-size:16px;color:var(--primary);justify-self:start;grid-column:1}
.adm-tabs{display:flex;gap:2px;background:var(--surface);border:1px solid var(--hairline-soft);border-radius:10px;padding:3px;justify-self:center;grid-column:2}
.adm-tab{padding:6px 20px;border-radius:7px;font-family:inherit;font-size:13px;font-weight:700;color:var(--sub);background:none;border:none;cursor:pointer;transition:.15s}
.adm-tab.active{background:var(--primary);color:#fff}
.adm-logout{background:none;border:1.5px solid var(--hairline);border-radius:8px;padding:6px 14px;font-family:inherit;font-size:12px;font-weight:700;color:var(--sub);cursor:pointer;justify-self:end;grid-column:3}
/* lms/admin iframe에 embed된 경우 상위 어드민의 "목록으로"를 대신하는 버튼. 로그아웃 자리를 대신 차지한다 */
.adm-back{display:none;background:none;border:1.5px solid var(--hairline);border-radius:8px;padding:6px 14px;font-family:inherit;font-size:12px;font-weight:700;color:var(--sub);cursor:pointer;justify-self:end;grid-column:3}
.adm-back:hover{background:var(--surface)}
body.embedded .adm-back{display:inline-flex;align-items:center}
.adm-body{padding:24px 28px 60px;max-width:1100px;margin:0 auto;width:100%}
/* 중앙정렬은 박스/칩/카드 같은 덩어리 단위에만 적용한다(각 컨테이너의 justify-content:center 참고).
   박스 안 텍스트·라벨은 일반 정렬(좌측)로 두고, 버튼(확인류)만 중앙정렬한다. */
/* lms/admin iframe으로 embed된 경우: 이미 상위 어드민에 로그인되어 있으므로 로고·로그아웃은 숨긴다 */
body.embedded .adm-logo,body.embedded .adm-logout{display:none}

/* ── 탭 패널 ── */
.tab-panel{display:none}
.tab-panel.active{display:block}
.section-card{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:20px;padding:22px;margin-bottom:16px;box-shadow:var(--shadow)}
.section-title{font-family:'Paperlogy',sans-serif;font-weight:700;font-size:15px;color:var(--ink);margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* ── 버튼 ── */
.btn{padding:9px 18px;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-deep)}
.btn-accent{background:var(--accent-l);color:var(--accent-deep);border:1.5px solid rgba(45,212,191,.3)}.btn-accent:hover{background:rgba(45,212,191,.22)}
.btn-ghost{background:none;border:1.5px solid var(--hairline);color:var(--sub)}.btn-ghost:hover{border-color:var(--stone);color:var(--ink)}
.btn-danger{background:var(--insuf-l);color:var(--insuf);border:1.5px solid rgba(220,38,38,.2)}.btn-danger:hover{background:rgba(220,38,38,.16)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:7px}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:6px}

/* ── 인물 아코디언 : 나중에 일러스트가 들어갈 것을 감안해 2열 카드로 배치 ── */
#char-accordion{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:start}
@media(max-width:700px){#char-accordion{grid-template-columns:1fr}}
.char-row{border:1px solid var(--hairline-soft);border-radius:14px;overflow:hidden}
/* 펼친 인물 카드는 편집 필드가 많아 좁으면 답답하므로 그리드 두 칸을 모두 차지하게 확장 */
.char-row.open{grid-column:1 / -1}
.char-row-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;background:var(--canvas);user-select:none}
.char-row-head:hover{background:var(--surface)}
.char-emoji{font-size:22px;flex-shrink:0}
.char-thumb{width:26px;height:26px;border-radius:8px;object-fit:cover;flex-shrink:0}
.char-row-name{font-family:'Paperlogy',sans-serif;font-weight:700;font-size:15px;flex:1}
.char-row-role{font-size:12px;color:var(--sub)}
.char-row-toggle{font-size:18px;color:var(--stone)}
.char-row.open .char-row-toggle{color:var(--primary)}
.char-row-body{display:none;padding:0 16px 16px;border-top:1px solid var(--hairline-soft)}
.char-row.open .char-row-body{display:block}
/* 이름·역할·이미지 URL 한 줄 배치 */
.char-meta-row{display:grid;grid-template-columns:1fr 1fr 1.3fr;gap:8px;margin:12px 0 8px}
.meta-input{width:100%;padding:8px 10px;border:1.5px solid var(--hairline);border-radius:8px;font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface);outline:none}
.meta-input:focus{border-color:var(--primary)}
.q-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.q-item{display:flex;align-items:flex-start;gap:8px;text-align:left}
.q-num{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--primary-soft);color:var(--primary);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:7px}
.q-textarea{flex:1;padding:8px 10px;border:1.5px solid var(--hairline);border-radius:8px;font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface);outline:none;resize:vertical;min-height:54px;line-height:1.5}
.q-textarea:focus{border-color:var(--primary)}
.q-del-btn{flex-shrink:0;padding:6px 8px;border-radius:7px;background:none;border:1.5px solid var(--hairline);font-size:13px;cursor:pointer;color:var(--stone);margin-top:4px}
.q-del-btn:hover{color:var(--insuf);border-color:var(--insuf)}
.char-actions{display:flex;gap:8px;justify-content:center;margin-top:8px}

/* ── 통계 칩 : 칩 제목은 유지하고, 숫자 아래 붙던 중복 캡션만 제거(숫자 색으로 구분) ── */
.stats-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
.stat-chip{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:14px;padding:12px 18px;box-shadow:var(--shadow);text-align:center}
.stat-chip-label{font-family:'Pretendard',sans-serif;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px}
.stat-chip-val{font-family:'Paperlogy',sans-serif;font-weight:900;font-size:30px;line-height:1;color:var(--ink)}
.stat-chip.pick-chip .stat-chip-val{color:var(--pick)}
.stat-dual{display:flex;align-items:center;justify-content:center;gap:14px}
.stat-dual-val{font-family:'Paperlogy',sans-serif;font-weight:900;font-size:28px;line-height:1}

/* ── 반 필터 ── */
.class-filter{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.cf-btn{padding:7px 16px;border-radius:100px;border:1.5px solid var(--hairline);background:var(--canvas);font-family:inherit;font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;transition:.15s}
.cf-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ── 학생 카드 ── */
.student-list{display:flex;flex-direction:column;gap:8px}
.stu-card{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
.stu-head{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer}
.stu-head:hover{background:var(--surface)}
.stu-class-badge{flex-shrink:0;padding:3px 8px;border-radius:6px;background:var(--primary-soft);color:var(--primary);font-size:11px;font-weight:800}
.stu-info{flex:1;min-width:0}
.stu-name{font-weight:800;font-size:14px}
.stu-id{font-size:12px;color:var(--sub)}
.stu-char{font-size:12px;color:var(--sub);margin-left:6px}
.status-badge{flex-shrink:0;padding:4px 10px;border-radius:7px;font-size:11px;font-weight:800}
.sb-pending{background:var(--surface);color:var(--stone);border:1px solid var(--hairline)}
.sb-pass{background:var(--pass-l);color:var(--pass)}
.sb-insuf{background:var(--insuf-l);color:var(--insuf)}
.sb-pick{background:var(--pick-l);color:var(--pick)}
.stu-toggle{font-size:16px;color:var(--stone);flex-shrink:0}
.stu-card.open .stu-toggle{color:var(--primary)}
.stu-body{display:none;padding:0 16px 16px;border-top:1px solid var(--hairline-soft)}
.stu-card.open .stu-body{display:block}
.stu-status-btns{display:flex;gap:6px;justify-content:center;margin:12px 0 14px}
.ssb{padding:6px 14px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;border:1.5px solid transparent;cursor:pointer;transition:.15s}
.ssb-pass{background:var(--pass-l);color:var(--pass);border-color:rgba(22,163,74,.2)}.ssb-pass.active,.ssb-pass:hover{background:var(--pass);color:#fff}
.ssb-insuf{background:var(--insuf-l);color:var(--insuf);border-color:rgba(220,38,38,.2)}.ssb-insuf.active,.ssb-insuf:hover{background:var(--insuf);color:#fff}
.ssb-pick{background:var(--pick-l);color:var(--pick);border-color:rgba(124,58,237,.2)}.ssb-pick.active,.ssb-pick:hover{background:var(--pick);color:#fff}
.ans-block{margin-bottom:14px}
.ans-q-label{font-size:12px;font-weight:800;color:var(--primary);margin-bottom:4px}
.ans-text{font-size:13px;color:var(--ink);line-height:1.65;background:var(--surface);padding:10px 12px;border-radius:8px;white-space:pre-wrap;word-break:break-word}
.ans-empty{font-size:13px;color:var(--stone);font-style:italic;padding:10px 12px;background:var(--surface);border-radius:8px}
.deep-block{border-top:1px solid var(--hairline-soft);padding-top:12px;margin-top:4px}
.deep-q-label{font-size:12px;font-weight:800;color:var(--accent-deep);margin-bottom:4px}

.scoring-bar{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:28px}
.score-info{font-size:12px;color:var(--sub)}
.no-data{text-align:center;padding:40px 20px;color:var(--stone);font-size:14px}

/* ── 확인 모달 ── */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal-back.open{display:flex}
.modal-box{background:var(--canvas);border-radius:20px;padding:28px;max-width:380px;width:100%}
.modal-title{font-family:'Paperlogy',sans-serif;font-weight:700;font-size:16px;margin-bottom:10px}
.modal-desc{font-size:13px;color:var(--sub);line-height:1.6;margin-bottom:20px}
.modal-btns{display:flex;gap:8px;justify-content:center}

.loading-bar{display:none;height:3px;background:linear-gradient(90deg,var(--accent),var(--primary));border-radius:2px;animation:loading 1.2s ease-in-out infinite;margin-bottom:12px}
@keyframes loading{0%{opacity:.4;transform:scaleX(.3);transform-origin:left}50%{opacity:1;transform:scaleX(1)}100%{opacity:.4;transform:scaleX(.3);transform-origin:right}}
</style>
</head>
<body>

<!-- 로그인 게이트 -->
<div id="gate-login">
  <div class="gate-card">
    <div class="gate-logo">INTERVIEW ADMIN</div>
    <div class="gate-sub">조선의 기틀을 만든 자들</div>
    <div class="gate-field">
      <label>이메일</label>
      <input type="email" id="gate-email" class="gate-input" placeholder="이메일">
    </div>
    <div class="gate-field">
      <label>비밀번호</label>
      <input type="password" id="gate-pw" class="gate-input" placeholder="비밀번호">
    </div>
    <div class="gate-err" id="gate-err"></div>
    <button class="gate-btn" id="gate-login-btn">로그인</button>
  </div>
</div>

<!-- 어드민 -->
<div id="gate-admin">
  <header class="adm-header">
    <div class="adm-logo">INTERVIEW ADMIN</div>
    <div class="adm-tabs">
      <button class="adm-tab active" data-tab="contents">Contents</button>
      <button class="adm-tab" data-tab="answer">Answer</button>
    </div>
    <button class="adm-logout" id="logout-btn">로그아웃</button>
    <button class="adm-back" id="embed-back-btn">목록으로</button>
  </header>

  <div class="adm-body">

    <!-- ── Contents 탭 ── -->
    <div class="tab-panel active" id="tab-contents">

      <!-- 인물 관리 -->
      <div class="section-card">
        <div class="section-title">
          👤 인물 / 질문 관리
          <button class="btn btn-ghost btn-sm" id="add-char-btn" style="margin-left:auto">+ 인물 추가</button>
        </div>
        <div id="char-accordion"></div>
        <div style="display:flex;justify-content:center;align-items:center;margin-top:14px;flex-wrap:wrap;gap:8px">
          <button class="btn btn-danger" id="reset-btn">🗑 답변 전체 초기화</button>
          <button class="btn btn-accent" id="save-default-btn" title="지금 내용을 앞으로의 기본값(초기화 기준점)으로 저장합니다">기본값으로 반영</button>
          <button class="btn btn-primary" id="save-content-btn">💾 저장 (Firebase 반영)</button>
        </div>
      </div>
    </div>

    <!-- ── Answer 탭 ── -->
    <div class="tab-panel" id="tab-answer">
      <div class="class-filter" id="class-filter"></div>

      <div class="stats-row" id="stats-row">
        <div class="stat-chip">
          <div class="stat-chip-label">전체 인원</div>
          <div class="stat-chip-val" id="s-total">0</div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-label">제출 / 미제출</div>
          <div class="stat-dual">
            <div class="stat-dual-val" id="s-sub" style="color:var(--accent-deep)">0</div>
            <div class="stat-dual-val" id="s-unsub" style="color:var(--stone)">0</div>
          </div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-label">통과 / 미흡</div>
          <div class="stat-dual">
            <div class="stat-dual-val" id="s-pass" style="color:var(--pass)">0</div>
            <div class="stat-dual-val" id="s-insuf" style="color:var(--insuf)">0</div>
          </div>
        </div>
        <div class="stat-chip pick-chip">
          <div class="stat-chip-label">PICK</div>
          <div class="stat-chip-val" id="s-pick">0</div>
        </div>
      </div>

      <div class="scoring-bar">
        <button class="btn btn-primary" id="score-btn">🤖 채점하기</button>
        <span class="score-info" id="score-info">채점하기를 누르면 미채점 학생의 답변을 자동으로 평가합니다.</span>
      </div>
      <div class="loading-bar" id="loading-bar"></div>
      <div class="student-list" id="student-list"></div>
    </div>

  </div>
</div>

<!-- 초기화 확인 모달 -->
<div class="modal-back" id="reset-modal">
  <div class="modal-box">
    <div class="modal-title">답변 전체 초기화</div>
    <div class="modal-desc">모든 학생의 제출 답변이 Firestore에서 삭제됩니다. 이 작업은 되돌릴 수 없습니다. 정말 진행하시겠습니까?</div>
    <div class="modal-btns">
      <button class="btn btn-ghost" id="reset-cancel-btn">취소</button>
      <button class="btn btn-danger" id="reset-confirm-btn">초기화</button>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getFirestore,doc,getDoc,setDoc,deleteDoc,collection,onSnapshot,writeBatch,updateDoc,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import{getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import{getDatabase,ref,get}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app=initializeApp({apiKey:"AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",authDomain:"ho0911seong-56638.firebaseapp.com",databaseURL:"https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"ho0911seong-56638",storageBucket:"ho0911seong-56638.firebasestorage.app",messagingSenderId:"994509567071",appId:"1:994509567071:web:8b33bb03a3d8f3a9f557ea"});
const db=getFirestore(app);
const auth=getAuth(app);
const rtdb=getDatabase(app);

/* ─────────── State ─────────── */
let CONTENT={characters:[]};
let roster=[]; // lms/admin 학생 관리(RTDB students/)에서 불러온 반별 명단

/* ─────────── Load Settings ───────────
   우선순위: 현재 저장된 콘텐츠(interview_content) → 선생님이 반영해둔 기본값(interview_content_default) → 코드에 박혀있는 최초 기본값(DEFAULT_CHARACTERS) */
async function loadSettings(){
  try{
    const snap=await getDoc(doc(db,'settings','interview_content'));
    if(snap.exists()&&Array.isArray(snap.data().characters)&&snap.data().characters.length){
      CONTENT={characters:snap.data().characters};
    } else {
      const defSnap=await getDoc(doc(db,'settings','interview_content_default'));
      if(defSnap.exists()&&Array.isArray(defSnap.data().characters)&&defSnap.data().characters.length)
        CONTENT={characters:defSnap.data().characters};
      else CONTENT={characters:DEFAULT_CHARACTERS};
    }
  }catch(e){CONTENT={characters:DEFAULT_CHARACTERS};}

  renderCharAccordion();
}

/* ─────────── 반별 명단 (lms/admin 학생 관리 RTDB students/ 를 그대로 사용) ─────────── */
function classNumOf(sid){
  sid=String(sid||'');
  if(sid.length<3)return null;
  const c=parseInt(sid.slice(1,3),10);
  return isNaN(c)?null:c;
}

async function loadRoster(){
  try{
    const snap=await get(ref(rtdb,'students'));
    const data=snap.val()||{};
    roster=Object.values(data).filter(Boolean)
      .map(s=>({studentId:String(s.studentId||s.id||'').trim(),name:s.name||''}))
      .filter(s=>s.studentId)
      .map(s=>({...s,classNum:classNumOf(s.studentId)}))
      // 학번 2~3번째 자리가 "00"(0반)이면 테스트 계정 — 명단·통계에서 완전히 제외한다.
      .filter(s=>s.classNum!==0);
  }catch(e){roster=[];}
}

/* ─────────── 인물 아코디언 ─────────── */
function renderCharAccordion(){
  const container=document.getElementById('char-accordion');
  container.innerHTML=CONTENT.characters.map((c,ci)=>`
    <div class="char-row" data-ci="${ci}">
      <div class="char-row-head">
        ${c.imageUrl?`<img class="char-thumb" src="${escHtml(c.imageUrl)}" alt="">`:`<span class="char-emoji">${c.emoji}</span>`}
        <span class="char-row-name">${c.name}</span>
        <span class="char-row-role">${c.role}</span>
        <span class="char-row-toggle">▸</span>
      </div>
      <div class="char-row-body">
        <div class="char-meta-row">
          <input class="meta-input c-name" value="${escHtml(c.name)}" placeholder="이름">
          <input class="meta-input c-role" value="${escHtml(c.role)}" placeholder="역할">
          <input class="meta-input c-imageurl" value="${escHtml(c.imageUrl||'')}" placeholder="이미지 URL (선택)">
        </div>
        <div class="q-list" data-ci="${ci}">
          ${c.questions.map((q,qi)=>`
            <div class="q-item" data-qi="${qi}">
              <span class="q-num">${qi+1}</span>
              <textarea class="q-textarea" rows="2">${escHtml(q)}</textarea>
              <button class="q-del-btn" title="삭제">✕</button>
            </div>
          `).join('')}
        </div>
        <div class="char-actions">
          <div style="display:flex;gap:6px">
            <button class="btn btn-ghost btn-sm add-q-btn">+ 질문 추가</button>
            <button class="btn btn-danger btn-sm del-char-btn">인물 삭제</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');

  container.querySelectorAll('.char-row-head').forEach(head=>{
    head.addEventListener('click',()=>{
      const row=head.closest('.char-row');
      const isOpen=row.classList.contains('open');
      container.querySelectorAll('.char-row.open').forEach(r=>{r.classList.remove('open');r.querySelector('.char-row-toggle').textContent='▸';});
      if(!isOpen){row.classList.add('open');head.querySelector('.char-row-toggle').textContent='▾';}
    });
  });

  container.querySelectorAll('.q-del-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const item=btn.closest('.q-item');
      const ci=+btn.closest('.char-row').dataset.ci;
      const qi=+item.dataset.qi;
      CONTENT.characters[ci].questions.splice(qi,1);
      renderCharAccordion();
      // Re-open the same accordion
      const rows=document.querySelectorAll('.char-row');
      if(rows[ci]){rows[ci].classList.add('open');rows[ci].querySelector('.char-row-toggle').textContent='▾';}
    });
  });

  container.querySelectorAll('.add-q-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const ci=+btn.closest('.char-row').dataset.ci;
      CONTENT.characters[ci].questions.push('');
      renderCharAccordion();
      const rows=document.querySelectorAll('.char-row');
      if(rows[ci]){rows[ci].classList.add('open');rows[ci].querySelector('.char-row-toggle').textContent='▾';}
    });
  });

  container.querySelectorAll('.del-char-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const ci=+btn.closest('.char-row').dataset.ci;
      if(confirm(`'${CONTENT.characters[ci].name}' 인물을 삭제하시겠습니까?`)){
        CONTENT.characters.splice(ci,1);
        renderCharAccordion();
      }
    });
  });
}

document.getElementById('add-char-btn').addEventListener('click',()=>{
  CONTENT.characters.push({id:'char_'+Date.now(),name:'새 인물',role:'역할',emoji:'🏛️',imageUrl:'',questions:['']});
  renderCharAccordion();
  const rows=document.querySelectorAll('.char-row');
  const last=rows[rows.length-1];
  if(last){last.classList.add('open');last.querySelector('.char-row-toggle').textContent='▾';}
});

function collectContentFromDOM(){
  document.querySelectorAll('.char-row').forEach((row,ci)=>{
    if(!CONTENT.characters[ci])return;
    CONTENT.characters[ci].name=row.querySelector('.c-name').value.trim();
    CONTENT.characters[ci].role=row.querySelector('.c-role').value.trim();
    CONTENT.characters[ci].imageUrl=row.querySelector('.c-imageurl').value.trim();
    row.querySelectorAll('.q-textarea').forEach((ta,qi)=>{
      CONTENT.characters[ci].questions[qi]=ta.value.trim();
    });
  });
}

/* ─────────── 실시간 리스너 ─────────── */
function startAnswerListener(){
  if(unsub)unsub();
  unsub=onSnapshot(collection(db,'interview_joseon_answers'),snap=>{
    students=[];
    // 0반(테스트 계정) 제출은 통계·목록에서 인식하지 않는다.
    snap.forEach(d=>{if(classNumOf(d.id)!==0)students.push({id:d.id,...d.data()});});
    students.sort((a,b)=>(classNumOf(a.id)||0)-(classNumOf(b.id)||0)||String(a.studentId).localeCompare(String(b.studentId)));
    renderClassFilter();
    updateStats();
    renderStudentList();
  });
}

/* ─────────── 반 필터 (lms/admin 학생 관리 명단 기준, 명단에 없으면 제출자 기준으로 보완) ─────────── */
function renderClassFilter(){
  const fromRoster=roster.map(r=>r.classNum);
  const fromSubmitted=students.map(s=>classNumOf(s.id));
  const classNums=[...new Set([...fromRoster,...fromSubmitted])].filter(n=>n!=null).sort((a,b)=>a-b);
  const classes=['전체',...classNums];
  document.getElementById('class-filter').innerHTML=classes.map(c=>`
    <button class="cf-btn${String(c)===currentFilter?' active':''}" data-c="${c}">${c==='전체'?'전체':c+'반'}</button>
  `).join('');
  document.querySelectorAll('.cf-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      currentFilter=btn.dataset.c;
      document.querySelectorAll('.cf-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      updateStats();
      renderStudentList();
    });
  });
}

function filteredStudents(){
  if(currentFilter==='전체')return students;
  return students.filter(s=>String(classNumOf(s.id))===currentFilter);
}

function rosterForFilter(){
  if(currentFilter==='전체')return roster;
  return roster.filter(r=>String(r.classNum)===currentFilter);
}

/* 학생 관리 명단이 등록돼 있으면 그 인원수를, 아직 명단이 없으면 제출자 수를 전체 인원으로 본다 */
function expectedCount(){
  return roster.length?rosterForFilter().length:filteredStudents().length;
}

/* ─────────── 통계 ─────────── */
function updateStats(){
  const fs=filteredStudents();
  const submitted=fs.filter(s=>s.charId&&s.answers&&Object.values(s.answers).some(v=>v&&v.trim()));
  const expected=expectedCount();
  const unsub2=Math.max(0,expected-submitted.length);
  const pass=fs.filter(s=>s.status==='pass').length;
  const insuf=fs.filter(s=>s.status==='insuf'||s.status==='insufficient').length+unsub2;
  const pick=fs.filter(s=>s.status==='pick').length;

  document.getElementById('s-total').textContent=expected||fs.length;
  document.getElementById('s-sub').textContent=submitted.length;
  document.getElementById('s-unsub').textContent=unsub2;
  document.getElementById('s-pass').textContent=pass;
  document.getElementById('s-insuf').textContent=insuf;
  document.getElementById('s-pick').textContent=pick;
}

/* ─────────── 채점 ─────────── */
document.getElementById('score-btn').addEventListener('click',async()=>{
  const toScore=filteredStudents().filter(s=>!s.status||s.status==='pending');
  if(!toScore.length){document.getElementById('score-info').textContent='채점할 학생이 없습니다.';return;}
  const lb=document.getElementById('loading-bar');
  lb.style.display='block';
  document.getElementById('score-info').textContent=`${toScore.length}명 채점 중...`;

  try{
    const batch=writeBatch(db);
    toScore.forEach(s=>{
      const status=autoScore(s);
      batch.update(doc(db,'interview_joseon_answers',s.studentId),{status});
    });
    await batch.commit();
    document.getElementById('score-info').textContent=`${toScore.length}명 채점 완료`;
  }catch(e){
    document.getElementById('score-info').textContent='채점 오류: '+e.message;
  }
  lb.style.display='none';
});

function autoScore(s){
  const answers=s.answers||{};
  const vals=Object.values(answers);
  const hasChar=!!s.charId;
  const allAnswered=vals.length>=3&&vals.every(v=>v&&v.trim().length>0);
  const avgLen=vals.length?vals.reduce((sum,v)=>sum+(v||'').trim().length,0)/vals.length:0;
  const hasDeep=(s.deepQuestion||'').trim().length>=10;
  if(hasChar&&allAnswered&&avgLen>=30&&hasDeep)return'pass';
  return'insufficient';
}

/* ─────────── 학생 목록 ─────────── */
function statusBadgeClass(status){
  if(status==='pass')return'sb-pass';
  if(status==='insufficient'||status==='insuf')return'sb-insuf';
  if(status==='pick')return'sb-pick';
  return'sb-pending';
}
function statusLabel(status){
  if(status==='pass')return'통과';
  if(status==='insufficient'||status==='insuf')return'미흡';
  if(status==='pick')return'PICK';
  return'미채점';
}

function renderStudentList(){
  const list=filteredStudents();
  const el=document.getElementById('student-list');
  if(!list.length){el.innerHTML='<div class="no-data">아직 제출한 학생이 없습니다.</div>';return;}

  el.innerHTML=list.map((s,i)=>{
    const char=CONTENT.characters.find(c=>c.id===s.charId);
    const qs=char?.questions||[];
    const answers=s.answers||{};
    const status=s.status||'pending';

    const ansHtml=qs.map((q,qi)=>`
      <div class="ans-block">
        <div class="ans-q-label">Q${qi+1}. ${escHtml(q)}</div>
        ${answers[qi]&&answers[qi].trim()
          ?`<div class="ans-text">${escHtml(answers[qi])}</div>`
          :`<div class="ans-empty">미작성</div>`}
      </div>
    `).join('');

    return`<div class="stu-card" data-idx="${i}">
      <div class="stu-head">
        <span class="stu-class-badge">${classNumOf(s.id)||'?'}반</span>
        <div class="stu-info">
          <div class="stu-name">${escHtml(s.name||'')} <span class="stu-id">${escHtml(String(s.studentId||''))}</span></div>
          ${s.charId?`<span class="stu-char">${char?.emoji||''} ${escHtml(s.charName||s.charId)}</span>`:'<span class="stu-char" style="color:var(--stone)">미제출</span>'}
        </div>
        <span class="status-badge ${statusBadgeClass(status)}">${statusLabel(status)}</span>
        <span class="stu-toggle">▸</span>
      </div>
      <div class="stu-body">
        <div class="stu-status-btns">
          <button class="ssb ssb-pass${status==='pass'?' active':''}" data-sid="${s.studentId}" data-st="pass">✓ 통과</button>
          <button class="ssb ssb-insuf${status==='insufficient'||status==='insuf'?' active':''}" data-sid="${s.studentId}" data-st="insufficient">✗ 미흡</button>
          <button class="ssb ssb-pick${status==='pick'?' active':''}" data-sid="${s.studentId}" data-st="pick">⭐ PICK</button>
        </div>
        ${s.charId?ansHtml:'<div class="ans-empty">제출된 답변이 없습니다.</div>'}
        ${s.deepQuestion?`<div class="deep-block">
          <div class="deep-q-label">✏️ 심화 질문 제작</div>
          <div class="ans-text">${escHtml(s.deepQuestion)}</div>
        </div>`:''}
      </div>
    </div>`;
  }).join('');

  // Accordion toggle
  el.querySelectorAll('.stu-head').forEach(head=>{
    head.addEventListener('click',()=>{
      const card=head.closest('.stu-card');
      const isOpen=card.classList.contains('open');
      el.querySelectorAll('.stu-card.open').forEach(c=>{c.classList.remove('open');c.querySelector('.stu-toggle').textContent='▸';});
      if(!isOpen){card.classList.add('open');head.querySelector('.stu-toggle').textContent='▾';}
    });
  });

  // Status buttons
  el.querySelectorAll('.ssb').forEach(btn=>{
    btn.addEventListener('click',async e=>{
      e.stopPropagation();
      const sid=btn.dataset.sid;
      const st=btn.dataset.st;
      try{
        await updateDoc(doc(db,'interview_joseon_answers',sid),{status:st});
      }catch(err){alert('오류: '+err.message);}
    });
  });
}

function escHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
</script>
</body>
</html>
