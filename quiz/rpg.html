<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>고려 RPG</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:sans-serif;
  background:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') center/cover no-repeat;
  color:white;
}

#wrap{
  background:rgba(0,0,0,0.75);
  min-height:100vh;
  padding:20px;
  text-align:center;
}

button,input{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
}

/* 전투 */
#battle{
  display:flex;
  justify-content:space-around;
  align-items:center;
  margin:20px 0;
}

.char img{
  width:140px;
  height:140px;
  object-fit:contain;
}

/* HP */
.bar{
  width:120px;
  height:10px;
  background:#333;
  margin:auto;
}
.hp{
  height:100%;
  background:red;
}

/* 애니메이션 */
@keyframes attack{
  0%{transform:translateX(0)}
  50%{transform:translateX(30px)}
  100%{transform:translateX(0)}
}
@keyframes hit{
  0%{filter:brightness(1)}
  50%{filter:brightness(2)}
  100%{filter:brightness(1)}
}
.attack{animation:attack 0.3s}
.hit{animation:hit 0.3s}

/* 스토리 */
#story{
  height:120px;
  overflow:hidden;
  border:1px solid #555;
  padding:10px;
  margin:10px;
  text-align:left;
  font-size:14px;
}

/* 랭킹 */
#ranking{
  position:fixed;
  right:10px;
  top:10px;
  background:#111;
  padding:10px;
  border-radius:10px;
  width:220px;
}
</style>
</head>

<body>
<div id="wrap">

<button onclick="toggleMode()" id="modeBtn">🧪 테스트</button>

<!-- 로그인 -->
<div id="login">
<h2>⚔ 고려 RPG</h2>
<input id="sid" placeholder="학번">
<input id="sname" placeholder="이름">
<input id="spw" placeholder="비밀번호">
<br>
<button onclick="login()">시작</button>
</div>

<!-- 게임 -->
<div id="game" style="display:none">

<h3 id="welcome"></h3>

<div id="story"></div>

<div id="battle">
<div class="char">
<img id="player">
<div class="bar"><div id="pHP" class="hp"></div></div>
</div>

<div class="char">
<img id="enemy">
<div id="enemyName"></div>
<div class="bar"><div id="eHP" class="hp"></div></div>
</div>
</div>

<div>Lv <span id="lv"></span> | EXP <span id="exp"></span> | GOLD <span id="gold"></span></div>

<h3 id="question"></h3>
<div id="answers"></div>

<input id="short" style="display:none">
<button onclick="submitShort()" id="submitBtn" style="display:none">제출</button>

</div>

<div id="ranking"><h4>🏆 랭킹</h4><div id="rankList"></div></div>

</div>

<script>
// ===== 모드 =====
let TEST_MODE = true;
const API_URL="여기에_GAS";

// ===== 사운드 =====
const atk=new Audio("https://actions.google.com/sounds/v1/impacts/punch_medium.ogg");
const ok=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const no=new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg");

// ===== 캐릭터 프레임 =====
const playerFrames=[
"https://i.imgur.com/4AiXzf8.png",
"https://i.imgur.com/4AiXzf8.png",
"https://i.imgur.com/4AiXzf8.png"
];

// ===== 몬스터 =====
const enemies=[
{name:"들개",type:"ox",hp:50,exp:10,img:"https://i.imgur.com/Z6X8ZzR.png"},
{name:"나무요괴",type:"ox",hp:70,exp:15,img:"https://i.imgur.com/UgXxP0Y.png"},
{name:"도깨비",type:"ox",hp:90,exp:20,img:"https://i.imgur.com/eM0Q7ZK.png"},
{name:"거란군",type:"short",hp:110,exp:25,img:"https://i.imgur.com/2DhF5ZB.png"},
{name:"여진군",type:"short",hp:130,exp:30,img:"https://i.imgur.com/Tq5Qz6X.png"},
{name:"몽골군",type:"short",hp:160,exp:40,img:"https://i.imgur.com/l49aYS3.png"}
];

// ===== 문제 =====
const oxQ=[
{q:"고려 건국자는 왕건이다",c:0},
{q:"광종은 노비안검법",c:0},
{q:"수도는 한양이다",c:1}
];
const shortQ=[
{q:"고려 수도?",c:"개경"},
{q:"건국자?",c:"왕건"},
{q:"거란 외교 인물?",c:"서희"}
];

// ===== 변수 =====
let user, enemyIndex=0, enemyHP=0, currentQ, frame=0;

// ===== DOM =====
const story=document.getElementById("story");

// ===== 모드 =====
function toggleMode(){
TEST_MODE=!TEST_MODE;
modeBtn.innerText=TEST_MODE?"🧪 테스트":"🌐 서버";
}

// ===== 로그인 =====
function login(){
user={name:sname.value||"테스트",lv:1,exp:0,gold:50,hp:100};
login.style.display="none";
game.style.display="block";
welcome.innerText=user.name+" 전투 시작";

startStory();
startAnim();
init();
}

// ===== 스토리 =====
function startStory(){
let arr=["고려 시대 시작","적 등장","역사를 지켜라"];
let i=0;
let t=setInterval(()=>{
if(i>=arr.length) return clearInterval(t);
story.innerHTML+=arr[i]+"<br>";
story.scrollTop=story.scrollHeight;
i++;
},800);
}

// ===== 애니메이션 =====
function startAnim(){
setInterval(()=>{
frame=(frame+1)%playerFrames.length;
player.src=playerFrames[frame];
},250);
}

// ===== 초기화 =====
function init(){
enemyIndex=0;
enemyHP=enemies[0].hp;
update();
loadQ();
loadRank();
}

// ===== 문제 =====
function loadQ(){
let e=enemies[enemyIndex];
currentQ=e.type==="ox"
?oxQ[Math.floor(Math.random()*oxQ.length)]
:shortQ[Math.floor(Math.random()*shortQ.length)];

renderQ();
}

// ===== 렌더 =====
function renderQ(){
let e=enemies[enemyIndex];

enemy.src=e.img;
enemyName.innerText=e.name;
eHP.style.width=(enemyHP/e.hp*100)+"%";

question.innerText=currentQ.q;
answers.innerHTML="";

if(e.type==="ox"){
["O","X"].forEach((v,i)=>{
let b=document.createElement("button");
b.innerText=v;
b.onclick=()=>process(i===currentQ.c);
answers.appendChild(b);
});
short.style.display="none";
submitBtn.style.display="none";
}else{
short.style.display="inline";
submitBtn.style.display="inline";
}
}

// ===== 처리 =====
function submitShort(){
process(short.value.trim()===currentQ.c);
short.value="";
}

function process(correct){
let e=enemies[enemyIndex];

if(correct){
ok.play(); atk.play();
player.classList.add("attack");
enemy.classList.add("hit");
enemyHP-=20;
user.exp+=e.exp;
user.gold+=5;
}else{
no.play();
enemy.classList.add("attack");
player.classList.add("hit");
user.hp-=20;
}

setTimeout(()=>{
player.classList.remove("attack","hit");
enemy.classList.remove("attack","hit");
},300);

if(user.exp>=100){user.lv++;user.exp=0;}

if(enemyHP<=0){
enemyIndex=(enemyIndex+1)%enemies.length;
enemyHP=enemies[enemyIndex].hp;
}

update();
loadQ();
}

// ===== UI =====
function update(){
lv.innerText=user.lv;
exp.innerText=user.exp;
gold.innerText=user.gold;
pHP.style.width=user.hp+"%";
}

// ===== 랭킹 =====
function loadRank(){
if(TEST_MODE){
rankList.innerHTML="1위 철수 Lv5<br>2위 영희 Lv4<br>3위 민수 Lv3";
}else{
// 서버 연결 시 구현
}
}
</script>

</body>
</html>
