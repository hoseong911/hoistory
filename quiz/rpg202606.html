<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>역사 RPG FINAL++</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>

<style>
body { margin:0; background:#111; color:white; font-family:sans-serif; }

/* 캐릭터 선택 */
#selectScreen {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#000;
}
.char {
  width:80px;
  margin:10px;
  cursor:pointer;
}

/* UI */
#ui {
  position:absolute;
  top:10px;
  left:10px;
  z-index:10;
}

.bar {
  width:150px;
  height:15px;
  border:2px solid white;
  margin-bottom:5px;
}
.fill { height:100%; }

/* 전투 */
#battleUI {
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.9);
  padding:15px;
  display:none;
}

/* 모바일 컨트롤 */
#controls {
  position:absolute;
  bottom:10px;
  right:10px;
}
.ctrl {
  width:60px;
  height:60px;
  margin:3px;
  font-size:20px;
}
</style>
</head>

<body>

<!-- 캐릭터 선택 -->
<div id="selectScreen">
  <h2>캐릭터 선택</h2>
  <img src="https://labs.phaser.io/assets/sprites/phaser-dude.png" class="char" onclick="startGame('dude')">
  <img src="https://labs.phaser.io/assets/sprites/robot.png" class="char" onclick="startGame('robot')">
  <img src="https://labs.phaser.io/assets/sprites/baddie.png" class="char" onclick="startGame('baddie')">
</div>

<!-- UI -->
<div id="ui">
  ❤️<div class="bar"><div id="hpFill" class="fill" style="background:lime;"></div></div>
  ⚡<div class="bar"><div id="xpFill" class="fill" style="background:yellow;"></div></div>
  🔥 Lv <span id="level">1</span>
</div>

<!-- 전투 -->
<div id="battleUI">
  <div id="question"></div>
  <div id="choices"></div>
  <input id="answer" style="display:none;">
  <button onclick="submitAnswer()">제출</button>
</div>

<!-- 모바일 -->
<div id="controls">
  <button class="ctrl" onclick="move('up')">⬆️</button><br>
  <button class="ctrl" onclick="move('left')">⬅️</button>
  <button class="ctrl" onclick="move('right')">➡️</button><br>
  <button class="ctrl" onclick="move('down')">⬇️</button>
</div>

<script>
let player, monsters;
let playerSprite = "dude";
let HP=100, XP=0, level=1;
let gameState="explore";
let moveDir=null;
let questions=[];
let currentQuestion, currentMonster;

// 📡 문제 로드
async function loadQuestions(){
  const res = await fetch("여기에_앱스크립트_URL");
  questions = await res.json();
}
loadQuestions();

// 🎮 게임 시작
function startGame(sprite){
  playerSprite = sprite;
  document.getElementById("selectScreen").style.display="none";
  initGame();
}

// Phaser 초기화
function initGame(){
  new Phaser.Game({
    type:Phaser.AUTO,
    scale:{
      mode:Phaser.Scale.RESIZE,
      autoCenter:Phaser.Scale.CENTER_BOTH
    },
    physics:{default:"arcade"},
    scene:{preload,create,update}
  });
}

function preload(){
  this.load.image('dude','https://labs.phaser.io/assets/sprites/phaser-dude.png');
  this.load.image('robot','https://labs.phaser.io/assets/sprites/robot.png');
  this.load.image('baddie','https://labs.phaser.io/assets/sprites/baddie.png');
  this.load.image('monster','https://labs.phaser.io/assets/sprites/ufo.png');
}

function create(){
  this.cameras.main.setBackgroundColor('#222');

  player = this.physics.add.sprite(100,100,playerSprite).setScale(0.5);

  monsters = this.physics.add.group();
  spawnMonsters(this);

  this.physics.add.overlap(player, monsters, startBattle, null, this);
}

function spawnMonsters(scene){
  for(let i=0;i<5+level;i++){
    let m = scene.physics.add.sprite(
      Phaser.Math.Between(50,window.innerWidth-50),
      Phaser.Math.Between(50,window.innerHeight-50),
      'monster'
    ).setScale(0.4);

    monsters.add(m);
  }
}

function update(){
  if(gameState!=="explore") return;

  player.setVelocity(0);

  if(moveDir==="left") player.setVelocityX(-200);
  if(moveDir==="right") player.setVelocityX(200);
  if(moveDir==="up") player.setVelocityY(-200);
  if(moveDir==="down") player.setVelocityY(200);

  monsters.children.iterate(m=>{
    m.setVelocity(
      Phaser.Math.Between(-50,50),
      Phaser.Math.Between(-50,50)
    );
  });
}

// 📱 이동
function move(dir){
  moveDir=dir;
  setTimeout(()=>moveDir=null,200);
}

// ⚔️ 전투
function startBattle(p,m){
  if(gameState==="battle") return;

  gameState="battle";
  currentMonster=m;
  currentQuestion=questions[Math.floor(Math.random()*questions.length)];

  document.getElementById("battleUI").style.display="block";
  document.getElementById("question").innerText=currentQuestion.question;

  let choices=document.getElementById("choices");
  let input=document.getElementById("answer");

  choices.innerHTML="";
  input.style.display="none";

  if(currentQuestion.answer==="O"||currentQuestion.answer==="X"){
    ["O","X"].forEach(v=>{
      let b=document.createElement("button");
      b.innerText=v;
      b.onclick=()=>submitAnswer(v);
      choices.appendChild(b);
    });
  }else{
    input.style.display="inline";
  }
}

function submitAnswer(sel=null){
  let user=sel||document.getElementById("answer").value.trim();

  if(user.toLowerCase()===currentQuestion.answer.toLowerCase()){
    currentMonster.destroy();
    XP+=20;
  }else{
    HP-=20;
  }

  if(HP<=0){
    alert("게임오버");
    location.reload();
  }

  checkLevelUp();
  updateUI();

  document.getElementById("battleUI").style.display="none";
  gameState="explore";
}

// 레벨업
function checkLevelUp(){
  if(XP>=level*100){
    XP=0;
    level++;
    HP=100;
    alert("🔥 레벨업!");

    monsters.clear(true,true);
    spawnMonsters(game.scene.scenes[0]);
  }
}

// UI
function updateUI(){
  document.getElementById("hpFill").style.width=HP+"%";
  document.getElementById("xpFill").style.width=(XP/(level*100))*100+"%";
  document.getElementById("level").innerText=level;
}
</script>

</body>
</html>
