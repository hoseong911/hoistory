<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>역사 수업 설문조사</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    :root {
      --green: #1ed760;
      --green-hover: #1db954;
      --green-dim: rgba(30, 215, 96, 0.12);
      --bg: #121212;
      --surface: #181818;
      --interactive: #252525;
      --border: #3a3a3a;
      --text: #ffffff;
      --sub: #a0a0a0;
      --danger: #f3727f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── Top bar ── */
    .top-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      border-radius: 0 0 20px 20px;
      padding: 18px 20px;
      position: sticky; top: 0; z-index: 10;
    }
    .top-bar-inner {
      max-width: 640px; margin: 0 auto; text-align: center;
    }
    .top-title { font-size: 18px; font-weight: 800; }
    .top-title span { color: var(--green); }

    #surveyApp { max-width: 640px; margin: 0 auto; }

    /* ── Card ── */
    .card {
      background: var(--surface); border-radius: 16px; padding: 26px 22px;
      margin: 16px 14px 0; box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      border: 1px solid var(--border);
    }
    .sec-title {
      font-size: 22px; font-weight: 800; color: var(--green);
      margin-bottom: 22px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
    }

    /* ── Question ── */
    .q-block { margin-bottom: 28px; }
    .q-block:last-child { margin-bottom: 0; }
    .q-label { font-size: 17px; font-weight: 600; line-height: 1.65; margin-bottom: 12px; }
    .q-label .q-num { color: var(--green); margin-right: 4px; }
    .req-star { color: var(--danger); }

    /* ── Slider ── */
    .slider-wrap { padding: 4px 2px; }
    .slider-ends {
      display: flex; justify-content: space-between;
      font-size: 15px; color: var(--sub); margin-bottom: 10px; gap: 8px;
    }
    .slider-ends span { max-width: 45%; line-height: 1.3; }
    .slider-ends span:last-child { text-align: right; }
    input[type=range].scale-slider {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 6px; border-radius: 3px; outline: none; cursor: pointer;
      background: var(--border);
      transition: background 0.1s;
    }
    input[type=range].scale-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--green);
      cursor: pointer;
      box-shadow: 0 1px 10px rgba(30,215,96,0.45);
      transition: transform 0.1s;
    }
    input[type=range].scale-slider::-webkit-slider-thumb:active { transform: scale(1.15); }
    input[type=range].scale-slider::-moz-range-thumb {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--green); border: none; cursor: pointer;
    }
    input[type=range].scale-slider.unset-slider { opacity: 0.45; }
    .slider-ticks {
      display: flex; justify-content: space-between;
      padding: 0 14px; margin-top: 7px;
    }
    .slider-tick { font-size: 14px; color: var(--sub); }
    .slider-val-display {
      margin-top: 12px; text-align: center;
      font-size: 16px; font-weight: 800;
      color: #000; background: var(--green);
      padding: 9px 16px; border-radius: 500px;
      display: inline-block; width: 100%;
    }

    /* ── Checkbox ── */
    .check-wrap { display: flex; flex-direction: column; gap: 7px; }
    .check-item {
      display: flex; align-items: center; gap: 12px; padding: 13px 16px;
      border: 1px solid var(--border); border-radius: 12px; background: var(--interactive);
      cursor: pointer; font-size: 17px; transition: all 0.12s; user-select: none;
    }
    .check-item:hover { border-color: var(--green); }
    .check-item.checked { border-color: var(--green); background: var(--green-dim); color: var(--green); font-weight: 700; }
    .check-box {
      width: 18px; height: 18px; border: 2px solid var(--border);
      border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      transition: all 0.12s;
    }
    .check-item.checked .check-box { background: var(--green); border-color: var(--green); }
    .check-item.checked .check-box::after { content: '✓'; color: #000; font-size: 13px; font-weight: 800; }

    /* ── Textarea ── */
    .survey-ta {
      width: 100%; padding: 13px 15px;
      border: 1px solid var(--border); border-radius: 12px; background: var(--interactive);
      font-family: inherit; font-size: 17px; color: var(--text);
      resize: vertical; min-height: 96px; line-height: 1.7; transition: border-color 0.12s;
    }
    .survey-ta:focus { outline: none; border-color: var(--green); }
    .survey-ta::placeholder { color: #555; }
    .char-count { font-size: 14px; color: var(--sub); text-align: right; margin-top: 6px; font-weight: 600; }

    /* ── Intro ── */
    .intro-card { padding: 32px 24px; }
    .intro-title { font-size: 24px; font-weight: 900; margin-bottom: 10px; }
    .intro-desc { font-size: 17px; color: var(--sub); line-height: 1.85; margin-bottom: 28px; }
    .form-label { font-size: 13px; font-weight: 700; color: var(--sub); margin-bottom: 7px; letter-spacing: 0.8px; text-transform: uppercase; }
    .form-input {
      width: 100%; padding: 14px 16px;
      border: 1px solid var(--border); border-radius: 12px; background: var(--interactive);
      font-family: inherit; font-size: 18px; color: var(--text);
      margin-bottom: 16px; transition: border-color 0.12s;
    }
    .form-input:focus { outline: none; border-color: var(--green); }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%; padding: 16px; background: var(--green); color: #000;
      border: none; border-radius: 500px; font-size: 18px; font-weight: 800;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .btn-primary:hover { background: var(--green-hover); transform: scale(1.01); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .nav-wrap { display: flex; gap: 10px; margin: 14px 14px 0; }
    .btn-nav {
      flex: 1; padding: 15px; border: 1px solid var(--border); border-radius: 500px;
      background: var(--surface); font-size: 17px; font-weight: 700; cursor: pointer;
      color: var(--text); font-family: inherit; transition: all 0.15s;
    }
    .btn-nav:hover { border-color: var(--green); color: var(--green); }
    .btn-nav.fill { background: var(--green); color: #000; border-color: var(--green); }
    .btn-nav.fill:hover { background: var(--green-hover); border-color: var(--green-hover); color: #000; }

    /* ── Done ── */
    .done-wrap { text-align: center; padding: 52px 24px; }
    .done-icon { font-size: 58px; margin-bottom: 20px; }
    .done-title { font-size: 28px; font-weight: 900; margin-bottom: 10px; color: var(--green); }
    .done-desc { font-size: 17px; color: var(--sub); line-height: 1.9; margin-bottom: 32px; }
    .btn-home {
      padding: 14px 36px; background: var(--interactive); color: var(--text);
      border: 1px solid var(--border); border-radius: 500px;
      font-size: 17px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
    }
    .btn-home:hover { border-color: var(--green); color: var(--green); }

    /* ── Footer ── */
    .app-footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px; text-align: center; pointer-events: none;
    }
    .admin-btn {
      pointer-events: all; background: none; border: none; cursor: pointer;
      font-size: 13px; color: var(--sub); opacity: 0.25; font-family: inherit; transition: opacity 0.12s;
    }
    .admin-btn:hover { opacity: 1; }

    /* ══ ADMIN OVERLAY ══ */
    #adminOverlay {
      display: none; position: fixed; inset: 0;
      background: var(--bg); overflow-y: auto; z-index: 200;
    }
    .adm-top {
      background: var(--surface); color: var(--text);
      border-bottom: 1px solid var(--border);
      padding: 0 16px; position: sticky; top: 0; z-index: 10;
    }
    .adm-top-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0 0;
    }
    .adm-top-title { font-size: 17px; font-weight: 800; }
    .adm-close {
      background: none; border: none; color: var(--text);
      font-size: 22px; cursor: pointer; opacity: 0.6; padding: 4px;
    }
    .adm-close:hover { opacity: 1; }
    .adm-tabs { display: flex; padding-top: 8px; }
    .adm-tab {
      padding: 9px 16px; font-size: 15px;
      color: var(--sub); cursor: pointer;
      border-bottom: 2px solid transparent; transition: all 0.12s;
    }
    .adm-tab.active { color: var(--text); border-bottom-color: var(--green); }
    .adm-body { max-width: 720px; margin: 0 auto; padding: 16px 14px 40px; }

    .adm-save-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border-radius: 12px; padding: 12px 16px;
      margin-bottom: 12px; border: 1px solid var(--border);
    }
    .adm-save-msg { font-size: 14px; color: var(--sub); }
    .btn-adm-save {
      padding: 8px 20px; background: var(--green); color: #000;
      border: none; border-radius: 500px; font-size: 15px; font-weight: 800;
      cursor: pointer; font-family: inherit;
    }
    .btn-adm-save:hover { background: var(--green-hover); }

    .adm-sec-block {
      background: var(--surface); border-radius: 12px; margin-bottom: 10px;
      border: 1px solid var(--border); overflow: hidden;
    }
    .adm-sec-hd {
      padding: 12px 16px; background: var(--green-dim); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .adm-sec-num {
      background: var(--green); color: #000; border-radius: 20px; padding: 2px 9px;
      font-size: 13px; font-weight: 800; flex-shrink: 0;
    }
    .adm-sec-title-inp {
      flex: 1; border: 1px solid transparent; background: transparent;
      font-size: 16px; font-weight: 700; color: var(--green);
      padding: 4px 8px; border-radius: 6px; font-family: inherit;
    }
    .adm-sec-title-inp:focus { outline: none; border-color: var(--green); background: var(--interactive); }
    .adm-q-list { padding: 10px 16px; }
    .adm-q-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
    .adm-q-item:last-child { border-bottom: none; }
    .adm-q-meta { font-size: 12px; color: var(--sub); font-weight: 700; margin-bottom: 5px; }
    .adm-q-inp {
      width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
      font-family: inherit; font-size: 15px; color: var(--text);
      background: var(--interactive); resize: vertical; min-height: 34px; transition: border-color 0.12s;
    }
    .adm-q-inp:focus { outline: none; border-color: var(--green); }
    .adm-opts-label { font-size: 12px; color: var(--sub); font-weight: 700; margin: 8px 0 4px; }
    .adm-opt-row { display: flex; gap: 5px; margin-bottom: 4px; }
    .adm-opt-inp {
      flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
      font-family: inherit; font-size: 14px; background: var(--interactive); color: var(--text); transition: border-color 0.12s;
    }
    .adm-opt-inp:focus { outline: none; border-color: var(--green); }
    .adm-opt-del {
      padding: 5px 9px; background: none; border: 1px solid var(--border); border-radius: 6px;
      cursor: pointer; color: var(--sub); font-size: 14px; transition: all 0.12s;
    }
    .adm-opt-del:hover { border-color: var(--danger); color: var(--danger); }
    .adm-opt-add {
      font-size: 14px; color: var(--green); background: none;
      border: 1px dashed var(--green); border-radius: 6px;
      padding: 5px 12px; cursor: pointer; margin-top: 2px; font-family: inherit;
    }
    .adm-opt-add:hover { background: var(--green-dim); }

    .stat-card {
      background: var(--surface); border-radius: 12px; padding: 16px; margin-bottom: 10px;
      border: 1px solid var(--border);
    }
    .stat-sec-label { font-size: 16px; font-weight: 800; color: var(--green); margin: 16px 0 8px; }
    .stat-sec-label:first-child { margin-top: 0; }
    .stat-q-text { font-size: 15px; font-weight: 600; margin-bottom: 10px; line-height: 1.5; }
    .stat-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .stat-bar-lbl { min-width: 90px; font-size: 13px; color: var(--sub); text-align: right; }
    .stat-bar-track { flex: 1; height: 13px; background: var(--interactive); border-radius: 6px; overflow: hidden; }
    .stat-bar-fill { height: 100%; background: var(--green); border-radius: 6px; transition: width 0.5s ease; }
    .stat-bar-cnt { min-width: 22px; font-size: 14px; font-weight: 600; color: var(--text); }
    .stat-avg { font-size: 13px; color: var(--sub); margin-top: 6px; }
    .stat-text-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
    .stat-text-item {
      background: var(--interactive); border-radius: 8px; padding: 8px 11px;
      font-size: 14px; line-height: 1.55;
    }
    .stat-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--green-dim); color: var(--green);
      border-radius: 500px; padding: 4px 14px;
      font-size: 15px; font-weight: 800; margin-bottom: 14px;
    }
    .adm-top-bar {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
    }
    .btn-reset {
      padding: 7px 14px; background: none; border: 1px solid var(--danger);
      border-radius: 500px; color: var(--danger); font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: all 0.12s;
    }
    .btn-reset:hover { background: var(--danger); color: #000; }

    .resp-card {
      background: var(--surface); border-radius: 12px; padding: 14px 16px;
      margin-bottom: 8px; border: 1px solid var(--border);
    }
    .resp-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 10px;
    }
    .resp-name { font-size: 17px; font-weight: 700; }
    .resp-id { font-size: 14px; color: var(--sub); margin-top: 1px; }
    .resp-header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .resp-date { font-size: 13px; color: var(--sub); }
    .btn-del-resp {
      padding: 4px 10px; background: none; border: 1px solid var(--border);
      border-radius: 6px; font-size: 13px; color: var(--sub); cursor: pointer; font-family: inherit;
      transition: all 0.12s;
    }
    .btn-del-resp:hover { border-color: var(--danger); color: var(--danger); }
    .resp-q { margin-bottom: 8px; }
    .resp-q-text { font-size: 13px; color: var(--sub); margin-bottom: 2px; line-height: 1.4; }
    .resp-q-ans { font-size: 15px; color: var(--text); }
    .empty-state { text-align: center; padding: 44px 20px; color: var(--sub); font-size: 16px; }
    .resp-table { width: 100%; border-collapse: collapse; margin-bottom: 6px; border: 1px solid var(--border); }
    .resp-table td { padding: 12px 12px; font-size: 14px; vertical-align: top; border: 1px solid var(--border); }
    .resp-table td.resp-table-sec {
      color: var(--green); font-weight: 800; font-size: 13px;
      width: 20%; vertical-align: middle; text-align: center;
    }
    .resp-table td.resp-table-q { color: var(--sub); width: 48%; line-height: 1.4; }
    .resp-table td.resp-table-q.resp-table-q-narrow { width: 30%; }
    .resp-table td.resp-table-a { font-weight: 700; text-align: right; line-height: 1.5; }
    .resp-text-heading {
      font-size: 15px; font-weight: 800; color: var(--green);
      margin: 18px 0 10px; padding-top: 14px; border-top: 1px solid var(--border);
    }
    .resp-text-sec { font-size: 13px; font-weight: 700; color: var(--sub); margin: 12px 0 6px; }
    .resp-text-sec:first-child { margin-top: 0; }
    .resp-pager { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .resp-pager .btn-nav { flex: none; padding: 10px 20px; }
    .resp-pager .btn-nav:disabled { opacity: 0.35; cursor: not-allowed; }
    .resp-pager-count { flex: 1; text-align: center; font-size: 15px; font-weight: 700; color: var(--sub); }

    /* ── Response filter tags / sort ── */
    .resp-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .resp-tag {
      padding: 7px 16px; border-radius: 500px; font-size: 15px; font-weight: 700;
      border: 1px solid var(--border); background: var(--interactive); color: var(--sub);
      cursor: pointer; transition: all 0.12s; user-select: none;
    }
    .resp-tag:hover { border-color: var(--green); color: var(--green); }
    .resp-tag.active { background: var(--green); border-color: var(--green); color: #000; }
    .resp-sort-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .resp-sort-btn {
      padding: 7px 16px; border-radius: 500px; font-size: 15px; font-weight: 700;
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      cursor: pointer; font-family: inherit; transition: all 0.12s;
    }
    .resp-sort-btn:hover { border-color: var(--green); color: var(--green); }
    .resp-sort-btn.active { background: var(--green); border-color: var(--green); color: #000; }

    /* ── Response list modal ── */
    #respListModal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 300; align-items: center; justify-content: center; padding: 20px;
    }
    #respListModal.open { display: flex; }
    .rlm-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      max-width: 380px; width: 100%; max-height: 70vh; display: flex; flex-direction: column;
      overflow: hidden;
    }
    .rlm-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 18px; border-bottom: 1px solid var(--border);
    }
    .rlm-title { font-size: 16px; font-weight: 800; color: var(--green); }
    .rlm-close { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; opacity: 0.6; padding: 4px; }
    .rlm-close:hover { opacity: 1; }
    .rlm-body { overflow-y: auto; padding: 8px 10px; }
    .rlm-empty { text-align: center; color: var(--sub); font-size: 15px; padding: 30px 10px; }
    .rlm-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-radius: 8px; font-size: 15px; }
    .rlm-item:nth-child(odd) { background: var(--interactive); }
    .rlm-item-name { font-weight: 700; }
    .rlm-item-id { color: var(--sub); font-size: 14px; }
    .stat-bar-cnt.clickable-cnt { cursor: pointer; text-decoration: underline; text-decoration-style: dotted; }
    .stat-bar-cnt.clickable-cnt:hover { color: var(--green); }

    /* ── Admin login modal ── */
    #adminLoginModal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 300; align-items: center; justify-content: center; padding: 20px;
    }
    #adminLoginModal.open { display: flex; }
    .alm-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      max-width: 340px; width: 100%; padding: 26px 22px;
    }
    .alm-title { font-size: 17px; font-weight: 800; margin-bottom: 18px; text-align: center; }
    .alm-error {
      display: none; font-size: 13px; color: var(--danger); margin: -8px 0 14px; text-align: center;
    }
    .alm-btn-row { display: flex; gap: 8px; margin-top: 4px; }
    .alm-btn-row .btn-nav { margin: 0; }
  </style>
</head>
<body>

<!-- ══ SURVEY ══ -->
<div id="surveyApp">
  <div class="top-bar">
    <div class="top-bar-inner">
      <div class="top-title">2026학년도 3학년 1학기 역사 수업 설문조사</div>
    </div>
  </div>
  <div id="surveyContent"></div>
</div>

<!-- ══ ADMIN OVERLAY ══ -->
<div id="adminOverlay">
  <div class="adm-top">
    <div class="adm-top-row">
      <span class="adm-top-title">관리자 패널</span>
      <button class="adm-close" id="admCloseBtn">✕</button>
    </div>
    <div class="adm-tabs">
      <div class="adm-tab active" data-tab="edit">설문 편집</div>
      <div class="adm-tab" data-tab="stats">응답 통계</div>
      <div class="adm-tab" data-tab="responses">개별 응답</div>
    </div>
  </div>
  <div class="adm-body" id="admBody"></div>
</div>

<div id="respListModal">
  <div class="rlm-card">
    <div class="rlm-hd">
      <span class="rlm-title" id="rlmTitle"></span>
      <button class="rlm-close" id="rlmCloseBtn">✕</button>
    </div>
    <div class="rlm-body" id="rlmBody"></div>
  </div>
</div>

<div id="adminLoginModal">
  <div class="alm-card">
    <div class="alm-title">관리자 비밀번호</div>
    <div class="alm-error" id="adminLoginError">비밀번호가 틀렸습니다.</div>
    <input class="form-input" id="adminLoginInput" type="password" placeholder="비밀번호를 입력하세요">
    <div class="alm-btn-row">
      <button class="btn-nav" id="adminLoginCancel">취소</button>
      <button class="btn-nav fill" id="adminLoginSubmit">확인</button>
    </div>
  </div>
</div>

// ── State ──
let config = null;
let step = 0;
let answers = {};
let studentId = '';
let studentName = '';
let adminLoggedIn = false;

function isValidStudentId(id) {
  if (id === '00000') return true;
  return /^30[1-6]\d{2}$/.test(id);
}
function getClassNum(id) {
  if (!id || id === '00000') return 0;
  const n = parseInt(id[2], 10);
  return (n >= 1 && n <= 6) ? n : 0;
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Session storage ──
function saveSession() {
  if (step > config.sections.length) { clearSession(); return; }
  sessionStorage.setItem('sv_step', step);
  sessionStorage.setItem('sv_id', studentId);
  sessionStorage.setItem('sv_name', studentName);
  sessionStorage.setItem('sv_answers', JSON.stringify(answers));
}
function clearSession() {
  ['sv_step','sv_id','sv_name','sv_answers'].forEach(k => sessionStorage.removeItem(k));
}
function loadSession() {
  const s = sessionStorage.getItem('sv_step');
  if (s == null) return;
  step = parseInt(s) || 0;
  studentId = sessionStorage.getItem('sv_id') || '';
  studentName = sessionStorage.getItem('sv_name') || '';
  try { answers = JSON.parse(sessionStorage.getItem('sv_answers') || '{}'); } catch { answers = {}; }
}

// ── Slider fill helper ──
function setSliderFill(slider, val) {
  const pct = ((val - 1) / 4) * 100;
  slider.style.background = `linear-gradient(to right, var(--green) ${pct}%, var(--border) ${pct}%)`;
}

// ── Init ──
async function init() {
  try {
    const snap = await getDoc(doc(db, 'survey_config', 'main'));
    config = snap.exists() ? snap.data() : JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  } catch { config = JSON.parse(JSON.stringify(DEFAULT_CONFIG)); }

  loadSession();
  history.replaceState({ surveyStep: step }, '');
  renderStep();

  if (sessionStorage.getItem('admin_auth') === '1') adminLoggedIn = true;
  if (adminLoggedIn && sessionStorage.getItem('adm_open') === '1') {
    currentAdminTab = sessionStorage.getItem('adm_tab') || 'edit';
    document.querySelectorAll('.adm-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === currentAdminTab));
    const savedFilter = sessionStorage.getItem('resp_filter');
    if (savedFilter != null) respFilterClass = savedFilter === 'all' ? 'all' : parseInt(savedFilter, 10);
    respSortDir = sessionStorage.getItem('resp_sortdir') || 'asc';
    respIndex = parseInt(sessionStorage.getItem('resp_index') || '0', 10);
    document.getElementById('adminOverlay').style.display = 'block';
    document.body.style.overflow = 'hidden';
    history.pushState({ adminOpen: true }, '');
    renderAdminTab();
  }
}

// ── Browser back button ──
window.addEventListener('popstate', (e) => {
  if (document.getElementById('adminOverlay').style.display === 'block') {
    closeAdmin(); return;
  }
  if (e.state && typeof e.state.surveyStep === 'number') {
    step = e.state.surveyStep;
    renderStep(false);
  }
});

// ── Render ──
function renderStep(pushHistory = true) {
  const el = document.getElementById('surveyContent');
  el.innerHTML = '';

  if (step === 0) {
    el.innerHTML = renderIntroHTML();
    el.querySelector('#startBtn').addEventListener('click', startSurvey);
  } else if (step <= config.sections.length) {
    const sec = config.sections[step - 1];
    el.innerHTML = renderSectionHTML(sec);
    el.innerHTML += renderNavHTML(step === config.sections.length);
    attachSectionListeners(sec, el);
    attachNavListeners(el, step === config.sections.length);
  } else {
    el.innerHTML = renderDoneHTML();
    el.querySelector('#homeBtn').addEventListener('click', () => {
      step = 0;
      answers = {};
      studentId = '';
      studentName = '';
      clearSession();
      renderStep();
    });
  }

  if (pushHistory) history.pushState({ surveyStep: step }, '');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderIntroHTML() {
  return `
    <div class="card intro-card">
      <div class="intro-title">안녕하세요!</div>
      <div class="intro-desc">
        이 설문은 1학기 역사 수업에 대한 여러분의 솔직한 의견을 듣기 위한 것입니다.<br><br>
        총 5개 섹션으로 구성되어 있으며 약 5~10분 소요됩니다.<br>
        모든 항목이 필수이니 성실하게 답해주세요 :)
      </div>
      <div class="form-label">학번 (5자리)</div>
      <input class="form-input" id="inpId" type="text" inputmode="numeric" maxlength="5" placeholder="예: 30101" value="${esc(studentId)}">
      <div class="form-label">이름</div>
      <input class="form-input" id="inpName" type="text" placeholder="이름을 입력하세요" value="${esc(studentName)}">
      <button class="btn-primary" id="startBtn">시작하기</button>
    </div>`;
}

function renderSectionHTML(sec) {
  let qNum = 0;
  const qs = sec.questions.map(q => {
    if (q.type === 'scale') qNum++;
    const prefix = q.type === 'scale' ? `<span class="q-num">${qNum}.</span>` : '';
    const label = `<div class="q-label">${prefix}${esc(q.text)}</div>`;

    if (q.type === 'scale') {
      const sel = answers[q.id];
      const sliderVal = sel != null ? sel : 3;
      const isUnset = sel == null;
      const valDisplay = isUnset
        ? `<div class="slider-val-display" data-qid="${esc(q.id)}" style="display:none"></div>`
        : `<div class="slider-val-display" data-qid="${esc(q.id)}">${sliderVal}점 · ${esc(q.options[sliderVal-1])}</div>`;
      return `<div class="q-block">${label}
        <div class="slider-wrap">
          <div class="slider-ends">
            <span>${esc(q.options[0])}</span>
            <span>${esc(q.options[4])}</span>
          </div>
          <input type="range" min="1" max="5" step="1" value="${sliderVal}"
            class="scale-slider ${isUnset ? 'unset-slider' : ''}"
            data-qid="${esc(q.id)}"
            data-opts="${esc(JSON.stringify(q.options))}">
          <div class="slider-ticks">
            <span class="slider-tick">1</span>
            <span class="slider-tick">2</span>
            <span class="slider-tick">3</span>
            <span class="slider-tick">4</span>
            <span class="slider-tick">5</span>
          </div>
          ${valDisplay}
        </div>
      </div>`;
    }

    if (q.type === 'checkbox') {
      const sel = answers[q.id] || [];
      const items = q.options.map(opt => {
        const cls = sel.includes(opt) ? 'check-item checked' : 'check-item';
        return `<div class="${cls}" data-qid="${esc(q.id)}" data-opt="${esc(opt)}">
          <div class="check-box"></div><span>${esc(opt)}</span></div>`;
      }).join('');
      return `<div class="q-block">${label}<div class="check-wrap">${items}</div></div>`;
    }

    if (q.type === 'text') {
      const val = answers[q.id] || '';
      return `<div class="q-block">${label}
        <textarea class="survey-ta" data-qid="${esc(q.id)}" placeholder="자유롭게 작성해주세요.">${esc(val)}</textarea>
        <div class="char-count" data-qid="${esc(q.id)}">${val.replace(/\s/g, '').length}자</div>
      </div>`;
    }
    return '';
  }).join('');

  return `<div class="card"><div class="sec-title">${esc(sec.title)}</div>${qs}</div>`;
}

function renderNavHTML(isLast) {
  const prevBtn = step > 1 ? `<button class="btn-nav" id="prevBtn">이전</button>` : '';
  return `<div class="nav-wrap">${prevBtn}<button class="btn-nav fill" id="nextBtn">${isLast ? '제출하기' : '다음'}</button></div>`;
}

function renderDoneHTML() {
  return `<div class="card done-wrap">
    <div class="done-icon">🎉</div>
    <div class="done-title">제출 완료!</div>
    <div class="done-desc">설문에 참여해 주셔서 감사합니다.<br>여러분의 소중한 의견이 더 좋은 수업을 만드는 데<br>큰 도움이 됩니다.</div>
    <button class="btn-home" id="homeBtn">처음으로 돌아가기</button>
  </div>`;
}

// ── Listeners ──
function attachSectionListeners(sec, el) {
  el.querySelectorAll('.scale-slider').forEach(slider => {
    const qid = slider.dataset.qid;
    const opts = JSON.parse(slider.dataset.opts);

    if (!slider.classList.contains('unset-slider')) {
      setSliderFill(slider, parseInt(slider.value));
    }

    slider.addEventListener('input', () => {
      const val = parseInt(slider.value);
      answers[qid] = val;
      slider.classList.remove('unset-slider');
      setSliderFill(slider, val);
      const display = el.querySelector(`.slider-val-display[data-qid="${qid}"]`);
      display.style.display = '';
      display.textContent = `${val}점 · ${opts[val-1]}`;
      saveSession();
    });
  });

  el.querySelectorAll('.check-item').forEach(item => {
    item.addEventListener('click', () => {
      const qid = item.dataset.qid;
      const opt = item.dataset.opt;
      if (!answers[qid]) answers[qid] = [];
      if (answers[qid].includes(opt)) {
        answers[qid] = answers[qid].filter(v => v !== opt);
        item.classList.remove('checked');
      } else {
        answers[qid].push(opt);
        item.classList.add('checked');
      }
      saveSession();
    });
  });

  el.querySelectorAll('.survey-ta').forEach(ta => {
    ta.addEventListener('input', () => {
      answers[ta.dataset.qid] = ta.value;
      const cc = el.querySelector(`.char-count[data-qid="${ta.dataset.qid}"]`);
      if (cc) cc.textContent = `${ta.value.replace(/\s/g, '').length}자`;
      saveSession();
    });
  });
}

function attachNavListeners(el, isLast) {
  const prev = el.querySelector('#prevBtn');
  const next = el.querySelector('#nextBtn');
  if (prev) prev.addEventListener('click', () => history.back());
  if (next) next.addEventListener('click', isLast ? submitSurvey : nextStep);
}

// ── Survey flow ──
function startSurvey() {
  const id   = document.getElementById('inpId').value.trim();
  const name = document.getElementById('inpName').value.trim();
  if (!id || id.length !== 5 || !/^\d+$/.test(id)) { alert('학번을 5자리 숫자로 입력해주세요.'); return; }
  if (!isValidStudentId(id)) { alert('학번 형식이 올바르지 않습니다.\n30xxx 형태로 입력해주세요. (3번째 자리는 1~6, 예외적으로 00000 허용)'); return; }
  if (!name) { alert('이름을 입력해주세요.'); return; }
  studentId = id; studentName = name;
  step = 1;
  saveSession();
  renderStep();
}

function nextStep() {
  if (!validateSection()) return;
  step++;
  saveSession();
  renderStep();
}

function validateSection() {
  const sec = config.sections[step - 1];
  for (const q of sec.questions) {
    if (!q.required) continue;
    if (q.type === 'scale' && answers[q.id] == null) {
      alert('모든 항목을 응답해주세요.');
      return false;
    }
    if (q.type === 'checkbox' && (!answers[q.id] || !answers[q.id].length)) {
      alert('하나 이상 선택해주세요.');
      return false;
    }
    if (q.type === 'text' && (!answers[q.id] || !answers[q.id].trim())) {
      alert('모든 항목을 작성해주세요.');
      return false;
    }
  }
  return true;
}

async function submitSurvey() {
  if (!validateSection()) return;
  const btn = document.getElementById('nextBtn');
  btn.disabled = true; btn.textContent = '제출 중...';
  try {
    await addDoc(collection(db, 'survey_responses'), {
      studentId, studentName, submittedAt: new Date(), answers,
    });
    clearSession();
    step = config.sections.length + 1;
    renderStep();
  } catch(e) {
    alert('제출 중 오류가 발생했습니다. 다시 시도해주세요.\n' + e.message);
    btn.disabled = false; btn.textContent = '제출하기';
  }
}

  history.pushState({ adminOpen: true }, '');
  sessionStorage.setItem('adm_open', '1');
  renderAdminTab();
}

function closeAdmin() {
  document.getElementById('adminOverlay').style.display = 'none';
  document.body.style.overflow = '';
  sessionStorage.removeItem('adm_open');
}

document.getElementById('admCloseBtn').addEventListener('click', () => {
  history.back();
});

// ── Admin login modal ──
function openAdminLoginModal() {
  document.getElementById('adminLoginError').style.display = 'none';
  document.getElementById('adminLoginInput').value = '';
  document.getElementById('adminLoginModal').classList.add('open');
  setTimeout(() => document.getElementById('adminLoginInput').focus(), 50);
}
function closeAdminLoginModal() {
  document.getElementById('adminLoginModal').classList.remove('open');
}
function attemptAdminLogin() {
  const pw = document.getElementById('adminLoginInput').value;
  if (pw !== ADMIN_PW) {
    document.getElementById('adminLoginError').style.display = 'block';
    return;
  }
  adminLoggedIn = true;
  sessionStorage.setItem('admin_auth', '1');
  closeAdminLoginModal();
  openAdmin();
}
document.getElementById('adminLoginSubmit').addEventListener('click', attemptAdminLogin);
document.getElementById('adminLoginCancel').addEventListener('click', closeAdminLoginModal);
document.getElementById('adminLoginInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') attemptAdminLogin();
});
document.getElementById('adminLoginModal').addEventListener('click', (e) => {
  if (e.target.id === 'adminLoginModal') closeAdminLoginModal();
});

document.querySelectorAll('.adm-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    currentAdminTab = tab.dataset.tab;
    document.querySelectorAll('.adm-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === currentAdminTab));
    sessionStorage.setItem('adm_tab', currentAdminTab);
    renderAdminTab();
  });
});

async function renderAdminTab() {
  if (currentAdminTab === 'edit') renderAdminEdit();
  else if (currentAdminTab === 'stats') {
    document.getElementById('admBody').innerHTML = '<div class="empty-state">불러오는 중...</div>';
    await renderAdminStats();
  } else {
    document.getElementById('admBody').innerHTML = '<div class="empty-state">불러오는 중...</div>';
    await renderAdminResponses();
  }
}

// ── Admin Edit ──
function renderAdminEdit() {
  const body = document.getElementById('admBody');
  let html = `<div class="adm-save-bar">
    <span class="adm-save-msg">변경사항을 저장하면 즉시 반영됩니다.</span>
    <button class="btn-adm-save" id="admSaveBtn">저장하기</button>
  </div>`;

  config.sections.forEach((sec, si) => {
    let qHtml = '';
    sec.questions.forEach((q, qi) => {
      const typeLbl = q.type === 'scale' ? '5점 척도' : q.type === 'checkbox' ? '복수 선택' : '주관식';
      let optsHtml = '';
      if (q.type === 'scale' || q.type === 'checkbox') {
        const rows = q.options.map((opt, oi) => `
          <div class="adm-opt-row">
            <input class="adm-opt-inp opt-inp" value="${esc(opt)}" data-si="${si}" data-qi="${qi}" data-oi="${oi}">
            ${q.type === 'checkbox' ? `<button class="adm-opt-del del-opt-btn" data-si="${si}" data-qi="${qi}" data-oi="${oi}">✕</button>` : ''}
          </div>`).join('');
        optsHtml = `
          <div class="adm-opts-label">${q.type === 'scale' ? '선택지 라벨 (1→5 순서)' : '선택지 목록'}</div>
          <div>${rows}</div>
          ${q.type === 'checkbox' ? `<button class="adm-opt-add add-opt-btn" data-si="${si}" data-qi="${qi}">+ 옵션 추가</button>` : ''}`;
      }
      qHtml += `<div class="adm-q-item">
        <div class="adm-q-meta">Q${qi+1} · ${typeLbl} · 필수</div>
        <textarea class="adm-q-inp q-text-inp" rows="2" data-si="${si}" data-qi="${qi}">${esc(q.text)}</textarea>
        ${optsHtml}
      </div>`;
    });
    html += `<div class="adm-sec-block">
      <div class="adm-sec-hd">
        <span class="adm-sec-num">${si+1}</span>
        <input class="adm-sec-title-inp sec-title-inp" value="${esc(sec.title)}" data-si="${si}">
      </div>
      <div class="adm-q-list">${qHtml}</div>
    </div>`;
  });

  body.innerHTML = html;

  body.querySelectorAll('.sec-title-inp').forEach(inp => {
    inp.addEventListener('input', () => { config.sections[+inp.dataset.si].title = inp.value; });
  });
  body.querySelectorAll('.q-text-inp').forEach(ta => {
    ta.addEventListener('input', () => { config.sections[+ta.dataset.si].questions[+ta.dataset.qi].text = ta.value; });
  });
  body.querySelectorAll('.opt-inp').forEach(inp => {
    inp.addEventListener('input', () => { config.sections[+inp.dataset.si].questions[+inp.dataset.qi].options[+inp.dataset.oi] = inp.value; });
  });
  body.querySelectorAll('.del-opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      config.sections[+btn.dataset.si].questions[+btn.dataset.qi].options.splice(+btn.dataset.oi, 1);
      renderAdminEdit();
    });
  });
  body.querySelectorAll('.add-opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      config.sections[+btn.dataset.si].questions[+btn.dataset.qi].options.push('새 옵션');
      renderAdminEdit();
    });
  });
  body.querySelector('#admSaveBtn').addEventListener('click', async () => {
    try {
      await setDoc(doc(db, 'survey_config', 'main'), config);
      alert('저장되었습니다.');
    } catch(e) { alert('저장 실패: ' + e.message); }
  });
}

// ── Admin Stats ──
async function renderAdminStats() {
  const body = document.getElementById('admBody');
  try {
    const snap = await getDocs(query(collection(db, 'survey_responses'), orderBy('submittedAt', 'desc')));
    const responses = snap.docs.map(d => d.data());
    const total = responses.length;

    if (!total) {
      body.innerHTML = '<div class="empty-state">아직 제출된 응답이 없습니다.</div>';
      return;
    }

    statMatches = {};

    let html = `<div class="adm-top-bar">
      <div class="stat-badge">총 ${total}명 응답</div>
      <button class="btn-reset" id="resetAllBtn">전체 초기화</button>
    </div>`;

    config.sections.forEach(sec => {
      html += `<div class="stat-sec-label">${esc(sec.title)}</div>`;
      sec.questions.forEach(q => {
        if (q.type === 'scale') {
          const counts = [0,0,0,0,0];
          responses.forEach(r => { const v = r.answers?.[q.id]; if (v >= 1 && v <= 5) counts[v-1]++; });
          const answered = counts.reduce((a,b) => a+b, 0);
          const sum = counts.reduce((a,b,i) => a + b*(i+1), 0);
          const avg = answered ? (sum/answered).toFixed(2) : '—';
          const bars = q.options.map((opt, i) => {
            const pct = total > 0 ? Math.round(counts[i]/total*100) : 0;
            const key = `${q.id}_s${i+1}`;
            statMatches[key] = responses
              .filter(r => r.answers?.[q.id] === i+1)
              .map(r => ({ id: r.studentId, name: r.studentName }));
            const cntCls = counts[i] > 0 ? 'stat-bar-cnt clickable-cnt' : 'stat-bar-cnt';
            return `<div class="stat-bar-row">
              <div class="stat-bar-lbl">${esc(opt)}</div>
              <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%"></div></div>
              <div class="${cntCls}" data-key="${key}" data-label="${esc(opt)}">${counts[i]}</div>
            </div>`;
          }).join('');
          html += `<div class="stat-card"><div class="stat-q-text">${esc(q.text)}</div>${bars}<div class="stat-avg">평균 ${avg}점 (${answered}명 응답)</div></div>`;

        } else if (q.type === 'checkbox') {
          const optCounts = {};
          q.options.forEach(o => optCounts[o] = 0);
          responses.forEach(r => { (r.answers?.[q.id] || []).forEach(v => { if (v in optCounts) optCounts[v]++; }); });
          const bars = q.options.map((opt, oi) => {
            const cnt = optCounts[opt] || 0;
            const pct = total > 0 ? Math.round(cnt/total*100) : 0;
            const key = `${q.id}_c${oi}`;
            statMatches[key] = responses
              .filter(r => (r.answers?.[q.id] || []).includes(opt))
              .map(r => ({ id: r.studentId, name: r.studentName }));
            const cntCls = cnt > 0 ? 'stat-bar-cnt clickable-cnt' : 'stat-bar-cnt';
            return `<div class="stat-bar-row">
              <div class="stat-bar-lbl">${esc(opt)}</div>
              <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%"></div></div>
              <div class="${cntCls}" data-key="${key}" data-label="${esc(opt)}">${cnt}</div>
            </div>`;
          }).join('');
          html += `<div class="stat-card"><div class="stat-q-text">${esc(q.text)}</div>${bars}</div>`;

        } else if (q.type === 'text') {
          const texts = responses.map(r => r.answers?.[q.id]).filter(v => v && v.trim());
          if (!texts.length) return;
          const items = texts.map(v => `<li class="stat-text-item">${esc(v)}</li>`).join('');
          html += `<div class="stat-card"><div class="stat-q-text">${esc(q.text)}</div><ul class="stat-text-list">${items}</ul></div>`;
        }
      });
    });

    body.innerHTML = html;

    body.querySelectorAll('.clickable-cnt').forEach(el => {
      el.addEventListener('click', () => {
        openRespModal(statMatches[el.dataset.key] || [], el.dataset.label);
      });
    });

    body.querySelector('#resetAllBtn').addEventListener('click', async () => {
      if (!confirm('모든 응답 데이터를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;
      try {
        const s = await getDocs(collection(db, 'survey_responses'));
        await Promise.all(s.docs.map(d => deleteDoc(d.ref)));
        body.innerHTML = '<div class="empty-state">초기화가 완료되었습니다.</div>';
      } catch(e) { alert('초기화 실패: ' + e.message); }
    });

  } catch(e) {
    body.innerHTML = `<div class="empty-state" style="color:var(--danger)">오류: ${esc(e.message)}</div>`;
  }
}

// ── Response list modal ──
function openRespModal(list, label) {
  document.getElementById('rlmTitle').textContent = label ? `${label} · ${list.length}명` : `${list.length}명`;
  const bodyEl = document.getElementById('rlmBody');
  bodyEl.innerHTML = list.length
    ? list.map(s => `<div class="rlm-item"><span class="rlm-item-name">${esc(s.name)}</span><span class="rlm-item-id">${esc(s.id)}</span></div>`).join('')
    : '<div class="rlm-empty">선택한 학생이 없습니다.</div>';
  document.getElementById('respListModal').classList.add('open');
}
function closeRespModal() {
  document.getElementById('respListModal').classList.remove('open');
}
document.getElementById('rlmCloseBtn').addEventListener('click', closeRespModal);
document.getElementById('respListModal').addEventListener('click', (e) => {
  if (e.target.id === 'respListModal') closeRespModal();
});

// ── Admin Responses ──
async function renderAdminResponses() {
  const body = document.getElementById('admBody');
  try {
    const snap = await getDocs(query(collection(db, 'survey_responses'), orderBy('submittedAt', 'desc')));
    allResponses = snap.docs.map(d => ({ _docId: d.id, ...d.data() }));
    renderResponseList();
  } catch(e) {
    body.innerHTML = `<div class="empty-state" style="color:var(--danger)">오류: ${esc(e.message)}</div>`;
  }
}

function saveRespState() {
  sessionStorage.setItem('resp_filter', String(respFilterClass));
  sessionStorage.setItem('resp_sortdir', respSortDir);
  sessionStorage.setItem('resp_index', String(respIndex));
}

function buildRespCardHTML(r) {
  const date = r.submittedAt?.toDate?.() || new Date();
  const dateStr = date.toLocaleDateString('ko-KR') + ' ' + date.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});

  const sectionGroups = [];
  let textHtml = '';

  config.sections.forEach(sec => {
    const rows = [];
    const textItems = [];
    sec.questions.forEach(q => {
      const val = r.answers?.[q.id];
      if (val == null || val === '') return;
      if (q.type === 'scale') {
        rows.push(`<td class="resp-table-q">${esc(q.text)}</td><td class="resp-table-a">${val}점 · ${esc(q.options[val-1] || '')}</td>`);
      } else if (q.type === 'checkbox') {
        const items = Array.isArray(val) ? val : [String(val)];
        const dv = items.map(v => esc(v)).join('<br>');
        rows.push(`<td class="resp-table-q resp-table-q-narrow">${esc(q.text)}</td><td class="resp-table-a">${dv}</td>`);
      } else if (q.type === 'text') {
        textItems.push(`<div class="resp-q"><div class="resp-q-text">${esc(q.text)}</div><div class="resp-q-ans">${esc(val)}</div></div>`);
      }
    });
    if (rows.length) sectionGroups.push({ title: sec.title, rows });
    if (textItems.length) {
      textHtml += `<div class="resp-text-sec">${esc(sec.title)}</div>${textItems.join('')}`;
    }
  });

  let tableHtml = '';
  if (sectionGroups.length) {
    const bodyRows = sectionGroups.map(grp =>
      grp.rows.map((cells, i) => i === 0
        ? `<tr><td class="resp-table-sec" rowspan="${grp.rows.length}">${esc(grp.title)}</td>${cells}</tr>`
        : `<tr>${cells}</tr>`
      ).join('')
    ).join('');
    tableHtml = `<table class="resp-table"><tbody>${bodyRows}</tbody></table>`;
  }

  return `<div class="resp-card" data-docid="${esc(r._docId)}">
    <div class="resp-header">
      <div><div class="resp-name">${esc(r.studentName)}</div><div class="resp-id">${esc(r.studentId)}</div></div>
      <div class="resp-header-right">
        <div class="resp-date">${dateStr}</div>
        <button class="btn-del-resp" data-docid="${esc(r._docId)}">삭제</button>
      </div>
    </div>
    ${tableHtml}
    ${textHtml ? `<div class="resp-text-heading">서술형 응답</div>${textHtml}` : ''}
  </div>`;
}

function renderResponseList() {
  const body = document.getElementById('admBody');

  if (!allResponses.length) {
    body.innerHTML = '<div class="empty-state">아직 제출된 응답이 없습니다.</div>';
    return;
  }

  const filtered = respFilterClass === 'all'
    ? allResponses.slice()
    : allResponses.filter(r => getClassNum(r.studentId) === respFilterClass);

  const sorted = filtered.slice().sort((a, b) => {
    const cmp = (a.studentId || '').localeCompare(b.studentId || '');
    return respSortDir === 'asc' ? cmp : -cmp;
  });

  const tagDefs = [
    { key: 'all', label: '전체' },
    { key: 1, label: '1반' }, { key: 2, label: '2반' }, { key: 3, label: '3반' },
    { key: 4, label: '4반' }, { key: 5, label: '5반' }, { key: 6, label: '6반' },
  ];
  const tagsHtml = tagDefs.map(t =>
    `<div class="resp-tag${respFilterClass === t.key ? ' active' : ''}" data-key="${t.key}">${t.label}</div>`
  ).join('');

  const sortArrow = respSortDir === 'asc' ? ' ↑' : ' ↓';
  const filterLabel = respFilterClass === 'all' ? '전체' : `${respFilterClass}반`;

  let html = `
    <div class="resp-tags">${tagsHtml}</div>
    <div class="resp-sort-row"><button class="resp-sort-btn active" id="respSortBtn">학번순${sortArrow}</button></div>
    <div class="adm-top-bar">
      <div class="stat-badge">${filterLabel} ${sorted.length}명 응답</div>
      <button class="btn-reset" id="resetAllBtn">전체 초기화</button>
    </div>`;

  if (!sorted.length) {
    html += '<div class="empty-state">해당 조건의 응답이 없습니다.</div>';
    body.innerHTML = html;
  } else {
    if (respIndex >= sorted.length) respIndex = sorted.length - 1;
    if (respIndex < 0) respIndex = 0;

    html += `<div class="resp-pager">
      <button class="btn-nav" id="respPrevBtn" ${respIndex <= 0 ? 'disabled' : ''}>이전</button>
      <div class="resp-pager-count">${respIndex + 1} / ${sorted.length}</div>
      <button class="btn-nav" id="respNextBtn" ${respIndex >= sorted.length - 1 ? 'disabled' : ''}>다음</button>
    </div>`;
    html += buildRespCardHTML(sorted[respIndex]);
    body.innerHTML = html;

    body.querySelector('#respPrevBtn')?.addEventListener('click', () => { respIndex--; saveRespState(); renderResponseList(); });
    body.querySelector('#respNextBtn')?.addEventListener('click', () => { respIndex++; saveRespState(); renderResponseList(); });

    body.querySelectorAll('.btn-del-resp').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('이 응답을 삭제하시겠습니까?')) return;
        try {
          await deleteDoc(doc(db, 'survey_responses', btn.dataset.docid));
          allResponses = allResponses.filter(r => r._docId !== btn.dataset.docid);
          renderResponseList();
        } catch(e) { alert('삭제 실패: ' + e.message); }
      });
    });
  }

  body.querySelectorAll('.resp-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      const k = tag.dataset.key;
      respFilterClass = k === 'all' ? 'all' : parseInt(k, 10);
      respIndex = 0;
      saveRespState();
      renderResponseList();
    });
  });

  body.querySelector('#respSortBtn').addEventListener('click', () => {
    respSortDir = respSortDir === 'asc' ? 'desc' : 'asc';
    respIndex = 0;
    saveRespState();
    renderResponseList();
  });

  body.querySelector('#resetAllBtn').addEventListener('click', async () => {
    if (!confirm('모든 응답 데이터를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;
    try {
      const s = await getDocs(collection(db, 'survey_responses'));
      await Promise.all(s.docs.map(d => deleteDoc(d.ref)));
      allResponses = [];
      body.innerHTML = '<div class="empty-state">초기화가 완료되었습니다.</div>';
    } catch(e) { alert('초기화 실패: ' + e.message); }
  });
}

init();
