<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수업 자료 슬라이드</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    :root {
      --font:     'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      --bg:       #e8e0d0;
      --card-bg:  #f7f2e8;
      --navy:     #1c3461;
      --red:      #b83030;
      --text:     #2c2823;
      --text-sub: #7a6f5e;
      --border:   #cfc6b0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    header {
      background: var(--navy);
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-brand {
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .header-title { font-size: 1.5rem; font-weight: 800; color: #fff; }
    .header-admin {
      font-size: 0.82rem;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      padding: 7px 18px;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 20px;
      transition: all 0.15s;
    }
    .header-admin:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.88); }

    .year-section { padding: 32px 40px 0; }
    .year-label {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text-sub);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .lesson-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
      padding-bottom: 40px;
    }
    .lesson-card {
      display: flex;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      color: var(--text);
    }
    .card-num {
      background: var(--navy);
      color: rgba(255,255,255,0.82);
      width: 72px;
      min-width: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.7rem;
      font-weight: 900;
      letter-spacing: -0.02em;
    }
    .card-body { padding: 14px 18px 12px; flex: 1; }
    .card-unit { font-size: 0.78rem; color: var(--text-sub); margin-bottom: 5px; }
    .card-title { font-size: 1.05rem; font-weight: 700; color: var(--navy); line-height: 1.35; margin-bottom: 12px; }
    .card-btns { display: flex; gap: 8px; }
    .card-btn {
      flex: 1;
      padding: 7px 0;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--bg);
      font-family: var(--font);
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-sub);
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .card-btn:hover { background: var(--navy); color: #fff; border-color: var(--navy); }
    .card-btn.blank:hover { background: var(--red); border-color: var(--red); color: #fff; }

    .empty { padding: 80px 40px; text-align: center; color: var(--text-sub); }
  </style>
</head>
<body>

<header>
  <div>
    <p class="header-brand">Hoseong History</p>
    <h1 class="header-title">수업 자료 슬라이드</h1>
  </div>
  <a href="admin.html" class="header-admin">설정</a>
</header>

<div id="content"><div class="empty" style="padding:80px 40px;text-align:center;color:var(--text-sub)">불러오는 중…</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
  authDomain:"ho0911seong-56638.firebaseapp.com",
  projectId:"ho0911seong-56638",
  storageBucket:"ho0911seong-56638.firebasestorage.app",
  messagingSenderId:"994509567071",
  appId:"1:994509567071:web:8b33bb03a3d8f3a9f557ea"
});
const db = getFirestore(app);
const content = document.getElementById('content');

onSnapshot(query(collection(db, 'class_lessons'), orderBy('order','asc')), snap => {
  const lessons = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
  if (!lessons.length) {
    content.innerHTML = '<p class="empty">등록된 강의가 없습니다.</p>';
    return;
  }
  const byYear = lessons.reduce((acc, l) => { (acc[l.year] ??= []).push(l); return acc; }, {});
  content.innerHTML = '';
  Object.keys(byYear).sort().reverse().forEach(year => {
    const section = document.createElement('div');
    section.className = 'year-section';
    section.innerHTML = `<p class="year-label">${year}학년도</p>`;
    const grid = document.createElement('div');
    grid.className = 'lesson-grid';
    byYear[year].forEach(l => {
      const div = document.createElement('div');
      div.className = 'lesson-card';
      div.innerHTML = `
        <div class="card-num">${l.num}</div>
        <div class="card-body">
          <p class="card-unit">${l.unit}</p>
          <h2 class="card-title">${l.title}</h2>
          <div class="card-btns">
            <a class="card-btn" href="../lms/lecture.html?num=${l.num}&mode=complete">완성형</a>
            <a class="card-btn blank" href="../lms/lecture.html?num=${l.num}&mode=blank">빈칸형</a>
          </div>
        </div>`;
      grid.appendChild(div);
    });
    section.appendChild(grid);
    content.appendChild(section);
  });
});
</script>
</body>
</html>
