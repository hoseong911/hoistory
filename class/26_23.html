<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>23강 · 고려의 사회, 고려의 문화</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    /* ════════════════════════════════
       디자인 변수 — 색상은 여기서 조정
       ════════════════════════════════ */
    :root {
      --font:       'Pretendard', 'Apple SD Gothic Neo', sans-serif;

      --bg:         #e8e0d0;   /* 페이지 배경 (크림) */
      --slide-bg:   #f7f2e8;   /* 슬라이드 배경 */
      --row-bg:     #f2ede0;   /* 개념 행 배경 */

      --navy:       #1c3461;   /* 제목·헤더·라벨 */
      --navy-pale:  #dce5f5;   /* 옅은 네이비 */

      --red:        #b83030;   /* 핵심 용어 강조 */
      --red-pale:   #fceaea;   /* 공개된 빈칸 배경 */

      --text:       #2c2823;   /* 본문 */
      --text-sub:   #7a6f5e;   /* 보조 설명 */

      --blank-bg:   #2d2921;   /* 빈칸 숨김 색 */
      --border:     #cfc6b0;   /* 테두리 */
    }

    /* ════ 리셋 ════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ════ 모드 선택 화면 ════ */
    #mode-select {
      height: 100vh;
      background: var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 56px;
    }
    .ms-top { text-align: center; }
    .ms-num {
      font-size: 7rem;
      font-weight: 900;
      color: rgba(255,255,255,0.1);
      line-height: 1;
      letter-spacing: -0.04em;
    }
    .ms-title {
      font-size: 2.2rem;
      font-weight: 800;
      color: #fff;
      margin-top: 4px;
    }
    .ms-unit {
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
      margin-top: 10px;
    }
    .ms-btns { display: flex; gap: 16px; }
    .ms-btn {
      padding: 18px 52px;
      font-family: var(--font);
      font-size: 1.15rem;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      transition: transform 0.15s, background 0.15s;
    }
    .ms-btn:hover { transform: translateY(-2px); }
    .ms-btn.complete { background: #fff; color: var(--navy); }
    .ms-btn.complete:hover { background: #f0ecd8; }
    .ms-btn.blank {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.88);
      border: 2px solid rgba(255,255,255,0.28);
    }
    .ms-btn.blank:hover { background: rgba(255,255,255,0.18); }

    /* ════ 슬라이드 컨테이너 ════ */
    #slides {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      scrollbar-width: none;
    }
    #slides::-webkit-scrollbar { display: none; }

    /* ════ 슬라이드 공통 ════ */
    .slide {
      height: 100vh;
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 52px 80px;
      background: var(--slide-bg);
    }

    /* ════ 표지 ════ */
    .slide-cover {
      background: var(--navy);
      color: #fff;
      gap: 10px;
    }
    .cover-brand {
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.38);
      text-transform: uppercase;
    }
    .cover-num-line {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-top: 10px;
    }
    .cover-num {
      font-size: 5.5rem;
      font-weight: 900;
      color: rgba(255,255,255,0.14);
      line-height: 1;
      letter-spacing: -0.04em;
    }
    .cover-num-label {
      font-size: 1.1rem;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
    }
    .cover-title {
      font-size: 3.4rem;
      font-weight: 800;
      line-height: 1.2;
      margin-top: 4px;
    }
    .cover-meta {
      font-size: 1rem;
      color: rgba(255,255,255,0.45);
      margin-top: 4px;
    }
    .cover-divider {
      width: 48px;
      height: 3px;
      background: rgba(255,255,255,0.25);
      border-radius: 2px;
      margin: 28px 0;
    }
    .cover-obj-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.38);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .cover-objectives { display: flex; flex-direction: column; gap: 10px; }
    .cover-obj {
      font-size: 1.05rem;
      color: rgba(255,255,255,0.7);
      line-height: 1.55;
      padding-left: 24px;
      position: relative;
    }
    .cover-obj::before {
      content: attr(data-n) '.';
      position: absolute;
      left: 0;
      color: rgba(255,255,255,0.35);
      font-weight: 700;
    }

    /* ════ 개념 Check 헤더 ════ */
    .slide-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 26px;
    }
    .check-badge {
      background: var(--navy);
      color: #fff;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 20px;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .check-badge.think { background: #2a6e40; }
    .slide-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--navy);
    }

    /* ════ 개념 행 ════ */
    .concept-rows { display: flex; flex-direction: column; gap: 14px; }
    .concept-row {
      display: flex;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .row-label {
      background: var(--navy);
      color: rgba(255,255,255,0.9);
      width: 110px;
      min-width: 110px;
      padding: 16px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.45;
      word-break: keep-all;
    }
    .row-content {
      flex: 1;
      background: var(--row-bg);
      padding: 16px 22px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      justify-content: center;
    }
    .row-content p {
      font-size: 1.1rem;
      line-height: 1.7;
      color: var(--text);
    }

    /* ════ 빈칸 ════ */
    .blank {
      display: inline-block;
      font-weight: 700;
      border-radius: 4px;
      padding: 1px 5px;
      transition: background 0.18s, color 0.18s;
    }

    /* 완성형: 빨간 강조 */
    body[data-mode="complete"] .blank { color: var(--red); }

    /* 빈칸형: 숨김 */
    body[data-mode="blank"] .blank:not(.revealed) {
      background: var(--blank-bg);
      color: transparent;
      cursor: pointer;
      min-width: 40px;
      user-select: none;
    }
    body[data-mode="blank"] .blank:not(.revealed):hover { background: #47423a; }

    /* 빈칸형: 클릭 후 공개 */
    body[data-mode="blank"] .blank.revealed {
      color: var(--red);
      background: var(--red-pale);
    }

    /* ════ 생각 Check ════ */
    .slide-think { background: #f5f0e4; }
    .think-question {
      font-size: 1.85rem;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.5;
      margin: 18px 0 32px;
    }
    .think-body { display: flex; align-items: center; gap: 48px; }
    .think-qr {
      width: 175px;
      height: 175px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      flex-shrink: 0;
      object-fit: contain;
    }
    .think-guide {
      font-size: 1.1rem;
      color: var(--text-sub);
      line-height: 1.85;
    }
    .think-guide strong { color: var(--red); }

    /* ════ 오버레이 UI ════ */
    #back-btn {
      position: fixed;
      top: 18px;
      left: 22px;
      background: rgba(28,52,97,0.08);
      border: 1px solid rgba(28,52,97,0.16);
      color: var(--navy);
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      z-index: 200;
    }
    #back-btn:hover { background: rgba(28,52,97,0.14); }

    #mode-badge {
      position: fixed;
      top: 18px;
      right: 22px;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 20px;
      z-index: 200;
    }
    body[data-mode="complete"] #mode-badge { background: rgba(28,52,97,0.09); color: var(--navy); }
    body[data-mode="blank"]    #mode-badge { background: rgba(184,48,48,0.09); color: var(--red); }

    #slide-counter {
      position: fixed;
      bottom: 22px;
      right: 26px;
      font-size: 0.82rem;
      font-weight: 600;
      color: rgba(44,40,35,0.28);
      z-index: 200;
      pointer-events: none;
    }
  </style>
</head>
<body>

<!-- ── 모드 선택 화면 ── -->
<div id="mode-select">
  <div class="ms-top">
    <div class="ms-num" id="ms-num"></div>
    <h1 class="ms-title" id="ms-title"></h1>
    <p class="ms-unit" id="ms-unit"></p>
  </div>
  <div class="ms-btns">
    <button class="ms-btn complete" onclick="startSlides('complete')">완성형</button>
    <button class="ms-btn blank"    onclick="startSlides('blank')">빈칸형</button>
  </div>
</div>

<!-- ── 슬라이드 (JS가 생성) ── -->
<div id="slides" hidden></div>

<!-- ── 오버레이 UI ── -->
<button id="back-btn"      hidden onclick="goBack()">모드 선택</button>
<div    id="mode-badge"    hidden></div>
<div    id="slide-counter" hidden></div>

<script>
/* ════════════════════════════════════════════════════════
   수업 정보 — 강마다 이 부분만 바꾸세요
   ════════════════════════════════════════════════════════ */
const LESSON = {
  num:   '23',

/* ════════════════════════════════════════════════════════

              완성형: 빨간 글씨로 강조
              빈칸형: 검은 블록으로 숨김 → 클릭하면 공개

   type: 'cover'    표지 (LESSON 정보 자동 사용)
   type: 'concept'  개념 Check 슬라이드
   type: 'think'    생각 Check 슬라이드

/* ════════════════════════════════════════════════════════
   렌더링 엔진 — 아래는 수정하지 않아도 됩니다
   ════════════════════════════════════════════════════════ */

function parseText(str) {
  return str.replace(/\{([^}]+)\}/g, '<span class="blank">$1</span>');
}

function buildCover() {
  const el = document.createElement('div');
  el.className = 'slide slide-cover';
  el.innerHTML = `
    <span class="cover-brand">Hoseong History &nbsp;·&nbsp; 역사 수업</span>
    <div class="cover-num-line">
      <span class="cover-num">${LESSON.num}</span>
      <span class="cover-num-label">강</span>
    </div>
    <h1 class="cover-title">${LESSON.title}</h1>
    <p class="cover-meta">${LESSON.unit} &nbsp;·&nbsp; ${LESSON.page}</p>
    <div class="cover-divider"></div>
    <p class="cover-obj-label">학습 목표</p>
    <div class="cover-objectives">
      ${LESSON.objectives.map((obj, i) =>
        `<p class="cover-obj" data-n="${i + 1}">${obj}</p>`
      ).join('')}
    </div>
  `;
  return el;
}

function buildConcept(slide) {
  const el = document.createElement('div');
  el.className = 'slide';
  el.innerHTML = `
    <div class="slide-header">
      <span class="check-badge">개념 Check</span>
      <h2 class="slide-title">${slide.title}</h2>
    </div>
    <div class="concept-rows">
      ${slide.rows.map(row => `
        <div class="concept-row">
          <div class="row-label">${row.label}</div>
          <div class="row-content">
            ${row.items.map(item => `<p>${parseText(item)}</p>`).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `;
  return el;
}

function buildThink(slide) {
  const el = document.createElement('div');
  el.className = 'slide slide-think';
  el.innerHTML = `
    <div class="slide-header">
      <span class="check-badge think">생각 Check</span>
      <h2 class="slide-title">${LESSON.num}강</h2>
    </div>
    <p class="think-question">${slide.question.replace(/\n/g, '<br>')}</p>
    <div class="think-body">
      <img src="${slide.qr}" alt="QR코드" class="think-qr">
      <p class="think-guide">${slide.guide.replace(/\n/g, '<br>').replace('50자', '<strong>50자</strong>')}</p>
    </div>
  `;
  return el;
}

function renderAll() {
  const container = document.getElementById('slides');
  SLIDES.forEach(s => {
    if      (s.type === 'cover')   container.appendChild(buildCover());
    else if (s.type === 'concept') container.appendChild(buildConcept(s));
    else if (s.type === 'think')   container.appendChild(buildThink(s));
  });
}

/* ── 초기화 ── */
document.getElementById('ms-num').textContent   = LESSON.num;
document.getElementById('ms-title').textContent = LESSON.title;
document.getElementById('ms-unit').textContent  = `${LESSON.unit} · ${LESSON.page}`;
renderAll();

/* ── 슬라이드 제어 ── */
const slidesEl  = document.getElementById('slides');
const modeSelEl = document.getElementById('mode-select');
const backBtn   = document.getElementById('back-btn');
const modeBadge = document.getElementById('mode-badge');
const counterEl = document.getElementById('slide-counter');

function currentIdx() { return Math.round(slidesEl.scrollTop / slidesEl.clientHeight); }
function totalCount() { return slidesEl.querySelectorAll('.slide').length; }

function updateCounter() {
  counterEl.textContent = `${currentIdx() + 1} / ${totalCount()}`;
}

function startSlides(mode) {
  document.body.dataset.mode = mode;
  modeSelEl.style.display    = 'none';
  slidesEl.hidden             = false;
  backBtn.hidden              = false;
  modeBadge.hidden            = false;
  counterEl.hidden            = false;
  modeBadge.textContent       = mode === 'complete' ? '완성형' : '빈칸형';
  slidesEl.scrollTop          = 0;
  updateCounter();

  if (mode === 'blank') {
    slidesEl.querySelectorAll('.blank').forEach(el => {
      el.addEventListener('click', () => el.classList.toggle('revealed'));
    });
  }
}

function goBack() {
  document.body.removeAttribute('data-mode');
  slidesEl.hidden     = true;
  backBtn.hidden      = true;
  modeBadge.hidden    = true;
  counterEl.hidden    = true;
  modeSelEl.style.display = 'flex';
  slidesEl.querySelectorAll('.blank.revealed').forEach(el => el.classList.remove('revealed'));
  slidesEl.scrollTop  = 0;
}

slidesEl.addEventListener('scroll', updateCounter);

/* ── 키보드 탐색 (↑↓ / ←→) ── */
document.addEventListener('keydown', e => {
  if (slidesEl.hidden) return;
  const h = slidesEl.clientHeight;
  const cur = currentIdx();
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    e.preventDefault();
    slidesEl.scrollTo({ top: (cur + 1) * h, behavior: 'smooth' });
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    slidesEl.scrollTo({ top: (cur - 1) * h, behavior: 'smooth' });
  }
});
</script>
</body>
</html>
