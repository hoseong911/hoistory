<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>23강 · 고려의 사회, 고려의 문화</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Paperlogy';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
      font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: 'Paperlogy';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-6SemiBold.woff2') format('woff2');
      font-weight: 600; font-style: normal;
    }
    @font-face {
      font-family: 'Paperlogy';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');
      font-weight: 700; font-style: normal;
    }
    @font-face {
      font-family: 'Paperlogy';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-8ExtraBold.woff2') format('woff2');
      font-weight: 800; font-style: normal;
    }
    @font-face {
      font-family: 'Paperlogy';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');
      font-weight: 900; font-style: normal;
    }
    /* ════════════════════════════════
       디자인 변수 — 색상은 여기서 조정
       ════════════════════════════════ */
    :root {
      --font:       'Pretendard', 'Apple SD Gothic Neo', sans-serif;

      --bg:         #e8e0d0;   /* 페이지 배경 (크림) */
      --slide-bg:   #f7f2e8;   /* 슬라이드 배경 */
      --row-bg:     #f2ede0;   /* 개념 행 배경 */

      --navy:       #1c3461;   /* 제목·헤더·라벨 */
      --navy-pale:  #dce5f5;   /* 옅은 네이비 */

      --red:        #b83030;   /* 핵심 용어 강조 */
      --red-pale:   #fceaea;   /* 공개된 빈칸 배경 */

      --text:       #2c2823;   /* 본문 */
      --text-sub:   #7a6f5e;   /* 보조 설명 */

      --blank-bg:   #2d2921;   /* 빈칸 숨김 색 */
      --border:     #cfc6b0;   /* 테두리 */

      --fs-slide-title: 29px;
      --fs-body:        18px;
      --fs-label:       16px;
      --fs-cover-title: 54px;
      --fs-question:    30px;
      --fs-obj:         17px;
    }

    /* ════ 리셋 ════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ════ 모드 선택 화면 ════ */
    #mode-select {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 500;
      background: var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 56px;
    }
    .ms-top { text-align: center; }
    .ms-num {
      font-size: 7rem;
      font-weight: 900;
      color: rgba(255,255,255,0.1);
      line-height: 1;
      letter-spacing: -0.04em;
    }
    .ms-title {
      font-size: 2.2rem;
      font-weight: 800;
      color: #fff;
      margin-top: 4px;
    }
    .ms-unit {
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
      margin-top: 10px;
    }
    .ms-btns { display: flex; gap: 16px; }
    .ms-btn {
      padding: 18px 52px;
      font-family: var(--font);
      font-size: 1.15rem;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      transition: transform 0.15s, background 0.15s;
    }
    .ms-btn:hover { transform: translateY(-2px); }
    .ms-btn.complete { background: #fff; color: var(--navy); }
    .ms-btn.complete:hover { background: #f0ecd8; }
    .ms-btn.blank {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.88);
      border: 2px solid rgba(255,255,255,0.28);
    }
    .ms-btn.blank:hover { background: rgba(255,255,255,0.18); }

    /* ════ 슬라이드 컨테이너 ════ */
    #slides {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      overflow: hidden;
    }

    /* ════ 슬라이드 공통 ════ */
    .slide {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 80px 80px 52px;
      background: var(--slide-bg);
      transform: translateY(100%);
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }

    /* ════ 표지 ════ */
    .slide-cover {
      background: var(--navy);
      color: #fff;
      padding: 0 5vw 5vh;
      justify-content: flex-end;
      align-items: flex-start;
      position: relative;
      overflow: hidden;
      gap: 0;
    }
    .cover-script {
      position: absolute;
      top: 0; left: 0; right: 0;
      font-family: 'Dancing Script', cursive;
      font-size: 7vw;
      font-weight: 600;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.06em;
      line-height: 1;
      padding: 1.5vh 5vw 0;
      z-index: 1;
    }
    .cover-tagline {
      font-size: clamp(0.65rem, 1.1vw, 1.4rem);
      font-weight: 600;
      color: var(--red);
      letter-spacing: 0.03em;
      margin-bottom: 0.6vh;
      position: relative;
      z-index: 1;
    }
    .cover-title {
      font-size: clamp(2.5rem, 6.5vw, 10rem);
      font-weight: 800;
      line-height: 1.15;
      position: relative;
      z-index: 1;
    }
    .cover-meta {
      font-size: clamp(0.6rem, 0.9vw, 1.1rem);
      color: rgba(255,255,255,0.35);
      margin-top: 1.2vh;
      position: relative;
      z-index: 1;
    }
    .cover-num-bg {
      position: absolute;
      right: -0.08em;
      bottom: -0.2em;
      font-size: 85vh;
      font-weight: 900;
      color: rgba(255,255,255,0.10);
      line-height: 1;
      letter-spacing: -0.05em;
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }

    /* ════ 개념 Check 헤더 ════ */
    .slide-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 26px;
    }
    .check-badge {
      background: var(--navy);
      color: #fff;
      font-family: 'Paperlogy', 'Pretendard', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 20px;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .check-badge.think { background: #2a6e40; }
    .slide-title {
      font-size: var(--fs-slide-title);
      font-weight: 800;
      color: var(--navy);
    }

    /* ════ 개념 행 ════ */
    .concept-rows { display: flex; flex-direction: column; gap: 14px; }
    .concept-row {
      display: flex;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .row-label {
      background: var(--navy);
      color: rgba(255,255,255,0.9);
      width: 7em;
      min-width: 90px;
      max-width: 180px;
      padding: 1em 0.7em;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: 'Paperlogy', 'Pretendard', sans-serif;
      font-size: var(--fs-label);
      font-weight: 700;
      line-height: 1.45;
      word-break: keep-all;
    }
    .row-content {
      flex: 1;
      background: var(--row-bg);
      padding: 14px 22px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      justify-content: center;
    }
    .row-content p {
      font-size: var(--fs-body);
      font-weight: 400;
      line-height: 1.7;
      color: var(--text);
      display: flex;
      align-items: baseline;
    }
    .item-lead {
      white-space: nowrap;
      flex-shrink: 0;
      font-family: 'Paperlogy', 'Pretendard', sans-serif;
      font-weight: 600;
      color: var(--navy);
    }
    .item-lead .blank {
      font-weight: 900;
    }
    .item-text {
      flex: 1;
      min-width: 0;
    }
    /* 데이터에 \n을 넣으면 그 위치에서 줄바꿈, 본문 시작 위치에 맞춰 정렬 */
    .line-cont { display: inline; }

    /* ════ 행 내 이미지 (방법 A) ════ */
    .row-content.has-img {
      flex-direction: row;
      align-items: stretch;
      gap: 16px;
    }
    .row-content.has-img .row-items {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 7px;
      justify-content: center;
    }
    .row-img-wrap {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .row-img {
      max-height: 150px;
      max-width: 200px;
      object-fit: contain;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
    }
    .row-img-caption {
      font-size: 0.72rem;
      color: var(--text-sub);
      text-align: center;
    }

    /* ════ 이미지 슬라이드 (방법 B) ════ */
    .image-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      min-height: 0;
    }
    .main-img {
      max-width: 100%;
      max-height: calc(100vh - 240px);
      object-fit: contain;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
    }
    .main-img-caption {
      font-size: 1.05rem;
      color: var(--text-sub);
      text-align: center;
      font-weight: 500;
    }

    /* 괄호 보조 설명 — 80% 크기 */
    .paren-note { font-size: 0.8em; }

    /* ════ 빈칸 ════ */
    .blank {
      display: inline-block;
      font-weight: 800;
      border-radius: 4px;
      padding: 1px 5px;
      transition: background 0.18s, color 0.18s;
    }

    /* 완성형: 빨간 강조 */
    body[data-mode="complete"] .blank { color: var(--red); }

    /* 빈칸형: 숨김 */
    body[data-mode="blank"] .blank:not(.revealed) {
      background: var(--blank-bg);
      color: transparent;
      cursor: pointer;
      min-width: 40px;
      user-select: none;
    }
    body[data-mode="blank"] .blank:not(.revealed):hover { background: #47423a; }

    /* 빈칸형: 클릭 후 공개 */
    body[data-mode="blank"] .blank.revealed {
      color: var(--red);
      background: var(--red-pale);
    }

    /* ════ 생각 Check ════ */
    .slide-think { background: #f5f0e4; }
    .think-question {
      font-size: var(--fs-question);
      font-weight: 700;
      color: var(--navy);
      line-height: 1.5;
      margin: 18px 0 32px;
    }
    .think-body { display: flex; align-items: center; gap: 48px; }
    .think-qr {
      width: 175px;
      height: 175px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      flex-shrink: 0;
      object-fit: contain;
    }
    .think-guide {
      font-size: 1.1rem;
      color: var(--text-sub);
      line-height: 1.85;
    }
    .think-guide strong { color: var(--red); }

    /* ════ 오버레이 UI ════ */
    #back-btn {
      position: fixed;
      top: 18px;
      left: 22px;
      background: rgba(28,52,97,0.08);
      border: 1px solid rgba(28,52,97,0.16);
      color: var(--navy);
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      z-index: 200;
    }
    #back-btn:hover { background: rgba(28,52,97,0.14); }

    #mode-badge {
      position: fixed;
      top: 18px;
      right: 22px;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 20px;
      z-index: 200;
    }
    body[data-mode="complete"] #mode-badge { background: rgba(28,52,97,0.09); color: var(--navy); }
    body[data-mode="blank"]    #mode-badge { background: rgba(184,48,48,0.09); color: var(--red); }

    #slide-counter {
      position: fixed;
      bottom: 22px;
      right: 26px;
      font-size: 0.82rem;
      font-weight: 600;
      color: rgba(44,40,35,0.28);
      z-index: 200;
      pointer-events: none;
    }
  </style>
</head>
<body>

<!-- ── 모드 선택 화면 ── -->
<div id="mode-select">
  <div class="ms-top">
    <div class="ms-num" id="ms-num"></div>
    <h1 class="ms-title" id="ms-title"></h1>
    <p class="ms-unit" id="ms-unit"></p>
  </div>
  <div class="ms-btns">
    <button class="ms-btn complete" onclick="startSlides('complete')">완성형</button>
    <button class="ms-btn blank"    onclick="startSlides('blank')">빈칸형</button>
  </div>
</div>

<!-- ── 슬라이드 (JS가 생성) ── -->
<div id="slides" hidden></div>

<!-- ── 오버레이 UI ── -->
<button id="back-btn"      hidden onclick="goBack()">모드 선택</button>
<div    id="mode-badge"    hidden></div>
<div    id="slide-counter" hidden></div>

<script>
/* ════════════════════════════════════════════════════════
   수업 정보 — 강마다 이 부분만 바꾸세요
   ════════════════════════════════════════════════════════ */
const LESSON = {
  num:   '23',
  title: '고려의 사회, 고려의 문화',
  unit:  'Ⅲ-4. 고려의 생활과 문화',
  page:  'p.96~103',
  objectives: [
    '고려 사회의 모습을 가족 제도를 중심으로 설명할 수 있다.',
    '종교, 사상, 학문 등을 통해 고려 문화의 특징을 말할 수 있다.'
  ]
};

/* ════════════════════════════════════════════════════════
   슬라이드 데이터 — 내용은 여기서 수정하세요

   {단어}  →  핵심 용어
              완성형: 빨간 글씨로 강조
              빈칸형: 검은 블록으로 숨김 → 클릭하면 공개

   type: 'cover'    표지 (LESSON 정보 자동 사용)
   type: 'concept'  개념 Check 슬라이드
   type: 'think'    생각 Check 슬라이드
   type: 'image'    이미지 슬라이드 (방법 B)
     { type: 'image', title: '제목', src: 'img/파일명.jpg', caption: '캡션' }

   [행 내 이미지 — 방법 A]
   rows 항목에 img, imgCaption 추가:
     { label: '라벨', items: [...], img: 'img/파일명.jpg', imgCaption: '캡션' }
   ════════════════════════════════════════════════════════ */
const SLIDES = [

  { type: 'cover' },

  /* ── 고려 사회의 모습 ── */
  {
    type: 'concept',
    title: '고려 사회의 모습',
    rows: [
      {
        label: '사회 정책',
        items: [
          '① 제도 마련 : {농민}의 보호를 위해 마련, 농사철에 농민 {노동력} 동원 금지, 자연재해 피해 시 세금 감면',
          '② {의창} : 백성에게 곡식 빌려주었다가 추수한 다음 갚도록 함',
          '③ {동서 대비원} : 국립 의료 기관, 의료 사업 뿐만 아니라 구제 기관 역할'
        ]
      },
      {
        label: '가족 제도',
        items: [
          '① 구성 : {소가족} 중심, {일부일처제}, 이혼과 재혼 가능 (재혼한 여성과 자녀는 차별 없음)',
          '② 특징 : {처가살이}하는 경우 많음, 외가 친척도 동일하게 혜택, {조혼} 풍속 유행 (고려 후기), 자녀 {균분} 상속 원칙'
        ]
      }
    ]
  },

  {
    type: 'concept',
    title: '고려 사회의 모습',
    rows: [
      {
        label: '여성 지위',
        items: [
          '① 특징 : 사회 활동에는 {제한}이 있지만, {일상생활}에서는 남성과 거의 대등한 위치',
          '② 호적 : 남녀 구분 없이 {태어난} 순서대로 기록, 여성이 {호주}가 되기도 함'
        ]
      }
    ]
  },

  /* ── 고려의 사상 ── */
  {
    type: 'concept',
    title: '고려의 사상',
    rows: [
      {
        label: '불교',
        items: [
          '① 불교 장려 : 국가의 지원 받으며 발전, {연등회}·{팔관회} 등 개최, {대장경} 간행',
          '② {의천} : {교종} 중심으로 {선종} 통합({교관겸수}), 해동 천태종 창시',
          '③ {지눌} : {선종} 중심으로 {교종} 포용({정혜쌍수}), 수선사 결사 운동 주장'
        ]
      }
    ]
  },

  {
    type: 'concept',
    title: '고려의 사상',
    rows: [
      {
        label: '도교',
        items: [
          '① {도교} : 국가의 평안을 기원하는 행사 개최',
          '② {풍수지리설} : {도참}사상(미래 예언하는 사상)과 결합, {묘청의 난}에 영향'
        ]
      },
      {
        label: '유학',
        items: [
          '① 유학 중시 : {과거제} 실시, {최충}의 9재 학당 설립 후 {사학} 12도 발전, 무신 집권기에는 크게 위축',
          '② {성리학} : 인간의 심성과 우주의 원리 문제를 철학적으로 탐구하는 신유학',
          ' {원}으로부터 수용, {안향}이 소개 → 신진 사대부 중심으로 발전, 조선 건국의 사상적 기반'
        ]
      }
    ]
  },

  {
    type: 'concept',
    title: '고려의 사상 — 역사서',
    rows: [
      {
        label: '역사서',
        items: [
          '① {『삼국사기』}(김부식) : 현존하는 가장 오래된 역사서, {유교}적 입장에서 편찬, {신라} 계승 의식 엿보임',

(function loadEdited() {

  if (!saved) return;
  try {
    const data = JSON.parse(saved);

/* ════════════════════════════════════════════════════════
   어드민 설정 적용 — admin.html에서 저장한 색상·폰트 불러오기
   ════════════════════════════════════════════════════════ */
const SETTING_KEY = 'hoistory_class_settings';
const SETTING_DEFAULTS = {
  baseFontSize: 16,
  fonts: { title: 29, body: 18, label: 16, cover: 54, think: 30, obj: 17 },
  navy:    '#1c3461',
  red:     '#b83030',
  bg:      '#e8e0d0',
  slideBg: '#f7f2e8',
  rowBg:   '#f2ede0',
  text:    '#2c2823'
};

function applySettings() {
  const raw  = JSON.parse(localStorage.getItem(SETTING_KEY) || '{}');
  const s    = Object.assign({}, SETTING_DEFAULTS, raw);
  const f    = Object.assign({}, SETTING_DEFAULTS.fonts, raw.fonts || {});
  const root = document.documentElement;
  root.style.fontSize = s.baseFontSize + 'px';
  root.style.setProperty('--navy',            s.navy);
  root.style.setProperty('--red',             s.red);
  root.style.setProperty('--bg',              s.bg);
  root.style.setProperty('--slide-bg',        s.slideBg);
  root.style.setProperty('--row-bg',          s.rowBg);
  root.style.setProperty('--text',            s.text);
  root.style.setProperty('--fs-slide-title',  f.title  + 'px');
  root.style.setProperty('--fs-body',         f.body   + 'px');
  root.style.setProperty('--fs-label',        f.label  + 'px');
  root.style.setProperty('--fs-cover-title',  f.cover  + 'px');
  root.style.setProperty('--fs-question',     f.think  + 'px');
  root.style.setProperty('--fs-obj',          f.obj    + 'px');
}
applySettings();

/* ════════════════════════════════════════════════════════
   렌더링 엔진 — 아래는 수정하지 않아도 됩니다
   ════════════════════════════════════════════════════════ */

function parseText(str) {
  // 빈칸을 임시 플레이스홀더로 보호
  const blanks = [];
  let s = str.replace(/\{([^}]+)\}/g, (_, inner) => {
    blanks.push(inner);
    return `\x00${blanks.length - 1}\x00`;
  });
  // 괄호 안에 빈칸(\x00)이 없는 경우에만 80% 크기 적용
  s = s.replace(/\(([^()\x00]*)\)/g, '<span class="paren-note">($1)</span>');
  // 플레이스홀더를 빈칸 span으로 복원
  s = s.replace(/\x00(\d+)\x00/g, (_, i) => `<span class="blank">${blanks[+i]}</span>`);
  return s;
}

/* \n 위치에서 줄바꿈 + 내어쓰기 */
function renderWithBreaks(text) {
  return text.split('\n').map((line, i) =>
    i === 0 ? parseText(line) : `<br><span class="line-cont">${parseText(line)}</span>`
  ).join('');
}

/* " : " 기준으로 소제목(item-lead)과 본문(item-text) 분리. 콜론은 제거 */
function parseItemText(str) {
  const colonIdx = str.indexOf(' : ');
  if (colonIdx > -1) {
    const leadRaw = str.slice(0, colonIdx);        /* 콜론 제거 */
    const rest    = str.slice(colonIdx + 3);
    return `<span class="item-lead">${parseText(leadRaw)}&nbsp;&nbsp;&nbsp;</span><span class="item-text">${renderWithBreaks(rest)}</span>`;
  }
  return `<span class="item-text">${renderWithBreaks(str)}</span>`;
}

function buildCover() {
  const el = document.createElement('div');
  el.className = 'slide slide-cover';
  el.innerHTML = `
    <span class="cover-script">HOSEONG HISTORY</span>
    <span class="cover-tagline">생각하고 활동하고 질문하는 역사 수업</span>
    <h1 class="cover-title">${LESSON.title.replace(/\n/g, '<br>')}</h1>
    <p class="cover-meta">${LESSON.unit} &nbsp;·&nbsp; ${LESSON.page}</p>
    <div class="cover-num-bg">${LESSON.num}</div>
  `;
  return el;
}

/* 행 하나 렌더링 — 이미지 있으면 has-img 레이아웃 */
function buildRowHtml(row) {
  const items = row.items.map(item => `<p>${parseItemText(item)}</p>`).join('');
  if (row.img) {
    return `
      <div class="concept-row">
        <div class="row-label">${row.label}</div>
        <div class="row-content has-img">
          <div class="row-items">${items}</div>
          <div class="row-img-wrap">
            <img src="${row.img}" alt="${row.imgCaption || ''}" class="row-img">
            ${row.imgCaption ? `<span class="row-img-caption">${row.imgCaption}</span>` : ''}
          </div>
        </div>
      </div>`;
  }
  return `
    <div class="concept-row">
      <div class="row-label">${row.label}</div>
      <div class="row-content">${items}</div>
    </div>`;
}

function buildConcept(slide) {
  const el = document.createElement('div');
  el.className = 'slide';
  el.innerHTML = `
    <div class="slide-header">
      <span class="check-badge">개념 Check</span>
      <h2 class="slide-title">${slide.title}</h2>
    </div>
    <div class="concept-rows">
      ${slide.rows.map(buildRowHtml).join('')}
    </div>
  `;
  return el;
}

/* 이미지 슬라이드 (방법 B) */
function buildImage(slide) {
  const el = document.createElement('div');
  el.className = 'slide';
  el.innerHTML = `
    <div class="slide-header">
      <span class="check-badge">자료</span>
      <h2 class="slide-title">${slide.title || ''}</h2>
    </div>
    <div class="image-body">
      <img src="${slide.src}" alt="${slide.title || ''}" class="main-img">
      ${slide.caption ? `<p class="main-img-caption">${slide.caption}</p>` : ''}
    </div>
  `;
  return el;
}

function buildThink(slide) {
  const el = document.createElement('div');
  el.className = 'slide slide-think';
  el.innerHTML = `
    <div class="slide-header">
      <span class="check-badge think">생각 Check</span>
      <h2 class="slide-title">${LESSON.num}강</h2>
    </div>
    <p class="think-question">${slide.question.replace(/\n/g, '<br>')}</p>
    <div class="think-body">
      <img src="${slide.qr}" alt="QR코드" class="think-qr">
      <p class="think-guide">${slide.guide.replace(/\n/g, '<br>').replace('50자', '<strong>50자</strong>')}</p>
    </div>
  `;
  return el;
}

function renderAll() {
  const container = document.getElementById('slides');
  SLIDES.forEach(s => {
    if      (s.type === 'cover')   container.appendChild(buildCover());
    else if (s.type === 'concept') container.appendChild(buildConcept(s));
    else if (s.type === 'image')   container.appendChild(buildImage(s));
    else if (s.type === 'think')   container.appendChild(buildThink(s));
  });
}

/* ── 초기화 ── */
document.getElementById('ms-num').textContent   = LESSON.num;
document.getElementById('ms-title').textContent = LESSON.title;
document.getElementById('ms-unit').textContent  = `${LESSON.unit} · ${LESSON.page}`;
renderAll();

/* ── 슬라이드 제어 ── */
const slidesEl  = document.getElementById('slides');
const modeSelEl = document.getElementById('mode-select');
const backBtn   = document.getElementById('back-btn');
const modeBadge = document.getElementById('mode-badge');
const counterEl = document.getElementById('slide-counter');

let currentSlideIdx = 0;
function currentIdx() { return currentSlideIdx; }
function totalCount() { return slidesEl.querySelectorAll('.slide').length; }

function updateCounter() {
  counterEl.textContent = `${currentIdx() + 1} / ${totalCount()}`;
}

function startSlides(mode) {
  document.body.dataset.mode  = mode;
  modeSelEl.style.display     = 'none';
  slidesEl.hidden              = false;
  backBtn.hidden               = false;
  modeBadge.hidden             = false;
  counterEl.hidden             = false;
  modeBadge.textContent        = mode === 'complete' ? '완성형' : '빈칸형';

  /* 모든 슬라이드를 아래쪽 대기 위치로 초기화, 첫 슬라이드만 표시 */
  const slides = slidesEl.querySelectorAll('.slide');
  slides.forEach((s, i) => {
    s.style.transition = 'none';
    s.style.transform  = i === 0 ? 'translateY(0)' : 'translateY(100%)';
  });
  currentSlideIdx = 0;
  transitioning   = false;
  updateCounter();

  if (mode === 'blank') {
    slidesEl.querySelectorAll('.blank').forEach(el => {
      el.addEventListener('click', () => el.classList.toggle('revealed'));
    });
  }
}

function goBack() {
  document.body.removeAttribute('data-mode');
  slidesEl.hidden          = true;
  backBtn.hidden           = true;
  modeBadge.hidden         = true;
  counterEl.hidden         = true;
  modeSelEl.style.display  = 'flex';
  slidesEl.querySelectorAll('.blank.revealed').forEach(el => el.classList.remove('revealed'));
  currentSlideIdx = 0;
  transitioning   = false;
}

/* ── 밀어내기 전환 (PPT Push 방식) ── */
let transitioning = false;

function scrollToSlide(targetIdx) {
  const slides = Array.from(slidesEl.querySelectorAll('.slide'));
  targetIdx = Math.max(0, Math.min(targetIdx, slides.length - 1));
  if (targetIdx === currentSlideIdx || transitioning) return;

  const dir = targetIdx > currentSlideIdx ? 1 : -1;
  const fromSlide = slides[currentSlideIdx];
  const toSlide   = slides[targetIdx];

  /* 진입 슬라이드를 진입 방향 바깥에 즉시 배치 */
  toSlide.style.transition = 'none';
  toSlide.style.transform  = `translateY(${dir * 100}%)`;
  toSlide.getBoundingClientRect(); /* reflow 강제 */

  /* 두 슬라이드 동시 애니메이션 */
  transitioning = true;
  fromSlide.style.transition = 'transform 0.55s cubic-bezier(0.4,0,0.2,1)';
  toSlide.style.transition   = 'transform 0.55s cubic-bezier(0.4,0,0.2,1)';
  fromSlide.style.transform  = `translateY(${-dir * 100}%)`;
  toSlide.style.transform    = 'translateY(0)';

  currentSlideIdx = targetIdx;
  updateCounter();
  setTimeout(() => { transitioning = false; }, 580);
}

/* ── 키보드·마우스휠 탐색 ── */
document.addEventListener('keydown', e => {
  if (slidesEl.hidden) return;
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); scrollToSlide(currentIdx() + 1); }
  else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); scrollToSlide(currentIdx() - 1); }
});

slidesEl.addEventListener('wheel', e => {
  e.preventDefault();
  scrollToSlide(currentIdx() + (e.deltaY > 0 ? 1 : -1));
}, { passive: false });

/* ── 터치 스와이프 ── */
let touchStartY = 0;
slidesEl.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
slidesEl.addEventListener('touchend', e => {
  const diff = touchStartY - e.changedTouches[0].clientY;
  if (Math.abs(diff) > 40) scrollToSlide(currentIdx() + (diff > 0 ? 1 : -1));
}, { passive: true });

/* ── localStorage 데이터 시딩: 저장된 내용이 없을 때만 기본값 기록 ── */
(function seedData() {
  const DATA_KEY = 'class_data_26_23';
  if (localStorage.getItem(DATA_KEY)) return;
  const seed = {
    lesson: LESSON,
    slides: SLIDES.map(s => JSON.parse(JSON.stringify(s)))
  };
  localStorage.setItem(DATA_KEY, JSON.stringify(seed));
})();

/* ── URL ?mode= 파라미터로 모드 선택 화면 건너뛰기 ── */
(function checkUrlMode() {
  const p = new URLSearchParams(location.search).get('mode');
  if (p === 'complete' || p === 'blank') startSlides(p);
})();
