<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>천년의 기억 — 고려의 부름</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700;800&family=Song+Myung&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1410;
  --paper: #f4ead5;
  --paper-dark: #e8d9b8;
  --shadow: rgba(26,20,16,0.25);
  --point-color: #a8322d;
  --point-border: #c9a44c;
  --point-bg: rgba(201,164,76,0.08);
}
body.theme-silla   { --point-color:#b8860b; --point-border:#daa520; --point-bg:rgba(218,165,32,0.08); }
body.theme-balhae  { --point-color:#6a1b9a; --point-border:#8e24aa; --point-bg:rgba(106,27,154,0.08); }
body.theme-goryeo  { --point-color:#3b7a57; --point-border:#4a8f6b; --point-bg:rgba(59,122,87,0.08); }

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Gowun Batang','Nanum Myeongjo',serif;
  background:var(--paper); color:var(--ink);
  min-height:100vh;
  background-image:
    radial-gradient(circle at 20% 30%, var(--point-bg) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(26,20,16,0.03) 0%, transparent 50%),
    repeating-linear-gradient(45deg,transparent 0px,transparent 2px,rgba(26,20,16,0.02) 2px,rgba(26,20,16,0.02) 4px);
  line-height:1.7;
  transition:background-color .8s ease, color .8s ease;
}

/* ── 로딩 ── */
.loading-screen{position:fixed;inset:0;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:1.5rem;}
.loading-screen.hidden{display:none;}
.loading-spinner{width:60px;height:60px;border:4px solid var(--paper-dark);border-top-color:var(--point-color);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:'Nanum Myeongjo',serif;font-weight:700;letter-spacing:.3em;}

/* ── 에러 ── */
.error-screen{display:none;min-height:100vh;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:2rem;}
.error-screen.active{display:flex;}

/* ── 로그인 ── */
.login-screen{display:none;min-height:100vh;flex-direction:column;justify-content:center;align-items:center;padding:2rem;}
.login-screen.active{display:flex;animation:fadeIn .8s ease;}
.login-seal{width:100px;height:100px;background:var(--point-color);color:var(--paper);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Nanum Myeongjo',serif;font-weight:800;font-size:1.5rem;margin:0 auto 1.5rem;box-shadow:0 6px 25px var(--shadow);animation:pulse 3s ease-in-out infinite;line-height:1.1;text-align:center;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.login-title{font-family:'Nanum Myeongjo',serif;font-weight:800;font-size:clamp(1.8rem,5vw,3rem);letter-spacing:.3em;text-align:center;margin-bottom:.4rem;}
.login-sub{color:var(--point-border);letter-spacing:.5em;text-align:center;margin-bottom:2rem;font-size:.9rem;}
.login-card{background:rgba(255,255,255,.5);border:2px solid var(--ink);box-shadow:6px 6px 0 var(--shadow);padding:2rem;width:100%;max-width:420px;}
.login-card p{text-align:center;color:#555;font-style:italic;margin-bottom:1.5rem;line-height:1.8;}
.form-row{margin-bottom:1rem;}
.form-row label{display:block;font-weight:700;font-size:.9rem;margin-bottom:.4rem;color:var(--point-color);letter-spacing:.1em;}
.form-input{width:100%;padding:.8rem 1rem;border:2px solid var(--ink);background:var(--paper);font-family:'Gowun Batang',serif;font-size:1rem;color:var(--ink);transition:all .3s;}
.form-input:focus{outline:none;border-color:var(--point-color);background:#fff;}
.form-input:disabled{opacity:.5;cursor:not-allowed;}
.verify-msg{font-size:.82rem;margin-top:.3rem;min-height:1.2em;}
.verify-msg.ok{color:#3b7a57;}
.verify-msg.err{color:#a8322d;}
.btn{padding:.9rem 2.5rem;font-family:'Nanum Myeongjo',serif;font-weight:700;font-size:1rem;border:2px solid var(--ink);cursor:pointer;letter-spacing:.2em;transition:all .3s;background:var(--paper);color:var(--ink);box-shadow:3px 3px 0 var(--ink);}
.btn:hover:not(:disabled){transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink);}
.btn:active:not(:disabled){transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:3px 3px 0 var(--ink)!important;}
.btn-dark{background:var(--ink);color:var(--paper);border-color:var(--point-border);margin-top:1rem;width:100%;}
.btn-dark:hover:not(:disabled){background:var(--point-color);border-color:var(--point-color);}

/* ── 인트로 ── */
.intro-screen{min-height:100vh;display:none;flex-direction:column;justify-content:center;align-items:center;padding:2rem;text-align:center;}
.intro-screen.active{display:flex;}
.intro-title{font-family:'Nanum Myeongjo',serif;font-weight:800;font-size:clamp(2rem,5vw,4rem);letter-spacing:.3em;margin-bottom:.5rem;animation:fadeInDown 1.5s ease;text-shadow:2px 2px 4px var(--shadow);}
.intro-subtitle{color:var(--point-border);letter-spacing:.5em;margin-bottom:2rem;animation:fadeIn 2s ease .5s both;font-size:.95rem;}
.intro-story{max-width:680px;font-size:1.05rem;line-height:2;margin:1.5rem auto;animation:fadeIn 2s ease 1s both;}
.intro-story p{margin-bottom:.8rem;}
.intro-greeting{font-weight:700;color:var(--point-color);margin-bottom:1rem;font-size:1.1rem;}
.btn-start{background:var(--ink);color:var(--paper);border-color:var(--point-border);animation:fadeInUp 2s ease 1.5s both;margin-top:2rem;}
.btn-start:hover{background:var(--point-color);border-color:var(--point-color);box-shadow:0 6px 20px var(--shadow);transform:translateY(-2px);}

/* ── 게임 화면 ── */
.game-screen{display:none;min-height:100vh;padding:1.5rem;max-width:900px;margin:0 auto;}
.game-screen.active{display:block;animation:fadeIn .8s ease;}
.progress-bar{background:var(--paper-dark);border:1px solid var(--point-border);padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}
.progress-text{font-weight:700;letter-spacing:.1em;}
.treasures{display:flex;gap:.4rem;flex-wrap:wrap;}
.treasure-dot{width:22px;height:22px;border-radius:50%;background:transparent;border:2px solid var(--point-border);transition:all .5s;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--paper);}
.treasure-dot.acquired{background:var(--point-color);border-color:var(--point-color);box-shadow:0 0 10px var(--shadow);}
.treasure-dot.acquired::after{content:'✦';color:var(--paper);}

.episode-card{background:var(--paper);border:2px solid var(--ink);box-shadow:8px 8px 0 var(--shadow),inset 0 0 0 4px var(--paper),inset 0 0 0 5px var(--point-border);padding:2.5rem;position:relative;transition:box-shadow .8s ease;}
.episode-story{font-style:italic;color:#333;background:var(--point-bg);border-left:4px solid var(--point-color);padding:1.2rem 1.5rem;margin-bottom:2rem;font-size:1.05rem;line-height:2;transition:all .8s ease;}
.episode-title{font-family:'Nanum Myeongjo',serif;font-weight:800;font-size:1.8rem;text-align:center;margin-bottom:.4rem;letter-spacing:.15em;}
.episode-number{text-align:center;color:var(--point-color);font-family:'Song Myung',serif;letter-spacing:.5em;margin-bottom:1.5rem;font-size:.9rem;transition:color .8s ease;}
.title-divider{width:80px;height:2px;background:var(--point-border);margin:0 auto 1.5rem;position:relative;}
.title-divider::before,.title-divider::after{content:'';position:absolute;top:50%;width:6px;height:6px;background:var(--point-color);border-radius:50%;transform:translateY(-50%);transition:background .8s ease;}
.title-divider::before{left:-10px;}.title-divider::after{right:-10px;}
.quiz-content{background:rgba(255,255,255,.4);border:1px dashed var(--point-border);padding:1.5rem;margin-bottom:1.5rem;font-size:1.05rem;line-height:2;}
.speaker{font-weight:700;color:var(--point-color);margin-bottom:.4rem;font-size:.95rem;}
.quiz-question{font-size:1.05rem;margin-top:.8rem;font-weight:700;}
.action-area{margin-bottom:1.5rem;}

/* ── 단계 표시 (twoStage) ── */
.stage-label{display:inline-block;background:var(--point-color);color:var(--paper);padding:.3rem 1rem;font-size:.85rem;font-weight:700;letter-spacing:.1em;margin-bottom:1rem;}
.stage2-area,.stage3-area{display:none;margin-top:2rem;padding-top:1.5rem;border-top:2px dashed var(--point-border);animation:fadeIn .6s ease;}
.stage2-area.show,.stage3-area.show{display:block;}

/* ── dragOffer ── */
.drag-container{display:flex;flex-direction:column;gap:1rem;}
.drag-pool-area{background:rgba(255,255,255,.3);border:2px dashed var(--ink);padding:1rem;min-height:80px;}
.drag-pool-label{font-size:.82rem;color:#777;margin-bottom:.6rem;letter-spacing:.1em;}
.drag-pool-grid,.drag-zone-items{display:flex;flex-wrap:wrap;gap:.5rem;min-height:48px;}
.drag-drop-zone{border:2px solid var(--point-border);background:var(--point-bg);padding:1rem;min-height:100px;transition:background .2s,border .2s;}
.drag-drop-zone.drag-over{background:rgba(201,164,76,.22);border-width:3px;}
.drag-zone-label{font-family:'Nanum Myeongjo',serif;font-weight:800;text-align:center;letter-spacing:.25em;color:var(--point-color);margin-bottom:.8rem;font-size:.9rem;}
.drag-item{padding:.65rem 1rem;background:var(--paper);border:2px solid var(--ink);cursor:pointer;user-select:none;transition:all .2s;font-weight:700;box-shadow:3px 3px 0 var(--ink);font-size:.9rem;}
.drag-item:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink);}
.drag-item.in-zone{background:var(--point-color);color:var(--paper);border-color:var(--point-border);box-shadow:3px 3px 0 rgba(0,0,0,.2);}
.drag-item.dragging{opacity:.3;}
/* ── eliminate ── */
.elim-list{display:flex;flex-direction:column;gap:.6rem;}
.elim-hint{font-size:.82rem;color:var(--point-color);margin-bottom:.8rem;font-style:italic;text-align:center;}
.elim-item{padding:1rem 1.2rem;background:rgba(255,255,255,.5);border:2px solid var(--ink);cursor:pointer;user-select:none;transition:all .2s;line-height:1.7;box-shadow:3px 3px 0 rgba(26,20,16,.1);}
.elim-item:hover{background:var(--point-bg);transform:translate(-1px,-1px);box-shadow:4px 4px 0 rgba(26,20,16,.15);}
.elim-item.eliminated{text-decoration:line-through;opacity:.38;background:rgba(168,50,45,.05);border-color:#ccc;box-shadow:none;transform:none;}
/* ── selectKeywords ── */
.kw-context{font-style:italic;background:var(--point-bg);border-left:4px solid var(--point-color);padding:1rem 1.2rem;margin-bottom:1rem;line-height:1.8;font-size:1rem;}
.kw-hint{font-size:.82rem;color:var(--point-color);margin-bottom:.8rem;font-style:italic;text-align:center;}
.kw-grid{display:flex;flex-wrap:wrap;gap:.6rem;}
.kw-item{padding:.7rem 1.1rem;background:rgba(255,255,255,.5);border:2px solid var(--ink);cursor:pointer;user-select:none;transition:all .2s;line-height:1.5;font-size:.92rem;box-shadow:2px 2px 0 rgba(26,20,16,.1);}
.kw-item:hover{background:var(--point-bg);transform:translate(-1px,-1px);box-shadow:3px 3px 0 rgba(26,20,16,.15);}
.kw-item.selected{background:var(--point-color);color:var(--paper);border-color:var(--point-border);box-shadow:3px 3px 0 rgba(0,0,0,.2);}
/* ── simulate (stage용) ── */
.sim-retry{margin-top:.7rem;padding:.5rem 1.1rem;font-family:'Nanum Myeongjo',serif;font-weight:700;font-size:.85rem;border:2px solid var(--ink);cursor:pointer;background:var(--paper);color:var(--ink);box-shadow:2px 2px 0 var(--ink);letter-spacing:.05em;}
.sim-retry:hover{background:var(--point-color);color:var(--paper);border-color:var(--point-color);}

/* ── 입력 공통 ── */
.blank-row{display:flex;align-items:center;gap:.8rem;margin-bottom:.8rem;flex-wrap:wrap;}
.blank-label{font-weight:700;color:var(--point-border);min-width:28px;}
.blank-input,.single-input{flex:1;padding:.75rem 1rem;border:2px solid var(--ink);background:var(--paper);font-family:'Gowun Batang',serif;font-size:1rem;color:var(--ink);transition:all .3s;box-shadow:inset 2px 2px 5px rgba(0,0,0,.05);}
.single-input{width:100%;text-align:center;letter-spacing:.2em;}
.blank-input:focus,.single-input:focus{outline:none;border-color:var(--point-color);background:#fff;}

/* ── tapOrder ── */
.tap-order-list{display:flex;flex-direction:column;gap:.6rem;}
.tap-order-item{display:flex;align-items:flex-start;gap:1rem;padding:1rem 1.2rem;background:rgba(255,255,255,.5);border:2px solid var(--ink);cursor:pointer;user-select:none;transition:all .2s;line-height:1.7;box-shadow:3px 3px 0 rgba(26,20,16,.1);}
.tap-order-item:hover{background:var(--point-bg);transform:translate(-1px,-1px);box-shadow:4px 4px 0 rgba(26,20,16,.15);}
.tap-order-item.tapped{background:var(--point-color);color:var(--paper);border-color:var(--point-border);box-shadow:3px 3px 0 rgba(0,0,0,.2);}
.tap-order-num{min-width:2rem;height:2rem;border:2px solid currentColor;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;flex-shrink:0;opacity:.35;transition:opacity .2s;}
.tap-order-item.tapped .tap-order-num{opacity:1;}
.tap-order-text{flex:1;}

/* ── dialogBlanks ── */
.dialog-log{display:flex;flex-direction:column;gap:.9rem;}
.dialog-line{display:flex;gap:.8rem;align-items:flex-start;}
.dialog-speaker{font-weight:800;color:var(--point-color);min-width:5.5rem;font-size:.82rem;padding-top:.35rem;flex-shrink:0;letter-spacing:.05em;line-height:1.5;}
.dialog-text{background:rgba(255,255,255,.45);border:1.5px solid var(--ink);padding:.75rem 1rem;line-height:2.1;font-size:.93rem;flex:1;}
.dialog-blank{border:none;border-bottom:2.5px solid var(--point-color);background:transparent;width:5rem;font-family:'Nanum Myeongjo',serif;font-size:.93rem;font-weight:700;color:var(--ink);text-align:center;padding:.1rem .2rem;outline:none;transition:border-color .2s;}
.dialog-blank:focus{border-bottom-color:var(--ink);}

/* ── 카드 공통 ── */
.card-pool{display:flex;flex-wrap:wrap;gap:.6rem;padding:1.2rem;background:rgba(255,255,255,.3);border:2px dashed var(--ink);min-height:80px;margin-bottom:1rem;}
.quiz-card,.match-item,.order-item{padding:.75rem 1.1rem;background:var(--paper);border:2px solid var(--ink);cursor:pointer;user-select:none;transition:all .2s;font-weight:700;box-shadow:3px 3px 0 var(--ink);display:flex;align-items:center;font-size:.95rem;}
.quiz-card:hover,.match-item:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink);background:var(--point-bg);}
.quiz-card:active,.match-item:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink);}
.quiz-card.selected,.match-item.selected{background:var(--point-color);color:var(--paper);border-color:var(--point-color);}
.quiz-card.placed{opacity:.35;cursor:not-allowed;pointer-events:none;box-shadow:none;transform:none;}
.match-item.matched{background:var(--paper-dark);color:var(--ink);border-style:dashed;cursor:default;box-shadow:none;transform:none;opacity:.7;}

/* ── 분류 ── */
.classify-zones{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1rem;}
.classify-zone{border:2px solid var(--ink);background:rgba(255,255,255,.4);padding:1rem;min-height:110px;transition:background .3s;cursor:pointer;}
.classify-zone:hover{background:var(--point-bg);}
.classify-zone h4{text-align:center;color:var(--point-color);margin-bottom:.7rem;letter-spacing:.1em;border-bottom:1px dashed var(--point-border);padding-bottom:.4rem;font-size:.9rem;}
.classify-items{display:flex;flex-wrap:wrap;gap:.4rem;min-height:50px;}
.classify-chip{padding:.35rem .7rem;background:var(--paper);border:1.5px solid var(--ink);font-size:.82rem;font-weight:700;cursor:pointer;}
.classify-chip:hover{background:var(--point-bg);}

/* ── 순서 ── */
.order-list{list-style:none;counter-reset:order-counter;display:flex;flex-direction:column;gap:.6rem;}
.order-item{gap:1rem;margin-bottom:0;counter-increment:order-counter;}
.order-item::before{content:counter(order-counter);background:var(--ink);color:var(--paper);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.85rem;}
.order-arrows{margin-left:auto;display:flex;gap:.3rem;}
.arrow-btn{width:30px;height:30px;border:1px solid var(--ink);background:var(--paper);cursor:pointer;font-weight:700;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:.85rem;}
.arrow-btn:hover:not(:disabled){background:var(--point-color);color:#fff;}
.arrow-btn:disabled{opacity:.2;cursor:not-allowed;}

/* ── 매칭 (pairMatch) ── */
.match-container{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1rem;}
.match-column h4{text-align:center;margin-bottom:.8rem;color:var(--point-color);letter-spacing:.15em;border-bottom:2px solid var(--point-border);padding-bottom:.4rem;font-size:.9rem;}
.match-pairs-result{margin-top:.8rem;padding:.8rem;background:rgba(255,255,255,.4);border:1px solid var(--point-border);}
.pair-row{padding:.4rem .6rem;background:#fff;margin-bottom:.3rem;font-size:.9rem;border-left:3px solid var(--point-color);}

/* ── 시뮬레이션 ── */
.sim-situation{background:rgba(255,255,255,.4);border:1px dashed var(--point-border);padding:1.2rem;margin-bottom:1rem;font-style:italic;line-height:1.9;}
.sim-choices{display:flex;flex-direction:column;gap:.7rem;}
.sim-choice{background:var(--paper);border:2px solid var(--ink);padding:1rem 1.2rem;cursor:pointer;font-weight:700;transition:all .2s;box-shadow:3px 3px 0 var(--ink);text-align:left;font-family:'Gowun Batang',serif;font-size:.95rem;line-height:1.7;}
.sim-choice:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink);background:var(--point-bg);}
.sim-choice.correct{background:#d4edda;border-color:#3b7a57;color:#1a4a1a;box-shadow:none;pointer-events:none;}
.sim-choice.wrong{background:#f8d7da;border-color:#a8322d;color:#6b1a1a;box-shadow:none;pointer-events:none;}
.sim-progress{text-align:center;color:var(--point-color);font-size:.9rem;font-weight:700;margin-bottom:.8rem;letter-spacing:.1em;}
.sim-feedback{padding:.8rem 1rem;margin-top:.8rem;background:var(--point-bg);border-left:4px solid var(--point-color);font-size:.95rem;line-height:1.8;display:none;}
.sim-feedback.show{display:block;}

/* ── 버튼 로우 ── */
.button-row{display:flex;gap:1rem;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-top:2rem;border-top:1px dashed var(--point-border);padding-top:1.5rem;}
.btn-check{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.btn-check:hover:not(:disabled){background:var(--point-color);border-color:var(--point-color);}
.btn-hint{background:transparent;color:var(--ink);border-color:var(--ink);}
.btn-hint:hover{background:var(--ink);color:var(--paper);}
.btn-next{background:var(--point-color);color:var(--paper);border-color:var(--point-color);margin-left:auto;display:none;}
.btn-next.show{display:inline-block;animation:slideInRight .5s ease;}
.hint-box{background:var(--point-bg);border:1px dashed var(--point-border);padding:1rem 1.5rem;margin-top:1.5rem;display:none;animation:slideDown .4s ease;border-left:4px solid var(--point-color);line-height:1.9;}
.hint-box.show{display:block;}

/* ── 모달 · 토스트 ── */
.toast{position:fixed;top:30px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--ink);color:var(--paper);padding:1.1rem 2rem;border:2px solid var(--point-border);box-shadow:0 6px 25px var(--shadow);font-family:'Nanum Myeongjo',serif;font-weight:700;font-size:1rem;z-index:1000;transition:transform .5s cubic-bezier(.34,1.56,.64,1);max-width:88%;text-align:center;letter-spacing:.1em;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--point-color);border-color:var(--paper);}
.treasure-modal{position:fixed;inset:0;background:rgba(26,20,16,.85);display:none;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(4px);}
.treasure-modal.show{display:flex;animation:fadeIn .4s ease;}
.treasure-modal-content{background:var(--paper);padding:2.5rem 3rem;text-align:center;border:4px solid var(--point-color);box-shadow:0 0 30px var(--point-color);max-width:480px;width:90%;animation:scaleIn .6s cubic-bezier(.34,1.56,.64,1);}
.treasure-icon{font-size:3.5rem;color:var(--point-color);margin-bottom:.8rem;display:block;animation:rotateIcon 2s ease-in-out infinite;}
@keyframes rotateIcon{0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);}}
.treasure-name{font-family:'Nanum Myeongjo',serif;font-weight:800;font-size:1.8rem;color:var(--ink);margin-bottom:.4rem;letter-spacing:.2em;border-bottom:2px solid var(--point-border);padding-bottom:.4rem;}
.treasure-desc{color:#555;font-style:italic;margin-top:.8rem;margin-bottom:1.8rem;line-height:1.8;}

/* ── 엔딩 ── */
.ending-screen{display:none;min-height:100vh;padding:3rem 2rem;text-align:center;max-width:800px;margin:0 auto;}
.ending-screen.active{display:block;animation:fadeIn 1s ease;}
.ending-title{font-family:'Nanum Myeongjo',serif;font-weight:800;font-size:clamp(2rem,6vw,3.5rem);margin-bottom:.8rem;letter-spacing:.2em;}
.ending-sub{color:var(--point-border);letter-spacing:.5em;margin-bottom:2.5rem;}
.ending-treasures{display:flex;justify-content:center;gap:.8rem;margin:2rem 0;flex-wrap:wrap;}
.ending-treasure{width:60px;height:60px;background:var(--point-color);border:3px solid var(--point-border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--paper);box-shadow:0 4px 15px var(--shadow);}
.ending-message{font-size:1.1rem;line-height:2.2;background:rgba(255,255,255,.5);padding:2rem;border:2px dashed var(--point-border);margin-bottom:2rem;}
.reflection-area{background:rgba(255,255,255,.5);border:2px solid var(--ink);padding:2rem;margin-bottom:2rem;text-align:left;}
.reflection-area h3{font-family:'Nanum Myeongjo',serif;color:var(--point-color);margin-bottom:.8rem;letter-spacing:.15em;border-bottom:1px solid var(--point-border);padding-bottom:.5rem;}
.reflection-textarea{width:100%;min-height:160px;padding:1.1rem;border:2px solid var(--ink);background:var(--paper);font-family:'Gowun Batang',serif;font-size:1rem;line-height:1.8;color:var(--ink);resize:vertical;}
.reflection-textarea:focus{outline:none;border-color:var(--point-color);background:#fff;}

/* ── 애니메이션 ── */
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-30px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
@keyframes scaleIn{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes slideInRight{from{transform:translateX(30px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes slideDown{from{opacity:0;max-height:0;}to{opacity:1;max-height:300px;}}

@media(max-width:600px){
  .episode-card{padding:1.5rem;}
  .episode-title{font-size:1.4rem;}
  .match-container{grid-template-columns:1fr;gap:.8rem;}
  .button-row{flex-direction:column;}
  .button-row .btn{width:100%;}
  .btn-next{margin-left:0;}
  .treasure-modal-content{padding:1.8rem 1.5rem;}
}
</style>
</head>

      <div class="verify-msg" id="nameMsg"></div>
    </div>
    <button class="btn btn-dark" id="loginBtn" onclick="doLogin()" disabled>시간의 문을 열어라</button>

<!-- 인트로 -->
<div class="intro-screen" id="introScreen">

</div>

<!-- 게임 -->
<div class="game-screen" id="gameScreen">

    <span class="progress-text">보물 <span id="progressNum">0</span> / 10</span>
    <div class="treasures" id="treasuresDisplay"></div>
  </div>
  <div class="episode-card" id="episodeCard"></div>
</div>

<!-- 엔딩 -->
<div class="ending-screen" id="endingScreen">

  <div class="reflection-area">

═══════════════════════════════════════ */
async function loadStudentMap() {
  try {
    const cached = localStorage.getItem('hi_students_cache');
    if (cached) {
      const { map, ts } = JSON.parse(cached);
      if (map && Date.now() - ts < 86400000) { studentMap = map; mapLoaded = true; return; }
    }
    const snap = await get(ref(rtdb, 'students'));
    const data = snap.val() || {};
    Object.values(data).forEach(s => {
      if (!s) return;
      const sid   = String(s.studentId || s.id || '').trim();
      const sname = (s.name || s.studentName || '').trim();
      if (sid && sname) studentMap[sid] = sname;
    });
    mapLoaded = true;
    localStorage.setItem('hi_students_cache', JSON.stringify({ map: studentMap, ts: Date.now() }));
  } catch (e) { mapLoaded = true; }
}

function verifyId(id) {
  if (!/^\d{5}$/.test(id)) return { ok: false, msg: '학번은 숫자 5자리입니다.' };
  if (!mapLoaded) return { ok: false, msg: '명단 확인 중...' };
  if (Object.keys(studentMap).length === 0) return { ok: true, name: null };
  const name = studentMap[id];
  if (!name) return { ok: false, msg: '명단에 없는 학번입니다. 선생님께 문의하세요.' };
  return { ok: true, name };
}

let _idTimer = null, _verifiedName = null;
document.getElementById('inputId').addEventListener('input', e => {
  const val = e.target.value.replace(/\D/g, '').slice(0, 5);
  e.target.value = val;
  const nameInput = document.getElementById('inputName');
  const idMsg = document.getElementById('idMsg');
  const nameMsg = document.getElementById('nameMsg');
  _verifiedName = null;
  nameInput.disabled = true; nameInput.value = '';
  idMsg.textContent = ''; idMsg.className = 'verify-msg';
  nameMsg.textContent = ''; nameMsg.className = 'verify-msg';
  document.getElementById('loginBtn').disabled = true;
  if (val.length < 5) { if (val.length > 0) { idMsg.textContent = `학번은 5자리입니다 (현재 ${val.length}자리)`; idMsg.className = 'verify-msg err'; } return; }
  clearTimeout(_idTimer);
  _idTimer = setTimeout(async () => {
    if (!mapLoaded) await loadStudentMap();
    const r = verifyId(val);
    if (r.ok) {
      _verifiedName = r.name;
      idMsg.textContent = r.name ? '명단 확인 완료' : '학번 형식 확인 완료';
      idMsg.className = 'verify-msg ok';
      nameInput.disabled = false;
    } else {
      idMsg.textContent = r.msg;
      idMsg.className = 'verify-msg err';
    }
  }, 400);
});

document.getElementById('inputName').addEventListener('input', e => {
  const val = e.target.value.trim();
  const nameMsg = document.getElementById('nameMsg');
  const btn = document.getElementById('loginBtn');
  if (!val) { nameMsg.textContent = ''; nameMsg.className = 'verify-msg'; btn.disabled = true; return; }
  if (_verifiedName) {
    if (val === _verifiedName) { nameMsg.textContent = '이름 일치 확인'; nameMsg.className = 'verify-msg ok'; btn.disabled = false; }
    else { nameMsg.textContent = '이름을 다시 확인해주세요.'; nameMsg.className = 'verify-msg err'; btn.disabled = true; }
  } else {
    nameMsg.textContent = ''; nameMsg.className = 'verify-msg ok'; btn.disabled = false;
  }
});

window.doLogin = function() {
  studentId   = document.getElementById('inputId').value.trim();
  studentName = document.getElementById('inputName').value.trim();
  if (!studentId || !studentName) return;
  document.getElementById('loginScreen').classList.remove('active');

  document.getElementById('introGreeting').textContent = `${studentName} 학생, 그대의 여정이 시작되도다.`;
};

async function seedEpisodes() {
  for (const ep of SEED_EPISODES) {
    await setDoc(doc(db, 'escape26_2', `ep_${ep.order}`), ep);
  }
}

/* ═══════════════════════════════════════
   데이터 로드
═══════════════════════════════════════ */
async function loadData() {
  try {
    const q = query(collection(db, 'escape26_2'), orderBy('order'));
    const snap = await getDocs(q);
    episodes = [];
    snap.forEach(d => episodes.push({ id: d.id, ...d.data() }));
    if (episodes.length === 0) {
      await seedEpisodes();
      const snap2 = await getDocs(q);
      episodes = [];
      snap2.forEach(d => episodes.push({ id: d.id, ...d.data() }));
    }
    if (episodes.length === 0) throw new Error('에피소드 데이터가 없소이다. 관리자에게 문의하시오.');

    const sDoc = await getDoc(doc(db, 'escape26_2_settings', 'main'));
    settings = sDoc.exists() ? sDoc.data() : defaultSettings();

    await loadStudentMap();

    document.getElementById('loadingScreen').classList.add('hidden');
    document.getElementById('introTitle').textContent  = settings.gameTitle  || '千年의 記憶';
    document.getElementById('introSubtitle').textContent = settings.gameSubtitle || '고 려 의 부 름';
    const storyEl = document.getElementById('introStory');
    storyEl.innerHTML = '';
    (settings.introStory || []).forEach(p => { const el = document.createElement('p'); el.innerHTML = p; storyEl.appendChild(el); });
    document.getElementById('loginScreen').classList.add('active');
  } catch (e) {
    console.error(e);
    document.getElementById('loadingScreen').classList.add('hidden');
    document.getElementById('errorScreen').classList.add('active');
    document.getElementById('errorMessage').textContent = e.message;
  }
}

  return {
    gameTitle: '千年의 記憶',
    gameSubtitle: '고 려 의 부 름',
    introStory: ['역사 수업 중 깜빡 잠이 들었다.', '눈을 뜨니 신라 말기, 혼란의 시대 한복판이었다.', '10개의 보물을 찾아야만 현재로 돌아올 수 있다.'],

window.startGame = function() {
  document.getElementById('introScreen').classList.remove('active');
  document.getElementById('gameScreen').classList.add('active');
  initTreasures();
  renderEpisode();
};

function initTreasures() {
  const c = document.getElementById('treasuresDisplay');
  c.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const d = document.createElement('div');
    d.className = 'treasure-dot';
    d.id = `td-${i}`;
    c.appendChild(d);
  }
}

function updateProgress() {
  document.getElementById('progressNum').textContent = acquiredTreasures.length;
  acquiredTreasures.forEach(i => {
    const el = document.getElementById(`td-${i}`);
    if (el) el.classList.add('acquired');
  });
}

function detectTheme(ep) {
  const txt = [ep.title, ep.story, ep.subtitle, ep.dialog, ep.speaker].join(' ');
  if (txt.includes('신라') || txt.includes('발해') || txt.includes('불국사') || txt.includes('석굴암')) {
    if (txt.includes('발해')) return 'theme-balhae';
    return 'theme-silla';
  }
  if (txt.includes('고려')) return 'theme-goryeo';
  return '';
}

   에피소드 렌더링
═══════════════════════════════════════ */
function renderEpisode() {
  const ep = episodes[currentEp];
  document.body.className = detectTheme(ep);
  window._epState = {};

  const actionHTML = buildAction(ep);
  const card = document.getElementById('episodeCard');
  card.innerHTML = `
    <div class="episode-story">${ep.story}</div>
    <h2 class="episode-title">${ep.title}</h2>
    <div class="episode-number">${ep.subtitle}</div>
    <div class="title-divider"></div>
    <div class="quiz-content">
      <div class="speaker">▣ ${ep.speaker} 가라사대</div>
      <div>"${ep.dialog}"</div>
      <div class="quiz-question">${ep.question}</div>
    </div>
    <div class="action-area" id="actionArea">${actionHTML}</div>
    <div class="hint-box" id="hintBox"><strong>💡 힌트:</strong> ${ep.hint || '없음'}</div>
    <div class="button-row">
      <button class="btn btn-hint" onclick="toggleHint()">💡 힌트 보기</button>
      <button class="btn btn-check" id="btnCheck" onclick="checkAnswer()">답을 확인하다</button>
      <button class="btn btn-next" id="btnNext" onclick="nextEpisode()">다음으로 →</button>
    </div>
  `;

  initAction(ep);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── 액션 빌드 ── */
function buildAction(ep) {
  switch (ep.type) {
    case 'fillBlanks':  return buildFillBlanks(ep);
    case 'singleInput': return buildSingleInput();
    case 'order':       return buildOrder(ep);
    case 'tapOrder':    return buildTapOrder(ep);
    case 'classify':    return buildClassify(ep);
    case 'pairMatch':   return buildPairMatch(ep);
    case 'twoStage':    return buildTwoStage(ep);
    case 'threeStage':  return buildThreeStage(ep);
    case 'simulate':    return buildSimulate(ep);
    default: return '<p>지원하지 않는 유형입니다.</p>';
  }
}

function initAction(ep) {
  switch (ep.type) {
    case 'order':    initOrder(ep); break;
    case 'tapOrder': initTapOrder(ep); break;
    case 'classify': initClassify(ep); break;
    case 'pairMatch':initPairMatch(ep); break;
    case 'twoStage':   initTwoStage(ep); break;
    case 'threeStage': initThreeStage(ep); break;
    case 'simulate': initSimulate(ep); break;
  }
}

/* ── fillBlanks ── */
function buildFillBlanks(ep) {
  const labels = ['①','②','③','④','⑤','⑥'];
  return ep.answers.map((_, i) => `
    <div class="blank-row">
      <span class="blank-label">${labels[i]}</span>
      <input type="text" class="blank-input" id="blank-${i}" placeholder="답을 입력하시오">
    </div>`).join('');
}

/* ── singleInput ── */
function buildSingleInput() {
  return `<input type="text" class="single-input" id="singleInput" placeholder="답을 입력하시오" maxlength="20">`;
}

/* ── order ── */
function buildOrder(ep) {
  window._epState.order = ep.items.map((item, i) => ({ item, i })).sort(() => Math.random() - .5);
  return `<ul class="order-list" id="orderList"></ul>`;
}
function initOrder(ep) { renderOrderList(); }
function renderOrderList() {
  const state = window._epState.order;
  document.getElementById('orderList').innerHTML = state.map((obj, i) => `
    <li class="order-item" data-idx="${obj.i}">
      <span style="flex:1;line-height:1.6;">${obj.item}</span>
      <div class="order-arrows">
        <button class="arrow-btn" onclick="moveOrder(${i},-1)" ${i===0?'disabled':''}>▲</button>
        <button class="arrow-btn" onclick="moveOrder(${i},1)" ${i===state.length-1?'disabled':''}>▼</button>
      </div>
    </li>`).join('');
}
window.moveOrder = function(cur, dir) {
  const s = window._epState.order, nxt = cur + dir;
  if (nxt < 0 || nxt >= s.length) return;
  [s[cur], s[nxt]] = [s[nxt], s[cur]];
  renderOrderList();
};

/* ── tapOrder ── */
function buildTapOrder(ep) {
  const shuffled = ep.items.map((item, i) => ({ item, i })).sort(() => Math.random() - .5);
  window._epState.tapOrder = { shuffled, sequence: [] };
  return `
    <p style="text-align:center;color:var(--point-color);font-size:.85rem;margin-bottom:1rem;">💡 순서대로 눌러 번호를 붙이시오. 다시 누르면 취소됩니다.</p>

function initTapOrder(ep) {}
window.tapOrderClick = function(si) {
  const s = window._epState.tapOrder;
  const pos = s.sequence.indexOf(si);
  if (pos !== -1) {
    s.sequence.splice(pos, 1);
  } else {
    if (s.sequence.length >= s.shuffled.length) return;
    s.sequence.push(si);
  }
  s.shuffled.forEach((_, i) => {
    const el = document.querySelector(`.tap-order-item[data-si="${i}"]`);
    const num = document.getElementById(`tapNum_${i}`);
    const p = s.sequence.indexOf(i);
    if (p !== -1) { el.classList.add('tapped'); num.textContent = p + 1; }
    else { el.classList.remove('tapped'); num.textContent = ''; }
  });
};
window.stageTapOrderClick = function(pfx, stateKey, si) {
  const s = window._epState[stateKey];
  if (!s) return;
  const pos = s.sequence.indexOf(si);
  if (pos !== -1) { s.sequence.splice(pos, 1); }
  else { if (s.sequence.length >= s.shuffled.length) return; s.sequence.push(si); }
  s.shuffled.forEach((_, i) => {
    const el = document.querySelector(`#${pfx}tapOrderList .tap-order-item[data-si="${i}"]`);
    const num = document.getElementById(`${pfx}tapNum_${i}`);
    const p = s.sequence.indexOf(i);
    if (p !== -1) { el.classList.add('tapped'); num.textContent = p + 1; }
    else { el.classList.remove('tapped'); num.textContent = ''; }
  });
};
function checkTapOrder(ep) {
  const s = window._epState.tapOrder;
  if (s.sequence.length < ep.items.length) { showToast('모든 항목에 순서를 매기시오!'); return false; }
  return s.sequence.every((si, pos) => s.shuffled[si].i === pos);
}

/* ── dragOffer helpers ── */
let _dragActiveId = null, _dragActivePfx = null, _dragJustMoved = false;
window.dragStart = function(e, pfx) {
  _dragActiveId  = e.currentTarget.dataset.id;
  _dragActivePfx = pfx;
  _dragJustMoved = false;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
};
window.dragEnd = function(e) {
  e.currentTarget.classList.remove('dragging');
  setTimeout(() => { _dragJustMoved = false; }, 60);
};
window.dragDrop = function(e, pfx) {
  e.preventDefault();
  document.getElementById(pfx+'zone').classList.remove('drag-over');
  if (!_dragActiveId || _dragActivePfx !== pfx) return;
  const el = document.querySelector(`.drag-item[data-id="${_dragActiveId}"]`);
  if (!el || el.classList.contains('in-zone')) return;
  el.classList.remove('dragging');
  el.classList.add('in-zone');
  document.getElementById(pfx+'zoneItems').appendChild(el);
  _dragActiveId = null; _dragActivePfx = null; _dragJustMoved = true;
};
window.dragItemClick = function(el, pfx) {
  if (_dragJustMoved) { _dragJustMoved = false; return; }
  const pool = document.getElementById(pfx+'pool');
  const zone = document.getElementById(pfx+'zoneItems');
  if (el.classList.contains('in-zone')) {
    el.classList.remove('in-zone');
    pool.appendChild(el);
  } else {
    el.classList.add('in-zone');
    zone.appendChild(el);
  }
};

    data = simKey.startsWith('stage1') ? ep.stage1 : ep.stage2;
  }
  const steps = data.steps;
  const simArea = document.getElementById(pfx + 'simArea');
  if (!simArea) return;
  if (idx >= steps.length) {
    simArea.innerHTML = `<div class="sim-situation" style="text-align:center;font-style:normal;font-weight:700;color:var(--point-color);">✦ 모든 장면을 확인하였도다!<br><span style="font-size:.9rem;font-weight:400;">제출 버튼을 눌러 2단계로 넘어가시오.</span></div>`;
    return;
  }
  const step = steps[idx];
  simArea.innerHTML = `
    <div class="sim-progress">${idx+1} / ${steps.length} 장면</div>
    <div class="sim-situation">${step.situation}</div>
    <div class="sim-choices">${step.choices.map((c,ci)=>
      `<button class="sim-choice" data-ci="${ci}" onclick="chooseSimStepById('${pfx}','${simKey}',${idx},${ci})">${c.text}</button>`).join('')}
    </div>
    <div class="sim-feedback" id="${pfx}simFeedback${idx}"></div>`;
};
window.chooseSimStepById = function(pfx, simKey, stepIdx, choiceIdx) {
  const ep   = episodes[currentEp];
  const data = simKey.startsWith('stage1') ? ep.stage1 : ep.stage2;
  const step = data.steps[stepIdx];
  const isOk = step.choices[choiceIdx].correct;
  const btns = document.querySelectorAll(`#${pfx}simArea .sim-choice`);
  btns.forEach(b => { b.classList.add(parseInt(b.dataset.ci)===choiceIdx ? (isOk?'correct':'wrong') : ''); b.disabled = true; });
  const fb = document.getElementById(`${pfx}simFeedback${stepIdx}`);
  if (!fb) return;
  if (isOk) {
    fb.textContent = step.choices[choiceIdx].feedback || '옳은 선택이다!';
    fb.classList.add('show');
    setTimeout(() => {
      window._epState[simKey].idx = stepIdx + 1;
      renderSimStepById(pfx, simKey, data, stepIdx + 1);
    }, 1800);
  } else {
    fb.innerHTML = (step.choices[choiceIdx].feedback || '아니로다! 다시 생각해 보거라.') +
      `<br><button class="sim-retry" onclick="renderSimStepById('${pfx}','${simKey}',null,${stepIdx})">↻ 다시 선택</button>`;
    fb.classList.add('show');
  }
};

/* ── simulate ── */
function buildSimulate(ep) {
  return `<div id="simArea"></div>`;
}
function initSimulate(ep) {
  window._epState.sim = { idx: 0, allCorrect: true };
  renderSimStep(ep, 0);
}
function renderSimStep(ep, idx) {
  const steps = ep.steps;
  if (idx >= steps.length) {
    document.getElementById('simArea').innerHTML = `<div class="sim-situation" style="text-align:center;font-style:normal;font-weight:700;color:var(--point-color);">✦ 모든 선택을 마쳤도다! 답을 확인하시오.</div>`;
    return;
  }
  const step = steps[idx];
  const simArea = document.getElementById('simArea');
  simArea.innerHTML = `
    <div class="sim-progress">${idx+1} / ${steps.length} 선택</div>
    <div class="sim-situation">${step.situation}</div>
    <div class="sim-choices">${step.choices.map((c,ci)=>`
      <button class="sim-choice" data-ci="${ci}" onclick="chooseSimStep(${idx},${ci})">${c.text}</button>`).join('')}
    </div>
    <div class="sim-feedback" id="simFeedback"></div>`;
}
window.chooseSimStep = function(stepIdx, choiceIdx) {
  const ep    = episodes[currentEp];
  const step  = ep.steps[stepIdx];
  const isOk  = step.choices[choiceIdx].correct;
  const btns  = document.querySelectorAll('.sim-choice');
  btns.forEach(b => { b.classList.add(parseInt(b.dataset.ci) === choiceIdx ? (isOk?'correct':'wrong') : ''); b.disabled = true; });
  const fb = document.getElementById('simFeedback');
  fb.textContent = step.choices[choiceIdx].feedback || (isOk ? '옳은 선택이다!' : '아니로다! 역사는 다른 길을 택하였소.');
  fb.classList.add('show');
  if (!isOk) window._epState.sim.allCorrect = false;
  setTimeout(() => {
    window._epState.sim.idx = stepIdx + 1;
    renderSimStep(ep, stepIdx + 1);
  }, 1800);
};

/* ═══════════════════════════════════════
   정답 확인
═══════════════════════════════════════ */
window.checkAnswer = function() {
  const ep = episodes[currentEp];
  const s  = window._epState;

  if (ep.type === 'twoStage') {
    if (!s.twoStage.stage1Done) {
      const ok = checkStageBlock(ep.stage1Type, ep.stage1, 1);
      if (!ok) { showToast(wrongMsg()); return; }
      s.twoStage.stage1Done = true;
      showToast('1단계 통과! 2단계로 나아가라 ✦', 'success');
      document.getElementById('stage2Block').classList.add('show');
      initStageBlock(ep.stage2Type, ep.stage2, 2);
      return;
    }
    const ok2 = checkStageBlock(ep.stage2Type, ep.stage2, 2);
    if (!ok2) { showToast(wrongMsg()); return; }
    onCorrect(ep);
    return;
  }
  if (ep.type === 'threeStage') {
    const ts = s.threeStage;
    if (!ts.stage1Done) {
      const ok = checkStageBlock(ep.stage1Type, ep.stage1, 1);
      if (!ok) { showToast(wrongMsg()); return; }
      ts.stage1Done = true;
      showToast('1단계 통과! 2단계로 나아가라 ✦', 'success');
      document.getElementById('stage2Block').classList.add('show');
      initStageBlock(ep.stage2Type, ep.stage2, 2);
      return;
    }
    if (!ts.stage2Done) {
      const ok = checkStageBlock(ep.stage2Type, ep.stage2, 2);
      if (!ok) { showToast(wrongMsg()); return; }
      ts.stage2Done = true;
      showToast('2단계 통과! 3단계로 나아가라 ✦', 'success');
      document.getElementById('stage3Block').classList.add('show');
      initStageBlock(ep.stage3Type, ep.stage3, 3);
      return;
    }
    const ok3 = checkStageBlock(ep.stage3Type, ep.stage3, 3);
    if (!ok3) { showToast(wrongMsg()); return; }
    onCorrect(ep);
    return;
  }

  let ok = false;
  switch (ep.type) {
    case 'fillBlanks':  ok = checkFillBlanks(ep); break;
    case 'singleInput': ok = checkSingleInput(ep); break;
    case 'order':       ok = checkOrder(ep); break;
    case 'tapOrder':    ok = checkTapOrder(ep); break;
    case 'classify':    ok = checkClassify(ep); break;
    case 'pairMatch':   ok = checkPairMatch(ep); break;
    case 'simulate':    ok = checkSimulate(ep); break;
  }
  if (ok) onCorrect(ep); else showToast(wrongMsg());
};

function checkFillBlanks(ep) {
  return ep.answers.every((ans, i) => {
    const v = document.getElementById(`blank-${i}`)?.value.trim() || '';
    return normalize(v) === normalize(ans);
  });
}
function checkSingleInput(ep) {
  const v = document.getElementById('singleInput')?.value.trim() || '';
  return normalize(v) === normalize(ep.answer);
}
function checkOrder(ep) {
  return window._epState.order.every((obj, i) => obj.i === ep.correctOrder[i]);
}
function checkClassify(ep) {
  const s = window._epState.classify;
  if (Object.keys(s.placed).length !== ep.items.length) return false;
  return Object.keys(s.placed).every(idx => ep.zones[s.placed[idx]].correct.includes(parseInt(idx)));
}
function checkPairMatch(ep) {
  const s = window._epState.pairMatch;
  if (Object.keys(s.pairs).length !== ep.leftItems.length) return false;
  return Object.keys(s.pairs).every(li => s.pairs[li] === ep.correctPairs[parseInt(li)]);
}
function checkSimulate(ep) {
  return window._epState.sim.idx >= ep.steps.length && window._epState.sim.allCorrect;
}

function checkStageBlock(type, data, stageNum) {
  const pfx = `s${stageNum}_`;
  const key  = `stage${stageNum}`;
  switch (type) {
    case 'fillBlanks':
      return data.answers.every((ans, i) => normalize(document.getElementById(`${pfx}blank-${i}`)?.value.trim()||'') === normalize(ans));
    case 'singleInput':
      return normalize(document.getElementById(`${pfx}singleInput`)?.value.trim()||'') === normalize(data.answer);
    case 'order': {
      const s = window._epState[key+'Order'];
      return s && s.every((obj, i) => obj.i === data.correctOrder[i]);
    }
    case 'tapOrder': {
      const s = window._epState[key+'TapOrder'];
      if (!s || s.sequence.length < data.items.length) { showToast('모든 항목에 순서를 매기시오!'); return false; }
      return s.sequence.every((si, pos) => s.shuffled[si].i === pos);
    }
    case 'classify': {
      const s = window._epState[key+'Classify'];
      if (!s || Object.keys(s.placed).length !== data.items.length) return false;
      return Object.keys(s.placed).every(idx => data.zones[s.placed[idx]].correct.includes(parseInt(idx)));
    }
    case 'dialogBlanks':
      return checkDialogBlanksHTML(data, pfx);
    case 'pairMatch': {
      const s = window._epState[key+'PairMatch'];
      if (!s || Object.keys(s.pairs).length !== data.leftItems.length) return false;
      return Object.keys(s.pairs).every(li => s.pairs[li] === data.correctPairs[parseInt(li)]);
    }
    case 'dragOffer': {
      const zoneEl = document.getElementById(pfx+'zoneItems');
      if (!zoneEl) return false;
      const zoneIds = new Set([...zoneEl.querySelectorAll('.drag-item')].map(el=>el.dataset.id));
      return data.correctItems.every((_,i) => zoneIds.has(`c${i}`))
          && data.wrongItems.every((_,i) => !zoneIds.has(`w${i}`));
    }
    case 'eliminate': {
      const list = document.getElementById(pfx+'elimList');
      if (!list) return false;
      return [...list.querySelectorAll('.elim-item')].every(el => {
        const shouldElim = !data.items[parseInt(el.dataset.idx)].correct;
        return shouldElim === el.classList.contains('eliminated');
      });
    }
    case 'simulate': {
      const s = window._epState[key+'Sim'];
      if (!s || s.idx < data.steps.length) { showToast('아직 모든 장면을 확인하지 않았소이다!'); return false; }
      return true;
    }
    case 'selectKeywords': {
      const grid = document.getElementById(pfx+'kwGrid');
      if (!grid) return false;
      return [...grid.querySelectorAll('.kw-item')].every(el => {
        const shouldSel = data.items[parseInt(el.dataset.idx)].correct;
        return shouldSel === el.classList.contains('selected');
      });
    }
    default: return false;
  }
}

function normalize(s) { return String(s).replace(/\s+/g,'').replace(/[·.,!?]/g,''); }
function wrongMsg() {
  const msgs = ['아니로다! 다시 한 번 생각해 보거라.','흠... 그것이 아닌 듯하니, 다시 보거라.','그대의 답은 옳지 않도다. 차근차근 살펴보거라.','허허, 그것이 아니라네. 다시 도전해 보시게.','아직은 부족하도다. 힌트를 보거나 다시 생각해 보거라.'];
  return msgs[Math.floor(Math.random()*msgs.length)];
}

/* ═══════════════════════════════════════
   정답 처리
═══════════════════════════════════════ */
function onCorrect(ep) {
  acquiredTreasures.push(currentEp);
  updateProgress();
  document.getElementById('treasureName').textContent = ep.treasureName || '보물';
  document.getElementById('treasureDesc').textContent = ep.treasureDesc || '';
  document.getElementById('treasureModal').classList.add('show');
}
window.closeTreasureModal = function() {
  document.getElementById('treasureModal').classList.remove('show');
  document.getElementById('btnNext').classList.add('show');
  showToast('그렇도다! 보물을 얻었느니라 ✦', 'success');
};
window.nextEpisode = function() {
  currentEp++;
  if (currentEp >= episodes.length) showEnding();
  else renderEpisode();
};

/* ═══════════════════════════════════════
   힌트 / 토스트
═══════════════════════════════════════ */
window.toggleHint = function() { document.getElementById('hintBox').classList.toggle('show'); };
let _toastTimer;
function showToast(msg, type='error') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type}`; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ═══════════════════════════════════════
   엔딩
═══════════════════════════════════════ */
function showEnding() {
  document.getElementById('gameScreen').classList.remove('active');
  document.getElementById('endingTitle').textContent = settings.endingTitle || '天 命 完 遂';
  document.getElementById('endingSub').textContent   = settings.endingSubtitle || '천 명 완 수';
  document.getElementById('reflectionPrompt').textContent = settings.reflectionPrompt || '이 여정을 마치며 느낀 점을 적어주시오.';
  const msgEl = document.getElementById('endingMessage');
  msgEl.innerHTML = '';
  (settings.endingMessage || ['그대는 천 년의 역사를 완주하였도다.']).forEach(p => {
    const el = document.createElement('p'); el.style.marginBottom='.6rem'; el.innerHTML = p; msgEl.appendChild(el);
  });
  const tc = document.getElementById('endingTreasures');
  tc.innerHTML = '';
  for (let i=0;i<10;i++) { const t=document.createElement('div'); t.className='ending-treasure'; t.textContent='✦'; t.style.animationDelay=(i*.12)+'s'; tc.appendChild(t); }
  document.getElementById('endingScreen').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.finishGame = async function() {
  const reflection = document.getElementById('reflectionInput').value.trim();
  if (!reflection) { showToast('소감을 한 줄이라도 적어주시오!'); return; }
  try {
    await addDoc(collection(db, 'escape26_2_reflections'), {
      studentId, studentName, reflection,
      score: acquiredTreasures.length,
      createdAt: serverTimestamp()
    });
    showToast('기록이 봉인되었느니라. 그대의 여정이 후세에 전해지리라.', 'success');
    setTimeout(() => {
      document.getElementById('endingScreen').innerHTML = `
        <div style="padding:4rem 2rem;text-align:center;">
          <h1 class="ending-title">完</h1>
          <p style="color:var(--point-border);letter-spacing:1em;margin:1rem 0 2rem;">완</p>
          <div style="background:rgba(255,255,255,.4);padding:2rem;border:2px solid var(--point-border);text-align:left;max-width:600px;margin:0 auto;">
            <h3 style="color:var(--point-color);margin-bottom:1rem;">✦ ${studentName} 학생의 기록 ✦</h3>
            <p style="font-style:italic;line-height:1.9;">${reflection.replace(/\n/g,'<br>')}</p>
            <p style="margin-top:1rem;font-weight:700;color:var(--point-color);">획득 보물: ${acquiredTreasures.length} / 10</p>
          </div>
          <button class="btn btn-dark" style="margin-top:2rem;" onclick="location.reload()">다시 시작하다</button>
        </div>`;
    }, 1500);
  } catch (e) {
    showToast('저장에 실패하였소. 다시 시도하시오.');
  }
};
