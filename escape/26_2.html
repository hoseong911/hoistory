<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>천년의 기억 — 잃어버린 기억을 찾아서</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700;800&family=Song+Myung&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1410;
  --paper: #f4ead5;
  --paper-dark: #e8d9b8;
  --shadow: rgba(26,20,16,0.25);
  --point-color: #a8322d;
  --point-border: #c9a44c;
  --point-bg: rgba(201,164,76,0.08);
}
body.theme-silla   { --point-color:#b8860b; --point-border:#daa520; --point-bg:rgba(218,165,32,0.08); }
body.theme-balhae  { --point-color:#6a1b9a; --point-border:#8e24aa; --point-bg:rgba(106,27,154,0.08); }
body.theme-goryeo  { --point-color:#3b7a57; --point-border:#4a8f6b; --point-bg:rgba(59,122,87,0.08); }

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Gowun Batang','Nanum Myeongjo',serif;
  background:var(--paper); color:var(--ink);
  min-height:100vh;
  background-image:
    radial-gradient(circle at 20% 30%, var(--point-bg) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(26,20,16,0.03) 0%, transparent 50%),
    repeating-linear-gradient(45deg,transparent 0px,transparent 2px,rgba(26,20,16,0.02) 2px,rgba(26,20,16,0.02) 4px);
  line-height:1.7;
  transition:background-color .8s ease, color .8s ease;
}

/* ── 로딩 ── */
.loading-screen{position:fixed;inset:0;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:1.5rem;}
.loading-screen.hidden{display:none;}
.loading-spinner{width:60px;height:60px;border:4px solid var(--paper-dark);border-top-color:var(--point-color);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:'Nanum Myeongjo',serif;font-weight:700;}

/* ── 에러 ── */
.error-screen{display:none;min-height:100vh;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:2rem;}
.error-screen.active{display:flex;}

/* ── 로그인 ── */
.login-screen{display:none;min-height:100vh;flex-direction:column;justify-content:center;align-items:center;padding:2rem;}
.login-screen.active{display:flex;animation:fadeIn .8s ease;}
.login-title{font-family:'Nanum Myeongjo',serif;font-weight:800;font-size:clamp(1.8rem,5vw,3rem);letter-spacing:.3em;text-align:center;margin-bottom:.4rem;}
.login-sub{color:var(--point-border);text-align:center;margin-bottom:2rem;font-size:.9rem;}
.login-card{background:rgba(255,255,255,.5);border:2px solid var(--ink);box-shadow:6px 6px 0 var(--shadow);padding:2rem;width:100%;max-width:420px;}
.login-card p{text-align:center;color:#555;font-style:italic;margin-bottom:1.5rem;line-height:1.8;}
.form-row{margin-bottom:1rem;}
.form-row label{display:block;font-weight:700;font-size:.9rem;margin-bottom:.4rem;color:var(--point-color);}
.form-input{width:100%;padding:.8rem 1rem;border:2px solid var(--ink);background:var(--paper);font-family:'Gowun Batang',serif;font-size:1rem;color:var(--ink);transition:all .3s;}
.form-input:focus{outline:none;border-color:var(--point-color);background:#fff;}
.form-input:disabled{opacity:.5;cursor:not-allowed;}
.verify-msg{font-size:.82rem;margin-top:.3rem;min-height:1.2em;}
.verify-msg.ok{color:#3b7a57;}
.verify-msg.err{color:#a8322d;}
.btn{padding:.9rem 2.5rem;font-family:'Nanum Myeongjo',serif;font-weight:700;font-size:1rem;border:2px solid var(--ink);cursor:pointer;transition:all .3s;background:var(--paper);color:var(--ink);box-shadow:3px 3px 0 var(--ink);}
.btn:hover:not(:disabled){transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink);}
.btn:active:not(:disabled){transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:3px 3px 0 var(--ink)!important;}
.btn-dark{background:var(--ink);color:var(--paper);border-color:var(--point-border);margin-top:1rem;width:100%;}
.btn-dark:hover:not(:disabled){background:var(--point-color);border-color:var(--point-color);}

/* ── 인트로 ── */
.intro-screen{min-height:100vh;display:none;flex-direction:column;justify-content:center;align-items:center;padding:2rem;text-align:center;}
.intro-screen.active{display:flex;}
.intro-title{font-family:'Nanum Myeongjo',serif;font-weight:800;font-size:clamp(2rem,5vw,4rem);letter-spacing:.3em;margin-bottom:.5rem;animation:fadeInDown 1.5s ease;text-shadow:2px 2px 4px var(--shadow);}
.intro-subtitle{color:var(--point-border);letter-spacing:.5em;margin-bottom:2rem;animation:fadeIn 2s ease .5s both;font-size:.95rem;}
.intro-story{max-width:680px;font-size:1.05rem;line-height:2;margin:1.5rem auto;animation:fadeIn 2s ease 1s both;}
.intro-story p{margin-bottom:.8rem;}
.intro-greeting{font-weight:700;color:var(--point-color);margin-bottom:1rem;font-size:1.1rem;}
.btn-start{background:var(--ink);color:var(--paper);border-color:var(--point-border);animation:fadeInUp 2s ease 1.5s both;margin-top:2rem;}
.btn-start:hover{background:var(--point-color);border-color:var(--point-color);box-shadow:0 6px 20px var(--shadow);transform:translateY(-2px);}

/* ── 게임 화면 ── */
.game-screen{display:none;min-height:100vh;padding:1.5rem;max-width:900px;margin:0 auto;}
.game-screen.active{display:block;animation:fadeIn .8s ease;}
.progress-bar{background:var(--paper-dark);border:1px solid var(--point-border);padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}
.progress-text{font-weight:700;}
.treasures{display:flex;gap:.4rem;flex-wrap:wrap;}
.treasure-dot{width:22px;height:22px;border-radius:50%;background:transparent;border:2px solid var(--point-border);transition:all .5s;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--paper);}
.treasure-dot.acquired{background:var(--point-color);border-color:var(--point-color);box-shadow:0 0 10px var(--shadow);}
.treasure-dot.acquired::after{content:'✦';color:var(--paper);}

.episode-card{background:var(--paper);border:2px solid var(--ink);box-shadow:8px 8px 0 var(--shadow),inset 0 0 0 4px var(--paper),inset 0 0 0 5px var(--point-border);padding:2.5rem;position:relative;transition:box-shadow .8s ease;}
.episode-story{font-style:italic;color:#333;background:var(--point-bg);border-left:4px solid var(--point-color);padding:1.2rem 1.5rem;margin-bottom:2rem;font-size:1.05rem;line-height:2;transition:all .8s ease;}
.episode-title{font-family:'Nanum Myeongjo',serif;font-weight:800;font-size:1.8rem;text-align:center;margin-bottom:.4rem;letter-spacing:.15em;}
.episode-number{text-align:center;color:var(--point-color);font-family:'Song Myung',serif;letter-spacing:.5em;margin-bottom:1.5rem;font-size:.9rem;transition:color .8s ease;}
.title-divider{width:80px;height:2px;background:var(--point-border);margin:0 auto 1.5rem;position:relative;}
.title-divider::before,.title-divider::after{content:'';position:absolute;top:50%;width:6px;height:6px;background:var(--point-color);border-radius:50%;transform:translateY(-50%);transition:background .8s ease;}
.title-divider::before{left:-10px;}.title-divider::after{right:-10px;}
.quiz-content{background:rgba(255,255,255,.4);border:1px dashed var(--point-border);padding:1.5rem;margin-bottom:1.5rem;font-size:1.05rem;line-height:2;}
.speaker{font-weight:700;color:var(--point-color);margin-bottom:.4rem;font-size:.95rem;}
.quiz-question{font-size:1.05rem;margin-top:.8rem;font-weight:700;}
.action-area{margin-bottom:1.5rem;}

/* ── 단계 표시 (twoStage) ── */
.stage-label{display:inline-block;background:var(--point-color);color:var(--paper);padding:.3rem 1rem;font-size:.85rem;font-weight:700;margin-bottom:1rem;}
.stage2-area,.stage3-area{display:none;margin-top:2rem;padding-top:1.5rem;border-top:2px dashed var(--point-border);animation:fadeIn .6s ease;}
.stage2-area.show,.stage3-area.show{display:block;}

/* ── dragOffer ── */
.drag-container{display:flex;flex-direction:column;gap:1rem;}
.drag-pool-area{background:rgba(255,255,255,.3);border:2px dashed var(--ink);padding:1rem;min-height:80px;}
.drag-pool-label{font-size:.82rem;color:#777;margin-bottom:.6rem;letter-spacing:.1em;}
.drag-pool-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;}
.drag-zone-items{display:flex;flex-wrap:wrap;gap:.5rem;min-height:48px;}
.drag-drop-zone{border:2px solid var(--point-border);background:var(--point-bg);padding:1rem;min-height:100px;transition:background .2s,border .2s;}
.drag-drop-zone.drag-over{background:rgba(201,164,76,.22);border-width:3px;}
.drag-zone-label{font-family:'Nanum Myeongjo',serif;font-weight:800;text-align:center;letter-spacing:.05em;color:var(--point-color);margin-bottom:.8rem;font-size:.9rem;}
.drag-item{padding:.65rem 1rem;background:var(--paper);border:2px solid var(--ink);cursor:pointer;user-select:none;transition:all .2s;font-weight:700;box-shadow:3px 3px 0 var(--ink);font-size:.9rem;min-height:52px;display:flex;align-items:center;justify-content:center;text-align:center;}
.drag-item:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink);}
.drag-item.in-zone{background:var(--point-color);color:var(--paper);border-color:var(--point-border);box-shadow:3px 3px 0 rgba(0,0,0,.2);}
.drag-item.dragging{opacity:.3;}
/* ── eliminate ── */
.elim-list{display:flex;flex-direction:column;gap:.6rem;}
.elim-hint{font-size:.82rem;color:var(--point-color);margin-bottom:.8rem;font-style:italic;text-align:center;}
.elim-item{padding:1rem 1.2rem;background:rgba(255,255,255,.5);border:2px solid var(--ink);cursor:pointer;user-select:none;transition:all .2s;line-height:1.7;box-shadow:3px 3px 0 rgba(26,20,16,.1);}
.elim-item:hover{background:var(--point-bg);transform:translate(-1px,-1px);box-shadow:4px 4px 0 rgba(26,20,16,.15);}
.elim-item.eliminated{text-decoration:line-through;opacity:.38;background:rgba(168,50,45,.05);border-color:#ccc;box-shadow:none;transform:none;}
/* ── selectKeywords ── */
.kw-context{font-style:italic;background:var(--point-bg);border-left:4px solid var(--point-color);padding:1rem 1.2rem;margin-bottom:1rem;line-height:1.8;font-size:1rem;}
.kw-hint{font-size:.82rem;color:var(--point-color);margin-bottom:.8rem;font-style:italic;text-align:center;}
.kw-grid{display:flex;flex-wrap:wrap;gap:.6rem;}
.kw-item{padding:.7rem 1.1rem;background:rgba(255,255,255,.5);border:2px solid var(--ink);cursor:pointer;user-select:none;transition:all .2s;line-height:1.5;font-size:.92rem;box-shadow:2px 2px 0 rgba(26,20,16,.1);display:flex;align-items:center;min-height:56px;}
.kw-item:hover{background:var(--point-bg);transform:translate(-1px,-1px);box-shadow:3px 3px 0 rgba(26,20,16,.15);}
.kw-item.selected{background:var(--point-color);color:var(--paper);border-color:var(--point-border);box-shadow:3px 3px 0 rgba(0,0,0,.2);}
/* ── simulate (stage용) ── */
.sim-retry{margin-top:.7rem;padding:.5rem 1.1rem;font-family:'Nanum Myeongjo',serif;font-weight:700;font-size:.85rem;border:2px solid var(--ink);cursor:pointer;background:var(--paper);color:var(--ink);box-shadow:2px 2px 0 var(--ink);letter-spacing:.05em;}
.sim-retry:hover{background:var(--point-color);color:var(--paper);border-color:var(--point-color);}

/* ── 입력 공통 ── */
.blank-row{display:flex;align-items:center;gap:.8rem;margin-bottom:.8rem;flex-wrap:wrap;}
.blank-label{font-weight:700;color:var(--point-border);min-width:28px;}
.blank-input,.single-input{flex:1;padding:.75rem 1rem;border:2px solid var(--ink);background:var(--paper);font-family:'Gowun Batang',serif;font-size:1rem;color:var(--ink);transition:all .3s;box-shadow:inset 2px 2px 5px rgba(0,0,0,.05);}
.single-input{width:100%;text-align:center;letter-spacing:.2em;}
.blank-input:focus,.single-input:focus{outline:none;border-color:var(--point-color);background:#fff;}

/* ── tapOrder ── */
.tap-order-list{display:flex;flex-direction:column;gap:.6rem;}
.tap-order-item{display:flex;align-items:flex-start;gap:1rem;padding:1rem 1.2rem;background:rgba(255,255,255,.5);border:2px solid var(--ink);cursor:pointer;user-select:none;transition:all .2s;line-height:1.7;box-shadow:3px 3px 0 rgba(26,20,16,.1);}
.tap-order-item:hover{background:var(--point-bg);transform:translate(-1px,-1px);box-shadow:4px 4px 0 rgba(26,20,16,.15);}
.tap-order-item.tapped{background:var(--point-color);color:var(--paper);border-color:var(--point-border);box-shadow:3px 3px 0 rgba(0,0,0,.2);}
.tap-order-num{min-width:2rem;height:2rem;border:2px solid currentColor;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;flex-shrink:0;opacity:.35;transition:opacity .2s;}
.tap-order-item.tapped .tap-order-num{opacity:1;}
.tap-order-text{flex:1;}

/* ── dialogBlanks ── */
.dialog-log{display:flex;flex-direction:column;gap:.9rem;}
.dialog-line{display:flex;gap:.8rem;align-items:flex-start;}
.dialog-speaker{font-weight:800;color:var(--point-color);min-width:5.5rem;font-size:.82rem;padding-top:.35rem;flex-shrink:0;line-height:1.5;}
.dialog-text{background:rgba(255,255,255,.45);border:1.5px solid var(--ink);padding:.75rem 1rem;line-height:2.1;font-size:.93rem;flex:1;}
.dialog-blank{border:none;border-bottom:2.5px solid var(--point-color);background:transparent;width:5rem;font-family:'Nanum Myeongjo',serif;font-size:.93rem;font-weight:700;color:var(--ink);text-align:center;padding:.1rem .2rem;outline:none;transition:border-color .2s;}
.dialog-blank:focus{border-bottom-color:var(--ink);}

/* ── 카드 공통 ── */
.card-pool{display:flex;flex-wrap:wrap;gap:.6rem;padding:1.2rem;background:rgba(255,255,255,.3);border:2px dashed var(--ink);min-height:80px;margin-bottom:1rem;}
.quiz-card,.match-item,.order-item{padding:.75rem 1.1rem;background:var(--paper);border:2px solid var(--ink);cursor:pointer;user-select:none;transition:all .2s;font-weight:700;box-shadow:3px 3px 0 var(--ink);display:flex;align-items:center;font-size:.95rem;}
.quiz-card:hover,.match-item:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink);background:var(--point-bg);}
.quiz-card:active,.match-item:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink);}
.quiz-card.selected,.match-item.selected{background:var(--point-color);color:var(--paper);border-color:var(--point-color);}
.quiz-card.placed{opacity:.35;cursor:not-allowed;pointer-events:none;box-shadow:none;transform:none;}
.match-item.matched{background:var(--paper-dark);color:var(--ink);border-style:dashed;cursor:default;box-shadow:none;transform:none;opacity:.7;}

/* ── 분류 ── */
.classify-zones{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1rem;}
.classify-zone{border:2px solid var(--ink);background:rgba(255,255,255,.4);padding:1rem;min-height:110px;transition:background .3s;cursor:pointer;}
.classify-zone:hover{background:var(--point-bg);}
.classify-zone h4{text-align:center;color:var(--point-color);margin-bottom:.7rem;border-bottom:1px dashed var(--point-border);padding-bottom:.4rem;font-size:.9rem;}
.classify-items{display:flex;flex-wrap:wrap;gap:.4rem;min-height:50px;}
.classify-chip{padding:.35rem .7rem;background:var(--paper);border:1.5px solid var(--ink);font-size:.82rem;font-weight:700;cursor:pointer;}
.classify-chip:hover{background:var(--point-bg);}

/* ── 순서 ── */
.order-list{list-style:none;counter-reset:order-counter;display:flex;flex-direction:column;gap:.6rem;}
.order-item{gap:1rem;margin-bottom:0;counter-increment:order-counter;}
.order-item::before{content:counter(order-counter);background:var(--ink);color:var(--paper);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.85rem;}
.order-arrows{margin-left:auto;display:flex;gap:.3rem;}
.arrow-btn{width:30px;height:30px;border:1px solid var(--ink);background:var(--paper);cursor:pointer;font-weight:700;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:.85rem;}
.arrow-btn:hover:not(:disabled){background:var(--point-color);color:#fff;}
.arrow-btn:disabled{opacity:.2;cursor:not-allowed;}

/* ── 매칭 (pairMatch) ── */
.match-container{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1rem;}
.match-column h4{text-align:center;margin-bottom:.8rem;color:var(--point-color);border-bottom:2px solid var(--point-border);padding-bottom:.4rem;font-size:.9rem;}
.match-pairs-result{margin-top:.8rem;padding:.8rem;background:rgba(255,255,255,.4);border:1px solid var(--point-border);}
.pair-row{padding:.4rem .6rem;background:#fff;margin-bottom:.3rem;font-size:.9rem;border-left:3px solid var(--point-color);}

/* ── 시뮬레이션 ── */
.sim-situation{background:rgba(255,255,255,.4);border:1px dashed var(--point-border);padding:1.2rem;margin-bottom:1rem;font-style:italic;line-height:1.9;}
.sim-choices{display:flex;flex-direction:column;gap:.7rem;}
.sim-choice{background:var(--paper);border:2px solid var(--ink);padding:1rem 1.2rem;cursor:pointer;font-weight:700;transition:all .2s;box-shadow:3px 3px 0 var(--ink);text-align:left;font-family:'Gowun Batang',serif;font-size:.95rem;line-height:1.7;}
.sim-choice:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink);background:var(--point-bg);}
.sim-choice.correct{background:#d4edda;border-color:#3b7a57;color:#1a4a1a;box-shadow:none;pointer-events:none;}
.sim-choice.wrong{background:#f8d7da;border-color:#a8322d;color:#6b1a1a;box-shadow:none;pointer-events:none;}
.sim-progress{text-align:center;color:var(--point-color);font-size:.9rem;font-weight:700;margin-bottom:.8rem;}
.sim-feedback{padding:.8rem 1rem;margin-top:.8rem;background:var(--point-bg);border-left:4px solid var(--point-color);font-size:.95rem;line-height:1.8;display:none;}
.sim-feedback.show{display:block;}

/* ── chatQuiz (질문-답변 순차형) ── */
.chatq-area{display:flex;flex-direction:column;gap:1.4rem;}
.chatq-q{font-style:italic;background:var(--point-bg);border-left:4px solid var(--point-color);padding:1rem 1.2rem;font-size:.95rem;line-height:1.9;margin-bottom:.6rem;}
.chatq-qnum{font-size:.78rem;color:var(--point-color);font-weight:700;margin-bottom:.4rem;}
.chatq-input-row{display:flex;gap:.6rem;align-items:center;}
.chatq-input{flex:1;padding:.75rem 1rem;border:2px solid var(--ink);background:var(--paper);font-family:'Gowun Batang',serif;font-size:1rem;color:var(--ink);transition:all .3s;box-shadow:inset 2px 2px 5px rgba(0,0,0,.05);}
.chatq-input:focus{outline:none;border-color:var(--point-color);background:#fff;}
.chatq-input:disabled{opacity:.5;}
.chatq-submit{padding:.75rem 1.5rem;font-family:'Nanum Myeongjo',serif;font-weight:700;font-size:.95rem;border:2px solid var(--ink);cursor:pointer;background:var(--ink);color:var(--paper);transition:all .2s;white-space:nowrap;}
.chatq-submit:hover:not(:disabled){background:var(--point-color);border-color:var(--point-color);}
.chatq-submit:disabled{opacity:.4;cursor:not-allowed;}
.chatq-answer{padding:.75rem 1rem;background:var(--point-bg);border:2px solid var(--point-border);font-weight:700;color:var(--ink);font-size:.95rem;}
.chatq-fb{font-size:.85rem;margin-top:.4rem;line-height:1.6;}
.chatq-fb.ok{color:#3b7a57;font-weight:700;}
.chatq-fb.err{color:#a8322d;}
/* ── dialogBlanksSeq chatMode ── */
.dialog-chat-log{display:flex;flex-direction:column;gap:0;background:#c2d3e0;border-radius:12px;padding:.9rem .8rem;margin-bottom:.8rem;}
.dialog-chat-left{display:flex;gap:.6rem;align-items:flex-start;margin-bottom:.7rem;}
.dialog-chat-right{display:flex;justify-content:flex-end;margin-bottom:.7rem;}
.dialog-chat-avatar{width:2rem;height:2rem;background:#3e2f1e;color:#f4ead5;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;flex-shrink:0;font-family:'Nanum Myeongjo',serif;}
.dialog-chat-right-avatar{width:2rem;height:2rem;background:var(--point-color);color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;flex-shrink:0;font-family:'Nanum Myeongjo',serif;}
.dialog-chat-body{display:flex;flex-direction:column;gap:.1rem;max-width:82%;}
.dialog-chat-name{font-size:.68rem;color:#333;font-weight:700;padding-left:.2rem;}

};

const app = initializeApp(firebaseConfig);

async function loadStudentMap() {
  try {
    const cached = localStorage.getItem('hi_students_cache');
    if (cached) {
      const { map, ts } = JSON.parse(cached);
      if (map && Date.now() - ts < 86400000) { studentMap = map; mapLoaded = true; return; }
    }
    const snap = await get(ref(rtdb, 'students'));
    const data = snap.val() || {};
    Object.values(data).forEach(s => {
      if (!s) return;
      const sid   = String(s.studentId || s.id || '').trim();
      const sname = (s.name || s.studentName || '').trim();
      if (sid && sname) studentMap[sid] = sname;
    });
    mapLoaded = true;
    localStorage.setItem('hi_students_cache', JSON.stringify({ map: studentMap, ts: Date.now() }));
  } catch (e) { mapLoaded = true; }
}

function verifyId(id) {
  if (!/^\d{5}$/.test(id)) return { ok: false, msg: '학번은 숫자 5자리입니다.' };
  if (!mapLoaded) return { ok: false, msg: '명단 확인 중...' };
  if (Object.keys(studentMap).length === 0) return { ok: true, name: null };
  const name = studentMap[id];
  if (!name) return { ok: false, msg: '명단에 없는 학번입니다. 선생님께 문의하세요.' };
  return { ok: true, name };
}

let _idTimer = null, _verifiedName = null;
document.getElementById('inputId').addEventListener('input', e => {
  const val = e.target.value.replace(/\D/g, '').slice(0, 5);
  e.target.value = val;
  const nameInput = document.getElementById('inputName');
  const idMsg = document.getElementById('idMsg');
  const nameMsg = document.getElementById('nameMsg');
  _verifiedName = null;
  nameInput.disabled = true; nameInput.value = '';
  idMsg.textContent = ''; idMsg.className = 'verify-msg';
  nameMsg.textContent = ''; nameMsg.className = 'verify-msg';
  document.getElementById('loginBtn').disabled = true;
  if (val.length < 5) { if (val.length > 0) { idMsg.textContent = `학번은 5자리입니다 (현재 ${val.length}자리)`; idMsg.className = 'verify-msg err'; } return; }
  clearTimeout(_idTimer);
  _idTimer = setTimeout(async () => {
    if (!mapLoaded) await loadStudentMap();
    const r = verifyId(val);
    if (r.ok) {
      _verifiedName = r.name;
      idMsg.textContent = r.name ? '명단 확인 완료' : '학번 형식 확인 완료';
      idMsg.className = 'verify-msg ok';
      nameInput.disabled = false;
    } else {
      idMsg.textContent = r.msg;
      idMsg.className = 'verify-msg err';
    }
  }, 400);
});

document.getElementById('inputName').addEventListener('input', e => {
  const val = e.target.value.trim();
  const nameMsg = document.getElementById('nameMsg');
  const btn = document.getElementById('loginBtn');
  if (!val) { nameMsg.textContent = ''; nameMsg.className = 'verify-msg'; btn.disabled = true; return; }
  if (_verifiedName) {
    if (val === _verifiedName) { nameMsg.textContent = '이름 일치 확인'; nameMsg.className = 'verify-msg ok'; btn.disabled = false; }
    else { nameMsg.textContent = '이름을 다시 확인해주세요.'; nameMsg.className = 'verify-msg err'; btn.disabled = true; }
  } else {
    nameMsg.textContent = ''; nameMsg.className = 'verify-msg ok'; btn.disabled = false;
  }
});

window.doLogin = function() {
  studentId   = document.getElementById('inputId').value.trim();
  studentName = document.getElementById('inputName').value.trim();
  if (!studentId || !studentName) return;
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('introScreen').classList.add('active');
  document.getElementById('introGreeting').textContent = `${studentName} 학생, 그대의 여정이 시작되도다.`;
};

async function seedEpisodes() {
  for (const ep of SEED_EPISODES) {
    await setDoc(doc(db, 'escape26_2', `ep_${ep.order}`), ep);
  }
}

═══════════════════════════════════════ */
async function loadData() {
  try {
    if (USE_LOCAL_DATA) {
      episodes = [...SEED_EPISODES].sort((a, b) => a.order - b.order);
      settings = defaultSettings();
    } else {
      const sDoc = await getDoc(doc(db, 'escape26_2_settings', 'main'));
      if (!sDoc.exists()) {
        settings = defaultSettings();
        await seedEpisodes();
        await setDoc(doc(db, 'escape26_2_settings', 'main'), { ...settings, dataVersion: DATA_VERSION });
      } else {
        settings = sDoc.data();
        if ((settings.dataVersion || '') !== DATA_VERSION) {
          await seedEpisodes();
          await setDoc(doc(db, 'escape26_2_settings', 'main'), { dataVersion: DATA_VERSION }, { merge: true });
        }
      }
      const q = query(collection(db, 'escape26_2'), orderBy('order'));
      const snap = await getDocs(q);
      episodes = [];
      snap.forEach(d => episodes.push({ id: d.id, ...d.data() }));
      if (episodes.length === 0) throw new Error('에피소드 데이터가 없습니다. 관리자에게 문의하세요.');
    }

    await loadStudentMap();

    document.getElementById('loadingScreen').classList.add('hidden');
    document.getElementById('introTitle').textContent  = settings.gameTitle  || '천년의 기억';
    document.getElementById('introSubtitle').textContent = settings.gameSubtitle || '잃어버린 기억을 찾아서';
    const storyEl = document.getElementById('introStory');
    storyEl.innerHTML = '';
    (settings.introStory || []).forEach(p => { const el = document.createElement('p'); el.innerHTML = p; storyEl.appendChild(el); });
    document.getElementById('loginScreen').classList.add('active');
  } catch (e) {
    console.error(e);
    document.getElementById('loadingScreen').classList.add('hidden');
    document.getElementById('errorScreen').classList.add('active');
    document.getElementById('errorMessage').textContent = e.message;
  }
}

/* ═══════════════════════════════════════
   게임 시작
═══════════════════════════════════════ */
window.startGame = function() {
  document.getElementById('introScreen').classList.remove('active');
  document.getElementById('gameScreen').classList.add('active');
  initTreasures();
  renderEpisode();
};

function initTreasures() {
  const c = document.getElementById('treasuresDisplay');
  c.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const d = document.createElement('div');
    d.className = 'treasure-dot';
    d.id = `td-${i}`;
    c.appendChild(d);
  }
}

function updateProgress() {
  document.getElementById('progressNum').textContent = acquiredTreasures.length;
  acquiredTreasures.forEach(i => {
    const el = document.getElementById(`td-${i}`);
    if (el) el.classList.add('acquired');
  });
}

function detectTheme(ep) {
  const txt = [ep.title, ep.story, ep.subtitle, ep.dialog, ep.speaker].join(' ');
  if (txt.includes('신라') || txt.includes('발해') || txt.includes('불국사') || txt.includes('석굴암')) {
    if (txt.includes('발해')) return 'theme-balhae';
    return 'theme-silla';
  }
  if (txt.includes('고려')) return 'theme-goryeo';
  return '';
}

/* ═══════════════════════════════════════
   에피소드 렌더링
═══════════════════════════════════════ */
function renderEpisode() {
  const ep = episodes[currentEp];
  document.body.className = detectTheme(ep);
  window._epState = {};

  const actionHTML = buildAction(ep);
  const card = document.getElementById('episodeCard');
  card.innerHTML = `
    <div class="episode-story">${ep.story}</div>
    <h2 class="episode-title">${ep.title}</h2>
    <div class="episode-number">${ep.subtitle}</div>
    <div class="title-divider"></div>
    <div class="quiz-content">
      <div class="speaker">▣ ${ep.speaker} 가라사대</div>
      <div>"${ep.dialog}"</div>
      <div class="quiz-question">${ep.question}</div>
    </div>
    <div class="action-area" id="actionArea">${actionHTML}</div>
    <div class="button-row">
      ${ep.type !== 'chatQuiz' ? `<button class="btn btn-check" id="btnCheck" onclick="checkAnswer()">답을 확인하다</button>` : ''}
    </div>
  `;

  initAction(ep);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── 액션 빌드 ── */
function buildAction(ep) {
  switch (ep.type) {
    case 'fillBlanks':  return buildFillBlanks(ep);
    case 'singleInput': return buildSingleInput();
    case 'order':       return buildOrder(ep);
    case 'tapOrder':    return buildTapOrder(ep);
    case 'classify':    return buildClassify(ep);
    case 'pairMatch':   return buildPairMatch(ep);
    case 'twoStage':    return buildTwoStage(ep);
    case 'threeStage':  return buildThreeStage(ep);
    case 'simulate':    return buildSimulate(ep);
    case 'chatQuiz':    return buildChatQuiz(ep);
    case 'dragOrder':   return buildDragOrder(ep);
    default: return '<p>지원하지 않는 유형입니다.</p>';
  }
}

function initAction(ep) {
  switch (ep.type) {
    case 'order':    initOrder(ep); break;
    case 'tapOrder': initTapOrder(ep); break;
    case 'classify': initClassify(ep); break;
    case 'pairMatch':initPairMatch(ep); break;
    case 'twoStage':   initTwoStage(ep); break;
    case 'threeStage': initThreeStage(ep); break;
    case 'simulate': initSimulate(ep); break;
    case 'chatQuiz': initChatQuiz(ep); break;
    case 'dragOrder': initDragOrder(ep); break;
  }
}

/* ── fillBlanks ── */
function buildFillBlanks(ep) {
  const labels = ['①','②','③','④','⑤','⑥'];
  return ep.answers.map((_, i) => `
    <div class="blank-row">
      <span class="blank-label">${labels[i]}</span>
      <input type="text" class="blank-input" id="blank-${i}" placeholder="답을 입력하세요">
    </div>`).join('');
}

/* ── singleInput ── */
function buildSingleInput() {
  return `<input type="text" class="single-input" id="singleInput" placeholder="답을 입력하세요" maxlength="20">`;
}

/* ── order ── */
function buildOrder(ep) {
  window._epState.order = ep.items.map((item, i) => ({ item, i })).sort(() => Math.random() - .5);
  return `<ul class="order-list" id="orderList"></ul>`;
}
function initOrder(ep) { renderOrderList(); }
function renderOrderList() {
  const state = window._epState.order;
  document.getElementById('orderList').innerHTML = state.map((obj, i) => `
    <li class="order-item" data-idx="${obj.i}">
      <span style="flex:1;line-height:1.6;">${obj.item}</span>
      <div class="order-arrows">
        <button class="arrow-btn" onclick="moveOrder(${i},-1)" ${i===0?'disabled':''}>▲</button>
        <button class="arrow-btn" onclick="moveOrder(${i},1)" ${i===state.length-1?'disabled':''}>▼</button>
      </div>
    </li>`).join('');
}
window.moveOrder = function(cur, dir) {
  const s = window._epState.order, nxt = cur + dir;
  if (nxt < 0 || nxt >= s.length) return;
  [s[cur], s[nxt]] = [s[nxt], s[cur]];
  renderOrderList();
};

/* ── tapOrder ── */
function buildTapOrder(ep) {
  const shuffled = ep.items.map((item, i) => ({ item, i })).sort(() => Math.random() - .5);
  window._epState.tapOrder = { shuffled, sequence: [] };
  return `
    <p style="text-align:center;color:var(--point-color);font-size:.85rem;margin-bottom:1rem;">순서대로 눌러 번호를 붙이세요. 다시 누르면 취소됩니다.</p>
    <div class="tap-order-list" id="tapOrderList">
      ${shuffled.map((obj, si) => `
        <div class="tap-order-item" data-si="${si}" onclick="tapOrderClick(${si})">
          <div class="tap-order-num" id="tapNum_${si}"></div>
          <div class="tap-order-text">${obj.item}</div>
        </div>`).join('')}
    </div>`;
}
function initTapOrder(ep) {}
window.tapOrderClick = function(si) {
  const s = window._epState.tapOrder;
  const pos = s.sequence.indexOf(si);
  if (pos !== -1) {
    s.sequence.splice(pos, 1);
  } else {
    if (s.sequence.length >= s.shuffled.length) return;
    s.sequence.push(si);
  }
  s.shuffled.forEach((_, i) => {
    const el = document.querySelector(`.tap-order-item[data-si="${i}"]`);
    const num = document.getElementById(`tapNum_${i}`);
    const p = s.sequence.indexOf(i);
    if (p !== -1) { el.classList.add('tapped'); num.textContent = p + 1; }
    else { el.classList.remove('tapped'); num.textContent = ''; }
  });
};
window.stageTapOrderClick = function(pfx, stateKey, si) {
  const s = window._epState[stateKey];
  if (!s) return;
  const pos = s.sequence.indexOf(si);
  if (pos !== -1) { s.sequence.splice(pos, 1); }
  else { if (s.sequence.length >= s.shuffled.length) return; s.sequence.push(si); }
  s.shuffled.forEach((_, i) => {
    const el = document.querySelector(`#${pfx}tapOrderList .tap-order-item[data-si="${i}"]`);
    const num = document.getElementById(`${pfx}tapNum_${i}`);
    const p = s.sequence.indexOf(i);
    if (p !== -1) { el.classList.add('tapped'); num.textContent = p + 1; }
    else { el.classList.remove('tapped'); num.textContent = ''; }
  });
  if (s.sequence.length >= s.shuffled.length) {
    const correct = s.sequence.every((idx, pos) => s.shuffled[idx].i === pos);
    if (correct) { const _sn = parseInt(pfx[1]); if (_sn) setTimeout(() => autoAdvanceStage(_sn), 400); }
  }
};
function checkTapOrder(ep) {
  const s = window._epState.tapOrder;
  if (s.sequence.length < ep.items.length) { showToast('모든 항목에 순서를 매겨주세요!'); return false; }
  return s.sequence.every((si, pos) => s.shuffled[si].i === pos);
}

/* ── dialogBlanks ── */
function buildDialogBlanksHTML(data, pfx) {
  function parse(text) {
    return String(text||'').replace(/\{(\d+)\}/g, (_, n) =>
      `<input class="dialog-blank" id="${pfx}dbBlank${n}" data-n="${n}" placeholder="?">`);
  }
  return `<div class="dialog-log">${data.lines.map(l=>`
    <div class="dialog-line">
      <div class="dialog-speaker">${parse(l.speaker)}</div>
      <div class="dialog-text">${parse(l.text)}</div>
    </div>`).join('')}</div>`;
}
function checkDialogBlanksHTML(data, pfx) {
  return data.answers.every((ans, i) => {
    const el = document.getElementById(`${pfx}dbBlank${i+1}`);
    return el && normalize(el.value.trim()) === normalize(String(ans));
  });
}

/* ── classify ── */
function buildClassify(ep) {
  return `
    <p style="text-align:center;color:var(--point-color);font-size:.9rem;margin-bottom:.8rem;">카드를 클릭한 뒤 해당 영역을 누르세요</p>
    <div class="card-pool" id="classifyPool"></div>
    <div class="classify-zones" id="classifyZones"></div>`;
}
function initClassify(ep) {
  window._epState.classify = { selected: null, placed: {} };
  const pool  = document.getElementById('classifyPool');
  const zones = document.getElementById('classifyZones');
  ep.items.forEach((item, i) => {
    const c = document.createElement('div');
    c.className = 'quiz-card'; c.textContent = item; c.dataset.idx = i;
    c.onclick = () => selectClassify(i, c);
    pool.appendChild(c);
  });
  ep.zones.forEach((zone, zi) => {
    const z = document.createElement('div');
    z.className = 'classify-zone'; z.dataset.zone = zi;
    z.innerHTML = `<h4>${zone.name}</h4><div class="classify-items" id="czone-${zi}"></div>`;
    z.onclick = () => placeClassify(zi, ep);
    zones.appendChild(z);
  });
}
function selectClassify(idx, card) {
  if (card.classList.contains('placed')) return;
  document.querySelectorAll('#classifyPool .quiz-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  window._epState.classify.selected = idx;
}
function placeClassify(zi, ep) {
  const s = window._epState.classify;
  if (s.selected === null) { showToast('먼저 카드를 선택해 주세요!'); return; }
  const idx = s.selected;
  s.placed[idx] = zi;
  const card = document.querySelector(`#classifyPool .quiz-card[data-idx="${idx}"]`);
  card.classList.add('placed'); card.classList.remove('selected');
  const zoneEl = document.getElementById(`czone-${zi}`);
  const chip = document.createElement('div');
  chip.className = 'classify-chip'; chip.textContent = ep.items[idx]; chip.dataset.itemIdx = idx;
  chip.onclick = e => { e.stopPropagation(); chip.remove(); delete s.placed[idx]; card.classList.remove('placed'); };
  zoneEl.appendChild(chip);
  s.selected = null;
}

/* ── pairMatch ── */
function buildPairMatch(ep) {
  return `
    <div class="match-container">
      <div class="match-column"><h4>${ep.leftLabel || '인물·세력'}</h4><div id="leftCol"></div></div>
      <div class="match-column"><h4>${ep.rightLabel || '내용·업적'}</h4><div id="rightCol"></div></div>
    </div>
    <div id="matchResult"></div>`;
}
function initPairMatch(ep) {
  window._epState.pairMatch = { selectedLeft: null, pairs: {} };
  const lc = document.getElementById('leftCol');
  const rc = document.getElementById('rightCol');
  ep.leftItems.forEach((item, i) => {
    const el = document.createElement('div'); el.className = 'match-item'; el.textContent = item; el.dataset.idx = i;
    el.onclick = () => selectLeft(i, el);
    lc.appendChild(el);
  });
  [...ep.rightItems.map((item,i)=>({item,i}))].sort(()=>Math.random()-.5).forEach(({item,i}) => {
    const el = document.createElement('div'); el.className = 'match-item'; el.textContent = item; el.dataset.idx = i;
    el.onclick = () => selectRight(i, el, ep);
    rc.appendChild(el);
  });
}
function selectLeft(idx, el) {
  if (el.classList.contains('matched')) return;
  document.querySelectorAll('#leftCol .match-item').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  window._epState.pairMatch.selectedLeft = idx;
}
function selectRight(idx, el, ep) {
  const s = window._epState.pairMatch;
  if (el.classList.contains('matched')) return;
  if (s.selectedLeft === null) { showToast('먼저 왼쪽을 선택해 주세요!'); return; }
  const leftEl = document.querySelector(`#leftCol .match-item[data-idx="${s.selectedLeft}"]`);
  leftEl.classList.remove('selected'); leftEl.classList.add('matched');
  el.classList.add('matched');
  s.pairs[s.selectedLeft] = idx;
  s.selectedLeft = null;
  const res = document.getElementById('matchResult');
  const leftEp = ep;
  res.innerHTML = `<div class="match-pairs-result">${Object.keys(s.pairs).map(li=>`<div class="pair-row"><strong>${leftEp.leftItems[li]}</strong> ↔ ${leftEp.rightItems[s.pairs[li]]}</div>`).join('')}
  ${Object.keys(s.pairs).length>0?`<button class="btn btn-hint" style="margin-top:.6rem;padding:.5rem 1rem;font-size:.82rem;" onclick="resetPairMatch(event)">초기화</button>`:''}
  </div>`;
}
window.resetPairMatch = function(e) {
  e.stopPropagation();
  window._epState.pairMatch = { selectedLeft: null, pairs: {} };
  document.querySelectorAll('.match-item').forEach(el => el.classList.remove('matched','selected'));
  document.getElementById('matchResult').innerHTML = '';
};

/* ── twoStage ── */
function nl(s){ return String(s||'').replace(/\n/g,'<br>'); }
function buildTwoStage(ep) {
  const s1 = buildStageBlock(ep.stage1Type, ep.stage1, 1);
  const s2 = buildStageBlock(ep.stage2Type, ep.stage2, 2);
  return `
    <div id="stage1Block">
      <div class="stage-label">1단계</div>
      <p style="font-weight:700;margin-bottom:1rem;line-height:1.9;">${nl(ep.stage1.question)}</p>
      <div id="stage1Action">${s1}</div>
    </div>
    <div class="stage2-area" id="stage2Block">
      <div class="stage-label">2단계</div>
      <p style="font-weight:700;margin-bottom:1rem;line-height:1.9;">${nl(ep.stage2.question)}</p>
      <div id="stage2Action">${s2}</div>
    </div>`;
}
function buildStageBlock(type, data, stageNum) {
  const pfx = `s${stageNum}_`;
  const key = `stage${stageNum}`;
  switch (type) {
    case 'fillBlanks': {
      const labels = ['①','②','③','④','⑤','⑥'];
      return data.answers.map((_, i) => `
        <div class="blank-row">
          <span class="blank-label">${labels[i]}</span>
          <input type="text" class="blank-input" id="${pfx}blank-${i}" placeholder="답을 입력하세요">
        </div>`).join('');
    }
    case 'singleInput':
      return `<input type="text" class="single-input" id="${pfx}singleInput" placeholder="답을 입력하세요" maxlength="20">`;
    case 'order':
      return `<ul class="order-list" id="${pfx}orderList"></ul>`;
    case 'tapOrder': {
      const _stk = key+'TapOrder';
      const _sh = data.items.map((item,i)=>({item,i})).sort(()=>Math.random()-.5);
      window._epState[_stk] = { shuffled:_sh, sequence:[] };
      return `<p style="text-align:center;color:var(--point-color);font-size:.85rem;margin-bottom:1rem;">순서대로 눌러 번호를 붙이세요. 다시 누르면 취소됩니다.</p>
        <div class="tap-order-list" id="${pfx}tapOrderList">
          ${_sh.map((obj,si)=>`
            <div class="tap-order-item" data-si="${si}" onclick="stageTapOrderClick('${pfx}','${key}TapOrder',${si})">
              <div class="tap-order-num" id="${pfx}tapNum_${si}"></div>
              <div class="tap-order-text">${obj.item}</div>
            </div>`).join('')}
        </div>`;
    }
    case 'classify':
      return `<p style="text-align:center;color:var(--point-color);font-size:.9rem;margin-bottom:.8rem;">카드를 클릭한 뒤 해당 영역을 누르세요</p>
              <div class="card-pool" id="${pfx}classifyPool"></div>
              <div class="classify-zones" id="${pfx}classifyZones"></div>`;
    case 'dialogBlanks':
      return buildDialogBlanksHTML(data, pfx);
    case 'pairMatch':
      return `<div class="match-container">
        <div class="match-column"><h4>${data.leftLabel||'인물·세력'}</h4><div id="${pfx}leftCol"></div></div>
        <div class="match-column"><h4>${data.rightLabel||'내용·업적'}</h4><div id="${pfx}rightCol"></div></div>
      </div><div id="${pfx}matchResult"></div>`;
    case 'dragOffer': {
      const pool = [
        ...data.correctItems.map((t,i)=>({t,id:`c${i}`})),
        ...data.wrongItems.map((t,i)=>({t,id:`w${i}`}))
      ].sort(()=>Math.random()-.5);
      return `<div class="drag-container" id="${pfx}dragContainer">
        <div class="drag-pool-area">
          <div class="drag-pool-label">📜 항목 목록 — 클릭(또는 드래그)하여 봉헌 영역으로 이동</div>
          <div class="drag-pool-grid" id="${pfx}pool">
            ${pool.map(o=>`<div class="drag-item" data-id="${o.id}" draggable="true"
              onclick="dragItemClick(this,'${pfx}')"
              ondragstart="dragStart(event,'${pfx}')"
              ondragend="dragEnd(event)"
            >${o.t}</div>`).join('')}
          </div>
        </div>
        <div class="drag-drop-zone" id="${pfx}zone"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="dragDrop(event,'${pfx}')"
        >
          <div class="drag-zone-label">${data.dropZoneLabel||'봉 헌 영 역'}</div>
          <div class="drag-zone-items" id="${pfx}zoneItems"></div>
        </div>
      </div>`;
    }
    case 'eliminate': {
      const shuffled = data.items.map((it,i)=>({...it,oi:i})).sort(()=>Math.random()-.5);
      return `<div class="elim-hint">💡 옳지 않은 설명을 눌러 제거하세요. 다시 누르면 취소됩니다.</div>
        <div class="elim-list" id="${pfx}elimList">
          ${shuffled.map(it=>`<div class="elim-item" data-idx="${it.oi}" onclick="this.classList.toggle('eliminated')">${it.text}</div>`).join('')}
        </div>`;
    }
    case 'simulate':
      return `<div id="${pfx}simArea"></div>`;
    case 'selectKeywords': {
      const shuffled = data.items.map((it,i)=>({...it,oi:i})).sort(()=>Math.random()-.5);
      const gridCls = data.fullWidth ? 'kw-grid kw-grid-block' : 'kw-grid';
      return `${data.context?`<div class="kw-context">${data.context}</div>`:''}
        <div class="kw-hint">💡 올바른 설명을 모두 선택하세요. 다시 누르면 취소됩니다.</div>
        <div class="${gridCls}" id="${pfx}kwGrid">
          ${shuffled.map(it=>`<div class="kw-item" data-idx="${it.oi}" onclick="this.classList.toggle('selected');checkKwAuto('${pfx}',${stageNum})">${it.text}</div>`).join('')}
        </div>`;
    }
    case 'multiSelect':
      return `<div class="ms-area" id="${pfx}msArea"></div>`;
    case 'dialogBlanksSeq':
      return `<div class="dbseq-area" id="${pfx}dbseqArea"></div>`;
    default: return '';
  }
}
function initTwoStage(ep) {
  window._epState.twoStage = { stage1Done: false };
  initStageBlock(ep.stage1Type, ep.stage1, 1);
}
function buildThreeStage(ep) {
  const s1 = buildStageBlock(ep.stage1Type, ep.stage1, 1);
  const s2 = buildStageBlock(ep.stage2Type, ep.stage2, 2);
  const s3 = buildStageBlock(ep.stage3Type, ep.stage3, 3);
  return `
    <div id="stage1Block">
      <div class="stage-label">1단계</div>

function initClassifyById(pfx, data, stateKey) {

window.chooseSimStepById = function(pfx, simKey, stepIdx, choiceIdx) {
  const ep   = episodes[currentEp];
  const data = simKey.startsWith('stage1') ? ep.stage1 : ep.stage2;
  const step = data.steps[stepIdx];
  const isOk = step.choices[choiceIdx].correct;
  const allBtns = document.querySelectorAll(`#${pfx}simArea .sim-choice`);
  if (isOk) {
    allBtns.forEach(b => { if (parseInt(b.dataset.ci)===choiceIdx) b.classList.add('correct'); b.disabled = true; });
    window._epState[simKey].idx = stepIdx + 1;
    const nextBtn = document.createElement('button');
    nextBtn.className = 'sim-retry';
    nextBtn.style.cssText = 'margin-top:.9rem;display:block;width:100%;';
    nextBtn.textContent = stepIdx + 1 >= data.steps.length ? '✦ 완료' : '다음 장면';
    nextBtn.onclick = () => { renderSimStepById(pfx, simKey, null, stepIdx + 1); };
    const simArea = document.getElementById(pfx + 'simArea');
    if (simArea) simArea.appendChild(nextBtn);
  } else {
    const clicked = document.querySelector(`#${pfx}simArea .sim-choice[data-ci="${choiceIdx}"]`);
    if (clicked) { clicked.classList.add('wrong'); clicked.disabled = true; }
    allBtns.forEach(b => { if (!b.classList.contains('wrong') && !b.classList.contains('correct')) b.disabled = true; });
    let t = 10;
    const cd = document.createElement('div');
    cd.style.cssText = 'text-align:center;color:var(--point-color);font-weight:700;font-size:.9rem;margin-top:.5rem;';
    cd.textContent = `${t}초 후 선택 가능`;
    const simArea = document.getElementById(pfx + 'simArea');
    if (simArea) simArea.appendChild(cd);
    const iv = setInterval(() => {
      t--;
      if (t > 0) { cd.textContent = `${t}초 후 선택 가능`; }
      else {
        clearInterval(iv); cd.remove();
        allBtns.forEach(b => { if (!b.classList.contains('wrong') && !b.classList.contains('correct')) b.disabled = false; });
      }
    }, 1000);
  }
};

/* ── dragOrder (드래그 순서 배치) ── */
function buildDragOrder(ep) {
  const shuffled = ep.items.map((item, i) => ({ item, i })).sort(() => Math.random() - .5);
  window._epState.dragOrder = shuffled;
  return `
    <p class="drag-order-hint">✦ 항목을 드래그하여 올바른 순서로 배열하세요.</p>
    <ul class="drag-order-list" id="dragOrderList"></ul>`;
}
function initDragOrder(ep) { renderDragOrderList(); }
function renderDragOrderList() {
  const list = document.getElementById('dragOrderList');
  if (!list) return;
  const state = window._epState.dragOrder;
  list.innerHTML = state.map((obj, pos) => `
    <li class="drag-order-item" data-pos="${pos}" draggable="true">
      <div class="drag-handle">⠿</div>
      <div class="drag-order-text">${obj.item}</div>
    </li>`).join('');
  let dragSrc = null;
  list.querySelectorAll('.drag-order-item').forEach(item => {
    item.addEventListener('dragstart', e => {
      dragSrc = item;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
      list.querySelectorAll('.drag-order-item').forEach(i => i.classList.remove('drag-over-top'));
    });
    item.addEventListener('dragover', e => {
      e.preventDefault();
      list.querySelectorAll('.drag-order-item').forEach(i => i.classList.remove('drag-over-top'));
      if (item !== dragSrc) item.classList.add('drag-over-top');
    });
    item.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragSrc || dragSrc === item) return;
      const srcPos = parseInt(dragSrc.dataset.pos);
      const tgtPos = parseInt(item.dataset.pos);
      const s = window._epState.dragOrder;
      const [moved] = s.splice(srcPos, 1);
      s.splice(tgtPos, 0, moved);
      renderDragOrderList();
    });
  });
}
function checkDragOrder(ep) {
  const s = window._epState.dragOrder;
  return s && s.every((obj, i) => obj.i === i);
}

function buildChatQuiz(ep) {

function initChatQuiz(ep) {

function renderChatqQ(ep, idx) {
  const qs = ep.chatQuiz.questions;
  if (idx >= qs.length) return;
  const q = qs[idx];
  const area = document.getElementById('chatqArea');
  if (!area) return;
  const wrap = document.createElement('div');
  wrap.className = 'chatq-item';
  wrap.innerHTML = `
    <div class="chatq-q">
      <div class="chatq-qnum">${idx + 1} / ${qs.length}</div>
      ${q.q}
    </div>
    <div class="chatq-input-row" id="chatqRow${idx}">
      <input class="chatq-input" id="chatqIn${idx}" type="text" placeholder="답을 입력하세요" maxlength="20" autocomplete="off">
      <button class="chatq-submit" onclick="submitChatq(${idx})">확인</button>
    </div>
    <div class="chatq-fb" id="chatqFb${idx}"></div>`;
  area.appendChild(wrap);
  setTimeout(() => {
    const input = document.getElementById(`chatqIn${idx}`);
    if (input) {
      input.focus();

    }

window.submitChatq = function(idx) {
  const ep = episodes[currentEp];
  const q = ep.chatQuiz.questions[idx];
  const input = document.getElementById(`chatqIn${idx}`);
  const fb = document.getElementById(`chatqFb${idx}`);
  const row = document.getElementById(`chatqRow${idx}`);
  if (!input || !fb || !row) return;
  const val = input.value.trim();
  if (!val) return;
  const isOk = normalize(val) === normalize(String(q.a));
  if (isOk) {
    row.innerHTML = `<div class="chatq-answer">✓ ${val}</div>`;
    fb.textContent = '정답입니다!';
    fb.className = 'chatq-fb ok';
    window._epState.chatQuiz.done++;
    if (window._epState.chatQuiz.done >= window._epState.chatQuiz.total) {
      setTimeout(() => { onCorrect(ep); }, 900);
    } else {
      setTimeout(() => { renderChatqQ(ep, idx + 1); }, 500);
    }
  } else {
    input.value = '';
    fb.textContent = '틀렸습니다! 다시 생각해 보세요.';
    fb.className = 'chatq-fb err';
    input.focus();
    setTimeout(() => { if (fb.className.includes('err')) fb.className = 'chatq-fb'; }, 2000);
  }
};
/* ── multiSelect (멀티셀렉트 장면별) ── */

window.submitMS = function(pfx, msKey, idx) {
  const ep = episodes[currentEp];
  const m = msKey.match(/^stage(\d+)/);
  const data = m ? ep[`stage${m[1]}`] : ep;
  const sc = data.scenes[idx];
  const items = document.querySelectorAll(`#${pfx}msItems${idx} .ms-item`);
  const fb = document.getElementById(`${pfx}msFb${idx}`);
  let allOk = true;
  items.forEach(el => {
    const i = parseInt(el.dataset.i);
    const selected = el.classList.contains('selected');
    if (selected !== sc.items[i].correct) allOk = false;
  });
  if (allOk) {
    fb.textContent = '정답입니다! 다음으로 넘어갑니다.';
    fb.className = 'ms-fb ok show';
    items.forEach(el => el.onclick = null);
    document.querySelector(`#${pfx}msArea .ms-submit`).disabled = true;
    const s = window._epState[msKey];
    s.cur = idx + 1;
    if (s.cur >= data.scenes.length) {
      s.done = true;
      const _sn = parseInt(pfx[1]);
      setTimeout(() => {
        if (_sn && autoAdvanceStage(_sn)) return;
        onCorrect(episodes[currentEp]);
      }, 600);
    } else {
      setTimeout(() => { renderMSScene(pfx, data, msKey, s.cur); }, 700);
    }
  } else {
    fb.textContent = '틀렸습니다! 옳은 것과 틀린 것을 다시 살펴보세요.';
    fb.className = 'ms-fb err show';
    setTimeout(() => { fb.className = 'ms-fb'; }, 1800);
  }
};

/* ── dialogBlanksSeq (섹션별 순차 대화 빈칸) ── */
function renderDbSeqSection(pfx, data, dbsKey, idx) {
  const sections = data.sections;
  if (idx >= sections.length) return;
  const sec = sections[idx];
  const area = document.getElementById(pfx + 'dbseqArea');
  if (!area) return;
  const chatMode = !!data.chatMode;
  function parseSeq(text, secIdx, pfx2) {
    return String(text||'').replace(/\{(\d+)\}/g, (_, n) =>
      `<input class="dialog-blank" id="${pfx2}dbs${secIdx}_${n}" data-n="${n}" placeholder="?">`);
  }
  let linesHtml;
  if (chatMode) {
    const speakerNames = [...new Set(sec.lines.filter(l => l.speaker !== '나레이터').map(l => l.speaker))];
    const rightSpeaker = speakerNames.length >= 2 ? speakerNames[1] : '';
    linesHtml = `<div class="dialog-chat-log">` + sec.lines.map(l => {
      const parsedText = parseSeq(l.text, idx, pfx);
      if (l.speaker === '나레이터') {
        return `<div class="dialog-chat-bubble-narrator">${parsedText}</div>`;
      }
      const isRight = l.speaker === rightSpeaker;
      const initials = l.speaker.slice(-1);
      if (isRight) {
        return `<div class="dialog-chat-right">
          <div class="dialog-chat-body" style="align-items:flex-end;">
            <div class="dialog-chat-name" style="text-align:right;">${l.speaker}</div>
            <div class="dialog-chat-bubble-r">${parsedText}</div>
          </div>
          <div class="dialog-chat-right-avatar">${initials}</div>
        </div>`;
      }
      return `<div class="dialog-chat-left">
        <div class="dialog-chat-avatar">${initials}</div>
        <div class="dialog-chat-body">
          <div class="dialog-chat-name">${l.speaker}</div>
          <div class="dialog-chat-bubble-l">${parsedText}</div>
        </div>
      </div>`;
    }).join('') + `</div>`;
  } else {
    linesHtml = `<div class="dialog-log">` + sec.lines.map(l => `
      <div class="dialog-line">
        <div class="dialog-speaker">${l.speaker}</div>
        <div class="dialog-text">${parseSeq(l.text, idx, pfx)}</div>
      </div>`).join('') + `</div>`;
  }
  const wrap = document.createElement('div');
  wrap.className = 'dbseq-section';
  wrap.innerHTML = `
    <div class="dbseq-title">${sec.title}</div>
    ${linesHtml}
    <button class="dbseq-next" onclick="submitDbSeq('${pfx}','${dbsKey}',${idx})">${idx < sections.length - 1 ? '다음 장면' : '완료'}</button>
    <div class="dbseq-fb" id="${pfx}dbsFb${idx}"></div>`;
  area.appendChild(wrap);
  setTimeout(() => { wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 100);
}
window.submitDbSeq = function(pfx, dbsKey, idx) {
  const ep = episodes[currentEp];
  const m = dbsKey.match(/^stage(\d+)/);
  const data = m ? ep[`stage${m[1]}`] : ep;
  const s0 = window._epState[dbsKey];
  if (s0 && s0.cur > idx) return; // 이미 제출된 섹션
  const sec = data.sections[idx];
  const fb = document.getElementById(`${pfx}dbsFb${idx}`);
  const allOk = sec.answers.every((ans, i) => {
    const el = document.getElementById(`${pfx}dbs${idx}_${i + 1}`);
    return el && normalize(el.value.trim()) === normalize(String(ans));
  });
  if (allOk) {
    if (fb) { fb.textContent = '정답입니다!'; fb.className = 'dbseq-fb show'; fb.style.color = '#3b7a57'; }
    const wrap = fb ? fb.closest('.dbseq-section') : null;
    if (wrap) { const btn = wrap.querySelector('.dbseq-next'); if (btn) btn.disabled = true; wrap.querySelectorAll('.dialog-blank').forEach(i => i.disabled = true); }
    const s = window._epState[dbsKey];
    s.cur = idx + 1;
    if (s.cur >= data.sections.length) {
      s.done = true;
      const _sn = parseInt(pfx[1]);
      setTimeout(() => {
        if (_sn && autoAdvanceStage(_sn)) return;
        onCorrect(episodes[currentEp]);
      }, 400);
    } else {
      setTimeout(() => { renderDbSeqSection(pfx, data, dbsKey, s.cur); }, 600);
    }
  } else {
    if (fb) { fb.textContent = '틀렸습니다! 빈칸을 다시 확인해 주세요.'; fb.className = 'dbseq-fb show'; fb.style.color = ''; }
    setTimeout(() => { if (fb) fb.className = 'dbseq-fb'; }, 1800);
  }
};


/* ═══════════════════════════════════════
   정답 확인
═══════════════════════════════════════ */
window.checkAnswer = function() {
  const ep = episodes[currentEp];
  const s  = window._epState;

  if (ep.type === 'twoStage') {
    if (!s.twoStage.stage1Done) {
      const ok = checkStageBlock(ep.stage1Type, ep.stage1, 1);
      if (!ok) { showToast(wrongMsg()); return; }
      s.twoStage.stage1Done = true;
      showToast('1단계 통과! 2단계로 넘어갑니다 ✦', 'success');
      const _s2b = document.getElementById('stage2Block');
      if (_s2b) { _s2b.classList.add('show'); initStageBlock(ep.stage2Type, ep.stage2, 2); setTimeout(() => _s2b.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100); }
      return;
    }
    const ok2 = checkStageBlock(ep.stage2Type, ep.stage2, 2);
    if (!ok2) { showToast(wrongMsg()); return; }
    onCorrect(ep);
    return;
  }
  if (ep.type === 'threeStage') {
    const ts = s.threeStage;
    if (!ts.stage1Done) {
      const ok = checkStageBlock(ep.stage1Type, ep.stage1, 1);
      if (!ok) { showToast(wrongMsg()); return; }
      ts.stage1Done = true;
      showToast('1단계 통과! 2단계로 넘어갑니다 ✦', 'success');
      const _ts2b = document.getElementById('stage2Block');
      if (_ts2b) { _ts2b.classList.add('show'); initStageBlock(ep.stage2Type, ep.stage2, 2); setTimeout(() => _ts2b.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100); }
      return;
    }
    if (!ts.stage2Done) {
      const ok = checkStageBlock(ep.stage2Type, ep.stage2, 2);
      if (!ok) { showToast(wrongMsg()); return; }
      ts.stage2Done = true;
      showToast('2단계 통과! 3단계로 넘어갑니다 ✦', 'success');
      const _ts3b = document.getElementById('stage3Block');
      if (_ts3b) { _ts3b.classList.add('show'); initStageBlock(ep.stage3Type, ep.stage3, 3); setTimeout(() => _ts3b.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100); }
      return;
    }
    const ok3 = checkStageBlock(ep.stage3Type, ep.stage3, 3);
    if (!ok3) { showToast(wrongMsg()); return; }
    onCorrect(ep);
    return;
  }

  let ok = false;
  switch (ep.type) {
    case 'fillBlanks':  ok = checkFillBlanks(ep); break;
    case 'singleInput': ok = checkSingleInput(ep); break;
    case 'order':       ok = checkOrder(ep); break;
    case 'tapOrder':    ok = checkTapOrder(ep); break;
    case 'classify':    ok = checkClassify(ep); break;
    case 'pairMatch':   ok = checkPairMatch(ep); break;
    case 'simulate':    ok = checkSimulate(ep); break;
    case 'dragOrder':   ok = checkDragOrder(ep); break;
  }
  if (ok) onCorrect(ep); else showToast(wrongMsg());
};

function checkFillBlanks(ep) {
  return ep.answers.every((ans, i) => {
    const v = document.getElementById(`blank-${i}`)?.value.trim() || '';
    return normalize(v) === normalize(ans);
  });
}
function checkSingleInput(ep) {
  const v = document.getElementById('singleInput')?.value.trim() || '';
  return normalize(v) === normalize(ep.answer);
}
function checkOrder(ep) {
  return window._epState.order.every((obj, i) => obj.i === ep.correctOrder[i]);
}
function checkClassify(ep) {
  const s = window._epState.classify;
  if (Object.keys(s.placed).length !== ep.items.length) return false;
  return Object.keys(s.placed).every(idx => ep.zones[s.placed[idx]].correct.includes(parseInt(idx)));
}
function checkPairMatch(ep) {
  const s = window._epState.pairMatch;
  if (Object.keys(s.pairs).length !== ep.leftItems.length) return false;
  return Object.keys(s.pairs).every(li => s.pairs[li] === ep.correctPairs[parseInt(li)]);
}
function checkSimulate(ep) {
  return window._epState.sim.idx >= ep.steps.length && window._epState.sim.allCorrect;
}

function checkStageBlock(type, data, stageNum) {
  const pfx = `s${stageNum}_`;
  const key  = `stage${stageNum}`;
  switch (type) {
    case 'fillBlanks':
      return data.answers.every((ans, i) => normalize(document.getElementById(`${pfx}blank-${i}`)?.value.trim()||'') === normalize(ans));
    case 'singleInput':
      return normalize(document.getElementById(`${pfx}singleInput`)?.value.trim()||'') === normalize(data.answer);
    case 'order': {
      const s = window._epState[key+'Order'];
      return s && s.every((obj, i) => obj.i === data.correctOrder[i]);
    }
    case 'tapOrder': {
      const s = window._epState[key+'TapOrder'];
      if (!s || s.sequence.length < data.items.length) { showToast('모든 항목에 순서를 매겨주세요!'); return false; }
      return s.sequence.every((si, pos) => s.shuffled[si].i === pos);
    }
    case 'classify': {
      const s = window._epState[key+'Classify'];
      if (!s || Object.keys(s.placed).length !== data.items.length) return false;
      return Object.keys(s.placed).every(idx => data.zones[s.placed[idx]].correct.includes(parseInt(idx)));
    }
    case 'dialogBlanks':
      return checkDialogBlanksHTML(data, pfx);
    case 'pairMatch': {
      const s = window._epState[key+'PairMatch'];
      if (!s || Object.keys(s.pairs).length !== data.leftItems.length) return false;
      return Object.keys(s.pairs).every(li => s.pairs[li] === data.correctPairs[parseInt(li)]);
    }
    case 'dragOffer': {
      const zoneEl = document.getElementById(pfx+'zoneItems');
      if (!zoneEl) return false;
      const zoneIds = new Set([...zoneEl.querySelectorAll('.drag-item')].map(el=>el.dataset.id));
      return data.correctItems.every((_,i) => zoneIds.has(`c${i}`))
          && data.wrongItems.every((_,i) => !zoneIds.has(`w${i}`));
    }
    case 'eliminate': {
      const list = document.getElementById(pfx+'elimList');
      if (!list) return false;
      return [...list.querySelectorAll('.elim-item')].every(el => {
        const shouldElim = !data.items[parseInt(el.dataset.idx)].correct;
        return shouldElim === el.classList.contains('eliminated');
      });
    }
    case 'simulate': {
      const s = window._epState[key+'Sim'];
      if (!s || s.idx < data.steps.length) { showToast('아직 모든 장면을 확인하지 않았습니다!'); return false; }
      return true;
    }
    case 'selectKeywords': {
      const grid = document.getElementById(pfx+'kwGrid');
      if (!grid) return false;
      return [...grid.querySelectorAll('.kw-item')].every(el => {
        const shouldSel = data.items[parseInt(el.dataset.idx)].correct;
        return shouldSel === el.classList.contains('selected');
      });
    }
    case 'multiSelect': {
      const s = window._epState[key+'MS'];
      if (!s || !s.done) { showToast('아직 모든 장면을 완료하지 않았습니다!'); return false; }
      return true;
    }
    case 'dialogBlanksSeq': {
      const s = window._epState[key+'DBS'];
      if (!s || !s.done) { showToast('아직 모든 장면을 완료하지 않았습니다!'); return false; }
      return true;
    }
    default: return false;
  }
}

/* ── 자동 단계 전환 ── */
function autoAdvanceStage(stageNum) {
  const ep = episodes[currentEp];
  if (ep.type === 'twoStage' && stageNum === 1) {
    const s = window._epState;
    if (!s.twoStage || s.twoStage.stage1Done) return false;
    if (!checkStageBlock(ep.stage1Type, ep.stage1, 1)) return false;
    s.twoStage.stage1Done = true;
    showToast('1단계 통과! 2단계로 넘어갑니다 ✦', 'success');
    const b = document.getElementById('stage2Block');
    if (b) { b.classList.add('show'); initStageBlock(ep.stage2Type, ep.stage2, 2); setTimeout(() => b.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100); }
    return true;
  }
  if (ep.type === 'threeStage') {
    const ts = window._epState.threeStage;
    if (!ts) return false;
    if (stageNum === 1 && !ts.stage1Done) {
      if (!checkStageBlock(ep.stage1Type, ep.stage1, 1)) return false;
      ts.stage1Done = true;
      showToast('1단계 통과! 2단계로 넘어갑니다 ✦', 'success');
      const b = document.getElementById('stage2Block');
      if (b) { b.classList.add('show'); initStageBlock(ep.stage2Type, ep.stage2, 2); setTimeout(() => b.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100); }
      return true;
    }
    if (stageNum === 2 && !ts.stage2Done) {
      if (!checkStageBlock(ep.stage2Type, ep.stage2, 2)) return false;
      ts.stage2Done = true;
      showToast('2단계 통과! 3단계로 넘어갑니다 ✦', 'success');
      const b = document.getElementById('stage3Block');
      if (b) { b.classList.add('show'); initStageBlock(ep.stage3Type, ep.stage3, 3); setTimeout(() => b.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100); }
      return true;
    }
  }
  return false;
}
window.checkElimAuto = function(pfx, stageNum) {
  setTimeout(() => {
    const ep = episodes[currentEp];
    const data = ep[`stage${stageNum}`];
    const list = document.getElementById(pfx + 'elimList');
    if (!list || !data) return;
    const ok = [...list.querySelectorAll('.elim-item')].every(el => {
      const shouldElim = !data.items[parseInt(el.dataset.idx)].correct;
      return shouldElim === el.classList.contains('eliminated');
    });
    if (ok && !autoAdvanceStage(stageNum)) onCorrect(episodes[currentEp]);
  }, 80);
};
window.checkKwAuto = function(pfx, stageNum) {
  setTimeout(() => {
    const ep = episodes[currentEp];
    const data = ep[`stage${stageNum}`];
    const grid = document.getElementById(pfx + 'kwGrid');
    if (!grid || !data) return;
    const ok = [...grid.querySelectorAll('.kw-item')].every(el => {
      const shouldSel = data.items[parseInt(el.dataset.idx)].correct;
      return shouldSel === el.classList.contains('selected');
    });
    if (ok && !autoAdvanceStage(stageNum)) onCorrect(episodes[currentEp]);
  }, 80);
};
window.checkDragOfferAuto = function(pfx, stageNum) {
  setTimeout(() => {
    const ep = episodes[currentEp];
    const data = ep[`stage${stageNum}`];
    const zoneEl = document.getElementById(pfx + 'zoneItems');
    if (!zoneEl || !data) return;
    const zoneIds = new Set([...zoneEl.querySelectorAll('.drag-item')].map(el => el.dataset.id));
    const ok = data.correctItems.every((_, i) => zoneIds.has(`c${i}`)) && data.wrongItems.every((_, i) => !zoneIds.has(`w${i}`));
    if (ok && !autoAdvanceStage(stageNum)) onCorrect(episodes[currentEp]);
  }, 80);
};

function normalize(s) { return String(s).replace(/\s+/g,'').replace(/[·.,!?]/g,''); }
function wrongMsg() {
  const msgs = ['틀렸습니다! 다시 한 번 생각해 보세요.','아직 아닙니다. 다시 살펴보세요.','정답이 아닙니다. 차근차근 살펴보세요.','다시 한 번 도전해 보세요.','힌트를 보거나 다시 생각해 보세요.'];
  return msgs[Math.floor(Math.random()*msgs.length)];
}

/* ═══════════════════════════════════════
   정답 처리
═══════════════════════════════════════ */
function onCorrect(ep) {
  acquiredTreasures.push(currentEp);
  updateProgress();
  document.getElementById('treasureName').textContent = ep.treasureName || '보물';
  document.getElementById('treasureDesc').textContent = ep.treasureDesc || '';
  document.getElementById('treasureModal').classList.add('show');
}
window.closeTreasureModal = function() {
  document.getElementById('treasureModal').classList.remove('show');
  showToast('보물을 획득했습니다 ✦', 'success');
  setTimeout(window.nextEpisode, 900);
};
window.nextEpisode = function() {
  currentEp++;
  if (currentEp >= episodes.length) showEnding();
  else renderEpisode();
};

/* ═══════════════════════════════════════
   네비게이터
═══════════════════════════════════════ */
window.openNav = function() {
  const list = document.getElementById('navList');
  list.innerHTML = '';
  episodes.forEach((ep, idx) => {
    const done = acquiredTreasures.includes(idx);
    const cur  = idx === currentEp;
    const row  = document.createElement('div');
    row.className = 'nav-ep-row';
    row.innerHTML = `
      <button class="nav-ep-btn" onclick="toggleNavEp(${idx})">
        <div class="nav-ep-badge${done?' done':''}">${ep.order}</div>
        <div class="nav-ep-txt">
          <div class="nav-ep-name">${ep.title}${cur?'<span class="nav-ep-tag">현재</span>':''}</div>
          <div class="nav-ep-sub">${ep.subtitle}</div>
        </div>
        <span class="nav-ep-toggle" id="navToggle${idx}">+</span>
      </button>
      <div class="nav-ep-body" id="navBody${idx}">
        <div class="nav-ep-story">${ep.story}</div>
        <div class="nav-ep-dialog"><strong>${ep.speaker} 가라사대</strong><br>"${ep.dialog}"</div>
        ${ep.hint ? `<div class="nav-ep-hint"><strong>힌트:</strong> ${ep.hint}</div>` : ''}
        <div style="text-align:right;margin-top:.8rem;">
          ${cur
            ? `<button class="nav-jump-btn current" disabled>현재 에피소드</button>`
            : `<button class="nav-jump-btn" onclick="jumpToEp(${idx})">이 에피소드로 이동</button>`}
        </div>
      </div>`;
    list.appendChild(row);
  });
  document.getElementById('navModal').classList.add('show');
};
window.closeNav = function() {
  document.getElementById('navModal').classList.remove('show');
};
window.jumpToEp = function(idx) {
  currentEp = idx;
  closeNav();
  renderEpisode();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};
window.closeNavOutside = function(e) {
  if (e.target === document.getElementById('navModal')) closeNav();
};
window.toggleNavEp = function(idx) {
  const body = document.getElementById(`navBody${idx}`);
  const tog  = document.getElementById(`navToggle${idx}`);
  const open = body.classList.toggle('open');
  tog.textContent = open ? '−' : '+';
};

/* ═══════════════════════════════════════
   힌트 / 토스트
═══════════════════════════════════════ */
window.toggleHint = function() { document.getElementById('hintBox').classList.toggle('show'); };
let _toastTimer;
function showToast(msg, type='error') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type}`; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ═══════════════════════════════════════
   엔딩
═══════════════════════════════════════ */
function showEnding() {
  document.getElementById('gameScreen').classList.remove('active');
  document.getElementById('endingTitle').textContent = settings.endingTitle || '天 命 完 遂';
  document.getElementById('endingSub').textContent   = settings.endingSubtitle || '천 명 완 수';
  document.getElementById('reflectionPrompt').textContent = settings.reflectionPrompt || '이 여정을 마치며 느낀 점을 적어주시오.';
  const msgEl = document.getElementById('endingMessage');
  msgEl.innerHTML = '<div class="ending-speaker">— 무 영 (無 影) 의 독 백 —</div>';
  (settings.endingMessage || ['그대는 천 년의 역사를 완주하였도다.']).forEach(p => {
    const el = document.createElement('p');
    if (p.startsWith('★')) { el.className = 'em'; el.innerHTML = p.slice(1); }
    else { el.innerHTML = p; }
    msgEl.appendChild(el);
  });
  const tc = document.getElementById('endingTreasures');
  tc.innerHTML = '';
  for (let i=0;i<10;i++) { const t=document.createElement('div'); t.className='ending-treasure'; t.textContent='✦'; t.style.animationDelay=(i*.12)+'s'; tc.appendChild(t); }
  document.getElementById('endingScreen').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function escapeHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.finishGame = async function() {
  const reflection = document.getElementById('reflectionInput').value.trim();
  if (!reflection) { showToast('소감을 한 줄이라도 적어주세요!'); return; }
  try {
    await addDoc(collection(db, 'escape26_2_reflections'), {
      studentId, studentName, reflection,
      score: acquiredTreasures.length,
      createdAt: serverTimestamp()
    });
    showToast('기록이 봉인되었느니라. 그대의 여정이 후세에 전해지리라.', 'success');
    setTimeout(() => {
      document.getElementById('endingScreen').innerHTML = `
        <div style="padding:4rem 2rem;text-align:center;">
          <h1 class="ending-title">完</h1>
          <p style="color:var(--point-border);letter-spacing:1em;margin:1rem 0 2rem;">완</p>
          <div style="background:rgba(255,255,255,.4);padding:2rem;border:2px solid var(--point-border);text-align:left;max-width:600px;margin:0 auto;">
            <h3 style="color:var(--point-color);margin-bottom:1rem;">✦ ${studentName} 학생의 기록 ✦</h3>
            <p style="font-style:italic;line-height:1.9;">${escapeHtml(reflection).replace(/\n/g,'<br>')}</p>
            <p style="margin-top:1rem;font-weight:700;color:var(--point-color);">획득 보물: ${acquiredTreasures.length} / 10</p>
          </div>
          <button class="btn btn-dark" style="margin-top:2rem;" onclick="location.reload()">다시 시작하다</button>
        </div>`;
    }, 1500);
  } catch (e) {
    showToast('저장에 실패했습니다. 다시 시도해 주세요.');
  }
};
