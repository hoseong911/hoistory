<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>천년의 기억 - 관리자 모드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="../shared/theme.css">
<link rel="stylesheet" href="../shared/admin-base.css">
<style>
  /* ── 기존 JS inline style 호환용 변수 별칭 ── */
  :root {
    --ink: var(--hi-text);
    --paper: var(--hi-bg-surface);
    --paper-dark: var(--hi-bg-mid);
    --point: var(--hi-accent);
    --border: var(--hi-border);
    --bg: var(--hi-bg-mid);
  }

  /* ── 버튼 ── */
  .btn{padding:.7rem 1.4rem;font-family:inherit;font-weight:700;border:1px solid var(--hi-border);cursor:pointer;transition:all .15s;background:var(--hi-accent);color:#fff;font-size:.85rem;border-radius:8px;}
  .btn:hover{opacity:.88;}
  .btn-sm{padding:.4rem .8rem;font-size:.78rem;}
  .btn-danger{background:var(--hi-negative);border-color:var(--hi-negative);}
  .btn-success{background:var(--hi-positive);border-color:var(--hi-positive);}
  .btn-seed{background:#7a5c2e;border-color:#7a5c2e;}

  /* ── 폼/섹션 ── */
  .section{background:var(--hi-bg-surface);border:1px solid var(--hi-border);border-radius:12px;padding:1.5rem;margin-bottom:1.2rem;}
  .section h3{font-size:14px;font-weight:800;color:var(--hi-text);margin-bottom:1.2rem;padding-bottom:.6rem;border-bottom:1px solid var(--hi-border);}
  .field{margin-bottom:1rem;}
  .field label{display:block;font-weight:700;font-size:.8rem;color:var(--hi-text-muted);margin-bottom:.3rem;letter-spacing:.5px;}
  .field input[type=text],.field input[type=password],.field textarea,.field select{width:100%;padding:.65rem .9rem;border:1px solid var(--hi-border);border-radius:8px;background:var(--hi-bg-base);font-family:inherit;font-size:.9rem;color:var(--hi-text);transition:.15s;}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--hi-accent);}
  .field textarea{resize:vertical;min-height:80px;}
  .info{background:var(--hi-bg-mid);border-left:3px solid var(--hi-accent);padding:.85rem 1rem;margin-bottom:1.2rem;font-size:.85rem;line-height:1.7;border-radius:0 8px 8px 0;color:var(--hi-text-soft);}
  .empty{text-align:center;padding:2.5rem;color:var(--hi-text-muted);font-size:.9rem;}

  /* ── 에피소드 편집 ── */
  .ep-layout{display:grid;grid-template-columns:220px 1fr;gap:1.2rem;align-items:start;}
  .ep-list-panel{border:1px solid var(--hi-border);border-radius:10px;overflow:hidden;background:var(--hi-bg-surface);}
  .ep-list-header{padding:.75rem 1rem;border-bottom:1px solid var(--hi-border);display:flex;justify-content:space-between;align-items:center;background:var(--hi-bg-mid);}
  .ep-list-header strong{font-size:.85rem;}
  .ep-list-item{padding:.7rem 1rem;cursor:pointer;border-bottom:1px solid var(--hi-border);display:flex;align-items:center;gap:.6rem;transition:.12s;}
  .ep-list-item:last-child{border-bottom:none;}
  .ep-list-item:hover{background:var(--hi-bg-mid);}
  .ep-list-item.active{background:var(--hi-accent-soft);border-left:3px solid var(--hi-accent);}
  .ep-num{font-weight:800;color:var(--hi-accent);min-width:22px;font-size:.9rem;}
  .ep-list-title{font-size:.83rem;line-height:1.35;color:var(--hi-text);}
  .ep-edit-panel{border:1px solid var(--hi-border);border-radius:10px;background:var(--hi-bg-surface);padding:1.3rem;}
  .ep-edit-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;padding-bottom:.75rem;border-bottom:1px solid var(--hi-border);flex-wrap:wrap;gap:.5rem;}
  .ep-edit-header h3{font-size:.95rem;font-weight:800;color:var(--hi-text);}
  .stage-section{margin-top:1rem;padding:1.1rem;background:var(--hi-bg-mid);border:1px dashed var(--hi-border);border-radius:8px;}
  .stage-section h4{font-size:.85rem;font-weight:700;color:var(--hi-text-muted);margin-bottom:.9rem;}
  .elim-edit-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;}
  .elim-edit-row input[type=text]{flex:1;padding:.45rem .7rem;border:1px solid var(--hi-border);border-radius:6px;background:var(--hi-bg-base);font-family:inherit;font-size:.85rem;color:var(--hi-text);}
  .elim-toggle{cursor:pointer;font-size:.9rem;min-width:34px;text-align:center;padding:.35rem .45rem;border:1px solid var(--hi-border);background:var(--hi-bg-base);font-weight:700;border-radius:6px;}
  .elim-toggle.ok{background:#e8f5e9;border-color:#3b7a57;color:#3b7a57;}
  .elim-toggle.ng{background:#fce8e6;border-color:var(--hi-negative);color:var(--hi-negative);}

  /* ── 서식 툴바 ── */
  .fmt-bar{display:flex;gap:.3rem;margin-bottom:.4rem;flex-wrap:wrap;}
  .fmt-btn{padding:.22rem .5rem;font-size:.76rem;font-weight:700;border:1px solid var(--hi-border);background:var(--hi-bg-base);cursor:pointer;color:var(--hi-text-soft);border-radius:5px;font-family:inherit;transition:.12s;}
  .fmt-btn:hover{background:var(--hi-bg-mid);color:var(--hi-text);}

  /* ── 소감 ── */
  .summary-box{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1rem;margin-bottom:1.5rem;}
  .summary-card{background:var(--hi-bg-surface);border:1px solid var(--hi-border);border-radius:10px;padding:1.2rem;text-align:center;}
  .summary-card .num{font-weight:800;font-size:2rem;color:var(--hi-accent);}
  .summary-card .lbl{font-size:.78rem;color:var(--hi-text-muted);margin-top:.3rem;}
  .reflection-list{display:flex;flex-direction:column;gap:1rem;}
  .ref-card{background:var(--hi-bg-surface);border:1px solid var(--hi-border);border-radius:10px;padding:1.1rem;}
  .ref-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;flex-wrap:wrap;gap:.4rem;}
  .ref-name{font-weight:700;color:var(--hi-accent);font-size:.9rem;}
  .ref-time{font-size:.74rem;color:var(--hi-text-muted);}
  .ref-body{font-style:italic;line-height:1.8;color:var(--hi-text-soft);border-left:3px solid var(--hi-border);padding-left:.8rem;margin-top:.4rem;}

  /* ── 토스트 ── */
  .toast{position:fixed;top:72px;right:20px;background:var(--hi-text);color:#fff;padding:.8rem 1.2rem;border-radius:10px;z-index:9999;font-weight:700;font-size:.85rem;display:none;max-width:300px;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,.2);}
  .toast.show{display:block;}.toast.success{background:var(--hi-positive);}

  /* ── EPISODE 넓은 컨테이너 ── */
  .ep-container { max-width: 1100px; margin: 0 auto; padding: 20px 16px 60px; }
  .ep-sub-panel { display: none; }
  .ep-sub-panel.active { display: block; }

  /* ── CLASS 카드 ── */
  .class-card { background: var(--hi-bg-surface); border: 1px solid var(--hi-border); border-radius: 10px; padding: 1rem 1.1rem; }
  .class-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: .4rem; flex-wrap: wrap; gap: .4rem; }
  .class-card-id { font-weight: 700; color: var(--hi-accent); font-size: .88rem; }
  .class-card-time { font-size: .74rem; color: var(--hi-text-muted); }
  .class-card-body { font-size: .85rem; line-height: 1.7; color: var(--hi-text-soft); border-left: 3px solid var(--hi-border); padding-left: .8rem; margin-top: .5rem; }
  .class-list { display: flex; flex-direction: column; gap: .8rem; }
  .loading-state { display: flex; align-items: center; gap: 10px; padding: 32px; color: var(--hi-text-muted); font-size: 13px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--hi-border); border-top-color: var(--hi-accent); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SETTING 패널 hi-btn 스타일 ── */
  .hi-btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; border: 1px solid transparent; transition: .15s; }
  .hi-btn-primary { background: var(--hi-accent); color: #fff; }
  .hi-btn-primary:hover { opacity: .88; }
  .hi-btn-outline { background: none; border-color: var(--hi-border); color: var(--hi-text-soft); }
  .hi-btn-outline:hover { border-color: var(--hi-text); color: var(--hi-text); }
  .hi-btn-danger { color: var(--hi-negative); }
  .hi-btn-sm { padding: 7px 14px; font-size: 12px; }
  .hi-btn-block { width: 100%; }
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 11px; font-weight: 800; color: var(--hi-text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .pw-msg { font-size: 12px; font-weight: 700; margin-top: 10px; min-height: 18px; }
  .pw-msg.ok { color: var(--hi-positive); }
  .pw-msg.err { color: var(--hi-negative); }

  /* ── filter-select ── */
  .filter-select { padding: 8px 12px; border: 1px solid var(--hi-border); border-radius: 8px; font-size: 13px; font-family: inherit; background: var(--hi-bg-surface); color: var(--hi-text); cursor: pointer; outline: none; }
  .filter-select:focus { border-color: var(--hi-accent); }

  @media(max-width:720px){.ep-layout{grid-template-columns:1fr;}}
  @media(max-width:480px){.section{padding:1rem;}.btn{padding:.55rem .8rem;}}
</style>
<script>if(window.self!==window.top)document.documentElement.classList.add('in-iframe');</script>
</head>
<body class="hi-preset-admin">

<!-- 로그인 -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-title">천년의 기억</div>
    <div class="login-sub">관리자 모드</div>
    <input type="password" class="hi-input" id="pwInput" placeholder="비밀번호"
           onkeydown="if(event.key==='Enter')doAdminLogin()"
           style="text-align:center;letter-spacing:3px;">
    <button class="hi-btn hi-btn-primary hi-btn-block" onclick="doAdminLogin()" style="margin-top:12px;">접속하기</button>
    <div class="login-err" id="loginErr">비밀번호가 올바르지 않습니다</div>
    <div class="login-foot"><a href="../admin.html" class="topbar-console">어드민 콘솔로</a></div>
  </div>
</div>

<!-- 어드민 앱 -->
<div id="adminApp">
  <header class="topbar">
    <div class="topbar-left">
      <a href="../admin.html" class="topbar-back topbar-console">콘솔</a>
      <span class="topbar-title">천년의 기억</span>
      <span class="topbar-badge">ADMIN</span>
    </div>
    <div class="topbar-right">
      <a href="26_2.html" class="topbar-link">학생 화면</a>
      <button class="topbar-logout" onclick="logoutAdmin()">로그아웃</button>
    </div>
  </header>

  <div class="main-tabs">
    <button class="main-tab active" onclick="switchTab('episode',this)">EPISODE</button>
    <button class="main-tab" onclick="switchTab('class',this)">CLASS</button>
    <button class="main-tab" onclick="switchTab('setting',this)">SETTING</button>
  </div>

  <!-- ── EPISODE ── -->
  <div class="panel-section active" id="panel-episode">
    <div class="sub-tabs" id="epSubTabs">
      <button class="sub-tab active" onclick="switchEpTab('prologue',this)">프롤로그</button>
      <button class="sub-tab" onclick="switchEpTab('ep_1',this)">1</button>
      <button class="sub-tab" onclick="switchEpTab('ep_2',this)">2</button>
      <button class="sub-tab" onclick="switchEpTab('ep_3',this)">3</button>
      <button class="sub-tab" onclick="switchEpTab('ep_4',this)">4</button>
      <button class="sub-tab" onclick="switchEpTab('ep_5',this)">5</button>
      <button class="sub-tab" onclick="switchEpTab('ep_6',this)">6</button>
      <button class="sub-tab" onclick="switchEpTab('ep_7',this)">7</button>
      <button class="sub-tab" onclick="switchEpTab('ep_8',this)">8</button>
      <button class="sub-tab" onclick="switchEpTab('ep_9',this)">9</button>
      <button class="sub-tab" onclick="switchEpTab('ep_10',this)">10</button>
      <button class="sub-tab" onclick="switchEpTab('ending',this)">엔딩</button>
    </div>
    <div class="ep-container">

      <!-- 프롤로그 -->
      <div id="eptab-prologue" class="ep-sub-panel active">
        <div class="section">
          <h3>프롤로그</h3>
          <div class="field"><label>게임 제목</label><input type="text" id="sGameTitle"></div>
          <div class="field"><label>게임 부제</label><input type="text" id="sGameSub"></div>
          <div class="field"><label>인트로 스토리 (줄바꿈으로 문단 구분)</label><textarea id="sIntroStory" rows="8"></textarea></div>
          <button class="hi-btn hi-btn-primary hi-btn-sm" onclick="savePrologue()">저장</button>
        </div>
      </div>

      <!-- 에피소드 1-10 공용 편집 영역 -->
      <div id="eptab-episode" class="ep-sub-panel">
        <div id="epLoadingState" class="loading-state"><div class="spinner"></div><span>불러오는 중…</span></div>
        <div id="epEditArea" style="display:none;">
          <div class="ep-edit-panel">
            <div class="ep-edit-header">
              <h3 id="epEditTitle"></h3>
              <button class="btn btn-sm btn-success" onclick="saveEpContent()">저장</button>
            </div>
            <div style="display:grid;grid-template-columns:2fr 1fr;gap:.8rem;">
              <div class="field"><label>에피소드 제목</label><input type="text" id="ef_title"></div>
              <div class="field"><label>부제 (시대)</label><input type="text" id="ef_subtitle"></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 2fr;gap:.8rem;">
              <div class="field"><label>보물 이름</label><input type="text" id="ef_treasureName"></div>
              <div class="field"><label>보물 설명</label><input type="text" id="ef_treasureDesc"></div>
            </div>
            <div class="field">
              <label>스토리</label>
              <div class="fmt-bar">
                <button class="fmt-btn" onclick="fmtWrap('ef_story','<strong>','</strong>')">B</button>
                <button class="fmt-btn" onclick="fmtWrap('ef_story','<em>','</em>')">I</button>
                <button class="fmt-btn" onclick="fmtWrap('ef_story','<span style=\'font-size:1.2em\'>','</span>')">크게</button>
                <button class="fmt-btn" onclick="fmtWrap('ef_story','<span style=\'font-size:0.85em\'>','</span>')">작게</button>
              </div>
              <textarea id="ef_story" rows="5"></textarea>
            </div>
            <div style="display:grid;grid-template-columns:1fr 2fr;gap:.8rem;">
              <div class="field"><label>말하는 사람</label><input type="text" id="ef_speaker"></div>
              <div class="field">
                <label>말하는 내용 (대사)</label>
                <div class="fmt-bar">
                  <button class="fmt-btn" onclick="fmtWrap('ef_dialog','<strong>','</strong>')">B</button>
                  <button class="fmt-btn" onclick="fmtWrap('ef_dialog','<em>','</em>')">I</button>
                  <button class="fmt-btn" onclick="fmtWrap('ef_dialog','<span style=\'font-size:1.2em\'>','</span>')">크게</button>
                  <button class="fmt-btn" onclick="fmtWrap('ef_dialog','<span style=\'font-size:0.85em\'>','</span>')">작게</button>
                </div>
                <textarea id="ef_dialog" rows="3"></textarea>
              </div>
            </div>
            <div class="field">
              <label>문제 지문</label>
              <div class="fmt-bar">
                <button class="fmt-btn" onclick="fmtWrap('ef_question','<strong>','</strong>')">B</button>
                <button class="fmt-btn" onclick="fmtWrap('ef_question','<em>','</em>')">I</button>
              </div>
              <textarea id="ef_question" rows="2"></textarea>
            </div>
            <div id="epTypeFields"></div>
            <div style="margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--hi-border);">
              <button class="btn btn-success" onclick="saveEpContent()">저장하기</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 엔딩 -->
      <div id="eptab-ending" class="ep-sub-panel">
        <div class="section">
          <h3>엔딩</h3>
          <div class="field"><label>엔딩 제목</label><input type="text" id="sEndingTitle"></div>
          <div class="field"><label>엔딩 부제</label><input type="text" id="sEndingSub"></div>
          <div class="field"><label>엔딩 메시지 (줄바꿈으로 문단 구분)</label><textarea id="sEndingMsg" rows="7"></textarea></div>
          <div class="field"><label>소감 작성 안내 문구</label><input type="text" id="sReflectionPrompt"></div>
          <button class="hi-btn hi-btn-primary hi-btn-sm" onclick="saveEnding()">저장</button>
        </div>
      </div>

    </div><!-- /.ep-container -->
  </div>

  <!-- ── CLASS ── -->
  <div class="panel-section" id="panel-class">
    <div class="sub-tabs">
      <button class="sub-tab active" onclick="switchClassTab(0,this)">전체</button>
      <button class="sub-tab" onclick="switchClassTab(1,this)">1반</button>
      <button class="sub-tab" onclick="switchClassTab(2,this)">2반</button>
      <button class="sub-tab" onclick="switchClassTab(3,this)">3반</button>
      <button class="sub-tab" onclick="switchClassTab(4,this)">4반</button>
      <button class="sub-tab" onclick="switchClassTab(5,this)">5반</button>
      <button class="sub-tab" onclick="switchClassTab(6,this)">6반</button>
    </div>
    <div class="admin-container">
      <div class="stat-grid" id="classStats" style="grid-template-columns:repeat(2,1fr);"></div>
      <div class="sort-bar">
        <div class="sort-box">
          <button class="sort-btn active" id="classSortNewest" onclick="setClassSort('newest',this)">최신순</button>
          <button class="sort-btn" id="classSortId" onclick="setClassSort('id',this)">학번순</button>
        </div>
      </div>
      <div id="classList">
        <div class="loading-state"><div class="spinner"></div><span>불러오는 중…</span></div>
      </div>
    </div>
  </div>

  <!-- ── SETTING ── -->
  <div class="panel-section" id="panel-setting">
    <div class="admin-container">
      <div class="stat-grid" style="grid-template-columns:repeat(1,1fr); margin-bottom:20px;">
        <div class="stat-chip"><span class="stat-num accent" id="settClasses">-</span><div class="stat-lbl">참여 반</div></div>
      </div>

      <div class="panel">
        <h3>소감 내보내기</h3>
        <p>학생 완료 현황과 소감을 CSV 파일로 다운로드합니다.</p>
        <div class="setting-row">
          <select class="filter-select" id="exportClass">
            <option value="all">전체 반</option>
            <option value="1">1반</option>
            <option value="2">2반</option>
            <option value="3">3반</option>
            <option value="4">4반</option>
            <option value="5">5반</option>
            <option value="6">6반</option>
          </select>
          <button class="hi-btn hi-btn-primary hi-btn-sm" onclick="exportCSV()">다운로드</button>
        </div>
      </div>

      <div class="panel">
        <h3>시드 데이터 삽입</h3>
        <p>에피소드 10개와 게임 설정을 Firestore에 강제 삽입합니다. 기존 데이터를 덮어씁니다.</p>
        <button class="hi-btn hi-btn-outline hi-btn-sm" onclick="insertSeedData()">시드 데이터 강제 삽입</button>
      </div>

      <div class="panel">
        <h3>관리자 비밀번호 변경</h3>
        <p>다음 로그인 시 즉시 적용됩니다.</p>
        <div class="form-group">
          <label class="form-label">새 비밀번호</label>
          <input type="password" class="hi-input" id="sNewPw" placeholder="새 비밀번호 (6자 이상)">
        </div>
        <button class="hi-btn hi-btn-primary hi-btn-sm" onclick="savePassword()">저장</button>
        <div class="pw-msg" id="pwMsg"></div>
      </div>

      <div class="panel panel-danger">
        <h3>위험 구역</h3>
        <p>아래 기능은 되돌릴 수 없습니다. 신중하게 사용하세요.</p>
        <button class="hi-btn hi-btn-outline hi-btn-sm hi-btn-danger" onclick="resetAllReflections()">전체 소감 초기화</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, getDocs, setDoc, deleteDoc, collection, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

function showAdmin() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminApp').classList.add('show');
}

window.logoutAdmin = function() {
  if (!confirm('로그아웃 하시겠습니까?')) return;
  sessionStorage.removeItem('admin_auth');
  location.reload();
};

window.doAdminLogin = async function() {
  const pw = document.getElementById('pwInput').value;
  try {
    const sDoc = await getDoc(doc(db,'escape26_2_settings','main'));
    if (sDoc.exists() && sDoc.data().adminPw) adminPw = sDoc.data().adminPw;
  } catch(e) {}
  if (pw !== adminPw) {
    const err = document.getElementById('loginErr');
    err.classList.add('show');
    setTimeout(() => err.classList.remove('show'), 2500);
    return;
  }
  sessionStorage.setItem('admin_auth', '1');
  showAdmin();
  await loadSettings();
};

/* ─── 메인 탭 ─── */
let classLoaded = false, settingLoaded = false;
window.switchTab = function(name, btn) {
  document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.querySelectorAll('.panel-section').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  if (name === 'class' && !classLoaded) { classLoaded = true; loadAllReflections().then(() => renderClassList()); }
  if (name === 'setting' && !settingLoaded) { settingLoaded = true; loadAllReflections().then(() => renderSettingStats()); }
};

/* ─── 에피소드 서브탭 ─── */
let epCache = {};
window.switchEpTab = async function(name, btn) {
  document.querySelectorAll('#epSubTabs .sub-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.querySelectorAll('.ep-sub-panel').forEach(p => p.classList.remove('active'));
  if (name === 'prologue' || name === 'ending') {
    document.getElementById(`eptab-${name}`).classList.add('active');
  } else {
    document.getElementById('eptab-episode').classList.add('active');
    document.getElementById('epLoadingState').style.display = 'flex';
    document.getElementById('epEditArea').style.display = 'none';
    let ep = epCache[name];
    if (!ep) {
      try {
        const d = await getDoc(doc(db,'escape26_2',name));
        if (d.exists()) ep = epCache[name] = { id: d.id, ...d.data() };
      } catch(e) { showToast('에피소드 로드 실패: '+e.message); return; }
    }
    if (ep) fillEpForm(ep);
  }
};

function fillEpForm(ep) {
  editingEpId = ep.id;
  document.getElementById('epEditTitle').textContent = `에피소드 ${ep.order}: ${ep.title||''}`;
  document.getElementById('ef_title').value         = ep.title        || '';
  document.getElementById('ef_subtitle').value      = ep.subtitle     || '';
  document.getElementById('ef_treasureName').value  = ep.treasureName || '';
  document.getElementById('ef_treasureDesc').value  = ep.treasureDesc || '';
  document.getElementById('ef_story').value         = ep.story        || '';
  document.getElementById('ef_speaker').value       = ep.speaker      || '';
  document.getElementById('ef_dialog').value        = ep.dialog       || '';
  document.getElementById('ef_question').value      = ep.question     || '';
  document.getElementById('epTypeFields').innerHTML = renderTypeFields(ep);
  document.getElementById('epLoadingState').style.display = 'none';
  document.getElementById('epEditArea').style.display = 'block';
}

async function loadSettings() {
  const sDoc = await getDoc(doc(db,'escape26_2_settings','main'));
  settings = sDoc.exists() ? sDoc.data() : {};
  document.getElementById('sGameTitle').value        = settings.gameTitle        || '천년의 기억';
  document.getElementById('sGameSub').value          = settings.gameSubtitle     || '잃어버린 기억을 찾아서';
  document.getElementById('sIntroStory').value       = (settings.introStory      || []).join('\n');
  document.getElementById('sEndingTitle').value      = settings.endingTitle      || '';
  document.getElementById('sEndingSub').value        = settings.endingSubtitle   || '';
  document.getElementById('sEndingMsg').value        = (settings.endingMessage   || []).join('\n');
  document.getElementById('sReflectionPrompt').value = settings.reflectionPrompt || '';
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderTypeFields(ep) {
  const types = [ep.type];
  let html = '';

  if (ep.type === 'twoStage' || ep.type === 'threeStage') {
    const stages = ep.type === 'twoStage'
      ? [[ep.stage1Type, ep.stage1, 1], [ep.stage2Type, ep.stage2, 2]]
      : [[ep.stage1Type, ep.stage1, 1], [ep.stage2Type, ep.stage2, 2], [ep.stage3Type, ep.stage3, 3]];
    stages.forEach(([sType, sData, sNum]) => {
      html += `<div class="stage-section" style="margin-top:${sNum>1?'1rem':'0'};">
        <h4>${sNum}단계 — ${escHtml(sType||'?')}</h4>
        ${renderStageEditor(sType, sData, sNum)}
      </div>`;
    });
    return html;
  }

  /* 단일 유형 */
  if (ep.type === 'simulate') return renderStageEditor('simulate', ep, 0);
  if (ep.type === 'tapOrder') return renderStageEditor('tapOrder', ep, 0);
  if (ep.type === 'dragOrder') return renderStageEditor('dragOrder', ep, 0);
  if (ep.type === 'pairMatch') return renderStageEditor('pairMatch', ep, 0);
  if (ep.type === 'chatQuiz') return renderStageEditor('chatQuiz', ep, 0);
  if (ep.type === 'fillBlanks') return renderStageEditor('fillBlanks', ep, 0);
  return '<div class="info" style="margin-top:1rem;">이 유형의 세부 편집은 향후 지원 예정입니다.</div>';
}

/* ── 서식 삽입 ── */
window.fmtWrap = function(id, open, close) {
  const el = document.getElementById(id);
  if (!el) return;
  const s = el.selectionStart, e = el.selectionEnd;
  const sel = el.value.substring(s, e);
  el.value = el.value.substring(0, s) + open + sel + close + el.value.substring(e);
  el.focus(); el.selectionStart = s + open.length; el.selectionEnd = s + open.length + sel.length;
};

/* ── 행 추가 helpers ── */
window.toggleElimStatus = function(btn) {
  const isOk = btn.classList.contains('ok');
  btn.classList.toggle('ok', !isOk); btn.classList.toggle('ng', isOk);
  btn.textContent = isOk ? '❌' : '✅';
};
window.addElimRow = function(containerId, placeholder) {
  const c = document.getElementById(containerId); if (!c) return;
  const d = document.createElement('div'); d.className = 'elim-edit-row';
  d.innerHTML = `<button class="elim-toggle ok" onclick="toggleElimStatus(this)">✅</button>
    <input type="text" placeholder="${placeholder||'설명문 입력...'}">
    <button class="btn btn-sm btn-danger" style="padding:.35rem .55rem;font-size:.75rem;" onclick="this.closest('.elim-edit-row').remove()">삭제</button>`;
  c.appendChild(d);
};

function readElimRows(containerId) {
  return [...document.querySelectorAll(`#${containerId} .elim-edit-row`)].map(r=>({
    text: r.querySelector('input[type=text]').value.trim(),
    correct: r.querySelector('.elim-toggle').classList.contains('ok')
  })).filter(it=>it.text);
}
function readStageData(type, data, p) {
  switch (type) {
    case 'dragOffer': return { ...data,
      correctItems: (document.getElementById(p+'ef_correctItems')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean),
      wrongItems:   (document.getElementById(p+'ef_wrongItems')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean),
      dropZoneLabel:(document.getElementById(p+'ef_dropZoneLabel')?.value||'').trim()
    };
    case 'eliminate': return { ...data, items: readElimRows(p+'ef_elimItems') };
    case 'selectKeywords': return { ...data,
      context: (document.getElementById(p+'ef_kwContext')?.value||'').trim(),
      items: readElimRows(p+'ef_kwItems')
    };
    case 'fillBlanks': return { ...data, answers: (document.getElementById(p+'ef_answers')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean) };
    case 'tapOrder': case 'dragOrder': case 'order': {
      const items = (document.getElementById(p+'ef_items')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);
      return { ...data, items };
    }
    case 'simulate': {
      const cont = document.getElementById(p+'ef_simSteps'); if (!cont) return data;
      const steps = [...cont.children].map(el => {
        const sit = el.querySelector('textarea')?.value.trim() || '';
        const choices = [];
        el.querySelectorAll('div[style]').forEach(row => {
          const text = row.querySelectorAll('input[type=text]')[0]?.value.trim() || '';
          if (!text) return;
          choices.push({
            text,
            correct: row.querySelector('input[type=checkbox]')?.checked || false,
            feedback: row.querySelectorAll('input[type=text]')[1]?.value.trim() || ''
          });
        });
        return { situation: sit, choices };
      }).filter(s=>s.situation);
      return { ...data, steps };
    }
    case 'dialogBlanks': {
      const answers = (document.getElementById(p+'ef_answers')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);
      const lines = (document.getElementById(p+'ef_lines')?.value||'').split('\n').map(l=>{ const [sp,...rest]=l.split('|'); return {speaker:sp.trim(),text:rest.join('|').trim()}; }).filter(l=>l.text);
      return { ...data, answers, lines };
    }
    case 'dialogBlanksSeq': {
      const cont = document.getElementById(p+'ef_dbsecSections'); if (!cont) return data;
      const sections = [...cont.children].map(el => {
        const inputs = el.querySelectorAll('input[type=text]');
        const textareas = el.querySelectorAll('textarea');
        const title = inputs[0]?.value.trim() || '';
        const answers = (textareas[0]?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);
        const lines = (textareas[1]?.value||'').split('\n').map(l=>{ const [sp,...rest]=l.split('|'); return {speaker:sp.trim(),text:rest.join('|').trim()}; }).filter(l=>l.text);
        return { title, answers, lines };
      }).filter(s=>s.lines.length);
      return { ...data, sections };
    }
    case 'pairMatch': return { ...data,
      leftItems:  (document.getElementById(p+'ef_leftItems')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean),
      rightItems: (document.getElementById(p+'ef_rightItems')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean)
    };
    case 'classify': {
      const items = (document.getElementById(p+'ef_classifyItems')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);
      const zones = (document.getElementById(p+'ef_classifyZones')?.value||'').split('\n').map(l=>{ const [name,...rest]=l.split('|'); const correct=(rest.join('|')||'').split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n)); return {name:name.trim(),correct}; }).filter(z=>z.name);
      return { ...data, items, zones };
    }
    case 'multiSelect': {
      const cont = document.getElementById(p+'ef_msScenes'); if (!cont) return data;
      const scenes = [...cont.children].map(el => {
        const inputs = el.querySelectorAll('input[type=text]');
        const textarea = el.querySelector('textarea');
        const speaker = inputs[0]?.value.trim() || '';
        const situation = textarea?.value.trim() || '';
        const items = [...el.querySelectorAll('.elim-edit-row')].map(r=>({
          text: r.querySelector('input[type=text]')?.value.trim()||'',
          correct: r.querySelector('.elim-toggle')?.classList.contains('ok')||false
        })).filter(it=>it.text);
        return { speaker, situation, items };
      }).filter(s=>s.situation||s.items.length);
      return { ...data, scenes };
    }
    case 'chatQuiz': {
      const cont = document.getElementById(p+'ef_chatQs'); if (!cont) return data;
      const questions = [...cont.children].map(el => {
        const inputs = el.querySelectorAll('input[type=text]');
        const ta = el.querySelector('textarea');
        const responses = ta ? ta.value.split('\n').map(s=>s.trim()).filter(Boolean) : [];
        return { q: inputs[0]?.value.trim()||'', a: inputs[1]?.value.trim()||'', responses };
      }).filter(q=>q.q);
      return { ...data, chatQuiz: { ...(data.chatQuiz||{}), questions } };
    }
    default: return data;
  }
}

window.saveEpContent = async function() {
  if (!editingEpId) return;
  const ep = epCache[editingEpId];
  if (!ep) return;
  try {
    const commonFields = {
      title:        document.getElementById('ef_title').value.trim(),
      subtitle:     document.getElementById('ef_subtitle').value.trim(),
      treasureName: document.getElementById('ef_treasureName').value.trim(),
      treasureDesc: document.getElementById('ef_treasureDesc').value.trim(),
      story:        document.getElementById('ef_story').value.trim(),
      speaker:      document.getElementById('ef_speaker').value.trim(),
      dialog:       document.getElementById('ef_dialog').value.trim(),
      question:     document.getElementById('ef_question').value.trim()
    };
    const update = { ...commonFields };
    if (ep.type === 'twoStage' || ep.type === 'threeStage') {
      update.stage1 = readStageData(ep.stage1Type, ep.stage1, sfx(1));
      update.stage2 = readStageData(ep.stage2Type, ep.stage2, sfx(2));
      if (ep.type === 'threeStage') update.stage3 = readStageData(ep.stage3Type, ep.stage3, sfx(3));
    } else if (['simulate','tapOrder','dragOrder','pairMatch','chatQuiz','fillBlanks'].includes(ep.type)) {
      const d = readStageData(ep.type, ep, '');
      Object.assign(update, d, commonFields);
    }
    await setDoc(doc(db,'escape26_2', editingEpId), update, { merge: true });
    Object.assign(ep, update);
    document.getElementById('epEditTitle').textContent = `에피소드 ${ep.order}: ${ep.title||''}`;
    showToast('저장되었습니다!', 'success');
  } catch(e) { showToast('저장 실패: '+e.message); }
};

function getClassNum(sid) {
  const s = String(sid || '');
  if (s.length < 3) return 0;
  return parseInt(s.substring(1, 3), 10) || 0;
}

function renderClassList() {
  const filtered = currentClass === 0
    ? reflections
    : reflections.filter(r => getClassNum(r.studentId) === currentClass);

  const statsEl = document.getElementById('classStats');
  if (currentClass === 0) {
    const classes = new Set(reflections.map(r => getClassNum(r.studentId)).filter(Boolean));
    statsEl.innerHTML = `
      <div class="stat-chip"><span class="stat-num">${reflections.length}</span><div class="stat-lbl">총 제출</div></div>
      <div class="stat-chip"><span class="stat-num accent">${classes.size ? classes.size+'개' : '-'}</span><div class="stat-lbl">참여 반</div></div>`;
  } else {
    const latest = filtered.reduce((acc, r) => {
      const t = r.createdAt?.toMillis?.() || 0;
      return t > acc ? t : acc;
    }, 0);
    const latestStr = latest ? new Date(latest).toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }) : '-';
    statsEl.innerHTML = `
      <div class="stat-chip"><span class="stat-num">${filtered.length}</span><div class="stat-lbl">${currentClass}반 제출</div></div>
      <div class="stat-chip"><span class="stat-num" style="font-size:.95rem;">${latestStr}</span><div class="stat-lbl">최근 제출</div></div>`;
  }

  const sorted = [...filtered].sort((a,b) => {
    if (classSort === 'newest') return (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0);
    return String(a.studentId||'').localeCompare(String(b.studentId||''));
  });

  const el = document.getElementById('classList');
  if (!sorted.length) { el.innerHTML = '<div class="empty">제출 내역이 없습니다.</div>'; return; }
  el.innerHTML = `<div class="class-list">${sorted.map(r => {
    const ts = r.createdAt?.toDate?.()?.toLocaleString('ko-KR') || '';
    const body = String(r.reflection||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    return `<div class="class-card">
      <div class="class-card-header">
        <span class="class-card-id">${r.studentId} ${r.studentName||''}</span>
        <span class="class-card-time">${ts}</span>
      </div>
      <div class="class-card-body">${body}</div>
    </div>`;
  }).join('')}</div>`;
}

window.exportCSV = function() {
  if (!reflections.length) { showToast('내보낼 데이터가 없습니다.'); return; }
  const cls = document.getElementById('exportClass').value;
  const data = cls === 'all' ? reflections : reflections.filter(r => getClassNum(r.studentId) === parseInt(cls));
  if (!data.length) { showToast('해당 반 데이터가 없습니다.'); return; }
  const rows = [['학번','이름','소감','제출 시간']];
  data.forEach(r => {
    const ts = r.createdAt?.toDate?.()?.toLocaleString('ko-KR') || '';
    rows.push([r.studentId||'', r.studentName||'', (r.reflection||'').replace(/\n/g,' '), ts]);
  });
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='escape26_2_reflections.csv'; a.click();
  URL.revokeObjectURL(url);
};

window.insertSeedData = async function() {
  if (!confirm("에피소드 10개와 게임 설정을 Firestore에 강제 삽입합니다.\n기존 ep_1~ep_10 문서를 덮어씁니다.\n계속하시겠소?")) return;
  try {
    showToast('삽입 중...');
    for (const ep of SEED_EPISODES) {
      await setDoc(doc(db, 'escape26_2', `ep_${ep.order}`), ep);
    }
    await setDoc(doc(db,'escape26_2_settings','main'), SEED_SETTINGS, { merge: true });
    await loadSettings();
    showToast('강제 삽입 완료! 에피소드 10개 + 게임 설정', 'success');
    if (typeof loadEpList === 'function') await loadEpList();
  } catch(e) { showToast('삽입 실패: '+e.message); }
};

/* ─── 토스트 ─── */
let _tt;
function showToast(msg, type='error') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  clearTimeout(_tt); _tt = setTimeout(() => t.classList.remove('show'), 3000);
}

/* ─── 세션 복원 ─── */
if (sessionStorage.getItem('admin_auth') === '1') {
  showAdmin();
  loadSettings();
}
