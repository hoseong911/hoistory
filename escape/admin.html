<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>천년의 기억 — 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1410;--paper:#f4ead5;--paper-dark:#e8d9b8;--point:#a8322d;--border:#c9a44c;--bg:rgba(201,164,76,0.08);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Gowun Batang','Nanum Myeongjo',serif;background:var(--paper);color:var(--ink);min-height:100vh;padding:2rem 1.5rem;background-image:radial-gradient(circle at 20% 30%,var(--bg) 0%,transparent 50%),repeating-linear-gradient(45deg,transparent 0px,transparent 2px,rgba(26,20,16,.02) 2px,rgba(26,20,16,.02) 4px);}
h1{font-family:'Nanum Myeongjo',serif;font-weight:800;font-size:1.8rem;letter-spacing:.2em;margin-bottom:.3rem;color:var(--point);}
.subtitle{color:var(--border);letter-spacing:.4em;font-size:.85rem;margin-bottom:2rem;}
.admin-login{max-width:360px;margin:4rem auto;background:rgba(255,255,255,.5);border:2px solid var(--ink);padding:2rem;box-shadow:6px 6px 0 rgba(26,20,16,.2);}
.admin-login h2{font-family:'Nanum Myeongjo',serif;font-weight:800;margin-bottom:1.5rem;color:var(--point);letter-spacing:.1em;}
input[type=text],input[type=password],textarea,select{width:100%;padding:.7rem .9rem;border:2px solid var(--ink);background:var(--paper);font-family:'Gowun Batang',serif;font-size:.93rem;color:var(--ink);transition:all .3s;}
input[type=text]:focus,input[type=password]:focus,textarea:focus{outline:none;border-color:var(--point);background:#fff;}
.btn{padding:.8rem 1.6rem;font-family:'Nanum Myeongjo',serif;font-weight:700;border:2px solid var(--ink);cursor:pointer;letter-spacing:.1em;transition:all .2s;background:var(--ink);color:var(--paper);font-size:.88rem;box-shadow:3px 3px 0 rgba(26,20,16,.2);}
.btn:hover{background:var(--point);border-color:var(--point);transform:translate(-1px,-1px);box-shadow:4px 4px 0 rgba(26,20,16,.2);}
.btn-sm{padding:.45rem .9rem;font-size:.8rem;box-shadow:2px 2px 0 rgba(26,20,16,.2);}
.btn-danger{background:#a8322d;border-color:#a8322d;}.btn-danger:hover{background:#7a1f1a;border-color:#7a1f1a;}
.btn-success{background:#3b7a57;border-color:#3b7a57;}.btn-success:hover{background:#2a5a3f;border-color:#2a5a3f;}
.btn-seed{background:#7a5c2e;border-color:#7a5c2e;}.btn-seed:hover{background:#5a3e18;border-color:#5a3e18;}
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--ink);margin-bottom:2rem;flex-wrap:wrap;}
.tab{padding:.7rem 1.3rem;cursor:pointer;border:2px solid transparent;border-bottom:none;font-weight:700;letter-spacing:.05em;font-size:.88rem;color:#777;transition:all .2s;}
.tab.active{color:var(--point);border-color:var(--ink);background:var(--paper);margin-bottom:-2px;}
.tab:hover{color:var(--point);}
.panel{display:none;}.panel.active{display:block;}
.section{background:rgba(255,255,255,.5);border:2px solid var(--ink);padding:1.8rem;margin-bottom:1.5rem;box-shadow:4px 4px 0 rgba(26,20,16,.1);}
.section h3{font-family:'Nanum Myeongjo',serif;color:var(--point);margin-bottom:1.2rem;padding-bottom:.5rem;border-bottom:2px solid var(--border);letter-spacing:.1em;}
.field{margin-bottom:1.1rem;}
.field label{display:block;font-weight:700;font-size:.83rem;color:var(--point);margin-bottom:.35rem;letter-spacing:.05em;}
.field textarea{resize:vertical;min-height:80px;}
/* ── 에피소드 편집 ── */
.ep-layout{display:grid;grid-template-columns:220px 1fr;gap:1.5rem;align-items:start;}
.ep-list-panel{border:2px solid var(--ink);background:rgba(255,255,255,.4);box-shadow:3px 3px 0 rgba(26,20,16,.1);}
.ep-list-header{padding:.8rem 1rem;border-bottom:2px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg);}
.ep-list-header strong{font-size:.88rem;}
.ep-list-item{padding:.75rem 1rem;cursor:pointer;border-bottom:1px solid rgba(201,164,76,.3);display:flex;align-items:center;gap:.6rem;transition:all .15s;}
.ep-list-item:last-child{border-bottom:none;}
.ep-list-item:hover{background:var(--bg);}
.ep-list-item.active{background:rgba(168,50,45,.08);border-left:3px solid var(--point);}
.ep-num{font-family:'Nanum Myeongjo',serif;font-weight:800;color:var(--point);min-width:20px;font-size:.95rem;}
.ep-list-title{font-size:.85rem;line-height:1.35;color:var(--ink);}
.ep-edit-panel{border:2px solid var(--ink);background:rgba(255,255,255,.4);box-shadow:3px 3px 0 rgba(26,20,16,.1);padding:1.5rem;}
.ep-edit-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.3rem;padding-bottom:.8rem;border-bottom:2px solid var(--border);flex-wrap:wrap;gap:.5rem;}
.ep-edit-header h3{font-family:'Nanum Myeongjo',serif;color:var(--point);letter-spacing:.1em;font-size:1rem;}
.stage-section{margin-top:1.2rem;padding:1.2rem;background:rgba(255,255,255,.4);border:2px dashed var(--border);}
.stage-section h4{font-family:'Nanum Myeongjo',serif;color:var(--border);font-size:.9rem;margin-bottom:1rem;letter-spacing:.1em;}
.elim-edit-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;}
.elim-edit-row input[type=text]{flex:1;padding:.5rem .7rem;}
.elim-toggle{cursor:pointer;font-size:.95rem;min-width:36px;text-align:center;padding:.4rem .5rem;border:2px solid var(--ink);background:var(--paper);font-weight:700;font-family:'Gowun Batang',serif;}
.elim-toggle.ok{background:#e8f5e9;border-color:#3b7a57;color:#3b7a57;}
.elim-toggle.ng{background:#fce8e6;border-color:#a8322d;color:#a8322d;}
/* ── 소감 ── */
.summary-box{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1rem;margin-bottom:1.5rem;}
.summary-card{background:rgba(255,255,255,.5);border:2px solid var(--ink);padding:1.2rem;text-align:center;box-shadow:3px 3px 0 rgba(26,20,16,.1);}
.summary-card .num{font-family:'Nanum Myeongjo',serif;font-weight:800;font-size:2.1rem;color:var(--point);}
.summary-card .lbl{font-size:.8rem;color:#777;margin-top:.3rem;}
.reflection-list{display:flex;flex-direction:column;gap:1rem;}
.ref-card{background:rgba(255,255,255,.5);border:2px solid var(--ink);padding:1.1rem;box-shadow:3px 3px 0 rgba(26,20,16,.1);}
.ref-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;flex-wrap:wrap;gap:.4rem;}
.ref-name{font-weight:700;color:var(--point);font-size:.93rem;}
.ref-score{font-size:.8rem;color:var(--border);font-weight:700;}
.ref-time{font-size:.76rem;color:#999;}
.ref-body{font-style:italic;line-height:1.8;color:#333;border-left:3px solid var(--border);padding-left:.8rem;margin-top:.4rem;}
.empty{text-align:center;padding:2.5rem;color:#999;font-style:italic;font-size:.9rem;}
.info{background:rgba(201,164,76,.1);border-left:4px solid var(--border);padding:.9rem 1.1rem;margin-bottom:1.2rem;font-size:.88rem;line-height:1.7;}
.toast{position:fixed;top:24px;right:24px;background:var(--ink);color:var(--paper);padding:.9rem 1.4rem;border:2px solid var(--border);z-index:999;font-weight:700;font-size:.88rem;display:none;max-width:320px;line-height:1.5;box-shadow:0 4px 15px rgba(0,0,0,.2);}
.toast.show{display:block;}.toast.success{background:#3b7a57;}
@media(max-width:720px){
  .ep-layout{grid-template-columns:1fr;}
  .ep-list-panel{max-height:220px;overflow-y:auto;}
}
@media(max-width:480px){.section{padding:1.1rem;}.btn{padding:.65rem .9rem;}.tab{padding:.6rem .9rem;}}
</style>
</head>
<body>
<h1>千年의 記憶 관리자</h1>
<p class="subtitle">관 리 자 패 널</p>

<div id="adminLogin" class="admin-login">
  <h2>🔑 관리자 로그인</h2>
  <input type="password" id="pwInput" placeholder="비밀번호" style="margin-bottom:1rem;" onkeydown="if(event.key==='Enter')doAdminLogin()">
  <button class="btn" onclick="doAdminLogin()">입장하다</button>
</div>

<div id="adminPanel" style="display:none;">
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('settings')">게임 설정</div>
    <div class="tab" onclick="switchTab('episodes')">에피소드 편집</div>
    <div class="tab" onclick="switchTab('reflections')">소감 목록</div>
  </div>

  <!-- ── 게임 설정 ── -->
  <div class="panel active" id="tab-settings">
    <div class="info">
      📜 <strong>강제 삽입</strong> — 아래 버튼으로 에피소드 10개와 게임 설정을 삽입합니다.<br>
      ⚠️ 기존 데이터를 <strong>덮어씁니다</strong> (ep_1 ~ ep_10 문서 ID로 setDoc 방식).
    </div>
    <div style="margin-bottom:2rem;">
      <button class="btn btn-seed" onclick="insertSeedData()">📜 시드 데이터 강제 삽입 (10개, 덮어쓰기)</button>
    </div>
    <div class="section">
      <h3>게임 텍스트 설정</h3>
      <div class="field"><label>게임 제목</label><input type="text" id="sGameTitle"></div>
      <div class="field"><label>게임 부제</label><input type="text" id="sGameSub"></div>
      <div class="field"><label>인트로 스토리 (줄바꿈으로 문단 구분)</label><textarea id="sIntroStory" rows="6"></textarea></div>
      <div class="field"><label>엔딩 제목</label><input type="text" id="sEndingTitle"></div>
      <div class="field"><label>엔딩 부제</label><input type="text" id="sEndingSub"></div>
      <div class="field"><label>엔딩 메시지 (줄바꿈으로 문단 구분)</label><textarea id="sEndingMsg" rows="5"></textarea></div>
      <div class="field"><label>소감 작성 안내 문구</label><input type="text" id="sReflectionPrompt"></div>
      <div class="field"><label>관리자 비밀번호 변경 (비어있으면 변경 안 함)</label><input type="password" id="sNewPw" placeholder="새 비밀번호"></div>
      <button class="btn" onclick="saveSettings()">설정 저장</button>
    </div>
  </div>

  <!-- ── 에피소드 편집 ── -->
  <div class="panel" id="tab-episodes">
    <div class="info">에피소드를 선택하여 스토리, 대사, 문제 지문, 힌트 등 내용을 편집합니다.</div>
    <div class="ep-layout">
      <div class="ep-list-panel">
        <div class="ep-list-header">
          <strong>에피소드 목록</strong>
          <button class="btn btn-sm" onclick="loadEpList()">↻</button>
        </div>
        <div id="epListItems"><div class="empty">불러오는 중...</div></div>
      </div>
      <div class="ep-edit-panel">
        <div class="empty" id="epEditEmpty">← 에피소드를 선택하시오.</div>
        <div id="epEditForm" style="display:none;">
          <div class="ep-edit-header">
            <h3 id="epEditTitle"></h3>
            <div style="display:flex;gap:.4rem;">
              <button class="btn btn-sm btn-success" onclick="saveEpContent()">💾 저장</button>
              <button class="btn btn-sm btn-danger" onclick="closeEpEdit()">✕ 닫기</button>
            </div>
          </div>
          <div class="field"><label>스토리</label><textarea id="ef_story" rows="5"></textarea></div>
          <div style="display:grid;grid-template-columns:1fr 2fr;gap:.8rem;">
            <div class="field"><label>말하는 사람</label><input type="text" id="ef_speaker"></div>
            <div class="field"><label>말하는 내용 (대사)</label><textarea id="ef_dialog" rows="3"></textarea></div>
          </div>
          <div class="field"><label>문제 지문</label><textarea id="ef_question" rows="2"></textarea></div>
          <div class="field"><label>힌트</label><textarea id="ef_hint" rows="2"></textarea></div>
          <div id="epTypeFields"></div>
          <div style="margin-top:1.2rem;padding-top:1rem;border-top:2px solid var(--ink);">
            <button class="btn" onclick="saveEpContent()">💾 저장하기</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 소감 목록 ── -->
  <div class="panel" id="tab-reflections">
    <div class="summary-box" id="reflectionSummary"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem;flex-wrap:wrap;gap:.5rem;">
      <strong>소감 목록 (<span id="refCount">0</span>건)</strong>
      <div style="display:flex;gap:.5rem;">
        <button class="btn btn-sm" onclick="loadReflections()">새로고침</button>
        <button class="btn btn-sm" onclick="exportCSV()">CSV 내보내기</button>
      </div>
    </div>
    <div class="reflection-list" id="reflectionList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, getDocs, setDoc, addDoc, collection, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
  authDomain: "ho0911seong-56638.firebaseapp.com",
  databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ho0911seong-56638",
  storageBucket: "ho0911seong-56638.firebasestorage.app",
  messagingSenderId: "994509567071",
  appId: "1:994509567071:web:de99e71c125ec2a3f557ea"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let settings = {}, reflections = [], epList = [], editingEpId = null;
const DEFAULT_PW = 'ghtjd12!@';
let adminPw = DEFAULT_PW;

/* ─── 로그인 ─── */
window.doAdminLogin = async function() {
  const pw = document.getElementById('pwInput').value;
  try {
    const sDoc = await getDoc(doc(db,'escape26_2_settings','main'));
    if (sDoc.exists() && sDoc.data().adminPw) adminPw = sDoc.data().adminPw;
  } catch(e) {}
  if (pw !== adminPw) { showToast('비밀번호가 틀렸소이다.'); return; }
  document.getElementById('adminLogin').style.display = 'none';
  document.getElementById('adminPanel').style.display  = 'block';
  await Promise.all([loadSettings(), loadReflections()]);
};

/* ─── 탭 ─── */
let epListLoaded = false;
window.switchTab = function(name) {
  const names = ['settings','episodes','reflections'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', names[i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  if (name === 'episodes' && !epListLoaded) { epListLoaded = true; loadEpList(); }
};

/* ─── 설정 ─── */
async function loadSettings() {
  const sDoc = await getDoc(doc(db,'escape26_2_settings','main'));
  settings = sDoc.exists() ? sDoc.data() : {};
  document.getElementById('sGameTitle').value        = settings.gameTitle        || '千年의 記憶';
  document.getElementById('sGameSub').value          = settings.gameSubtitle     || '고 려 의 부 름';
  document.getElementById('sIntroStory').value       = (settings.introStory      || []).join('\n');
  document.getElementById('sEndingTitle').value      = settings.endingTitle      || '天 命 完 遂';
  document.getElementById('sEndingSub').value        = settings.endingSubtitle   || '천 명 완 수';
  document.getElementById('sEndingMsg').value        = (settings.endingMessage   || []).join('\n');
  document.getElementById('sReflectionPrompt').value = settings.reflectionPrompt || '이 여정을 마치며 느낀 점을 적어주시오.';
}

window.saveSettings = async function() {
  const newPw = document.getElementById('sNewPw').value;
  const data = {
    gameTitle:        document.getElementById('sGameTitle').value.trim(),
    gameSubtitle:     document.getElementById('sGameSub').value.trim(),
    introStory:       document.getElementById('sIntroStory').value.split('\n').map(s=>s.trim()).filter(Boolean),
    endingTitle:      document.getElementById('sEndingTitle').value.trim(),
    endingSubtitle:   document.getElementById('sEndingSub').value.trim(),
    endingMessage:    document.getElementById('sEndingMsg').value.split('\n').map(s=>s.trim()).filter(Boolean),
    reflectionPrompt: document.getElementById('sReflectionPrompt').value.trim()
  };
  if (newPw) { data.adminPw = newPw; adminPw = newPw; }
  await setDoc(doc(db,'escape26_2_settings','main'), data, { merge: true });
  showToast('설정이 저장되었소이다!', 'success');
};

/* ─── 에피소드 편집 ─── */
window.loadEpList = async function() {
  document.getElementById('epListItems').innerHTML = '<div class="empty">불러오는 중...</div>';
  try {
    const q = query(collection(db,'escape26_2'), orderBy('order','asc'));
    const snap = await getDocs(q);
    epList = [];
    snap.forEach(d => epList.push({ id: d.id, ...d.data() }));
    renderEpList();
  } catch(e) { showToast('에피소드 로드 실패: '+e.message); }
};

function renderEpList() {
  const el = document.getElementById('epListItems');
  if (!epList.length) {
    el.innerHTML = '<div class="empty">에피소드가 없습니다.<br>씨드 데이터를 삽입하시오.</div>';
    return;
  }
  el.innerHTML = epList.map(ep => `
    <div class="ep-list-item ${ep.id === editingEpId ? 'active' : ''}" onclick="openEpEditor('${ep.id}')">
      <span class="ep-num">${ep.order}</span>
      <span class="ep-list-title">${ep.title || '(제목 없음)'}</span>
    </div>`).join('');
}

window.openEpEditor = function(id) {
  const ep = epList.find(e => e.id === id);
  if (!ep) return;
  editingEpId = id;
  renderEpList();
  document.getElementById('epEditEmpty').style.display = 'none';
  document.getElementById('epEditForm').style.display  = 'block';
  document.getElementById('epEditTitle').textContent   = `에피소드 ${ep.order}: ${ep.title||''}`;
  document.getElementById('ef_story').value    = ep.story    || '';
  document.getElementById('ef_speaker').value  = ep.speaker  || '';
  document.getElementById('ef_dialog').value   = ep.dialog   || '';
  document.getElementById('ef_question').value = ep.question || '';
  document.getElementById('ef_hint').value     = ep.hint     || '';
  document.getElementById('epTypeFields').innerHTML = renderTypeFields(ep);
};

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderTypeFields(ep) {
  if (ep.type !== 'twoStage') return '<div class="info" style="margin-top:1rem;">이 유형의 세부 편집은 향후 지원 예정입니다.</div>';
  let html = '';

  /* Stage 1 */
  if (ep.stage1Type === 'dragOffer') {
    html += `<div class="stage-section">
      <h4>⭐ 1단계 — 드래그 봉헌 (dragOffer)</h4>
      <div class="field">
        <label>✅ 올바른 항목 (한 줄에 하나씩)</label>
        <textarea id="ef_s1_correctItems" rows="6">${escHtml((ep.stage1?.correctItems||[]).join('\n'))}</textarea>
      </div>
      <div class="field">
        <label>❌ 틀린 항목 (한 줄에 하나씩)</label>
        <textarea id="ef_s1_wrongItems" rows="4">${escHtml((ep.stage1?.wrongItems||[]).join('\n'))}</textarea>
      </div>
      <div class="field">
        <label>봉헌 영역 라벨</label>
        <input type="text" id="ef_s1_dropZoneLabel" value="${escHtml(ep.stage1?.dropZoneLabel||'')}">
      </div>
    </div>`;
  } else if (ep.stage1Type === 'fillBlanks') {
    html += `<div class="stage-section">
      <h4>⭐ 1단계 — 빈칸 채우기 (fillBlanks)</h4>
      <div class="field">
        <label>정답 목록 (한 줄에 하나씩)</label>
        <textarea id="ef_s1_answers" rows="4">${escHtml((ep.stage1?.answers||[]).join('\n'))}</textarea>
      </div>
    </div>`;
  } else if (ep.stage1Type === 'order') {
    html += `<div class="stage-section">
      <h4>⭐ 1단계 — 순서 배열 (order)</h4>
      <div class="field">
        <label>항목 목록 (한 줄에 하나씩, 올바른 순서대로)</label>
        <textarea id="ef_s1_items" rows="5">${escHtml((ep.stage1?.items||[]).join('\n'))}</textarea>
      </div>
    </div>`;
  } else {
    html += `<div class="info" style="margin-top:1rem;">1단계(${escHtml(ep.stage1Type)}) 세부 편집 준비 중</div>`;
  }

  /* Stage 2 */
  if (ep.stage2Type === 'eliminate') {
    const items = ep.stage2?.items || [];

window.toggleElimStatus = function(btn) {
  const isOk = btn.classList.contains('ok');
  btn.classList.toggle('ok', !isOk);
  btn.classList.toggle('ng', isOk);
  btn.textContent = isOk ? '❌' : '✅';
};

window.addElimEditRow = function() {
  const c = document.getElementById('ef_s2_elimItems');
  const d = document.createElement('div'); d.className = 'elim-edit-row';
  d.innerHTML = `<button class="elim-toggle ok" onclick="toggleElimStatus(this)">✅</button>
    <input type="text" placeholder="설명문 입력...">
    <button class="btn btn-sm btn-danger" style="padding:.35rem .55rem;font-size:.75rem;" onclick="this.closest('.elim-edit-row').remove()">삭제</button>`;
  c.appendChild(d);
};

window.addKwEditRow = function() {
  const c = document.getElementById('ef_s2_kwItems');
  const d = document.createElement('div'); d.className = 'elim-edit-row';
  d.innerHTML = `<button class="elim-toggle ok" onclick="toggleElimStatus(this)">✅</button>
    <input type="text" placeholder="키워드 설명 입력...">
    <button class="btn btn-sm btn-danger" style="padding:.35rem .55rem;font-size:.75rem;" onclick="this.closest('.elim-edit-row').remove()">삭제</button>`;

};

window.saveEpContent = async function() {
  if (!editingEpId) return;
  const ep = epList.find(e => e.id === editingEpId);
  if (!ep) return;
  try {
    const update = {
      story:    document.getElementById('ef_story').value.trim(),
      speaker:  document.getElementById('ef_speaker').value.trim(),
      dialog:   document.getElementById('ef_dialog').value.trim(),
      question: document.getElementById('ef_question').value.trim(),
      hint:     document.getElementById('ef_hint').value.trim()
    };
    if (ep.type === 'twoStage') {
      if (ep.stage1Type === 'dragOffer') {
        update.stage1 = { ...ep.stage1,
          correctItems:  document.getElementById('ef_s1_correctItems').value.split('\n').map(s=>s.trim()).filter(Boolean),
          wrongItems:    document.getElementById('ef_s1_wrongItems').value.split('\n').map(s=>s.trim()).filter(Boolean),
          dropZoneLabel: document.getElementById('ef_s1_dropZoneLabel').value.trim()
        };
      } else if (ep.stage1Type === 'fillBlanks') {
        update.stage1 = { ...ep.stage1, answers: document.getElementById('ef_s1_answers').value.split('\n').map(s=>s.trim()).filter(Boolean) };
      } else if (ep.stage1Type === 'order') {
        const items = document.getElementById('ef_s1_items').value.split('\n').map(s=>s.trim()).filter(Boolean);
        update.stage1 = { ...ep.stage1, items, correctOrder: items.map((_,i)=>i) };
      }
      if (ep.stage2Type === 'eliminate') {
        const rows = [...document.querySelectorAll('#ef_s2_elimItems .elim-edit-row')];
        update.stage2 = { ...ep.stage2, items: rows.map(r=>({
          text:    r.querySelector('input[type=text]').value.trim(),
          correct: r.querySelector('.elim-toggle').classList.contains('ok')
        })).filter(it=>it.text) };
      } else if (ep.stage2Type === 'selectKeywords') {
        const rows = [...document.querySelectorAll('#ef_s2_kwItems .elim-edit-row')];
        update.stage2 = { ...ep.stage2,
          context: document.getElementById('ef_s2_kwContext')?.value.trim() || '',
          items: rows.map(r=>({
            text:    r.querySelector('input[type=text]').value.trim(),
            correct: r.querySelector('.elim-toggle').classList.contains('ok')
          })).filter(it=>it.text)
        };
      } else if (ep.stage2Type === 'fillBlanks') {
        update.stage2 = { ...ep.stage2, answers: document.getElementById('ef_s2_answers').value.split('\n').map(s=>s.trim()).filter(Boolean) };
      }
    }
    await setDoc(doc(db,'escape26_2', editingEpId), update, { merge: true });
    Object.assign(ep, update);
    showToast('저장되었소이다!', 'success');
  } catch(e) { showToast('저장 실패: '+e.message); }
};

window.closeEpEdit = function() {
  editingEpId = null;
  document.getElementById('epEditEmpty').style.display = 'block';
  document.getElementById('epEditForm').style.display  = 'none';
  renderEpList();
};

/* ─── 소감 ─── */
window.loadReflections = async function() {
  try {
    const q = query(collection(db,'escape26_2_reflections'), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    reflections = [];
    snap.forEach(d => reflections.push({ id: d.id, ...d.data() }));
    document.getElementById('refCount').textContent = reflections.length;
    const scores = reflections.map(r=>r.score||0);
    const avg = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : 0;
    document.getElementById('reflectionSummary').innerHTML = `
      <div class="summary-card"><div class="num">${reflections.length}</div><div class="lbl">총 제출</div></div>
      <div class="summary-card"><div class="num">${avg}</div><div class="lbl">평균 점수</div></div>
      <div class="summary-card"><div class="num">${scores.length?Math.max(...scores):0}/10</div><div class="lbl">최고 점수</div></div>`;
    const list = document.getElementById('reflectionList');
    if (!reflections.length) { list.innerHTML = '<div class="empty">아직 제출된 소감이 없소이다.</div>'; return; }
    list.innerHTML = '';
    reflections.forEach(r => {
      const ts = r.createdAt?.toDate?.()?.toLocaleString('ko-KR') || '';
      const card = document.createElement('div'); card.className = 'ref-card';
      card.innerHTML = `<div class="ref-header">
        <span class="ref-name">${r.studentId} ${r.studentName}</span>
        <span class="ref-score">보물 ${r.score||0}/10</span>
        <span class="ref-time">${ts}</span>
      </div>
      <div class="ref-body">${String(r.reflection||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>`;
      list.appendChild(card);
    });
  } catch(e) { showToast('소감 로드 실패: '+e.message); }
};

window.exportCSV = function() {
  if (!reflections.length) { showToast('내보낼 데이터가 없소이다.'); return; }
  const rows = [['학번','이름','점수','소감','제출 시간']];
  reflections.forEach(r => {
    const ts = r.createdAt?.toDate?.()?.toLocaleString('ko-KR') || '';
    rows.push([r.studentId||'', r.studentName||'', r.score||0, (r.reflection||'').replace(/\n/g,' '), ts]);
  });
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='escape26_2_reflections.csv'; a.click();
  URL.revokeObjectURL(url);
};

let _tt;
function showToast(msg, type='error') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  clearTimeout(_tt); _tt = setTimeout(() => t.classList.remove('show'), 3000);
}
