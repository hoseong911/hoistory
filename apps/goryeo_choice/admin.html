<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>亂世의 士大夫 : 관리자 모드</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/theme.css">
  <link rel="stylesheet" href="../../shared/admin-base.css">
  <style>
    html, body { min-height: 100%; font-family: 'Pretendard', sans-serif; background: var(--hi-bg-base); color: var(--hi-text); }

    /* ── 로그인 게이트 (interview/admin.html의 gate-login과 동일한 카드형) ── */
    #loginScreen {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--hi-bg-base);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: var(--hi-bg-surface);
      border-radius: 24px;
      padding: 32px 28px;
      width: 100%; max-width: 340px;
      box-shadow: var(--hi-shadow-dialog);
      border: 1px solid var(--hi-border);
      text-align: center;
    }
    .login-logo { letter-spacing: 2px; }
    .login-sub { font-size: 12px; color: var(--hi-text-muted); margin-bottom: 24px; letter-spacing: 0.5px; }
    .login-error { font-size: 12px; color: var(--hi-negative); margin-top: 10px; min-height: 16px; display:none; text-align:center; }
    .login-foot { margin-top: 16px; }
    .login-foot a { font-size: 12px; color: var(--hi-text-muted); text-decoration: none; }
    .login-foot a:hover { color: var(--hi-text); }

    /* ── 어드민 헤더: 3열 그리드(로고 / 탭 / 로그아웃)로 interview/admin.html과 동일한 구조 ──
       (주의) display:none인 그리드 아이템은 auto-placement에서 빠지므로, 로고·로그아웃을 숨겼을 때(임베드 시)
       남은 탭이 1번 칸으로 밀려 들어가 중앙정렬이 깨진다. grid-column을 각각 명시해 방지한다. */
    #adminApp { display: none; min-height: 100vh; }
    .adm-header {
      background: var(--hi-bg-surface); border-bottom: 1px solid var(--hi-border);
      padding: 0 28px; display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; height: 54px; position: sticky; top: 0; z-index: 100;
    }
    .adm-logo { letter-spacing: 1px; }
    .adm-logout, .adm-back {
      background: none; border: 1.5px solid var(--hi-border); border-radius: 8px;
      padding: 6px 14px; font-family: inherit; font-size: 12px; font-weight: 700;
      color: var(--hi-text-muted); cursor: pointer; justify-self: end; grid-column: 3;
      transition: 0.15s; white-space: nowrap;
    }
    .adm-logout:hover, .adm-back:hover { border-color: var(--hi-text-muted); color: var(--hi-text); background: var(--hi-bg-mid); }
    /* lms/admin의 iframe으로 embed된 경우 상위 어드민의 "목록으로"를 대신하는 버튼. 로그아웃 자리를 대신 차지한다 */
    .adm-back { display: none; }
    body.embedded .adm-back { display: inline-flex; align-items: center; }
    body.embedded .adm-logo, body.embedded .adm-logout { display: none; }

    /* ── 반 필터 (가운데 정렬 필 그룹, 다른 앱 어드민의 class-filter와 동일한 스타일) ── */
    .sub-tabs { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 18px; }
    .sub-tab {
      padding: 7px 16px; border-radius: 100px; border: 1.5px solid var(--hi-border);
      background: var(--hi-bg-surface); font-family: inherit; font-size: 13px; font-weight: 700;
      color: var(--hi-text-muted); cursor: pointer; transition: 0.15s;
    }
    .sub-tab:hover:not(.active) { border-color: var(--hi-text-muted); color: var(--hi-text); }
    .sub-tab.active { background: var(--hi-accent); color: #fff; border-color: var(--hi-accent); }

    /* ── 본문 영역 ── */
    .adm-body { max-width: 900px; margin: 0 auto; padding: 24px 28px 60px; width: 100%; }
    .container { max-width: 100%; margin: 0; padding: 0; }

    /* ── 정렬 + 도구 바 ── */
    .toolbar-row {
      display: flex; justify-content: space-between;
      align-items: center; gap: 8px;
      padding: 4px 0 14px; flex-wrap: wrap;
    }
    .toolbar-row .summary { font-size: 12px; color: var(--hi-text-muted); }
    .toolbar-row .summary strong { color: var(--hi-text); font-weight: 800; }
    .sort-box {
      display: flex; background: var(--hi-bg-surface);
      border: 1px solid var(--hi-border); border-radius: 9999px;
      padding: 2px;
    }
    .sort-btn {
      font-size: 11px; font-weight: 700;
      border: none; border-radius: 9999px;
      padding: 5px 12px; cursor: pointer;
      font-family: inherit;
      color: var(--hi-text-muted);
      background: none; transition: 0.15s;
    }
    .sort-btn.active { color: var(--hi-on-accent); background: var(--hi-accent); }

    /* ── 결말 통계 (section-card 톤의 박스로) ── */
    .stats-block {
      background: var(--hi-bg-surface); border: 1px solid var(--hi-border);
      border-radius: 20px; padding: 22px; margin-bottom: 16px;
      box-shadow: var(--hi-shadow-card);
    }
    .stats-title {
      font-size: 14px; font-weight: 800;
      color: var(--hi-text);
      letter-spacing: 0.3px;
      margin: 0 0 12px;
    }
    .stats-title:not(:first-child) { margin-top: 20px; }
    .path-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; margin-bottom: 14px;
    }
    .path-card {
      background: var(--hi-bg-mid);
      border: 1px solid var(--hi-border);
      border-radius: 14px;
      padding: 14px 10px;
      text-align: center;
      position: relative;
    }
    .path-card .path-name {
      font-size: 11px; color: var(--hi-text-muted);
      font-weight: 700; margin-bottom: 4px;
      letter-spacing: 0.5px;
    }
    .path-card .path-count {
      font-size: 26px; font-weight: 900;
      color: var(--hi-text); line-height: 1;
    }
    .path-card .path-pct {
      font-size: 10px; color: var(--hi-text-muted);
      margin-top: 4px; font-weight: 600;
    }
    .path-card.open { border-top: 3px solid #b08c4a; }
    .path-card.retreat { border-top: 3px solid #6b7d4f; }
    .path-card.martyr { border-top: 3px solid #a94d4d; }

    /* 12개 세부 결말 칩 — 4칸씩 3줄 고정 */
    .ending-chips-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .ending-chip {
      background: var(--hi-bg-surface);
      border: 1px solid var(--hi-border);
      border-radius: 8px;
      padding: 8px 10px;
      display: flex; align-items: center;
      gap: 8px;
      transition: border-color 0.15s;
    }
    .ending-chip.zero { opacity: 0.45; }
    .ending-chip-char {
      font-size: 18px; font-weight: 900;
      color: var(--hi-text);
      width: 28px; text-align: center;
      flex-shrink: 0;
    }
    .ending-chip-info {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
    }
    .ending-chip-title {
      font-size: 11px; font-weight: 700;
      color: var(--hi-text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ending-chip-meta {
      font-size: 9px; color: var(--hi-text-muted);
      letter-spacing: 0.5px;
    }
    .ending-chip-count {
      font-size: 16px; font-weight: 800;
      color: var(--hi-text);
      flex-shrink: 0;
    }
    .ending-chip.zero .ending-chip-count { color: var(--hi-text-muted); }
    /* 경로별 색 보더 */
    .ending-chip.path-open { border-left: 3px solid #b08c4a; }
    .ending-chip.path-retreat { border-left: 3px solid #6b7d4f; }
    .ending-chip.path-martyr { border-left: 3px solid #a94d4d; }

    /* ── 결과 카드 ── */
    .result-card {
      background: var(--hi-bg-surface);
      border: 1px solid var(--hi-border);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: var(--hi-shadow-card);
    }
    .rc-header {
      display: flex; align-items: center;
      gap: 8px; flex-wrap: wrap;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--hi-border-faint);
      margin-bottom: 10px;
    }
    .rc-sid {
      font-size: 11px; font-weight: 700;
      color: var(--hi-text-muted);
      letter-spacing: 0.5px;
      background: var(--hi-bg-mid);
      padding: 2px 8px;
      border-radius: 4px;
    }
    .rc-sname { font-size: 14px; font-weight: 800; color: var(--hi-text); }
    .rc-time {
      font-size: 10px; color: var(--hi-text-muted);
      margin-left: auto;
    }

    /* 인물 설정 + 결말 행 */
    .rc-meta {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    @media (min-width: 520px) {
      .rc-meta { grid-template-columns: 1fr 1fr; }
    }
    .rc-meta-item {
      display: flex; flex-direction: column;
      gap: 3px;
    }
    .rc-meta-label {
      font-size: 9px; color: var(--hi-text-muted);
      font-weight: 700; letter-spacing: 1px;
    }
    .rc-meta-value {
      font-size: 13px; color: var(--hi-text);
      font-weight: 600;
      word-break: keep-all;
    }
    .rc-ending {
      font-weight: 900;
    }
    .rc-ending-char {
      display: inline-block;
      font-size: 14px; font-weight: 900;
      color: var(--hi-on-accent);
      background: var(--hi-text);
      width: 22px; height: 22px;
      line-height: 22px;
      text-align: center;
      border-radius: 4px;
      margin-right: 6px;
      vertical-align: middle;
    }

    /* 스탯 */
    .rc-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      margin-bottom: 10px;
    }
    .rc-stat {
      background: var(--hi-bg-mid);
      border: 1px solid var(--hi-border-faint);
      border-radius: 6px;
      padding: 6px 4px;
      text-align: center;
    }
    .rc-stat-label {
      font-size: 9px; color: var(--hi-text-muted);
      font-weight: 700; letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .rc-stat-value {
      font-size: 16px; font-weight: 900;
      color: var(--hi-text); line-height: 1;
    }
    .rc-stat.low .rc-stat-value { color: var(--hi-negative); }
    .rc-stat.high .rc-stat-value { color: var(--hi-positive); }

    /* 소감 */
    .rc-reflection-label {
      font-size: 9px; color: var(--hi-text-muted);
      font-weight: 700; letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .rc-reflection {
      font-size: 12px; color: var(--hi-text-soft);
      line-height: 1.7;
      background: var(--hi-bg-mid);
      border-left: 3px solid var(--hi-border);
      border-radius: 0 6px 6px 0;
      padding: 10px 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .rc-reflection.empty {
      color: var(--hi-text-muted);
      font-style: italic;
    }

    .rc-actions {
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--hi-border-faint);
      display: flex; gap: 6px; justify-content: flex-end;
    }
    .btn-del {
      font-size: 10px; font-weight: 700;
      color: var(--hi-negative);
      background: var(--hi-bg-surface);
      border: 1px solid var(--hi-border);
      border-radius: 5px; padding: 4px 10px;
      cursor: pointer; font-family: inherit; transition: 0.12s;
    }
    .btn-del:hover {
      border-color: var(--hi-negative);
      background: #fef2f2;
    }


    /* ── 빈 상태 / 로딩 ── */
    .empty {
      padding: 48px 20px; text-align: center;
      color: var(--hi-text-muted); font-size: 13px;
    }
    .empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.4; }
    .loading-state {
      padding: 40px 20px; text-align: center;
      color: var(--hi-text-muted); font-size: 13px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .spinner {
      width: 22px; height: 22px;
      border: 2px solid var(--hi-border);
      border-top-color: var(--hi-accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 패널 섹션 */
    .panel-section { display: none; }
    .panel-section.active { display: block; }

    /* 확인 모달 (interview/admin.html의 modal-back/modal-box와 동일한 톤) */
    .confirm-bg {
      position: fixed; inset: 0;
      background: rgba(10,19,23,0.55);
      z-index: 600; display: none;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .confirm-bg.show { display: flex; }
    .confirm-box {
      background: var(--hi-bg-surface);
      border: 1px solid var(--hi-border);
      border-radius: 20px; padding: 24px;
      width: 100%; max-width: 340px;
      box-shadow: var(--hi-shadow-dialog);
    }
    .confirm-box h3 { font-size: 16px; font-weight: 800; margin-bottom: 8px; color: var(--hi-text); }
    .confirm-box p { font-size: 13px; color: var(--hi-text-muted); margin-bottom: 20px; line-height: 1.6; }
    .confirm-actions { display: flex; gap: 8px; justify-content: center; }

    /* 토스트 */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--hi-text);
      color: var(--hi-bg-surface);
      padding: 12px 20px;
      border-radius: 9999px;
      font-size: 13px; font-weight: 700;
      box-shadow: var(--hi-shadow-dialog);
      opacity: 0; transition: 0.25s;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* 모바일 미세 조정 */
    @media (max-width: 420px) {
      .adm-header, .adm-body { padding-left: 14px; padding-right: 14px; }
      .path-card .path-count { font-size: 22px; }
      .ending-chip { padding: 6px 8px; gap: 6px; }
      .ending-chip-char { font-size: 16px; width: 22px; }
      .ending-chip-title { font-size: 10px; }
      .adm-logo { font-size: 14px; }
      .sub-tab { padding: 6px 12px; font-size: 12px; }
    }
  </style>
<script>if(window.self!==window.top){document.documentElement.classList.add('in-iframe');document.documentElement.classList.add('has-own-back');}</script>
</head>
<body class="hi-preset-admin">

<!-- ── 로그인 게이트 (interview/admin.html과 동일한 카드형) ── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">亂世의 士大夫</div>
    <div class="login-sub">관리자 모드</div>
    <input class="hi-input" type="password" id="adminPw"
      placeholder="비밀번호" style="text-align:center;letter-spacing:3px;"
      onkeydown="if(event.key==='Enter') tryLogin()">
    <div class="login-err" id="loginErr">비밀번호가 올바르지 않습니다.</div>
    <button class="login-btn" onclick="tryLogin()">접속하기</button>
    <div class="login-foot"><a href="index.html">학생 페이지로</a></div>
  </div>
</div>

<!-- ── 어드민 앱 ── -->
<div id="adminApp">
  <!-- 헤더: 로고 / 로그아웃(또는 임베드 시 목록으로) — SETTING 탭 삭제로 화면이 CLASS 하나뿐이라 탭은 없앴다 -->
  <header class="adm-header">
    <div class="adm-logo">亂世의 士大夫<span class="adm-badge">관리자 모드</span></div>
    <button class="adm-logout" id="admin-logout-btn" onclick="logoutAdmin()">로그아웃</button>
    <button class="adm-back" id="embed-back-btn" onclick="window.parent.closeAppAdmin && window.parent.closeAppAdmin()">목록으로</button>
  </header>

  <div class="adm-body">

  <!-- ══════════ CLASS 패널 ══════════ -->
  <section class="tab-panel active" id="panel-class">
    <div class="class-filter" id="classSubTabs">
      <button class="cf-btn active" data-class="all" onclick="setClassTab('all', this)">전체</button>
      <button class="cf-btn" data-class="1" onclick="setClassTab(1, this)">1반</button>
      <button class="cf-btn" data-class="2" onclick="setClassTab(2, this)">2반</button>
      <button class="cf-btn" data-class="3" onclick="setClassTab(3, this)">3반</button>
      <button class="cf-btn" data-class="4" onclick="setClassTab(4, this)">4반</button>
      <button class="cf-btn" data-class="5" onclick="setClassTab(5, this)">5반</button>
      <button class="cf-btn" data-class="6" onclick="setClassTab(6, this)">6반</button>
    </div>

    <div class="container">
      <!-- 결말 통계 -->
      <div class="stats-block">
        <div class="stats-title">▪ 결말 통계 — 경로별</div>
        <div class="path-grid">
          <div class="path-card open">
            <div class="path-name">조선 합류</div>
            <div class="path-count" id="pathCountOpen">0</div>
            <div class="path-pct" id="pathPctOpen">—</div>
          </div>
          <div class="path-card retreat">
            <div class="path-name">두문동 은거</div>
            <div class="path-count" id="pathCountRetreat">0</div>
            <div class="path-pct" id="pathPctRetreat">—</div>
          </div>
          <div class="path-card martyr">
            <div class="path-name">충절의 순사</div>
            <div class="path-count" id="pathCountMartyr">0</div>
            <div class="path-pct" id="pathPctMartyr">—</div>
          </div>
        </div>

        <div class="stats-title">▪ 결말 통계 — 세부 (12종)</div>
        <div class="ending-chips-row" id="endingChips"></div>
      </div>

      <!-- 표준 통계 행 -->
      <div class="stats-row" style="margin-top:16px;">
        <div class="stat-chip">
          <div class="stat-chip-label">전체 인원</div>
          <div class="stat-chip-val" id="stTotal">-</div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-label">제출 / 미제출</div>
          <div class="stat-dual">
            <div class="stat-dual-val" id="stSubmit" style="color:var(--hi-accent)">-</div>
            <div class="stat-dual-val" id="stMissing" style="color:var(--hi-text-muted)">-</div>
          </div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-label">통과 / 미흡</div>
          <div class="stat-dual">
            <div class="stat-dual-val" id="stPass" style="color:var(--hi-positive)">-</div>
            <div class="stat-dual-val" id="stFail" style="color:var(--hi-negative)">-</div>
          </div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-label">PICK</div>
          <div class="stat-chip-val" id="stPick">-</div>
        </div>
      </div>

      <!-- 표준 액션 줄 -->
      <div class="adm-action-row">
        <button class="hi-btn hi-btn-primary hi-btn-sm" onclick="runScoring()">채점하기</button>
        <button class="hi-btn hi-btn-outline hi-btn-sm" onclick="exportExcel()">엑셀 내보내기</button>
        <div class="sort-box">
          <button class="sort-btn active" id="sortNewest" onclick="setResultSort('newest')">최신순</button>
          <button class="sort-btn" id="sortSid" onclick="setResultSort('sid')">학번순</button>
        </div>
      </div>

      <!-- 결과 리스트 -->
      <div id="resultList">
        <div class="loading-state"><div class="spinner"></div><span>결과 불러오는 중…</span></div>
      </div>
    </div>
  </section>

  </div><!-- /adm-body -->
</div>

<!-- 확인 모달 -->
<div class="confirm-bg" id="confirmModal">
  <div class="confirm-box">
    <h3 id="confirmTitle"></h3>
    <p id="confirmDesc"></p>
    <div class="confirm-actions">
      <button class="hi-btn hi-btn-outline hi-btn-sm" onclick="closeConfirm()">취소</button>
      <button class="hi-btn hi-btn-primary hi-btn-sm" id="confirmOk">확인</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase, ref, set, onValue, remove, update
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ===== Firebase ===== */
const firebaseConfig = {
  apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
  authDomain: "ho0911seong-56638.firebaseapp.com",
  databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ho0911seong-56638",
  storageBucket: "ho0911seong-56638.firebasestorage.app",
  messagingSenderId: "994509567071",
  appId: "1:994509567071:web:de99e71c125ec2a3f557ea"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const resultsRef = ref(db, 'goryeo_results');

// lms/admin의 iframe으로 열린 경우인지 여부 (interview/hismile 어드민과 동일한 패턴)
const isEmbedded = window.self !== window.top;

const ADMIN_PW_HASH = "57765044de4726b8a55db8c3846a7b6a038a2beaff40c0cc5113744ad8b62694";
const SESSION_KEY = 'sadaebu_admin_v1';

/* ===== 12개 결말 정의 (sadaebu.html과 동기화) ===== */
const ENDINGS_META = {
  // open 계열
  open:             { char:'功', title:'개국공신',         path:'open' },
  open_architect:   { char:'設', title:'창업의 설계자',    path:'open' },
  open_scholar:     { char:'經', title:'학자관료',         path:'open' },
  open_pragmatist:  { char:'濟', title:'경세가',           path:'open' },
  // retreat 계열
  retreat:          { char:'隱', title:'두문동 은거',      path:'retreat' },
  retreat_teacher:  { char:'師', title:'사림의 시조',      path:'retreat' },
  retreat_purist:   { char:'節', title:'절개의 선비',      path:'retreat' },
  retreat_recluse:  { char:'逸', title:'은일거사',         path:'retreat' },
  // martyr 계열
  martyr:           { char:'節', title:'충절의 순사',      path:'martyr' },
  martyr_icon:      { char:'烈', title:'충신열전',         path:'martyr' },
  martyr_scholar:   { char:'文', title:'학문의 순교자',    path:'martyr' },
  martyr_unknown:   { char:'魂', title:'무명의 충혼',      path:'martyr' },
};
const ENDING_ORDER = [
  'open_architect','open_scholar','open_pragmatist','open',
  'retreat_teacher','retreat_purist','retreat_recluse','retreat',
  'martyr_icon','martyr_scholar','martyr_unknown','martyr'
];
const PATH_LABEL = { open:'조선 합류', retreat:'두문동 은거', martyr:'충절의 순사' };

/* ===== 상태 ===== */
let allResults = [];       // [{_key, ...data}]
let allStudents = [];      // [{studentId, name}]
let studentMap = {};       // sid → name
let classTab = 'all';      // 'all' or 1~6
let resultSort = 'newest'; // 'sid' | 'newest'

/* ===== 유틸 ===== */
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
function esc(s) {
  const d = document.createElement('div'); d.textContent = String(s == null ? '' : s); return d.innerHTML;
}
function classNumFromId(sid) {
  if (!sid || String(sid).length < 3) return null;
  const c = parseInt(String(sid).slice(1, 3), 10);
  return isNaN(c) ? null : c;
}
function classLabel(sid) {
  const cls = (sid || '').slice(0, 3);
  return /^\d{3}$/.test(cls) ? `${cls[0]}학년 ${parseInt(cls.slice(1))}반` : '-';
}
function pathOfEndingKey(key) {
  if (!key) return null;
  if (ENDINGS_META[key]) return ENDINGS_META[key].path;
  // legacy fallback: 'open' / 'retreat' / 'martyr' base
  const base = String(key).split('_')[0];
  return ['open','retreat','martyr'].includes(base) ? base : null;
}

/* ===== 로그인 ===== */
window.tryLogin = async () => {
  const hash = await sha256(document.getElementById('adminPw').value);
  if (hash === ADMIN_PW_HASH) {
    sessionStorage.setItem(SESSION_KEY, '1');
    enterAdmin();
  } else {
    document.getElementById('loginErr').classList.add('show');
  }
};
window.logoutAdmin = () => {
  if (!confirm('로그아웃 하시겠습니까?')) return;
  sessionStorage.removeItem(SESSION_KEY); location.reload();
};
function enterAdmin() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminApp').classList.add('show');
  startListening();
}
window.addEventListener('DOMContentLoaded', () => {
  // lms/admin에 이미 로그인되어 있으므로 로그인 화면을 생략하고 바로 들어간다.
  if (isEmbedded) {
    document.body.classList.add('embedded');
    // lms/admin이 이 마커를 보고 자기 쪽 상단의 중복된 "목록으로" 바를 자동으로 숨긴다.
    document.documentElement.classList.add('has-own-back');
    enterAdmin();
    return;
  }
  if (sessionStorage.getItem(SESSION_KEY) === '1') enterAdmin();
});

/* ===== Firebase 구독 ===== */
function startListening() {
  // 학생 명단 (sadaebu의 ../../shared/auth.js와 동일 경로)
  onValue(ref(db, 'students'), snap => {
    const data = snap.val();
    allStudents = []; studentMap = {};
    if (data) {
      Object.entries(data).forEach(([key, val]) => {
        const sid = val.studentId || '';
        const name = val.name || val.studentName || val.realName || '';
        allStudents.push({ _key: key, studentId: sid, name });
        if (sid && name) studentMap[sid] = name;
      });
      allStudents.sort((a, b) => a.studentId.localeCompare(b.studentId));
    }
    renderAll();
  });
  // 게임 결과
  onValue(resultsRef, snap => {
    const data = snap.val();
    allResults = data
      ? Object.entries(data).map(([k, v]) => ({ _key: k, ...v }))
      : [];
    renderAll();
  });
}

function renderAll() { renderClass(); }

/* ===== CLASS 패널 ===== */
window.setClassTab = (val, btn) => {
  classTab = val;
  document.querySelectorAll('#classSubTabs .cf-btn').forEach(el => el.classList.remove('active'));
  btn.classList.add('active');
  renderClass();
};
window.setResultSort = (sort) => {
  resultSort = sort;
  document.getElementById('sortNewest').classList.toggle('active', sort === 'newest');
  document.getElementById('sortSid').classList.toggle('active', sort === 'sid');
  renderClass();
};

function filteredResults() {
  if (classTab === 'all') return allResults;
  return allResults.filter(r => classNumFromId(r.studentId) === classTab);
}

function renderClass() {
  const results = filteredResults();
  renderStats(results);
  renderResultList(results);
}

function renderStats(results) {
  // 경로별 카운트
  const pathCount = { open: 0, retreat: 0, martyr: 0 };
  const endingCount = {};
  ENDING_ORDER.forEach(k => endingCount[k] = 0);

  results.forEach(r => {
    const key = r.ending;
    const path = pathOfEndingKey(key);
    if (path) pathCount[path]++;
    if (endingCount.hasOwnProperty(key)) endingCount[key]++;
  });

  const total = results.length;
  const pct = (n) => total ? Math.round(n / total * 100) + '%' : '—';

  document.getElementById('pathCountOpen').textContent = pathCount.open;
  document.getElementById('pathCountRetreat').textContent = pathCount.retreat;
  document.getElementById('pathCountMartyr').textContent = pathCount.martyr;
  document.getElementById('pathPctOpen').textContent = pct(pathCount.open);
  document.getElementById('pathPctRetreat').textContent = pct(pathCount.retreat);
  document.getElementById('pathPctMartyr').textContent = pct(pathCount.martyr);

  // 12개 결말 칩
  const chipsHtml = ENDING_ORDER.map(key => {
    const meta = ENDINGS_META[key];
    const count = endingCount[key];
    const zero = count === 0 ? ' zero' : '';
    return `
      <div class="ending-chip path-${meta.path}${zero}">
        <div class="ending-chip-char">${meta.char}</div>
        <div class="ending-chip-info">
          <div class="ending-chip-title">${meta.title}</div>
          <div class="ending-chip-meta">${PATH_LABEL[meta.path]}</div>
        </div>
        <div class="ending-chip-count">${count}</div>
      </div>`;
  }).join('');
  document.getElementById('endingChips').innerHTML = chipsHtml;

  // 표준 통계 행 업데이트
  const classStudents = classTab === 'all'
    ? allStudents
    : allStudents.filter(s => classNumFromId(s.studentId) === classTab);
  const submittedIds = new Set(results.map(r => r.studentId));
  const pickCount = results.filter(r => r.pick).length;
  document.getElementById('stTotal').textContent = classStudents.length || '-';
  document.getElementById('stSubmit').textContent = submittedIds.size;
  document.getElementById('stMissing').textContent = classStudents.length ? classStudents.length - submittedIds.size : '-';
  document.getElementById('stPass').textContent = '-';
  document.getElementById('stFail').textContent = '-';
  document.getElementById('stPick').textContent = pickCount;
}

function renderResultList(results) {
  const container = document.getElementById('resultList');

  if (!results.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">📜</div>${classTab==='all'?'아직 플레이 결과가 없습니다':'이 반의 플레이 결과가 없습니다'}</div>`;
    return;
  }

  // 정렬: 최신순 / 학번순
  let sorted;
  if (resultSort === 'sid') {
    sorted = [...results].sort((a, b) => {
      const sa = String(a.studentId || ''), sb = String(b.studentId || '');
      if (sa !== sb) return sa.localeCompare(sb);
      return (a.timestamp || 0) - (b.timestamp || 0);
    });
  } else {
    sorted = [...results].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
  }

  container.innerHTML = `<div class="std-list">${sorted.map(r => buildResultCard(r)).join('')}</div>`;
}

function buildResultCard(r) {
  const meta = ENDINGS_META[r.ending] || null;
  const endingTitle = r.endingTitle || (meta ? meta.title : '—');
  const endingPath = pathOfEndingKey(r.ending) || '';
  const name = studentMap[r.studentId] || r.studentName || '';
  const reflection = (r.reflection || '').trim();
  const picked = !!r.pick;
  const pathKorean = endingPath === 'open' ? '조선합류' : endingPath === 'retreat' ? '두문동은거' : endingPath === 'martyr' ? '충절의순사' : '—';

  return `<div class="std-card">
    <div class="std-card-row">
      <div>
        <div class="std-sid">${esc(r.studentId||'')}</div>
        <div class="std-name">${esc(name)}</div>
      </div>
      <div class="std-badge-col">
        <span class="std-badge ${endingPath}">${pathKorean}</span>
      </div>
      <div class="std-content">
        <div class="std-content-main">${esc(endingTitle)}</div>
        ${reflection ? `<div class="std-content-sub">${esc(reflection)}</div>` : ''}
      </div>
      <div class="std-actions">
        <button class="std-pick${picked?' picked':''}" onclick="togglePick('${r._key}',${picked})">
          ${picked?'⭐':'☆'}
        </button>
        <button class="std-edit" onclick="editResult('${r._key}')">✏️</button>
        <button class="std-del" onclick="deleteResult('${r._key}')">✕</button>
      </div>
    </div>
  </div>`;
}

/* ===== 결과 조작 ===== */
window.togglePick = async (key, isPicked) => {
  await update(ref(db, `goryeo_results/${key}`), { pick: isPicked ? null : true });
};
window.editResult = (key) => { /* stub */ };
window.deleteResult = (key) => {
  openConfirm('결과 삭제', '이 플레이 결과를 삭제하시겠습니까?', () => {
    remove(ref(db, `goryeo_results/${key}`));
    showToast('삭제 완료');
  });
};
window.runScoring = () => { alert('채점 기능은 준비 중입니다.'); };
window.exportExcel = () => { alert('엑셀 내보내기 기능은 준비 중입니다.'); };

/* ===== 확인 모달 ===== */
function openConfirm(title, desc, onOk) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmDesc').textContent = desc;
  document.getElementById('confirmOk').onclick = () => { closeConfirm(); onOk(); };
  document.getElementById('confirmModal').classList.add('show');
}
function closeConfirm() { document.getElementById('confirmModal').classList.remove('show'); }
window.closeConfirm = closeConfirm;

/* ===== 토스트 ===== */
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

</script>
