<!DOCTYPE html>
<html lang="ko" class="hi-theme-light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>방탈출 — 역사는 즐겁다</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="../../shared/theme.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100%; }

body {
  font-family: 'Pretendard', sans-serif;
  background: #0d1117;
  color: #e6edf3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 32px 20px;
}

/* 배경 그라데이션 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(88,28,135,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(30,58,138,0.15) 0%, transparent 50%);
  pointer-events: none;
}

/* 헤더 */
.page-header {
  text-align: center;
  margin-bottom: 40px;
}
.page-header .eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #7d8590;
  margin-bottom: 10px;
}
.page-header h1 {
  font-size: 28px;
  font-weight: 900;
  color: #e6edf3;
  letter-spacing: -0.5px;
}
.page-header .sub {
  font-size: 13px;
  color: #7d8590;
  margin-top: 6px;
}

/* 카드 그리드 */
.card-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  width: 100%;
  max-width: 600px;
}

/* 방탈출 카드 */
.escape-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 20px;
  padding: 28px 24px;
  cursor: pointer;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.escape-card::before {
  content: '';
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity .2s;
  border-radius: 20px;
}
.escape-card.card-1::before {
  background: radial-gradient(ellipse at top left, rgba(234,88,12,0.12) 0%, transparent 60%);
}
.escape-card.card-2::before {
  background: radial-gradient(ellipse at top left, rgba(30,58,138,0.18) 0%, transparent 60%);
}
.escape-card:hover {
  border-color: #484f58;
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.4);
}
.escape-card:hover::before { opacity: 1; }

.card-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 999px;
  margin-bottom: 18px;
  width: fit-content;
}
.card-1 .card-badge {
  background: rgba(234,88,12,0.15);
  color: #fb923c;
  border: 1px solid rgba(234,88,12,0.3);
}
.card-2 .card-badge {
  background: rgba(30,58,138,0.2);
  color: #93c5fd;
  border: 1px solid rgba(30,58,138,0.4);
}

.card-icon {
  font-size: 36px;
  margin-bottom: 14px;
}
.card-title {
  font-size: 15px;
  font-weight: 800;
  color: #e6edf3;
  margin-bottom: 6px;
  line-height: 1.3;
  word-break: keep-all;
}
.card-desc {
  font-size: 11px;
  color: #7d8590;
  line-height: 1.6;
  flex: 1;
  word-break: keep-all;
}
.card-arrow {
  margin-top: 20px;
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 700;
  color: #484f58;
  transition: color .15s, gap .15s;
}
.escape-card:hover .card-arrow {
  gap: 8px;
  color: #8b949e;
}

/* 관리자 링크 */
.admin-link {
  margin-top: 32px;
  font-size: 11px;
  color: #484f58;
  text-decoration: none;
  transition: color .15s;
}
.admin-link:hover { color: #7d8590; }

@media (max-width: 480px) {
  .card-grid { grid-template-columns: 1fr; }
  .page-header h1 { font-size: 22px; }
}
</style>
</head>
<body>

<div class="page-header">
  <div class="eyebrow">Dive into HISTORY</div>
  <h1>🔐 역사 방탈출</h1>
  <div class="sub">도전할 시험을 선택하세요</div>
</div>

<div class="card-grid">

  <a class="escape-card card-1" href="26_1.html">
    <div class="card-badge">26 첫번째</div>
    <div class="card-icon">🏫</div>
    <div class="card-title">나 역사 속에 떨어졌는데 집에 갈 수 있겠지?</div>
    <div class="card-desc">1회시험 범위 · 선사~삼국 통일</div>
    <div class="card-arrow">시작하기 →</div>
  </a>

  <a class="escape-card card-2" href="26_2.html">
    <div class="card-badge">26 두번째</div>
    <div class="card-icon">📜</div>
    <div class="card-title">천년의 기억 — 잃어버린 기억을 찾아서</div>
    <div class="card-desc">2회시험 범위 · 남북국~조선 전기</div>
    <div class="card-arrow">시작하기 →</div>
  </a>

</div>

<a class="admin-link" href="admin.html">🔑 관리자</a>

</body>
</html>
