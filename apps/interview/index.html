<!DOCTYPE html>
<html lang="ko" class="hi-theme-light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>조선의 기틀을 만든 자들</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../shared/theme.css">
<style>
@font-face{font-family:'Paperlogy';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');font-weight:700;font-display:swap}
@font-face{font-family:'Paperlogy';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');font-weight:900;font-display:swap}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* shared 토큰 브릿지 */
  --canvas:var(--hi-bg-surface);--surface:var(--hi-bg-mid);
  --hairline:var(--hi-border);--hairline-soft:var(--hi-border-faint);
  --ink:var(--hi-text);--sub:var(--hi-text-muted);--stone:var(--hi-border-light);
  --shadow:var(--hi-shadow-card);--shadow-lg:var(--hi-shadow-dialog);
  /* interview 고유 색상 */
  --primary:#1E3A8A;--primary-deep:#172554;--primary-soft:rgba(30,58,138,0.09);--primary-m:rgba(30,58,138,0.18);
  --accent:#2DD4BF;--accent-deep:#0F766E;--accent-l:rgba(45,212,191,0.12);
  --pass:#16A34A;--pass-l:rgba(22,163,74,0.1);
  --insuf:#DC2626;--insuf-l:rgba(220,38,38,0.09);
}
html{-webkit-text-size-adjust:100%}
html,body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--surface);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
body{padding-bottom:60px}
.wrap{max-width:680px;margin:0 auto;padding:0 16px}

/* iOS zoom 방지 */
input,textarea,select{font-size:16px;font-family:inherit}

/* ── 공통 버튼 ── */
.btn{min-height:48px;padding:11px 22px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;touch-action:manipulation}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:active{background:var(--primary-deep)}
.btn-ghost{background:none;border:1.5px solid var(--hairline);color:var(--sub)}.btn-ghost:active{border-color:var(--stone)}
.btn-danger{background:var(--insuf-l);color:var(--insuf);border:1.5px solid rgba(220,38,38,.2)}
.btn-full{width:100%}
.btn-back{display:inline-flex;align-items:center;background:none;border:none;font-family:inherit;font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;padding:8px 0;margin-bottom:10px;min-height:44px;touch-action:manipulation}
.btn-back:active{color:var(--ink)}

/* ── 스크린 ── */
.screen{display:none;flex-direction:column;gap:14px;padding-top:24px;padding-bottom:20px}
.screen.active{display:flex}

/* ─────────── 표지 ─────────── */
#screen-cover{align-items:stretch;justify-content:center;min-height:calc(100vh - 40px);gap:0;padding-top:0;padding-bottom:0}
.cover-inner{background:linear-gradient(155deg,var(--primary) 0%,var(--primary-deep) 100%);border-radius:28px;padding:60px 32px;text-align:center;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center}
.cover-inner::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.cover-eyebrow{font-family:'Gowun Batang',serif;font-size:13px;color:rgba(255,255,255,.6);letter-spacing:.06em;margin-bottom:16px;position:relative}
.cover-title{font-family:'Paperlogy',sans-serif;font-weight:900;font-size:26px;color:#fff;line-height:1.35;word-break:keep-all;margin-bottom:12px;position:relative}
.cover-sub{font-size:13px;color:rgba(255,255,255,.65);line-height:1.75;word-break:keep-all;margin-bottom:32px;position:relative}
.cover-chip{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.13);border-radius:100px;padding:8px 16px;font-size:13px;font-weight:700;color:#fff;margin-bottom:28px;position:relative}
.cover-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
.cover-start-btn{background:#fff;color:var(--primary);font-family:'Paperlogy',sans-serif;font-weight:700;font-size:15px;border:none;cursor:pointer;padding:14px 48px;border-radius:14px;box-shadow:0 4px 18px rgba(0,0,0,.2);position:relative;min-height:50px;touch-action:manipulation}
.cover-start-btn:active{transform:scale(.97)}
.cover-no-login{background:rgba(255,255,255,.1);border-radius:12px;padding:14px 18px;font-size:13px;color:rgba(255,255,255,.8);line-height:1.6;position:relative}

/* ─────────── 인물 선택 (스와이프 캐러셀) ─────────── */
.select-greeting{text-align:center;font-size:14px;color:var(--sub)}
/* 인물 선택 영역(캐러셀+점+인터뷰 시작 버튼) 전체가 모바일 화면의 80%를 차지하도록 하고,
   그 중 이름/역할/점/버튼을 뺀 나머지 공간을 일러스트가 다 채운다(flex:1). */
.char-select-area{display:flex;flex-direction:column;gap:10px;height:80vh;height:80dvh}
.char-carousel{display:flex;align-items:stretch;gap:6px;flex:1;min-height:0}
.char-nav{align-self:center;flex-shrink:0;width:40px;height:40px;border-radius:50%;border:1.5px solid var(--hairline);background:var(--canvas);color:var(--ink);font-size:19px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;transition:.15s}
.char-nav:active{background:var(--surface)}
.char-nav:disabled{opacity:.3;cursor:default}
.char-slide-viewport{flex:1;min-width:0;overflow:hidden;touch-action:pan-y}
.char-slide-track{display:flex;height:100%;transition:transform .3s cubic-bezier(.22,.61,.36,1)}
/* 슬라이드에는 일러스트만 둔다(이름/역할을 슬라이드 안에 같이 두면 인물마다 텍스트
   줄바꿈 여부가 달라 일러스트 높이가 서로 달라지는 문제가 있었음).
   이름/역할은 캐러셀 바깥의 고정 영역(.char-info)에서 JS로 텍스트만 갈아끼운다. */
.char-slide{flex:0 0 100%;min-width:0;height:100%;display:flex;align-items:center;justify-content:center}
.char-illust{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.char-illust img{width:100%;height:100%;object-fit:contain}
.char-emoji-big{font-size:96px;line-height:1}
.char-info{flex-shrink:0;text-align:center}
.char-name{font-family:'Paperlogy',sans-serif;font-weight:700;font-size:19px}
.char-role{font-size:13px;color:var(--sub);font-weight:600;line-height:1.4;word-break:keep-all;margin-top:2px}
.char-dots{flex-shrink:0;display:flex;justify-content:center;gap:6px}
.char-dot{width:7px;height:7px;border-radius:50%;background:var(--hairline);cursor:pointer;transition:.15s}
.char-dot.active{background:var(--primary);width:18px;border-radius:4px}
.iv-avatar img,.comment-avatar img{width:100%;height:100%;object-fit:cover;border-radius:inherit}

/* ─────────── 인터뷰 ─────────── */
.iv-head{display:flex;align-items:center;gap:12px;background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:20px;padding:14px 16px;box-shadow:var(--shadow)}
.iv-avatar{width:50px;height:50px;border-radius:14px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden}
.iv-name{font-family:'Paperlogy',sans-serif;font-weight:700;font-size:17px}
.iv-role{font-size:12px;color:var(--sub);font-weight:600;margin-top:2px}
.iv-notice{background:var(--primary-soft);border-radius:10px;padding:11px 14px;font-size:13px;color:var(--primary);font-weight:600;line-height:1.55;word-break:keep-all}

.qa-wrap{display:flex;flex-direction:column;gap:12px}
.qa-block{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:18px;padding:16px;box-shadow:var(--shadow)}
.qa-num-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.qa-num{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;font-family:'Paperlogy',sans-serif;font-weight:900;font-size:12px;display:flex;align-items:center;justify-content:center;margin-top:2px}
.qa-q{font-size:14px;font-weight:600;line-height:1.6;word-break:keep-all}
.qa-ta{width:100%;min-height:100px;padding:12px 14px;border:1.5px solid var(--hairline);border-radius:10px;font-family:'Pretendard',-apple-system,sans-serif;font-size:16px;line-height:1.6;color:var(--ink);background:var(--surface);outline:none;resize:vertical;transition:border-color .2s;-webkit-appearance:none}
.qa-ta:focus{border-color:var(--primary)}
.qa-ta::placeholder{color:var(--stone)}

/* ─────────── AI 피드백 ─────────── */
.ai-loading{display:flex;flex-direction:column;align-items:center;gap:16px;padding:48px 20px;text-align:center}
.ai-spinner{width:44px;height:44px;border:3px solid var(--hairline);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-loading-text{font-size:14px;color:var(--sub);font-weight:600}
.ai-q-result{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:16px;padding:16px;box-shadow:var(--shadow)}
.ai-q-label{font-size:12px;font-weight:800;color:var(--sub);margin-bottom:6px}
.ai-preview{font-size:13px;color:var(--ink);line-height:1.55;background:var(--surface);padding:9px 11px;border-radius:8px;margin-bottom:10px;word-break:break-word}
.ai-fb-row{display:flex;align-items:flex-start;gap:8px}
.ai-badge{flex-shrink:0;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:800}
.ai-badge.pass{background:var(--pass-l);color:var(--pass)}
.ai-badge.insuf{background:var(--insuf-l);color:var(--insuf)}
.ai-fb-text{font-size:13px;color:var(--sub);line-height:1.6;word-break:keep-all}
.ai-overall{border-radius:16px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.ai-overall.pass{background:var(--pass-l);border:1.5px solid rgba(22,163,74,.2)}
.ai-overall.insuf{background:var(--insuf-l);border:1.5px solid rgba(220,38,38,.2)}
.ai-overall-label{font-family:'Paperlogy',sans-serif;font-weight:700;font-size:15px}
.ai-overall.pass .ai-overall-label{color:var(--pass)}
.ai-overall.insuf .ai-overall-label{color:var(--insuf)}
.ai-overall-desc{font-size:13px;color:var(--sub);margin-top:3px;word-break:keep-all}
.ai-overall-icon{font-size:30px;flex-shrink:0}
.ai-action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ─────────── 제출 후 메뉴 ─────────── */
.post-header{text-align:center;padding:16px 0 4px}
.post-title{font-family:'Paperlogy',sans-serif;font-weight:900;font-size:20px;margin-bottom:8px}
.post-badge{display:inline-block;padding:4px 14px;border-radius:100px;font-size:12px;font-weight:800;margin-bottom:12px}
.post-badge.pass{background:var(--pass-l);color:var(--pass)}
.post-badge.insuf{background:var(--insuf-l);color:var(--insuf)}
.post-sub{font-size:13px;color:var(--sub)}
.post-menu{display:flex;flex-direction:column;gap:10px}
.post-menu-btn{display:flex;align-items:center;gap:14px;background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:18px;padding:18px;cursor:pointer;font-family:inherit;text-align:left;box-shadow:var(--shadow);transition:transform .12s;touch-action:manipulation;min-height:76px}
.post-menu-btn:active{transform:scale(.98)}
.post-menu-icon{width:48px;height:48px;border-radius:14px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.post-menu-title{font-family:'Paperlogy',sans-serif;font-weight:700;font-size:15px;margin-bottom:3px}
.post-menu-desc{font-size:12px;color:var(--sub);line-height:1.5;word-break:keep-all}

/* ─────────── 심화 질문 ─────────── */
.deep-char-tabs{display:flex;gap:7px;flex-wrap:wrap}
.deep-char-tab{padding:8px 14px;border-radius:100px;border:1.5px solid var(--hairline);background:var(--canvas);font-family:inherit;font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;min-height:40px;touch-action:manipulation}
.deep-char-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.deep-section-card{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:18px;padding:18px;box-shadow:var(--shadow)}
.deep-section-label{font-family:'Paperlogy',sans-serif;font-weight:700;font-size:15px;color:var(--accent-deep);margin-bottom:6px}
.deep-hint{font-size:13px;color:var(--sub);line-height:1.55;margin-bottom:12px;word-break:keep-all}
.save-hint{font-size:12px;color:var(--sub);margin-top:7px;height:16px}
.save-hint.show{color:var(--accent-deep);font-weight:700}

/* ─────────── 친구 답변 ─────────── */
.peer-filter{display:flex;gap:7px;flex-wrap:wrap}
.peer-filter-btn{padding:7px 14px;border-radius:100px;border:1.5px solid var(--hairline);background:var(--canvas);font-family:inherit;font-size:12px;font-weight:700;color:var(--sub);cursor:pointer;min-height:38px;touch-action:manipulation}
.peer-filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.comment-list{display:flex;flex-direction:column;gap:10px}
.comment-card{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:18px;overflow:hidden;box-shadow:var(--shadow)}
.comment-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;touch-action:manipulation}
.comment-head:active{background:var(--surface)}
.comment-avatar{width:42px;height:42px;border-radius:12px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.comment-info{flex:1;min-width:0}
.comment-name{font-weight:800;font-size:14px}
.comment-meta{font-size:12px;color:var(--sub);margin-top:1px}
.comment-preview{font-size:12px;color:var(--stone);margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.comment-expand{flex-shrink:0;width:28px;height:28px;border-radius:8px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--sub)}
.comment-card.open .comment-expand{background:var(--primary-soft);color:var(--primary)}
.comment-body{display:none;border-top:1px solid var(--hairline-soft);padding:14px 16px;flex-direction:column;gap:12px}
.comment-card.open .comment-body{display:flex}
.comment-ans-q{font-size:11px;font-weight:800;color:var(--primary);margin-bottom:4px}
.comment-ans-text{font-size:13px;color:var(--ink);line-height:1.65;word-break:break-word}

/* ─────────── 친구 심화질문 ─────────── */
.peer-deep-list{display:flex;flex-direction:column;gap:10px}
.deep-card{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:18px;padding:16px;box-shadow:var(--shadow)}
.deep-card-meta{display:flex;align-items:center;gap:7px;margin-bottom:8px;font-size:12px;color:var(--sub);font-weight:600}
.deep-card-q{font-size:14.5px;font-weight:700;line-height:1.6;color:var(--ink);word-break:keep-all;margin-bottom:12px}
.deep-card-reply{display:none;flex-direction:column;gap:8px}
.deep-card.expanded .deep-card-reply{display:flex}
.deep-card-reply-ta{width:100%;min-height:80px;padding:11px 13px;border:1.5px solid var(--hairline);border-radius:10px;font-family:'Pretendard',-apple-system,sans-serif;font-size:16px;line-height:1.6;color:var(--ink);background:var(--surface);outline:none;resize:vertical;-webkit-appearance:none}
.deep-card-reply-ta:focus{border-color:var(--primary)}
.deep-reply-close{background:none;border:none;font-family:inherit;font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;align-self:flex-end;padding:4px 0;min-height:36px}

.no-data{text-align:center;padding:40px 20px;color:var(--stone);font-size:14px}

/* ── 모바일 반응형 ── */
@media(max-width:480px){
  .cover-inner{padding:52px 22px}
  .cover-title{font-size:23px}
  .cover-sub{font-size:12px}
  .char-nav{width:36px;height:36px;font-size:17px}
  .char-emoji-big{font-size:76px}
  .char-name{font-size:16px}
  .iv-head{padding:12px 14px}
  .qa-block{padding:14px}
  .post-menu-btn{padding:14px}
  .post-menu-icon{width:44px;height:44px;font-size:20px}
  .post-menu-title{font-size:14px}
  .ai-action-row{grid-template-columns:1fr 1fr}
}
@media(max-width:360px){
  .cover-title{font-size:20px}
}
</style>
</head>
<body>

<div class="wrap">

  <!-- 표지 -->
  <div class="screen active" id="screen-cover">
    <div class="cover-inner">
      <div class="cover-eyebrow">생각하고 활동하고 질문하는 역사 수업</div>
      <div class="cover-title">조선의 기틀을<br>만든 자들</div>
      <div class="cover-sub">조선을 세운 인물들과 직접 인터뷰해 보세요.<br>그들의 결정 뒤에 숨겨진 이야기를 찾아봅시다.</div>
      <div id="cover-chip" class="cover-chip" style="display:none">
        <span class="cover-dot"></span>
        <span id="cover-chip-text"></span>
      </div>
      <div id="cover-no-login" class="cover-no-login" style="display:none">
        LMS 허브에서 로그인 후 이 페이지에 접속해 주세요.
      </div>
      <button class="cover-start-btn" id="cover-start-btn" style="display:none">시작하기</button>
    </div>
  </div>

  <!-- 인물 선택 -->
  <div class="screen" id="screen-select">
    <p class="select-greeting" id="select-greeting"></p>
    <div class="char-select-area">
      <div class="char-carousel">
        <button class="char-nav" id="char-prev-btn" aria-label="이전 인물">‹</button>
        <div class="char-slide-viewport" id="char-slide-viewport">
          <div class="char-slide-track" id="char-slide-track"></div>
        </div>
        <button class="char-nav" id="char-next-btn" aria-label="다음 인물">›</button>
      </div>
      <div class="char-info">
        <div class="char-name" id="char-name-label"></div>
        <div class="char-role" id="char-role-label"></div>
      </div>
      <div class="char-dots" id="char-dots"></div>
      <button class="btn btn-primary btn-full" id="char-select-btn">이 인물로 인터뷰 시작</button>
    </div>
  </div>

  <!-- 인터뷰 -->
  <div class="screen" id="screen-interview">
    <button class="btn-back" id="iv-back-btn">인물 선택으로</button>
    <div class="iv-head">
      <div class="iv-avatar" id="iv-avatar"></div>
      <div>
        <div class="iv-name" id="iv-name"></div>
        <div class="iv-role" id="iv-role"></div>
      </div>
    </div>
    <div class="iv-notice">이 인물이라면 어떻게 대답할지 상상하며 작성해 보세요. 답변이 완성되면 AI 피드백을 받을 수 있어요.</div>
    <div class="qa-wrap" id="qa-wrap"></div>
    <button class="btn btn-primary btn-full" id="ai-check-btn">AI 피드백 받기</button>
  </div>

  <!-- AI 피드백 -->
  <div class="screen" id="screen-ai">

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getFirestore,doc,getDoc,setDoc,addDoc,collection,getDocs,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import "../../shared/offline.js";
import { firebaseConfig } from "../../shared/firebase-config.js";

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const DEFAULT_CHARS=[
  {id:'taejong',name:'태종',role:'조선 3대 국왕',emoji:'👑',questions:['전하, 신하들의 최고 기구인 의정부를 거치지 않고 6조의 판서들에게 직접 업무를 보고받으시는(6조 직계제) 진짜 이유가 무엇입니까?','왕족과 공신들이 거느리던 개인 군대(사병)를 전부 없애버리셨습니다. 굳이 군사력을 국가로 집중시키신 이유가 궁금합니다.','모든 국사를 직접 챙기시려면 엄청나게 피곤하실 것 같습니다. 혹시 신하들을 전혀 믿지 못하시는 건가요?']},
  {id:'sejong',name:'세종',role:'조선 4대 국왕',emoji:'📖',questions:["아버님(태종)께서 만들어 놓으신 강력한 6조 직계제를 폐지하고, 다시 영의정 등 3정승과 국사를 논의하는 '의정부 서사제'를 실시하신 이유가 무엇입니까?",'집현전을 설치하고 젊은 학자들과 밤낮으로 토론(경연)을 하신다고 들었습니다. 굳이 신하들과 피곤하게 토론하시는 이유가 있나요?','만약 신하들이 전하의 의견에 끝까지 반대한다면, 그때는 어떻게 결정하실 생각이십니까?']},
  {id:'samsa',name:'3사 관원',role:'사헌부·사간원·홍문관',emoji:'🖋️',questions:["대감께서 속한 '3사'는 조선 최고의 엘리트 직장이라고 들었습니다. 구체적으로 어떤 일을 하시길래 다들 그렇게 우러러보는 것입니까?",'전하의 정책을 대놓고 비판하거나 높은 대신들의 비리를 고발하시는데, 혹시 나중에 보복을 당하거나 왕에게 미움을 받을까 두렵지 않으십니까?',"새로운 관리를 임명할 때 대감들의 동의(서경)를 꼭 받아야 한다고 들었습니다. 동의를 해주고 말고를 결정하는 대감만의 '합격 기준'은 무엇입니까?"]},
  {id:'yuhyangso',name:'유향소 양반',role:'지방 자치 기구',emoji:'🏘️',questions:["나으리, 왕께서 직접 고을에 사또(수령)를 파견하셨는데, 굳이 지역 양반들이 모여 '유향소'라는 기구를 따로 만드신 이유가 무엇입니까?",'사또가 새로 부임하면 지역 사정을 잘 모를 텐데, 유향소에서는 사또를 그저 무조건 도와주기만 하는 건가요? 아니면 다른 역할도 있습니까?',"고을의 실무를 담당하는 '향리(아전)'들을 유향소에서 굉장히 엄격하게 감시한다고 들었습니다. 향리들을 그렇게 견제해야만 하는 특별한 이유가 있습니까?"]}
];

let CHARS=DEFAULT_CHARS;
let student=null;
let selIdx=null;
let answers=['','',''];
let aiResult=null;
let submissionStatus=null;
let deepCharIdx=null;
let deepDrafts={};
let peerFilter='전체';
let pdFilter='전체';
const CLAUDE_PROXY_URL='https://asia-northeast3-ho0911seong-56638.cloudfunctions.net/claudeProxy';

function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
// 인물 카드/아바타 안에 넣을 내용: 일러스트(imageUrl)가 있으면 이미지, 없으면 이모지로 대체
function avatarInner(c){return c&&c.imageUrl?`<img src="${esc(c.imageUrl)}" alt="">`:esc(c&&c.emoji||'👤');}
function showHint(el,t){el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1400);}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

/* ── LMS 연동 ── */
function getStudentFromLMS(){
  const sid=localStorage.getItem('lms_autosave_sid');
  const sname=localStorage.getItem('lms_autosave_sname');
  if(!sid||!sname||sid.length<3)return null;
  return{studentId:sid,name:sname,classNum:sid.charAt(2)};
}

/* ── AI 피드백 ── */
function fbFromFlags(ht,hr){
  if(ht&&hr)return{ok:true,fb:'충분한 내용의 답변이에요. 인물의 입장을 잘 표현했습니다!'};
  if(ht&&!hr)return{ok:false,fb:'본인의 생각은 잘 담겼어요! 그런데 왜 그렇게 생각하는지 이유도 같이 써줘야 해요.'};
  if(!ht&&hr)return{ok:false,fb:'이유는 잘 썼어요! 그런데 이 인물이 어떤 생각을 가졌는지 본인의 해석도 같이 써줘야 해요.'};
  return{ok:false,fb:'인물의 입장에서 어떤 생각이었는지, 그리고 왜 그런 결정을 했는지 이유까지 함께 써봐요.'};
}
async function runAI(){
  const c=CHARS[selIdx];
  const SHORT_FB='조금 더 자세히 써봐요. 생각과 이유를 담아 30자 이상 작성해야 통과할 수 있어요.';
  const lengthOk=answers.map(a=>a.replace(/\s/g,'').length>=30);

  try{
    const prompt=`다음은 중학교 역사 수업에서 학생이 '${c.name}'의 입장이 되어 작성한 답변입니다.\n\n`
      +c.questions.map((q,i)=>`[Q${i+1}] ${q}\n[A${i+1}] ${answers[i]||'(미작성)'}`).join('\n\n')
      +`\n\n각 답변에 대해 두 가지만 판단하세요:\n1. 이 인물이 어떤 생각을 했는지 학생의 해석이 있는가\n2. 왜 그런 생각을 했는지 이유/근거가 있는가\n\n반드시 JSON 배열만 답하세요 (다른 텍스트 금지):\n[{"hasThought":true/false,"hasReason":true/false},{"hasThought":true/false,"hasReason":true/false},{"hasThought":true/false,"hasReason":true/false}]`;
    const resp=await fetch(CLAUDE_PROXY_URL,{
      method:'POST',
      headers:{'content-type':'application/json'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:150,messages:[{role:'user',content:prompt}]})
    });
    const data=await resp.json();
    const text=data.content?.[0]?.text||'[]';
    const parsed=JSON.parse(text.match(/\[[\s\S]*\]/)?.[0]||'[]');
    const items=answers.map((_,i)=>{
      if(!lengthOk[i])return{ok:false,fb:SHORT_FB};
      const r=parsed[i]||{};
      return fbFromFlags(!!r.hasThought,!!r.hasReason);
    });
    return{items,overallOk:items.every(i=>i.ok)};
  }catch(e){
    const items=answers.map((_,i)=>lengthOk[i]?{ok:true,fb:'충분한 내용의 답변이에요. 인물의 입장을 잘 표현했습니다!'}:{ok:false,fb:SHORT_FB});
    return{items,overallOk:items.every(i=>i.ok)};
  }
}

/* ── 표지 ── */
async function initCover(){
  try{const snap=await getDoc(doc(db,'settings','interview_content'));if(snap.exists()&&Array.isArray(snap.data().characters)&&snap.data().characters.length)CHARS=snap.data().characters;}catch(e){}
  student=getStudentFromLMS();
  if(student){
    document.getElementById('cover-chip-text').textContent=`${student.studentId} · ${student.name}`;
    document.getElementById('cover-chip').style.display='inline-flex';
    document.getElementById('cover-start-btn').style.display='block';
  }else{
    document.getElementById('cover-no-login').style.display='block';
  }
}

document.getElementById('cover-start-btn').addEventListener('click',()=>{
  document.getElementById('select-greeting').textContent=`${student.name} 학생, 인터뷰할 인물을 선택하세요!`;
  renderCharGrid();showScreen('screen-select');
});

/* ── 인물 선택 (스와이프 캐러셀) ── */
let charIdx=0;

function renderCharGrid(){
  charIdx=0;
  document.getElementById('char-slide-track').innerHTML=CHARS.map(c=>`
    <div class="char-slide">
      <div class="char-illust">${c.imageUrl?`<img src="${esc(c.imageUrl)}" alt="">`:`<span class="char-emoji-big">${esc(c.emoji||'🏛️')}</span>`}</div>
    </div>`).join('');
  document.getElementById('char-dots').innerHTML=CHARS.map((_,i)=>`<span class="char-dot" data-i="${i}"></span>`).join('');
  updateCharCarousel();
}

function updateCharCarousel(){
  document.getElementById('char-slide-track').style.transform=`translateX(-${charIdx*100}%)`;
  document.querySelectorAll('.char-dot').forEach((d,i)=>d.classList.toggle('active',i===charIdx));
  document.getElementById('char-prev-btn').disabled=charIdx===0;
  document.getElementById('char-next-btn').disabled=charIdx===CHARS.length-1;
  const c=CHARS[charIdx];
  document.getElementById('char-name-label').textContent=c.name;
  document.getElementById('char-role-label').textContent=c.role;
}

function goToChar(i){
  if(i<0||i>=CHARS.length)return;
  charIdx=i;
  updateCharCarousel();
}

document.getElementById('char-prev-btn').addEventListener('click',()=>goToChar(charIdx-1));
document.getElementById('char-next-btn').addEventListener('click',()=>goToChar(charIdx+1));
document.getElementById('char-select-btn').addEventListener('click',()=>openInterview(charIdx));
document.getElementById('char-dots').addEventListener('click',e=>{
  const dot=e.target.closest('.char-dot');
  if(dot)goToChar(+dot.dataset.i);
});

// PC: 인물 선택 화면이 열려 있을 때만 좌우 화살표 키로 이동
document.addEventListener('keydown',e=>{
  if(!document.getElementById('screen-select').classList.contains('active'))return;
  if(e.key==='ArrowLeft')goToChar(charIdx-1);
  else if(e.key==='ArrowRight')goToChar(charIdx+1);
});

// 모바일: 좌우로 스와이프해서 인물 넘기기
(function(){
  const viewport=document.getElementById('char-slide-viewport');
  let startX=0,startY=0,dragging=false;
  viewport.addEventListener('touchstart',e=>{
    startX=e.touches[0].clientX;startY=e.touches[0].clientY;dragging=true;
  },{passive:true});
  viewport.addEventListener('touchend',e=>{
    if(!dragging)return;
    dragging=false;
    const dx=e.changedTouches[0].clientX-startX;
    const dy=e.changedTouches[0].clientY-startY;
    if(Math.abs(dx)>40&&Math.abs(dx)>Math.abs(dy)){
      if(dx<0)goToChar(charIdx+1);else goToChar(charIdx-1);
    }
  },{passive:true});
})();

/* ── 인터뷰 ── */
function openInterview(idx){
  selIdx=idx;answers=['','',''];
  const c=CHARS[idx];
  document.getElementById('iv-avatar').innerHTML=avatarInner(c);
  document.getElementById('iv-name').textContent=c.name;
  document.getElementById('iv-role').textContent=c.role;
  document.getElementById('qa-wrap').innerHTML=c.questions.map((q,i)=>`
    <div class="qa-block">
      <div class="qa-num-row"><span class="qa-num">${i+1}</span><span class="qa-q">${esc(q)}</span></div>
      <textarea class="qa-ta" data-i="${i}" placeholder="${esc(c.name)}의 입장에서 답변을 작성해보세요."></textarea>
    </div>`).join('');
  document.querySelectorAll('.qa-ta').forEach(ta=>ta.addEventListener('input',()=>{answers[+ta.dataset.i]=ta.value;}));
  showScreen('screen-interview');
}
document.getElementById('iv-back-btn').addEventListener('click',()=>showScreen('screen-select'));

/* ── AI 피드백 ── */
document.getElementById('ai-check-btn').addEventListener('click',async()=>{
  if(answers.every(a=>!a.trim())){alert('답변을 하나 이상 작성해주세요.');return;}
  showScreen('screen-ai');
  document.getElementById('ai-loading').style.display='flex';
  document.getElementById('ai-result').style.display='none';
  aiResult=await runAI();
  document.getElementById('ai-loading').style.display='none';
  const c=CHARS[selIdx];
  const el=document.getElementById('ai-result');
  el.innerHTML=c.questions.map((q,i)=>`
    <div class="ai-q-result">
      <div class="ai-q-label">Q${i+1}. ${esc(q)}</div>
      <div class="ai-preview">${answers[i]?esc(answers[i]):'<em style="color:var(--stone)">미작성</em>'}</div>
      <div class="ai-fb-row">
        <span class="ai-badge ${aiResult.items[i].ok?'pass':'insuf'}">${aiResult.items[i].ok?'통과':'미흡'}</span>
        <span class="ai-fb-text">${aiResult.items[i].fb}</span>
      </div>
    </div>`).join('')
  +`<div class="ai-overall ${aiResult.overallOk?'pass':'insuf'}">
      <div>
        <div class="ai-overall-label">${aiResult.overallOk?'전체 통과':'보완이 필요해요'}</div>
        <div class="ai-overall-desc">${aiResult.overallOk?'모든 답변이 충분해요. 제출해 보세요!':'일부 답변을 더 보완하면 더 좋은 인터뷰가 될 거예요.'}</div>
      </div>
      <div class="ai-overall-icon">${aiResult.overallOk?'✅':'📝'}</div>
    </div>
    <div class="ai-action-row">
      <button class="btn btn-ghost" id="rewrite-btn">답변 수정하기</button>
      <button class="btn ${aiResult.overallOk?'btn-primary':'btn-danger'}" id="submit-btn">${aiResult.overallOk?'제출하기':'그래도 제출하기'}</button>
    </div>`;
  el.style.display='flex';
  document.getElementById('rewrite-btn').addEventListener('click',()=>{
    showScreen('screen-interview');
    document.querySelectorAll('.qa-ta').forEach(ta=>{ta.value=answers[+ta.dataset.i]||'';});
  });
  document.getElementById('submit-btn').addEventListener('click',doSubmit);
});
document.getElementById('ai-back-btn').addEventListener('click',()=>{
  showScreen('screen-interview');
  document.querySelectorAll('.qa-ta').forEach(ta=>{ta.value=answers[+ta.dataset.i]||'';});
});

/* ── 제출 ── */
async function doSubmit(){
  submissionStatus=aiResult?.overallOk?'pass':'fail';
  const c=CHARS[selIdx];
  const ansMap={};answers.forEach((a,i)=>ansMap[i]=a);
  try{
    await setDoc(doc(db,'interview_joseon_answers',student.studentId),{
      studentId:student.studentId,name:student.name,classNum:student.classNum,
      charId:c.id,charName:c.name,answers:ansMap,
      submittedAt:serverTimestamp(),status:submissionStatus
    },{merge:true});
  }catch(e){}
  const badge=document.getElementById('post-badge');
  badge.textContent=submissionStatus==='pass'?'통과':'미흡';
  badge.className='post-badge '+(submissionStatus==='pass'?'pass':'insuf');
  showScreen('screen-post');
}

/* ── 메뉴 ── */
document.getElementById('menu-deep').addEventListener('click',()=>{deepCharIdx=selIdx;renderDeepScreen();showScreen('screen-deep');});
document.getElementById('menu-peer-ans').addEventListener('click',async()=>{await loadPeerAnswers();showScreen('screen-peer-ans');});
document.getElementById('menu-peer-deep').addEventListener('click',async()=>{await loadPeerDeep();showScreen('screen-peer-deep');});
document.getElementById('deep-back-btn').addEventListener('click',()=>showScreen('screen-post'));
document.getElementById('pa-back-btn').addEventListener('click',()=>showScreen('screen-post'));
document.getElementById('pd-back-btn').addEventListener('click',()=>showScreen('screen-post'));

/* ── 심화 질문 ── */
function renderDeepScreen(){
  const c=CHARS[deepCharIdx];
  document.getElementById('deep-iv-avatar').innerHTML=avatarInner(c);
  document.getElementById('deep-iv-name').textContent=c.name;
  document.getElementById('deep-iv-role').textContent=c.role;
  document.getElementById('deep-char-tabs').innerHTML=CHARS.map((ch,i)=>`
    <button class="deep-char-tab${i===deepCharIdx?' active':''}" data-i="${i}">${ch.emoji} ${esc(ch.name)}</button>`).join('');
  document.querySelectorAll('.deep-char-tab').forEach(btn=>btn.addEventListener('click',()=>{deepCharIdx=+btn.dataset.i;renderDeepScreen();}));
  const ta=document.getElementById('deep-ta');
  ta.value=deepDrafts[c.id]||'';
  ta.oninput=()=>{deepDrafts[c.id]=ta.value;};
  document.getElementById('deep-save-hint').textContent='';
}
document.getElementById('deep-submit-btn').addEventListener('click',async()=>{
  const c=CHARS[deepCharIdx];
  const q=(deepDrafts[c.id]||'').trim();
  if(!q){alert('질문을 작성해 주세요.');return;}
  try{
    await addDoc(collection(db,'interview_joseon_deep'),{studentId:student.studentId,name:student.name,classNum:student.classNum,charId:c.id,charName:c.name,emoji:c.emoji,question:q,createdAt:serverTimestamp()});
    deepDrafts[c.id]='';
    document.getElementById('deep-ta').value='';
    showHint(document.getElementById('deep-save-hint'),'제출 완료!');
  }catch(e){alert('오류: '+e.message);}
});

/* ── 친구 답변 ── */
let peerAnswers=[];
async function loadPeerAnswers(){
  try{const snap=await getDocs(collection(db,'interview_joseon_answers'));peerAnswers=[];snap.forEach(d=>{const data=d.data();if(data.studentId!==student.studentId&&data.charId)peerAnswers.push(data);});}catch(e){}
  peerFilter='전체';renderPeerAnswers();
}
function renderPeerAnswers(){
  const chars=['전체',...new Set(peerAnswers.map(p=>p.charId))];
  const filterEl=document.getElementById('pa-filter');
  filterEl.innerHTML=chars.map(cid=>{const ch=CHARS.find(c=>c.id===cid);return`<button class="peer-filter-btn${cid===peerFilter?' active':''}" data-c="${cid}">${cid==='전체'?'전체':(ch?`${ch.emoji} ${ch.name}`:cid)}</button>`;}).join('');
  filterEl.querySelectorAll('.peer-filter-btn').forEach(btn=>btn.addEventListener('click',()=>{peerFilter=btn.dataset.c;renderPeerAnswers();}));
  const filtered=peerFilter==='전체'?peerAnswers:peerAnswers.filter(p=>p.charId===peerFilter);
  const listEl=document.getElementById('pa-list');
  if(!filtered.length){listEl.innerHTML='<div class="no-data">아직 친구들의 답변이 없어요.</div>';return;}
  listEl.innerHTML=filtered.map((p,i)=>{
    const pch=CHARS.find(c=>c.id===p.charId);
    const ans=p.answers||{};
    const qs=pch?.questions||[];
    const preview=Object.values(ans).find(a=>a&&a.trim())||'';
    return`<div class="comment-card" data-i="${i}">
      <div class="comment-head">
        <div class="comment-avatar">${avatarInner(pch)}</div>
        <div class="comment-info">
          <div class="comment-name">${esc(p.name)}</div>
          <div class="comment-meta">${esc(pch?.name||p.charId)}</div>
          <div class="comment-preview">${esc(preview.substring(0,40))}${preview.length>40?'...':''}</div>
        </div>
        <div class="comment-expand">+</div>
      </div>
      <div class="comment-body">
        ${qs.map((q,qi)=>`
          <div>
            <div class="comment-ans-q">Q${qi+1}. ${esc(q)}</div>
            <div class="comment-ans-text">${esc(ans[qi]||'(미작성)')}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
  listEl.querySelectorAll('.comment-head').forEach(head=>{
    head.addEventListener('click',()=>{
      const card=head.closest('.comment-card');
      const isOpen=card.classList.contains('open');
      listEl.querySelectorAll('.comment-card.open').forEach(c=>{c.classList.remove('open');c.querySelector('.comment-expand').textContent='+';});
      if(!isOpen){card.classList.add('open');head.querySelector('.comment-expand').textContent='-';}
    });
  });
}

/* ── 친구 심화질문 ── */
let peerDeepList=[];
async function loadPeerDeep(){
  try{const snap=await getDocs(collection(db,'interview_joseon_deep'));peerDeepList=[];snap.forEach(d=>{const data=d.data();if(data.studentId!==student.studentId)peerDeepList.push({id:d.id,...data});});}catch(e){}
  pdFilter='전체';renderPeerDeep();
}
function renderPeerDeep(){
  const chars=['전체',...new Set(peerDeepList.map(p=>p.charId))];
  const filterEl=document.getElementById('pd-filter');
  filterEl.innerHTML=chars.map(cid=>{const ch=CHARS.find(c=>c.id===cid);return`<button class="peer-filter-btn${cid===pdFilter?' active':''}" data-c="${cid}">${cid==='전체'?'전체':(ch?`${ch.emoji} ${ch.name}`:cid)}</button>`;}).join('');
  filterEl.querySelectorAll('.peer-filter-btn').forEach(btn=>btn.addEventListener('click',()=>{pdFilter=btn.dataset.c;renderPeerDeep();}));
  const filtered=pdFilter==='전체'?peerDeepList:peerDeepList.filter(p=>p.charId===pdFilter);
  const listEl=document.getElementById('pd-list');
  if(!filtered.length){listEl.innerHTML='<div class="no-data">아직 친구들의 심화 질문이 없어요.</div>';return;}
  listEl.innerHTML=filtered.map((p,i)=>`
    <div class="deep-card" data-i="${i}">
      <div class="deep-card-meta"><span>${esc(p.emoji||'🏛️')}</span>${esc(p.charName)} · ${esc(p.name)}</div>
      <div class="deep-card-q">${esc(p.question)}</div>
      <button class="btn btn-ghost" style="font-size:13px;min-height:42px;padding:8px 18px" onclick="toggleReply(this)">나도 답해보기</button>
      <div class="deep-card-reply">
        <textarea class="deep-card-reply-ta" placeholder="이 질문에 대한 내 생각을 자유롭게 써보세요..."></textarea>
        <button class="deep-reply-close" onclick="toggleReply(this.closest('.deep-card').querySelector('.btn-ghost'))">닫기</button>
      </div>
    </div>`).join('');
}
window.toggleReply=function(btn){
  const card=btn.closest('.deep-card');
  card.classList.toggle('expanded');
};

initCover();
</script>
