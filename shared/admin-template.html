<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APP_NAME - 관리자 모드</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/theme.css">
  <link rel="stylesheet" href="../../shared/admin-base.css">
  <style>
    /* ── 앱 고유 스타일 ── */
  </style>
<script>if(window.self!==window.top){document.documentElement.classList.add('in-iframe');document.documentElement.classList.add('has-own-back');}</script>
</head>
<body class="hi-preset-admin">

<!-- ── 로그인 화면 ── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">APP_NAME</div>
    <div class="login-sub">관리자 모드</div>
    <input class="hi-input" type="email" id="adminEmail"
      placeholder="이메일" autocomplete="username" style="margin-bottom:10px;"
      onkeydown="if(event.key==='Enter') document.getElementById('adminPw').focus()">
    <input class="hi-input" type="password" id="adminPw"
      placeholder="비밀번호" autocomplete="current-password" style="text-align:center;letter-spacing:3px;"
      onkeydown="if(event.key==='Enter') tryLogin()">
    <div class="login-err" id="loginErr">이메일 또는 비밀번호가 올바르지 않습니다.</div>
    <button class="login-btn" id="loginBtn" onclick="tryLogin()">접속하기</button>
    <div class="login-foot"><a href="index.html">학생 페이지로</a></div>
  </div>
</div>

<!-- ── 어드민 앱 ── -->
<div id="adminApp">
  <header class="adm-header">
    <div class="adm-logo">APP_NAME<span class="adm-badge">관리자 모드</span></div>
    <div class="adm-tabs">
      <!-- FEED 탭이 있는 앱: -->
      <button class="adm-tab active" onclick="showPanel('feed')">FEED</button>
      <button class="adm-tab" onclick="showPanel('class')">ANSWER</button>
    </div>
    <button class="adm-logout" onclick="logoutAdmin()">로그아웃</button>
    <button class="adm-back" onclick="window.parent.closeAppAdmin&&window.parent.closeAppAdmin()">목록으로</button>
  </header>

  <div class="adm-body">

  <!-- ══════════ FEED 패널 ══════════ -->
  <div id="panel-feed" class="tab-panel active">
    <!-- 서브탭: .class-filter + .cf-btn 스타일 사용 (앱별 필터 항목 교체) -->
    <div class="class-filter" id="feedSubTabs">
      <button class="cf-btn active" onclick="setFeedFilter('all', this)">전체</button>
      <!-- TODO: 앱별 서브탭 항목 추가 -->
    </div>
    <div class="admin-container">
      <div class="sort-bar">
        <div class="sort-box">
          <button class="sort-btn active" id="feedSortNewest" onclick="setFeedSort('newest')">최신순</button>
          <button class="sort-btn" id="feedSortPopular" onclick="setFeedSort('popular')">인기순</button>
        </div>
        <button class="filter-toggle" id="feedPickBtn" onclick="toggleFeedPick()">PICK</button>
      </div>
      <div id="feedList">
        <div class="loading-state"><div class="spinner"></div><span>게시글 불러오는 중…</span></div>
      </div>
    </div>
  </div>

  <!-- ══════════ ANSWER 패널 ══════════ -->
  <div id="panel-class" class="tab-panel">
    <!-- 1. 반 필터 -->
    <div class="class-filter" id="classSubTabs">
      <button class="cf-btn active" onclick="setClassTab('all', this)">전체</button>
      <button class="cf-btn" onclick="setClassTab(1, this)">1반</button>
      <button class="cf-btn" onclick="setClassTab(2, this)">2반</button>
      <button class="cf-btn" onclick="setClassTab(3, this)">3반</button>
      <button class="cf-btn" onclick="setClassTab(4, this)">4반</button>
      <button class="cf-btn" onclick="setClassTab(5, this)">5반</button>
      <button class="cf-btn" onclick="setClassTab(6, this)">6반</button>
    </div>

    <div class="admin-container">
      <!-- 2. 통계 행 (4개 칩 고정) -->
      <div class="stats-row">
        <div class="stat-chip">
          <div class="stat-chip-label">전체 인원</div>
          <div class="stat-chip-val" id="stTotal">-</div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-label">제출 / 미제출</div>
          <div class="stat-dual">
            <div class="stat-dual-val" id="stSubmit" style="color:var(--hi-accent)">-</div>
            <div class="stat-dual-val" id="stMissing" style="color:var(--hi-text-muted)">-</div>
          </div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-label">통과 / 미흡</div>
          <div class="stat-dual">
            <div class="stat-dual-val" id="stPass" style="color:var(--hi-positive)">-</div>
            <div class="stat-dual-val" id="stFail" style="color:var(--hi-negative)">-</div>
          </div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-label">PICK</div>
          <div class="stat-chip-val" id="stPick">-</div>
        </div>
      </div>

      <!-- 3. 액션 줄 -->
      <div class="adm-action-row">
        <button class="hi-btn hi-btn-primary hi-btn-sm" onclick="runScoring()">채점하기</button>
        <button class="hi-btn hi-btn-outline hi-btn-sm" id="aiPickBtn" onclick="runAiPick()">✨ AI 픽</button>
        <button class="hi-btn hi-btn-outline hi-btn-sm" onclick="exportExcel()">엑셀 내보내기</button>
        <button class="scoring-prompt-btn" onclick="openSettingsModal()" title="AI 설정">⚙️</button>
        <div class="sort-box">
          <button class="sort-btn active" id="classSortNewest" onclick="setClassSort('newest')">최신순</button>
          <button class="sort-btn" id="classSortId" onclick="setClassSort('id')">학번순</button>
          <button class="sort-btn" id="classSortPick" onclick="setClassSort('pick')">픽 모아보기</button>
        </div>
      </div>

      <!-- 4. 학생 카드 목록 -->
      <div id="classList">
        <div class="loading-state"><div class="spinner"></div><span>불러오는 중…</span></div>
      </div>
    </div>
  </div>

  </div><!-- /.adm-body -->
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, push, onValue, remove, update, get }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
  authDomain: "ho0911seong-56638.firebaseapp.com",
  databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ho0911seong-56638",
  storageBucket: "ho0911seong-56638.firebasestorage.app",
  messagingSenderId: "994509567071",
  appId: "1:994509567071:web:REPLACE_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// ── 로그인 (Firebase Authentication) ──
// 모든 어드민이 같은 Firebase 프로젝트 계정을 공유한다. lms/admin 등 같은
// origin의 다른 어드민에 이미 로그인돼 있으면 이 페이지도 자동으로 통과된다.
function enterAdmin() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminApp').classList.add('show');
  startListening();
}

window.tryLogin = async () => {
  const email = document.getElementById('adminEmail').value.trim();
  const pw = document.getElementById('adminPw').value;
  const err = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');
  err.classList.remove('show');
  if (!email || !pw) { err.textContent = '이메일과 비밀번호를 입력해주세요.'; err.classList.add('show'); return; }
  btn.disabled = true; btn.textContent = '접속 중...';
  try {
    await signInWithEmailAndPassword(auth, email, pw);
  } catch (e) {
    err.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
    err.classList.add('show');
  } finally {
    btn.disabled = false; btn.textContent = '접속하기';
  }
};

window.logoutAdmin = () => {
  if (!confirm('로그아웃 하시겠습니까?')) return;
  signOut(auth);
};

// ── 임베드 감지: lms/admin.html에서 열릴 때 상단 중복 바를 숨김 ──
const isEmbedded = window.self !== window.top;
onAuthStateChanged(auth, user => {
  if (user) {
    if (isEmbedded) document.documentElement.classList.add('has-own-back');
    enterAdmin();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminApp').classList.remove('show');
  }
});

// ── 상태 변수 ──
let allPosts = [], studentMap = {}, studentList = [], allGrades = {};
let feedFilter = 'all', feedSort = 'newest', feedPickOnly = false;
let classTab = 'all', classSort = 'newest';

// ── 탭 전환 ──
window.showPanel = (name) => {
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  document.getElementById(`panel-${name}`)?.classList.add('active');
  document.querySelectorAll('.adm-tab').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
};

// ── FEED ──
window.setFeedFilter = (filter, btn) => {
  feedFilter = filter;
  document.querySelectorAll('#feedSubTabs .cf-btn').forEach(el => el.classList.remove('active'));
  btn.classList.add('active');
  renderFeed();
};
window.setFeedSort = (sort) => {
  feedSort = sort;
  document.getElementById('feedSortNewest').classList.toggle('active', sort === 'newest');
  document.getElementById('feedSortPopular').classList.toggle('active', sort === 'popular');
  renderFeed();
};
window.toggleFeedPick = () => {
  feedPickOnly = !feedPickOnly;
  document.getElementById('feedPickBtn').classList.toggle('active', feedPickOnly);
  renderFeed();
};

function renderFeed() {
  // TODO: 앱별 렌더링 구현
}

// ── ANSWER ──
window.setClassTab = (num, btn) => {
  classTab = num;
  document.querySelectorAll('#classSubTabs .cf-btn').forEach(el => el.classList.remove('active'));
  btn.classList.add('active');
  renderClass();
};
window.setClassSort = (sort) => {
  classSort = sort;
  document.getElementById('classSortNewest').classList.toggle('active', sort === 'newest');
  document.getElementById('classSortId').classList.toggle('active', sort === 'id');
  document.getElementById('classSortPick').classList.toggle('active', sort === 'pick');
  renderClass();
};

function classNumFromId(sid) {
  if (!sid || String(sid).length < 3) return null;
  const c = parseInt(String(sid).slice(1, 3), 10);
  return isNaN(c) ? null : c;
}

function renderClass() {
  const classStudents = classTab === 'all'
    ? studentList
    : studentList.filter(s => classNumFromId(s.studentId) === classTab);
  const classPosts = classTab === 'all'
    ? allPosts.filter(p => p.studentId !== '00000')
    : allPosts.filter(p => p.studentId !== '00000' && classNumFromId(p.studentId) === classTab);
  const submittedIds = new Set(classPosts.map(p => p.studentId));
  const pickCount = classPosts.filter(p => p.adminPick).length;
  const total = classStudents.length;
  const submit = submittedIds.size;
  const missing = total ? total - submit : 0;
  // TODO: passCount / failCount 로직 추가
  document.getElementById('stTotal').textContent = total || '-';
  document.getElementById('stSubmit').textContent = submit;
  document.getElementById('stMissing').textContent = total ? missing : '-';
  document.getElementById('stPass').textContent = '-';
  document.getElementById('stFail').textContent = '-';
  document.getElementById('stPick').textContent = pickCount;

  const base = classSort === 'pick' ? classPosts.filter(p => p.adminPick) : classPosts;
  const sorted = classSort === 'id'
    ? [...base].sort((a,b) => String(a.studentId).localeCompare(String(b.studentId)))
    : [...base].sort((a,b) => (b.timestamp||0)-(a.timestamp||0));

  const container = document.getElementById('classList');
  if (!sorted.length) { container.innerHTML = `<div class="empty-state">${classSort==='pick' ? '픽한 게시글이 없습니다.' : '게시글이 없습니다.'}</div>`; return; }
  container.innerHTML = `<div class="std-list">${sorted.map(p => buildStudentCard(p)).join('')}</div>`;
}

// ── 표준 학생 카드 빌더 ──
// TODO: badge, content 필드는 앱별로 커스터마이즈
function buildStudentCard(item) {
  const sid = item.studentId || '';
  const name = studentMap[sid] || item.realName || '';
  const picked = !!item.adminPick;
  // TODO: badgeClass = 앱별 경로 클래스 ('open'/'retreat'/'martyr' 또는 '')
  const badgeClass = '';
  // TODO: badgeLabel = 앱별 배지 텍스트
  const badgeLabel = '';
  // TODO: contentMain = 메인 콘텐츠 텍스트
  const contentMain = item.content || '';
  // TODO: contentSub = 서브 텍스트 (닉네임, 시간 등)
  const contentSub = `${item.nickname||''} · ${item.time||''}`;

  return `<div class="std-card">
    <div class="std-card-row">
      <div>
        <div class="std-sid">${esc(sid)}</div>
        <div class="std-name">${esc(name)}</div>
      </div>
      <div class="std-badge-col">
        ${badgeLabel ? `<span class="std-badge ${badgeClass}">${badgeLabel}</span>` : ''}
      </div>
      <div class="std-content">
        <div class="std-content-main">${esc(contentMain)}</div>
        <div class="std-content-sub">${esc(contentSub)}</div>
      </div>
      <div class="std-actions">
        <button class="std-pick${picked?' picked':''}" onclick="togglePick('${item.id}',${picked})">
          ${picked?'⭐':'☆'}
        </button>
        <button class="std-edit" onclick="">✏️</button>
        <button class="std-del" onclick="deleteItem('${item.id}')">✕</button>
      </div>
    </div>
  </div>`;
}

// ── AI 설정 모달 (채점 프롬프트 + AI 픽 기준) ──
// TODO: APP_KEY를 실제 앱 슬러그로 교체
const SCORING_PROMPT_PATH = 'adminConfig/APP_KEY/scoringPrompt';
const AI_PICK_CRITERIA_PATH = 'adminConfig/APP_KEY/aiPickCriteria';
// TODO: 앱 활동 성격에 맞는 기본 AI 픽 기준으로 교체 (⚙️ 모달에 아무것도 저장 안 됐을 때 쓰이는 기본값)
const DEFAULT_PICK_CRITERIA = `- 역사적 사실이나 맥락이 잘 반영된 글
- 다른 학생들과 공유할 만한 통찰이 있는 글
- 전체의 20~30% 내외 선정`;

window.openSettingsModal = async () => {
  const backdrop = document.getElementById('settings-modal-backdrop');
  const scoringTa = document.getElementById('scoring-prompt-textarea');
  const pickTa = document.getElementById('ai-pick-criteria-textarea');
  const msg = document.getElementById('settings-modal-msg');
  msg.textContent = '불러오는 중…'; msg.style.color = 'var(--hi-text-muted)';
  backdrop.classList.add('open');
  try {
    const [scoringSnap, pickSnap] = await Promise.all([
      get(ref(db, SCORING_PROMPT_PATH)),
      get(ref(db, AI_PICK_CRITERIA_PATH))
    ]);
    scoringTa.value = scoringSnap.exists() ? scoringSnap.val() : '';
    pickTa.value = pickSnap.exists() ? pickSnap.val() : DEFAULT_PICK_CRITERIA;
    msg.textContent = '';
  } catch(e) { msg.textContent = '불러오기 실패'; msg.style.color = 'var(--hi-negative)'; }
};
window.closeSettingsModal = () => {
  document.getElementById('settings-modal-backdrop').classList.remove('open');
  document.getElementById('settings-modal-msg').textContent = '';
};
window.switchSettingsTab = (tab, btn) => {
  document.querySelectorAll('#settings-modal-backdrop .modal-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('settings-panel-scoring').style.display = tab === 'scoring' ? '' : 'none';
  document.getElementById('settings-panel-pick').style.display = tab === 'pick' ? '' : 'none';
};
window.saveSettings = async () => {
  const scoringPrompt = (document.getElementById('scoring-prompt-textarea').value || '').trim();
  const pickCriteria = (document.getElementById('ai-pick-criteria-textarea').value || '').trim();
  const msg = document.getElementById('settings-modal-msg');
  if (!scoringPrompt) { msg.style.color = 'var(--hi-negative)'; msg.textContent = '채점 프롬프트를 입력해주세요.'; return; }
  if (!pickCriteria) { msg.style.color = 'var(--hi-negative)'; msg.textContent = 'AI 픽 기준을 입력해주세요.'; return; }
  try {
    await Promise.all([
      set(ref(db, SCORING_PROMPT_PATH), scoringPrompt),
      set(ref(db, AI_PICK_CRITERIA_PATH), pickCriteria)
    ]);
    msg.style.color = 'var(--hi-positive)'; msg.textContent = '저장되었습니다.';
    setTimeout(closeSettingsModal, 900);
  } catch(e) { msg.style.color = 'var(--hi-negative)'; msg.textContent = '저장 실패: ' + e.message; }
};

// ── 스텁 함수 ──
window.runScoring = () => { alert('채점 기능은 준비 중입니다.'); };
// TODO: 아래 스텁을 blind_ryeo/admin.html의 runAiPick()을 참고해 실제 구현으로 교체
// (customPrompt 대신 AI_PICK_CRITERIA_PATH에서 불러온 criteria를 프롬프트에 삽입)
window.runAiPick = () => { alert('AI 픽 기능은 준비 중입니다.'); };
window.exportExcel = () => { alert('엑셀 내보내기 기능은 준비 중입니다.'); };
window.togglePick = async (id, isPicked) => {
  // TODO: 앱별 Firebase 경로로 교체
  // await update(ref(db, `APP_DATA/${id}`), { adminPick: isPicked ? null : true });
};
window.deleteItem = (id) => {
  if (!confirm('삭제하시겠습니까?')) return;
  // TODO: 앱별 Firebase 경로로 교체
  // remove(ref(db, `APP_DATA/${id}`));
};

// ── Firebase 구독 시작 ──
function startListening() {
  // TODO: onValue(...) 구독 코드 작성
  // onValue(ref(db, 'APP_DATA'), snap => { ... renderAll(); });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>

<!-- AI 설정 모달 -->
<div class="scoring-modal-backdrop" id="settings-modal-backdrop" onclick="if(event.target===this)closeSettingsModal()">
  <div class="scoring-modal">
    <div class="scoring-modal-title">AI 설정</div>
    <div class="modal-tabs" style="margin-bottom:14px;">
      <button class="modal-tab active" onclick="switchSettingsTab('scoring', this)">채점 프롬프트</button>
      <button class="modal-tab" onclick="switchSettingsTab('pick', this)">AI 픽 기준</button>
    </div>
    <div id="settings-panel-scoring">
      <p class="scoring-modal-desc">Claude가 학생 답변을 채점할 때 사용할 지침입니다.<br><code>{content}</code> 위치에 학생 답변이 삽입됩니다. 응답은 <code>pass</code> 또는 <code>fail</code>로만 하도록 지시해 주세요.</p>
      <textarea class="scoring-modal-textarea" id="scoring-prompt-textarea" placeholder="예) 다음 학생의 답변을 읽고, 기준에 부합하면 pass, 아니면 fail로만 답하세요.&#10;&#10;{content}"></textarea>
    </div>
    <div id="settings-panel-pick" style="display:none;">
      <p class="scoring-modal-desc">✨ AI 픽이 우수한 글을 고를 때 사용할 기준입니다. 한 줄에 기준 하나씩 자유롭게 작성하세요.</p>
      <textarea class="scoring-modal-textarea" id="ai-pick-criteria-textarea" placeholder="예)&#10;- 역사적 사실이나 맥락이 잘 반영된 글&#10;- 전체의 20~30% 내외 선정"></textarea>
    </div>
    <div class="scoring-modal-msg" id="settings-modal-msg"></div>
    <div class="scoring-modal-footer">
      <button class="hi-btn hi-btn-outline hi-btn-sm" onclick="closeSettingsModal()">취소</button>
      <button class="hi-btn hi-btn-primary hi-btn-sm" onclick="saveSettings()">저장</button>
    </div>
  </div>
</div>
</body>
</html>
