<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<meta name="theme-color" content="#121212">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HOISTORY">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-base:#121212;
  --bg-surface:#181818;
  --bg-mid:#1f1f1f;
  --bg-card:#252525;
  --bg-elevated:#2a2a2a;
  --accent:#1ed760;
  --accent-hover:#1fdf64;
  --text-base:#ffffff;
  --text-muted:#b3b3b3;
  --border:#4d4d4d;
  --negative:#f3727f;
  --shadow-card:rgba(0,0,0,0.3) 0px 8px 8px;
  --shadow-dialog:rgba(0,0,0,0.5) 0px 8px 24px;
}
html,body{background:var(--bg-base);font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;color:var(--text-base);-webkit-font-smoothing:antialiased}
body{overflow-x:hidden}

/* ===== Page Layout ===== */
.page{position:relative;z-index:1;padding:48px 40px 80px;max-width:1800px;margin:0 auto}

/* ===== Profile Header ===== */
.profile-area{text-align:center;margin-bottom:56px}
.avatar-ring{
  display:inline-flex;align-items:center;justify-content:center;
  width:108px;height:108px;border-radius:50%;
  background:var(--bg-mid);margin-bottom:18px;position:relative;
  box-shadow:var(--shadow-card),0 0 0 3px rgba(30,215,96,.15);
  overflow:hidden;
  transition:transform .3s ease,box-shadow .3s ease;
}
.avatar-ring:hover{
  transform:scale(1.04);
  box-shadow:var(--shadow-dialog),0 0 0 3px rgba(30,215,96,.35);
}
.avatar-img{width:100%;height:100%;object-fit:cover;display:block}
.profile-name{font-size:24px;font-weight:700;color:var(--text-base);letter-spacing:-.5px;line-height:1.2}
.profile-name span{color:var(--accent)}
.profile-sub{font-size:13px;color:var(--text-muted);margin-top:6px;letter-spacing:.5px;font-weight:400}

/* ===== PC: Dynamic Columns (1~4) ===== */
.sections-wrap{
  display:grid;gap:20px;
  width:100%;max-width:100%;
  grid-template-columns:repeat(4,minmax(0,1fr));
}

.section-col{display:flex;flex-direction:column;gap:14px;min-width:0;max-width:100%;overflow:hidden}
.section-header{padding:0 4px 12px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:6px}
.section-title-en{font-size:18px;font-weight:700;color:var(--text-base);letter-spacing:-.3px;line-height:1.3}
.section-title-ko{font-size:12px;font-weight:400;color:var(--text-muted);margin-top:4px;letter-spacing:.2px}

.section-cards{display:flex;flex-direction:column;gap:12px;min-height:60px}
.section-empty{font-size:12px;color:var(--text-muted);opacity:.5;padding:20px 8px;text-align:center;font-weight:400}

/* ===== Card (Rectangular) ===== */
.link-card{
  display:flex;align-items:center;gap:14px;
  background:var(--bg-surface);border-radius:8px;
  padding:14px 16px;cursor:pointer;text-decoration:none;
  position:relative;overflow:hidden;
  transition:background .2s ease,transform .15s ease,box-shadow .2s ease;
  min-height:72px;
}
.link-card:hover{background:var(--bg-card);transform:translateY(-1px);box-shadow:var(--shadow-card)}

.card-icon{
  width:44px;height:44px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
  background:var(--bg-mid);
}
.link-card:hover .card-icon{background:var(--bg-elevated)}

.card-text{flex:1;min-width:0}
.card-title{
  font-size:14px;font-weight:700;color:var(--text-base);
  line-height:1.4;letter-spacing:-.1px;
  word-break:keep-all;overflow-wrap:break-word;
}
.card-desc{
  font-size:12px;color:var(--text-muted);margin-top:4px;
  line-height:1.4;font-weight:400;
  word-break:keep-all;overflow-wrap:break-word;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}

/* Locked card */
.link-card.locked{opacity:.5;cursor:not-allowed}
.link-card.locked:hover{background:var(--bg-surface);transform:none;box-shadow:none}
.lock-badge{
  display:inline-block;margin-top:6px;
  font-size:10px;font-weight:600;
  padding:3px 9px;border-radius:9999px;
  background:var(--bg-mid);color:var(--text-muted);
  letter-spacing:1px;text-transform:uppercase;
}

/* ===== Mobile Accordion ===== */
.mobile-accordion{display:none}

/* ===== Empty State (no categories) ===== */
.empty-state{
  grid-column:1/-1;text-align:center;
  padding:60px 20px;color:var(--text-muted);
}
.empty-state-icon{font-size:48px;margin-bottom:16px;opacity:.5}
.empty-state-title{font-size:16px;font-weight:700;color:var(--text-base);margin-bottom:8px}
.empty-state-desc{font-size:13px;color:var(--text-muted);line-height:1.6}

/* ===== Footer ===== */
.footer{text-align:center;margin-top:64px}
.footer-tag{font-size:11px;color:var(--text-muted);opacity:.5;letter-spacing:1.4px;text-transform:uppercase;font-weight:400}
.footer-tag span{color:var(--accent)}

/* ===== Admin Button ===== */
.admin-row{
  display:flex;align-items:center;justify-content:center;
  gap:10px;margin:40px auto 0;
}
.admin-btn{
  background:var(--bg-mid);border:none;
  border-radius:9999px;padding:8px 20px;
  color:var(--text-muted);font-size:11px;font-weight:600;
  cursor:pointer;letter-spacing:1.4px;text-transform:uppercase;
  font-family:inherit;transition:background .2s,color .2s;
  text-decoration:none;display:inline-block;
}
.admin-btn:hover{background:var(--bg-card);color:var(--text-base)}
.version-tag{
  font-size:10px;font-weight:700;color:var(--text-muted);
  background:var(--bg-mid);border-radius:9999px;
  padding:5px 10px;letter-spacing:1.2px;
  font-family:inherit;opacity:.6;
}

/* ===== Loading ===== */
.loading-wrap{text-align:center;padding:40px;color:var(--text-muted);font-size:12px;font-weight:400;grid-column:1/-1}
.spinner{
  display:inline-block;width:20px;height:20px;
  border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== Mobile Responsive ===== */
@media(max-width:880px){
  .sections-wrap{display:none}
  .mobile-accordion{display:flex;flex-direction:column;gap:10px}

  .accordion-item{
    background:var(--bg-surface);border-radius:8px;
    overflow:hidden;transition:background .2s;
  }
  .accordion-header{
    width:100%;display:flex;align-items:center;justify-content:space-between;
    background:transparent;border:none;
    padding:18px 20px;cursor:pointer;
    color:var(--text-base);font-family:inherit;
    text-align:left;transition:background .2s;
  }
  .accordion-header:hover,
  .accordion-header.active{background:var(--bg-card)}
  .accordion-titles{flex:1;min-width:0}
  .accordion-title-en{
    font-size:15px;font-weight:700;color:var(--text-base);
    letter-spacing:-.2px;line-height:1.3;
  }
  .accordion-title-ko{
    font-size:11px;font-weight:400;color:var(--text-muted);
    margin-top:3px;letter-spacing:.2px;
  }
  .accordion-count{
    font-size:10px;font-weight:700;color:var(--text-muted);
    background:var(--bg-mid);border-radius:9999px;
    padding:4px 10px;letter-spacing:.8px;flex-shrink:0;margin-left:12px;
  }
  .accordion-content{
    max-height:0;overflow:hidden;
    transition:max-height .35s ease;
  }
  .accordion-content.open{max-height:3000px}
  .accordion-cards{display:flex;flex-direction:column;gap:10px;padding:4px 12px 16px}
  .accordion-empty{
    padding:20px;text-align:center;
    font-size:12px;color:var(--text-muted);opacity:.5;
  }

  .page{padding:32px 16px 60px}
  .profile-area{margin-bottom:36px}
  .profile-name{font-size:20px}
}
</style>
</head>
<body>

<div class="page">
  <div class="profile-area">
    <div class="avatar-ring">
      <img src="main.png" alt="김호성 선생님" class="avatar-img"
           onerror="this.style.display='none';this.parentNode.innerHTML='<span style=&quot;font-size:54px;&quot;>📚</span>'">

<!-- ===== PWA Install ===== -->
<script>
(function() {
  const btn = document.getElementById('install-btn');
  const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isSafari = /safari/i.test(navigator.userAgent) && !/CriOS|FxiOS|EdgiOS/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  let deferredPrompt = null;

  if (isStandalone) return;

  if (isIos && isSafari) {
    btn.style.display = 'inline-block';
  }

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    btn.style.display = 'inline-block';
  });

  window.addEventListener('appinstalled', () => {
    btn.style.display = 'none';
    deferredPrompt = null;
  });

  window.handleInstall = function() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(r => {
        deferredPrompt = null;
        if (r.outcome === 'accepted') btn.style.display = 'none';
      });
    } else if (isIos) {
      document.getElementById('ios-modal').style.display = 'flex';
    }
  };

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
})();
</script>

<!-- ===== Firebase ===== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
  authDomain: "ho0911seong-56638.firebaseapp.com",
  databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ho0911seong-56638",
  storageBucket: "ho0911seong-56638.firebasestorage.app",
  messagingSenderId: "994509567071",
  appId: "1:994509567071:web:8b33bb03a3d8f3a9f557ea"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 카테고리 구독 (새 구조: { list: [{key, en, ko}, ...] })
const catsDocRef = doc(db, "settings", "categories");
onSnapshot(catsDocRef, (snap) => {
  let list = [];
  if (snap.exists()) {
    const d = snap.data();
    if (Array.isArray(d.list)) list = d.list;
  }
  window._categoryList = list;
  if (window._cards) renderCards(window._cards);
}, (err) => console.error("category subscribe error:", err));

// 카드 구독
const q = query(collection(db, "cards"), orderBy("order", "asc"));
onSnapshot(q, (snapshot) => {
  const cards = [];
  snapshot.forEach(d => cards.push({ docId: d.id, ...d.data() }));
  window._cards = cards;
  renderCards(cards);
}, (err) => {
  console.error(err);
  document.getElementById('sectionsWrap').innerHTML =
    '<div class="loading-wrap" style="color:#f3727f">Firebase 연결 오류</div>';
});
</script>

<script>
/* ===== State ===== */
let openAccordions = new Set();

/* ===== Helpers ===== */
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function createCardEl(card) {
  const a = document.createElement('a');
  a.className = `link-card${card.locked ? ' locked' : ''}`;
  if (!card.locked) {
    a.href = card.url;
    a.target = '_blank';
    a.rel = 'noopener';
  }
  a.innerHTML = `
    <div class="card-icon">${escapeHtml(card.emoji || '📌')}</div>
    <div class="card-text">
      <div class="card-title">${escapeHtml(card.title || '')}</div>
      ${card.locked
        ? '<div class="lock-badge">🔒 준비 중</div>'
        : (card.desc ? `<div class="card-desc">${escapeHtml(card.desc)}</div>` : '')}
    </div>
  `;
  if (card.locked) a.onclick = e => e.preventDefault();
  return a;
}

/* ===== Render ===== */
function renderCards(cards) {
  const cats = window._categoryList || [];
  const pc = document.getElementById('sectionsWrap');
  const mob = document.getElementById('mobileAccordion');

  // 카테고리가 없으면 안내 메시지
  if (cats.length === 0) {
    pc.style.gridTemplateColumns = '1fr';
    pc.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📚</div>
        <div class="empty-state-title">아직 학습 자료가 준비되지 않았습니다</div>
        <div class="empty-state-desc">곧 새로운 역사 이야기로 찾아올게요!</div>
      </div>`;
    mob.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📚</div>
        <div class="empty-state-title">아직 학습 자료가 준비되지 않았습니다</div>
        <div class="empty-state-desc">곧 새로운 역사 이야기로 찾아올게요!</div>
      </div>`;
    return;
  }

  // 그룹핑 (분류 없는 카드는 학생 페이지에서는 표시 안 함)
  const grouped = {};
  cats.forEach(c => { grouped[c.key] = []; });
  (cards || []).forEach(c => {
    if (c.category && grouped[c.category] !== undefined) {
      grouped[c.category].push(c);
    }
  });

  // PC: 카테고리 수에 따라 동적 컬럼
  pc.style.gridTemplateColumns = `repeat(${cats.length}, minmax(0, 1fr))`;
  pc.innerHTML = '';
  cats.forEach(catObj => {
    const col = document.createElement('div');
    col.className = 'section-col';
    col.innerHTML = `
      <div class="section-header">
        <div class="section-title-en">${escapeHtml(catObj.en || '')}</div>
        <div class="section-title-ko">${escapeHtml(catObj.ko || '')}</div>
      </div>
      <div class="section-cards"></div>
    `;
    const box = col.querySelector('.section-cards');
    if (grouped[catObj.key].length === 0) {
      box.innerHTML = '<div class="section-empty">아직 비어있어요</div>';
    } else {
      grouped[catObj.key].forEach(card => box.appendChild(createCardEl(card)));
    }
    pc.appendChild(col);
  });

  // Mobile: 아코디언
  mob.innerHTML = '';
  cats.forEach(catObj => {
    const item = document.createElement('div');
    item.className = 'accordion-item';
    const count = grouped[catObj.key].length;
    const isOpen = openAccordions.has(catObj.key);
    item.innerHTML = `
      <button class="accordion-header${isOpen ? ' active' : ''}" onclick="toggleAccordion('${escapeHtml(catObj.key)}')">
        <div class="accordion-titles">
          <div class="accordion-title-en">${escapeHtml(catObj.en || '')}</div>
          <div class="accordion-title-ko">${escapeHtml(catObj.ko || '')}</div>
        </div>
        <span class="accordion-count">${count}</span>
      </button>
      <div class="accordion-content${isOpen ? ' open' : ''}">
        <div class="accordion-cards"></div>
      </div>
    `;
    const box = item.querySelector('.accordion-cards');
    if (grouped[catObj.key].length === 0) {
      box.innerHTML = '<div class="accordion-empty">아직 비어있어요</div>';
    } else {
      grouped[catObj.key].forEach(card => box.appendChild(createCardEl(card)));
    }
    mob.appendChild(item);
  });
}

/* ===== Mobile Accordion Toggle ===== */
function toggleAccordion(catKey) {
  if (openAccordions.has(catKey)) openAccordions.delete(catKey);
  else openAccordions.add(catKey);
  if (window._cards) renderCards(window._cards);
}
window.toggleAccordion = toggleAccordion;
</script>
