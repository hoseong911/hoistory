<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<style>
@font-face{font-family:'Paperlogy';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-6SemiBold.woff2') format('woff2');font-weight:600;font-style:normal;font-display:swap}
@font-face{font-family:'Paperlogy';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');font-weight:900;font-style:normal;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --canvas:#FAFAF9;--surface:#F4F3EE;
  --hairline:#E5E4DF;--hairline-soft:#ECEAE4;
  --ink-deep:#0A1317;--ink:#2C3333;--charcoal:#4A5568;--slate:#6B7280;--stone:#C4C4C4;
  --primary:#DB2777;--primary-deep:#9D174D;--primary-soft:rgba(219,39,119,0.09);--primary-l:rgba(219,39,119,0.10);--primary-m:rgba(219,39,119,0.18);
  --accent:#2DD4BF;--accent-deep:#0F766E;--accent-l:rgba(45,212,191,0.12);
  --shadow:rgba(20,22,26,0.10) 0px 1px 4px 0px;
  --shadow-hover:rgba(20,22,26,0.16) 0px 10px 24px 0px;
}
html,body{background:var(--surface);font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;color:var(--ink-deep);-webkit-font-smoothing:antialiased}
body{overflow-x:hidden}

/* ===== Page Layout ===== */
.page{position:relative;z-index:1;padding:48px 40px 80px;max-width:1560px;margin:0 auto}

/* ===== Profile Header ===== */
.profile-area{text-align:center;margin-bottom:44px}
.avatar-ring{
  display:inline-flex;align-items:center;justify-content:center;
  width:104px;height:104px;border-radius:50%;
  background:var(--canvas);margin-bottom:16px;position:relative;
  box-shadow:var(--shadow),0 0 0 3px var(--primary-l);
  overflow:hidden;border:1px solid var(--hairline-soft);
  transition:transform .3s ease,box-shadow .3s ease;
}
.avatar-ring:hover{transform:scale(1.04);box-shadow:var(--shadow-hover),0 0 0 3px var(--primary-m)}
.avatar-img{width:100%;height:100%;object-fit:cover;display:block}
.profile-name{font-family:'Paperlogy',sans-serif;font-weight:900;font-size:26px;color:var(--ink-deep);letter-spacing:.5px;line-height:1.2}
.profile-name span{color:var(--primary)}
.profile-sub{font-family:'Gowun Batang',serif;font-size:13px;color:var(--slate);margin-top:8px;letter-spacing:.2px}

/* ===== PC: Dynamic Columns ===== */
.sections-wrap{display:grid;gap:20px;width:100%;max-width:100%;grid-template-columns:repeat(4,minmax(0,1fr))}

/* ===== Section Card (LMS sec-card 스타일) ===== */
.sec-card{background:var(--canvas);border-radius:28px;overflow:hidden;border:1px solid var(--hairline-soft);box-shadow:var(--shadow);display:flex;flex-direction:column;min-width:0}
.sec-head{padding:20px 20px 16px}
.sec-name{font-family:'Paperlogy',sans-serif;font-weight:600;font-size:19px;line-height:1.3;color:var(--primary)}
.sec-name-ko{font-size:12px;color:var(--slate);margin-top:4px;font-weight:400}
.sec-divider{border:none;border-top:1px solid var(--hairline-soft);margin:0}
.sec-body{padding:16px;min-height:110px;flex:1}

/* ===== Icon Grid ===== */
.icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:14px 10px}
.icon-item{display:flex;flex-direction:column;align-items:center;gap:7px;text-decoration:none;cursor:pointer;background:none;border:none;font-family:inherit;padding:0}
.icon-box{width:100%;aspect-ratio:1;max-width:68px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;background:var(--primary-l);color:var(--primary);transition:transform .15s,box-shadow .15s,background .15s}
.icon-item:hover:not(.locked) .icon-box{transform:translateY(-3px);box-shadow:var(--shadow-hover);background:var(--primary-m)}
.icon-label{font-size:12.5px;font-weight:700;color:var(--ink-deep);text-align:center;line-height:1.35;word-break:keep-all;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.icon-item.locked{opacity:.45;cursor:not-allowed}
.icon-item.locked .icon-box{background:var(--surface);color:var(--stone)}
.icon-sublabel{font-size:10px;color:var(--slate);text-align:center;letter-spacing:.2px}
.section-empty{grid-column:1/-1;font-size:12px;color:var(--slate);opacity:.6;padding:24px 8px;text-align:center;font-weight:400}

/* ===== Empty State (no categories) ===== */
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;background:var(--canvas);border-radius:28px;border:1px solid var(--hairline-soft)}
.empty-state-icon{font-size:44px;margin-bottom:14px;opacity:.6}
.empty-state-title{font-family:'Paperlogy',sans-serif;font-weight:600;font-size:16px;color:var(--ink-deep);margin-bottom:8px}
.empty-state-desc{font-size:13px;color:var(--slate);line-height:1.6}

/* ===== Footer ===== */
.footer{text-align:center;margin-top:56px}
.footer-tag{font-family:'Gowun Batang',serif;font-size:12px;color:var(--slate);letter-spacing:.4px}
.footer-tag span{color:var(--primary)}

/* ===== Admin Row ===== */
.admin-row{display:flex;align-items:center;justify-content:center;gap:10px;margin:36px auto 0}
.admin-btn{
  background:var(--canvas);border:1.5px solid var(--hairline);
  border-radius:9999px;padding:8px 20px;
  color:var(--charcoal);font-size:12px;font-weight:700;
  cursor:pointer;letter-spacing:.4px;
  font-family:inherit;transition:background .2s,border-color .2s,color .2s;
  text-decoration:none;display:inline-block;
}
.admin-btn:hover{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}
.version-tag{
  font-size:11px;font-weight:700;color:var(--slate);
  background:var(--surface);border:1px solid var(--hairline-soft);border-radius:9999px;
  padding:5px 12px;letter-spacing:.4px;font-family:inherit;
}

/* ===== Loading ===== */
.loading-wrap{text-align:center;padding:40px;color:var(--slate);font-size:12px;font-weight:400;grid-column:1/-1}
.spinner{
  display:inline-block;width:20px;height:20px;
  border:2px solid var(--hairline);border-top-color:var(--primary);
  border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== Mobile Responsive ===== */
@media(max-width:880px){
  .sections-wrap{grid-template-columns:1fr}
  .page{padding:32px 16px 60px}
  .profile-area{margin-bottom:32px}
  .profile-name{font-size:22px}
}
</style>
</head>
<body>

<div class="page">
  <div class="profile-area">
    <div class="avatar-ring">
      <img src="main.png" alt="김호성 선생님" class="avatar-img"
           onerror="this.style.display='none';this.parentNode.innerHTML='<span style=&quot;font-size:50px;&quot;>📚</span>'">
    </div>
    <div class="profile-name"><span>김호성</span> 선생님</div>
    <div class="profile-sub">DIVE INTO HISTORY · @hoi_story_</div>
  </div>

  <div class="sections-wrap" id="sectionsWrap">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div>LOADING...</div>
    </div>
  </div>

  <div class="admin-row">
    <a class="admin-btn" href="admin.html">ADMIN</a>
    <button class="admin-btn" id="install-btn" style="display:none" onclick="handleInstall()">홈 화면에 추가</button>
    <span class="version-tag">v2.0.0</span>
  </div>

  <!-- iOS 안내 모달 -->
  <div id="ios-modal" style="display:none;position:fixed;inset:0;background:rgba(10,19,23,0.5);z-index:1000;align-items:center;justify-content:center;padding:24px;">
    <div style="background:#FAFAF9;border-radius:24px;padding:28px 24px;max-width:300px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.2);">
      <div style="font-size:32px;margin-bottom:12px;">📲</div>
      <div style="font-family:'Paperlogy',sans-serif;font-size:16px;font-weight:600;color:#0A1317;margin-bottom:18px;">홈 화면에 추가하기</div>
      <div style="font-size:13px;color:#4A5568;line-height:2.1;text-align:left;">
        <div>① Safari 하단 <strong style="color:#0A1317">공유 버튼 ⬆</strong> 을 누르세요</div>
        <div>② <strong style="color:#0A1317">'홈 화면에 추가'</strong> 를 선택하세요</div>
        <div>③ 오른쪽 위 <strong style="color:#0A1317">'추가'</strong> 를 탭하면 완료!</div>
      </div>
      <button onclick="document.getElementById('ios-modal').style.display='none'" style="margin-top:22px;width:100%;padding:13px;background:#DB2777;color:#fff;border:none;border-radius:100px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">확인</button>
    </div>
  </div>

  <div class="footer">
    <p class="footer-tag">역사는 즐겁다 <span>✦</span> Dive into HISTORY</p>
  </div>
</div>

<!-- ===== PWA Install ===== -->
<script>
(function() {
  const btn = document.getElementById('install-btn');
  const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isSafari = /safari/i.test(navigator.userAgent) && !/CriOS|FxiOS|EdgiOS/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  let deferredPrompt = null;

  if (isStandalone) return;

  if (isIos && isSafari) {
    btn.style.display = 'inline-block';
  }

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    btn.style.display = 'inline-block';
  });

  window.addEventListener('appinstalled', () => {
    btn.style.display = 'none';
    deferredPrompt = null;
  });

  window.handleInstall = function() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(r => {
        deferredPrompt = null;
        if (r.outcome === 'accepted') btn.style.display = 'none';
      });
    } else if (isIos) {
      document.getElementById('ios-modal').style.display = 'flex';
    }
  };

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
})();
</script>

<!-- ===== Firebase ===== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
  authDomain: "ho0911seong-56638.firebaseapp.com",
  databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ho0911seong-56638",
  storageBucket: "ho0911seong-56638.firebasestorage.app",
  messagingSenderId: "994509567071",
  appId: "1:994509567071:web:8b33bb03a3d8f3a9f557ea"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 카테고리 구독 (새 구조: { list: [{key, en, ko}, ...] })
const catsDocRef = doc(db, "settings", "categories");
onSnapshot(catsDocRef, (snap) => {
  let list = [];
  if (snap.exists()) {
    const d = snap.data();
    if (Array.isArray(d.list)) list = d.list;
  }
  window._categoryList = list;
  if (window._cards) renderCards(window._cards);
}, (err) => console.error("category subscribe error:", err));

// 카드 구독
const q = query(collection(db, "cards"), orderBy("order", "asc"));
onSnapshot(q, (snapshot) => {
  const cards = [];
  snapshot.forEach(d => cards.push({ docId: d.id, ...d.data() }));
  window._cards = cards;
  renderCards(cards);
}, (err) => {
  console.error(err);
  document.getElementById('sectionsWrap').innerHTML =
    '<div class="loading-wrap" style="color:#DC2626">Firebase 연결 오류</div>';
});
</script>

<script>
/* ===== Helpers ===== */
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function createIconItem(card) {
  const isLocked = !!card.locked;
  const el = document.createElement(isLocked ? 'div' : 'a');
  el.className = `icon-item${isLocked ? ' locked' : ''}`;
  if (!isLocked) {
    el.href = card.url;
    el.target = '_blank';
    el.rel = 'noopener';
  }
  el.innerHTML = `
    <div class="icon-box">${escapeHtml(card.emoji || '📌')}</div>
    <div class="icon-label">${escapeHtml(card.title || '')}</div>
    ${isLocked ? '<div class="icon-sublabel">🔒 준비 중</div>' : ''}
  `;
  return el;
}

/* ===== Render ===== */
function renderCards(cards) {
  const cats = window._categoryList || [];
  const wrap = document.getElementById('sectionsWrap');

  if (cats.length === 0) {
    wrap.style.gridTemplateColumns = '1fr';
    wrap.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📚</div>
        <div class="empty-state-title">아직 학습 자료가 준비되지 않았습니다</div>
        <div class="empty-state-desc">곧 새로운 역사 이야기로 찾아올게요!</div>
      </div>`;
    return;
  }

  // 그룹핑 (분류 없는 카드는 학생 페이지에서는 표시 안 함)
  const grouped = {};
  cats.forEach(c => { grouped[c.key] = []; });
  (cards || []).forEach(c => {
    if (c.category && grouped[c.category] !== undefined) {
      grouped[c.category].push(c);
    }
  });

  wrap.style.gridTemplateColumns = `repeat(${cats.length}, minmax(0, 1fr))`;
  wrap.innerHTML = '';
  cats.forEach(catObj => {
    const card = document.createElement('div');
    card.className = 'sec-card';
    card.innerHTML = `
      <div class="sec-head">
        <div class="sec-name">${escapeHtml(catObj.en || '')}</div>
        <div class="sec-name-ko">${escapeHtml(catObj.ko || '')}</div>
      </div>
      <hr class="sec-divider">
      <div class="sec-body"><div class="icon-grid"></div></div>
    `;
    const grid = card.querySelector('.icon-grid');
    const items = grouped[catObj.key];
    if (items.length === 0) {
      grid.innerHTML = '<div class="section-empty">아직 비어있어요</div>';
    } else {
      items.forEach(c => grid.appendChild(createIconItem(c)));
    }
    wrap.appendChild(card);
  });
}
</script>
