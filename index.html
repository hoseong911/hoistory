@font-face{font-family:'Paperlogy';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');font-weight:900;font-style:normal;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --canvas:#FAFAF9;--surface:#F4F3EE;
  --hairline:#E5E4DF;--hairline-soft:#ECEAE4;
  --ink-deep:#0A1317;--ink:#2C3333;--charcoal:#4A5568;--slate:#6B7280;--stone:#C4C4C4;
  --primary:#DB2777;--primary-deep:#9D174D;--primary-soft:rgba(219,39,119,0.09);--primary-l:rgba(219,39,119,0.10);--primary-m:rgba(219,39,119,0.18);
  --accent:#2DD4BF;--accent-deep:#0F766E;--accent-l:rgba(45,212,191,0.12);
  --shadow:rgba(20,22,26,0.10) 0px 1px 4px 0px;
  --shadow-hover:rgba(20,22,26,0.16) 0px 10px 24px 0px;
}
html,body{background:var(--surface);font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;color:var(--ink-deep);-webkit-font-smoothing:antialiased}
body{overflow-x:hidden}

/* ===== Page Layout (링크트리 스타일 단일 컬럼, PC·모바일 공통) ===== */
.page{position:relative;z-index:1;padding:48px 20px 80px;max-width:640px;margin:0 auto}

/* ===== Profile Header ===== */
.profile-area{text-align:center;margin-bottom:36px}
.avatar-ring{
  display:inline-flex;align-items:center;justify-content:center;
  width:104px;height:104px;border-radius:50%;
  background:var(--canvas);margin-bottom:16px;position:relative;
  box-shadow:var(--shadow),0 0 0 3px var(--primary-l);
  overflow:hidden;border:1px solid var(--hairline-soft);
  transition:transform .3s ease,box-shadow .3s ease;
}
.avatar-ring:hover{transform:scale(1.04);box-shadow:var(--shadow-hover),0 0 0 3px var(--primary-m)}
.avatar-img{width:100%;height:100%;object-fit:cover;display:block}
.profile-name{font-family:'Paperlogy',sans-serif;font-weight:900;font-size:26px;color:var(--ink-deep);letter-spacing:.5px;line-height:1.2}
.profile-name span{color:var(--primary)}
.profile-sub{font-family:'Gowun Batang',serif;font-size:13px;color:var(--slate);margin-top:8px;letter-spacing:.2px}

/* ===== LMS 진입 카드 ===== */
.lms-cta{
  display:flex;align-items:center;gap:16px;
  background:var(--primary);color:#fff;text-decoration:none;
  border-radius:24px;padding:22px 24px;margin-bottom:20px;
  box-shadow:var(--shadow);transition:transform .15s ease,box-shadow .15s ease;
}
.lms-cta:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover)}
.lms-cta-icon{
  width:52px;height:52px;border-radius:16px;flex-shrink:0;
  background:rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;font-size:26px;
}
.lms-cta-title{font-family:'Paperlogy',sans-serif;font-weight:900;font-size:19px;letter-spacing:.3px}
.lms-cta-sub{font-size:12.5px;color:rgba(255,255,255,0.78);margin-top:4px;letter-spacing:.1px}

/* ===== 아카이브 박스 (1차 아코디언) ===== */
.archive-box{background:var(--canvas);border:1px solid var(--hairline-soft);border-radius:24px;overflow:hidden;box-shadow:var(--shadow)}
.archive-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 22px;cursor:pointer;user-select:none;background:none;border:none;width:100%;font-family:inherit;text-align:left}
.archive-head-title{font-family:'Paperlogy',sans-serif;font-weight:600;font-size:15px;color:var(--ink-deep);letter-spacing:.2px}
.archive-head-sub{font-size:11.5px;color:var(--slate);margin-top:3px}
.archive-toggle-icon{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:var(--surface);color:var(--slate);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;transition:transform .25s ease,background .15s,color .15s;
}
.archive-box.open .archive-head{border-bottom:1px solid var(--hairline-soft)}
.archive-box.open .archive-toggle-icon{transform:rotate(45deg);background:var(--primary-l);color:var(--primary)}
.archive-collapse{display:grid;grid-template-rows:0fr;transition:grid-template-rows .32s ease}
.archive-box.open .archive-collapse{grid-template-rows:1fr}
.archive-body{overflow:hidden;min-height:0}

/* ===== 카테고리 아코디언 (2차 아코디언, 아카이브 박스 내부) ===== */
.cat-acc{border-top:1px solid var(--hairline-soft)}
.cat-acc:first-child{border-top:none}
.cat-acc-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 22px;cursor:pointer;user-select:none;background:none;border:none;width:100%;font-family:inherit;text-align:left}
.cat-acc-name{font-family:'Paperlogy',sans-serif;font-weight:600;font-size:14px;color:var(--primary)}
.cat-acc-name-ko{font-size:11px;color:var(--slate);margin-top:2px;font-weight:400}
.cat-acc-toggle{
  width:22px;height:22px;border-radius:50%;flex-shrink:0;
  background:var(--primary-l);color:var(--primary);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;transition:transform .22s ease;
}
.cat-acc.open .cat-acc-toggle{transform:rotate(45deg)}
.cat-acc-collapse{display:grid;grid-template-rows:0fr;transition:grid-template-rows .28s ease}
.cat-acc.open .cat-acc-collapse{grid-template-rows:1fr}
.cat-acc-panel{overflow:hidden;min-height:0}
.cat-acc-panel-inner{padding:6px 22px 20px}

/* ===== Icon Grid (카테고리 펼침 내용) ===== */
.icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:14px 10px}
.icon-item{display:flex;flex-direction:column;align-items:center;gap:7px;text-decoration:none;cursor:pointer;background:none;border:none;font-family:inherit;padding:0}
.icon-box{width:100%;aspect-ratio:1;max-width:68px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;background:var(--primary-l);color:var(--primary);transition:transform .15s,box-shadow .15s,background .15s}
.icon-item:hover:not(.locked) .icon-box{transform:translateY(-3px);box-shadow:var(--shadow-hover);background:var(--primary-m)}
.icon-label{font-size:12.5px;font-weight:700;color:var(--ink-deep);text-align:center;line-height:1.35;word-break:keep-all;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.icon-item.locked{opacity:.45;cursor:not-allowed}
.icon-item.locked .icon-box{background:var(--surface);color:var(--stone)}
.icon-sublabel{font-size:10px;color:var(--slate);text-align:center;letter-spacing:.2px}
.section-empty{font-size:12px;color:var(--slate);opacity:.6;padding:16px 4px;text-align:center;font-weight:400}

/* ===== Empty State (분류 자체가 없을 때) ===== */
.empty-state{text-align:center;padding:40px 20px}
.empty-state-icon{font-size:40px;margin-bottom:12px;opacity:.6}
.empty-state-title{font-family:'Paperlogy',sans-serif;font-weight:600;font-size:15px;color:var(--ink-deep);margin-bottom:8px}
.empty-state-desc{font-size:13px;color:var(--slate);line-height:1.6}

/* ===== Footer ===== */
.footer{text-align:center;margin-top:44px}
.footer-tag{font-family:'Gowun Batang',serif;font-size:12px;color:var(--slate);letter-spacing:.4px}
.footer-tag span{color:var(--primary)}

/* ===== Admin Row ===== */
.admin-row{display:flex;align-items:center;justify-content:center;gap:10px;margin:28px auto 0}
.admin-btn{
  background:var(--canvas);border:1.5px solid var(--hairline);
  border-radius:9999px;padding:8px 20px;
  color:var(--charcoal);font-size:12px;font-weight:700;
  cursor:pointer;letter-spacing:.4px;
  font-family:inherit;transition:background .2s,border-color .2s,color .2s;
  text-decoration:none;display:inline-block;
}
.admin-btn:hover{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}
.version-tag{
  font-size:11px;font-weight:700;color:var(--slate);
  background:var(--surface);border:1px solid var(--hairline-soft);border-radius:9999px;
  padding:5px 12px;letter-spacing:.4px;font-family:inherit;
}

/* ===== Loading ===== */
.loading-wrap{text-align:center;padding:32px;color:var(--slate);font-size:12px;font-weight:400}
.spinner{
  display:inline-block;width:20px;height:20px;
  border:2px solid var(--hairline);border-top-color:var(--primary);
  border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== Mobile Responsive ===== */
@media(max-width:480px){
  .page{padding:36px 14px 60px}
  .profile-area{margin-bottom:28px}
  .profile-name{font-size:22px}
  .lms-cta{padding:18px 18px;gap:12px}
  .lms-cta-icon{width:46px;height:46px;font-size:22px}
  .lms-cta-title{font-size:17px}
  .archive-head,.cat-acc-head{padding-left:18px;padding-right:18px}
  .cat-acc-panel-inner{padding-left:18px;padding-right:18px}
}
</style>
</head>

<!-- ===== PWA Install ===== -->
<script>
(function() {
  const btn = document.getElementById('install-btn');
  const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isSafari = /safari/i.test(navigator.userAgent) && !/CriOS|FxiOS|EdgiOS/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  let deferredPrompt = null;

  if (isStandalone) return;

  if (isIos && isSafari) {
    btn.style.display = 'inline-block';
  }

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    btn.style.display = 'inline-block';
  });

  window.addEventListener('appinstalled', () => {
    btn.style.display = 'none';
    deferredPrompt = null;
  });

  window.handleInstall = function() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(r => {
        deferredPrompt = null;
        if (r.outcome === 'accepted') btn.style.display = 'none';
      });
    } else if (isIos) {
      document.getElementById('ios-modal').style.display = 'flex';
    }
  };

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
})();
</script>

<!-- ===== Firebase ===== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDAc5S87JK-LtXzk5-iTR9rt7RnHWnUXTQ",
  authDomain: "ho0911seong-56638.firebaseapp.com",
  databaseURL: "https://ho0911seong-56638-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ho0911seong-56638",
  storageBucket: "ho0911seong-56638.firebasestorage.app",
  messagingSenderId: "994509567071",
  appId: "1:994509567071:web:8b33bb03a3d8f3a9f557ea"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 카테고리 구독 (새 구조: { list: [{key, en, ko}, ...] })
const catsDocRef = doc(db, "settings", "categories");
onSnapshot(catsDocRef, (snap) => {
  let list = [];
  if (snap.exists()) {
    const d = snap.data();
    if (Array.isArray(d.list)) list = d.list;
  }
  window._categoryList = list;
  if (window._cards) renderCards(window._cards);
}, (err) => console.error("category subscribe error:", err));

// 카드 구독
const q = query(collection(db, "cards"), orderBy("order", "asc"));
onSnapshot(q, (snapshot) => {
  const cards = [];
  snapshot.forEach(d => cards.push({ docId: d.id, ...d.data() }));
  window._cards = cards;
  renderCards(cards);
}, (err) => {
  console.error(err);
  document.getElementById('archiveBody').innerHTML =
    '<div class="loading-wrap" style="color:#DC2626">Firebase 연결 오류</div>';
});
</script>

<script>
/* ===== Helpers ===== */
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function createIconItem(card) {
  const isLocked = !!card.locked;
  const el = document.createElement(isLocked ? 'div' : 'a');
  el.className = `icon-item${isLocked ? ' locked' : ''}`;
  if (!isLocked) {
    el.href = card.url;
    el.target = '_blank';
    el.rel = 'noopener';
  }
  el.innerHTML = `
    <div class="icon-box">${escapeHtml(card.emoji || '📌')}</div>
    <div class="icon-label">${escapeHtml(card.title || '')}</div>
    ${isLocked ? '<div class="icon-sublabel">🔒 준비 중</div>' : ''}
  `;
  return el;
}

/* ===== Render (아카이브 박스 안에 카테고리별 2차 아코디언으로 렌더링) ===== */
function renderCards(cards) {
  const cats = window._categoryList || [];
  const body = document.getElementById('archiveBody');

  if (cats.length === 0) {
    body.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📚</div>
        <div class="empty-state-title">아직 학습 자료가 준비되지 않았습니다</div>
        <div class="empty-state-desc">곧 새로운 역사 이야기로 찾아올게요!</div>
      </div>`;
    return;
  }

  // 그룹핑 (분류 없는 카드는 학생 페이지에서는 표시 안 함)
  const grouped = {};
  cats.forEach(c => { grouped[c.key] = []; });
  (cards || []).forEach(c => {
    if (c.category && grouped[c.category] !== undefined) {
      grouped[c.category].push(c);
    }
  });

  body.innerHTML = '';
  cats.forEach(catObj => {
    const acc = document.createElement('div');
    acc.className = 'cat-acc';
    acc.innerHTML = `
      <button type="button" class="cat-acc-head">
        <div>
          <div class="cat-acc-name">${escapeHtml(catObj.en || '')}</div>
          <div class="cat-acc-name-ko">${escapeHtml(catObj.ko || '')}</div>
        </div>
        <span class="cat-acc-toggle">+</span>
      </button>
      <div class="cat-acc-collapse">
        <div class="cat-acc-panel"><div class="cat-acc-panel-inner"><div class="icon-grid"></div></div></div>
      </div>
    `;
    const grid = acc.querySelector('.icon-grid');
    const items = grouped[catObj.key];
    if (items.length === 0) {
      grid.innerHTML = '<div class="section-empty">아직 비어있어요</div>';
    } else {
      items.forEach(c => grid.appendChild(createIconItem(c)));
    }
    acc.querySelector('.cat-acc-head').addEventListener('click', () => {
      acc.classList.toggle('open');
    });
    body.appendChild(acc);
  });
}
</script>
